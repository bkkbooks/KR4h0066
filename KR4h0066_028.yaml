body:
  text: 十先生奧論注後集卷十三兩漢論戴溪蕭望之此篇論為小人所中夫小人之害君子必深明其情而後用其術故攻其所惡犯其所忌中其所不欲而致其所不樂其仁柔朴厚也或怵之其廉潔自喜也或汚之其剛果辨急也或激之多方以誤之百計以困之逼之辱之以致其必死之術有如君子一不能忍而决於速死則小人之計中矣故始而誤之終而困之逼之辱之而屹然不動則其為計也窮故君子不幸而至此當守死以俟命不當勇决以自殘非愛死而貪生也從容就義死於君命而不死於小人之術所以保全善類愛養國體破小人之奸謀而嚴於死生之際如此也人莫難於一死而處死有道善乎公冉務人之言曰若君命可死非君命何聽此可謂善處死之道矣哀哉望之之死也剛悻不屈志非不善也而卒為小人所中此可謂攻其所惡犯其所忌者矣上欲以周堪劉更生為諌大夫恭顯白皆以為中郎上器重蕭望之不已欲倚以為宰相恭顯及許史子弟皆側目於望之等更生乃使其外親上變事言地震殆為恭等不為三獨夫動宜退恭顯進望之等恭顯疑更生所為請考奸詐辭果復㑹望之子散騎中郎伋上書訟望之前事恭顯等知望之素髙節不屈辱建白望之前幸得不坐復賜爵邑不悔過服罪深懷怨望教子上書歸非於上非頗屈望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭太傳素剛安肯就吏恭等曰人命至重望之所坐語言薄罪必無所憂上乃可其奏使者召望之望之飲鴆自殺天子聞之召顯等責問以議不詳皆免冠謝良久然後已為大臣不當對吏固然也然文王囚於羑里從容演易亦自顧此心無愧爾史周紀西伯其囚羑里蓋益易之八卦為六十四卦孔子亦曰公冶長雖在縲紲之中非其罪也自漢以來將相大臣不幸坐獄罕自保全絶吭不食死於獄户者多矣夏侯勝黃霸繫獄再更冬講論不輟君子不以為愛死也哀哉望之之賢不少隱忍而卒為小人所中也雖然吾於更生之事有憾焉夫君子所以異於小人者謂其徇公而行無所用吾智也若猶用吾智雖公猶私也更生使其所親上書訟恭顯之惡而稱道望之之賢是猶未免用其私智也何以間執小人之口此固君子之所深忌而小人之所樂攻也哉劉向此篇論不避同姓之嫌漢懲七國之變疏逺同姓忘吕霍之禍親近外戚蓋恃外者易踈恃內者易親易疏者知其惡易親者忘其危事勢然也成帝時王氏用事劉氏微弱王氏子弟據滿朝廷劉氏遺老獨向一人位列大夫三十餘年曽不得一為九卿向少子歆天子欲以為中常侍而不可得王氏太橫矣王氏日强劉氏日危王氏日盛劉氏日孤此識者所為寒心也向不避同姓之嫌反覆論外戚同姓事詞語深切帝非不感悟為之悲傷嘆息卒不能奪王氏權豈非成帝至此猶有疑同姓之心耶劉向以王氏權位太盛而上方鄉詩書古文向乃著洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏權劉向謂陳湯曰外家日盛其漸必日危劉氏吾而不言誰當言者遂上封事極諫云云天子召見向嘆息悲傷其意謂向曰君且休矣吾將思之然終不能用其言向言及此豈自為地者帝㳂習故事思索利害寧信外戚不敢信同姓異時欲倚馮野王代王鳯亦王舅也慮不及宗室元帝時御史大夫李延壽卒在位多舉野王上使尚書選第中二千石而野王行能第一上曰吾用野王為三公後世必謂我私後宫親屬以野王為此乃詔曰剛疆堅固確然亡欲野王是也心辨善辭可使四方五鹿充宗是也亷潔節儉張談是也其以談為御史大夫上繇下苐而用談越次避嫌不用野王以昭儀兄故也野王乃嘆曰人皆以女寵貴我兄弟獨以賤成帝立有司奏野王王舅不宜備九卿位以秩出為上郡太守吾然後知朝錯削七國之禍其極乃至此也景帝即位錯說上曰大封同姓今吳王益驕恣謀亂逆削之亦反不削亦反吳主先起兵膠西膠東災川濟南楚趙亦皆反漢自吕氏三有外戚之變不少懲艾一有同姓之亂悔恨至今卒使王侯宗室厥角稽首陳說符命奉上璽綬取媚王氏以求免死可哀也已漢諸侯王為公者悉上璽綬為民無違命者莽曰嘉新公國師以符命為子四輔明德侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言或捕告反叛厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓昔周公弔二叔之不咸故大封同姓以藩屏周左傳僖二十四年富辰曰昔周公弔二叔之不咸故封建親戚以藩屛周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆邭文之昭也邦晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也注弔傷也咸同也周公傷夏殷之叔世疏其親戚以至滅亡故廣封其兄弟自今觀之二叔不咸固創艾同姓者而姬之子孫半為諸侯周既微弱實嘉賴此聖人之所為衆人固不識也孔光此篇論媚悅求寵古今君臣惟魏鄭公善納諫惟唐太宗善聽諌然鄭公身沒未幾或言其以諫草付史官太宗大怒已有仆碑停㛰之事徴亡帝思不已聞者媢之言徵嘗録前後諌爭語示史官褚遂良帝滋不悅乃停叔玉婚而仆所為碑顧其家衰矣君臣之問有遺恨焉甚矣太宗之不察也至今太宗之德巍然不可及冠絶漢唐者獨以鄭公諌草具存耳德宗謂諫官論事例自矜眩歸過於朕以自取名善乎陸宣公之言曰陛下若納諫不違則傳之適足增美若拒諌不納安能禁之勿傳使德宗能開懷納諫則陸宣公奏議數十條皆德宗盛德也夫從諫愈多則君德愈盛懼其不傳爾非懼其傳之廣也周書曰爾有嘉謀嘉猷則入告爾后于內爾乃順之於外曰斯謀斯猷惟我后之德夫嘉謀嘉猷雖出於人臣入告於君而君從之豈非其君之德乎為人君而與臣下爭名此豈盛德事乎自漢以來有事君為容悅者始以焚草削藁為忠夫人臣而招君之過以揚已取名如杜欽谷永輩是誠可罪矣若愛君深切言事懇到而避嫌逺禍以密語詭辭為忠則君臣之間未免有相疑之意此人臣不忠之利非社稷之福也吾觀孔光齷齪自守退縮多畏真聖人所謂鄙夫不可與事君者時有所言輒削草藁以為章主之過以奸忠直人臣大罪也孔光典樞機領尚書事十餘年守法度修政事上有所問據經法以心所安而對不希㫖苟合如或不從不敢强諫爭以是久而安時有所言輒削草藁以為彰主之過以奸忠直人臣大罪也有所薦舉惟恐其人聞知嗚呼彼亦安能有言哉就使有言其大體亦可略見矣存削草藁何足為輕重顧若此者夫亦致其小心媚悅之意以求寵於上此不忠之尤者人臣患不忠爾苟誠忠􅋀明言陰風無所忌諱君不以此疑其臣臣不以此疑其君開心見誠肝膽相照區區削藁何足計利害哉孔光之事非矣後之人或以削藁為忠尤而效之故不可以不辨張禹此篇論引經誤國漢羣臣率用經術决疑獄斷國論故事宰相至小吏皆喜任經術飾吏事天子亦重經術士士彬彬向文學矣然引經誤國未有過於張禹者禹通知論語為章句學者所尊重號張侯論天子皆從受大義至謂禹師傅親拜禹床下禹援據論語誤漢不細自夫子不語怪力亂神與子貢之屬不聞性與天道何與災異事切取以自文侮聖言欺君父罪不容於誅帝至張禹第辟左右用吏民所言王氏事示禹禹曰灾變之意深逺難見故聖人罕言命不語怪神性與天道自子貢之屬不得聞何况淺陋鄙儒之所言陛下宜修其政事以善應之與下同其福喜此經義意也唐柳公綽曰贓吏犯法法在奸吏舞法法亡小人不學無識公為不道雖背違經義經術猶在也身為儒者專門名經傳托經義誣罔一世經術亡矣禹以治論語為太子師傅至封侯為宰相子孫親戚皆至大官身享富貴窮奢極侈天子不負禹論語且不負禹矣禹獨負天子負論語乎成帝雅信重禹王氏不敢望當車駕自臨問屏辟左右時天子虛心聽受此可回之機也禹從容為天子陳說大義勸上屏絶聲色疏逺外家懇惻深切發於至誠成帝寬仁頗易感動一語存漢未可知也日暮途逺顧影自惜愛子念孫患得患失何暇問漢社稷耶一言喪邦張氏安矣王氏興矣劉氏其殆乎哀哉師丹此篇論言限田事嗚呼秦漢而下生民之不易可哀也已松柏之下其草不殖邑有甚富之家里有甚貧之民大較富之家一而貧之家千富之家十而貧之家萬舉天下不過為數十百富家而民生已無所容矣古之人所以惡兼并者非惡民之富也哀民之貧也哀民之貧而無䇿以救之則富與貧者俱困而已矣三代之民所以無凍餒之老者非必盡井田功也法制修明民志先定斯民不知為富之利故亦無欲富之心民不獨富則彼也兼足矣自秦以來閭閻市井之民患不富耳以匹夫而為王侯之事無不可者蕩然無限凡民皆有僣侈無上之心决性命以爭一旦之利當此時而欲行限田之制不亦難乎如賈誼所言漢風俗不美何異於秦永始四年詔書曰方今世風俗奢侈罔極靡有厭足若此而董仲舒師丹等方力言限田事宜其沮格不得行也初董仲舒說武帝限民名田以瞻不足及哀帝即位師丹復建言今纍世承平豪富吏民資數巨萬而貧弱愈困冝略為限天子下其議承相光大司馬武奏請自諸侯王列侯公主名田各有限關內侯受民田皆無過三十頃時貴戚近習皆不便也詔書且須後遂寢不行夫田不可井也又不可均也獨不可限乎限田可也特不可徒限耳然則如之何而可夫亦先限其心而已矣光武此篇論封禪封禪其秦漢之侈心乎文中子王道篇封禪之費非古也徒以夸天下其秦漢之侈心乎注始皇東巡上太山立石封祠下禪梁甫以頌秦德漢武帝用齊人公孫卿言封禪登仙遂升中嶽又上太山封王有玉牒使方士求神仙千數無驗而迥此皆夸侈以欺天下非事天致誠之本雖聖人復起不易斯言矣人之好自侈大何所不至哉極其侈大之意施於人無以加矣而復飾說以誣上天盛禮樂侈儀衛張大功德升中喬嶽告成于天若此可以明布天下誇示羣臣跨越前王傳誦來世此秦始皇之初心也後之人君曷為而效之有言亡秦之政於太平之時則聞者莫不惡之又從而罪之獨奈何效秦始皇之侈以為帝王之盛事乎就使前世帝王常行之始皇帝亦為之吾猶當廢之而况前世帝王未始行之秦始皇實始為之吾獨奈何效之吾觀秦漢以來致治之君幸而海內無事百姓安生業四海無外警則歉然以不得封禪為缺又幸而舉行是禮則君臣動色交相慶賀以為太平之極功其亦習於秦漢之事而不察於三代之故相仍而不可變耶漢光武唐太宗皆明智有餘而執德不堅始之所行未嘗不善終之所行乃大不然余是以知侈心之難忘也光武之言曰吾誰欺欺天乎曽謂泰山不如林放乎其自知甚明自處甚謙然未嘗以封禪為非是也羣臣上言即位三十年宜封禪封禪泰山詔曰即位三十年而百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汚七十二代之編録若郡縣逺遣吏上壽盛稱虛美必髠令屯田於是羣臣不敢復言他日感㑹昌之符欣然從之固亦不待勸請矣中元元年上讀河圖㑹昌符曰赤劉之九㑹命岱宗上感此文乃詔梁松等按索河圖䜟文言九世當封禪者凡三十六事於是張純等復奏請封禪上乃許焉登山以璽親封玉牒檢太宗之論又異於光武矣若曰天下乂安家給人足雖不封禪庸何傷乎秦始皇封禪而漢文帝不封禪後世豈以文帝之賢為不及始皇耶羣臣猶固請不已帝意欲從之獨魏鄭公以為時不可耳六年文武官復請封禪上曰卿輩皆以封禪為帝王之盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦從之魏徵獨以為不可上曰公不欲朕封禪者以功未髙邪曰髙矣德未厚邪曰厚矣中國未安邪曰安矣四夷未服邪曰服矣年穀未豐邪曰豐矣符瑞未至邪曰至矣然則何為不可封禪對曰陛下雖有此六者然承隋未大亂之後戶口未復倉廩尚虛而車駕東巡千乘萬騎其供頓勞費未易任也且陛下封禪則萬國咸集逺夷君長皆當扈從今自伊洛以東至于海岱煙火尚希葦芥極日此乃引夷狄入腹中示之以虛弱也况賞賚不資未厭逺人之望給復連年不償百姓之勞出示虛名而受實害陛下將焉用之㑹河南北數州大水事遂寢貞觀之末屢欲東封以事而止禮樂志十五年將東幸行至洛陽而彗星見乃止由此言之太宗非真知封禪之不足為魏鄭公非真知封禪之不可為意有所欲為事有所未可行待時而後動爾夫王者父事天母事地兆南郊而就陽因吉土以升中巡狩而告祭柴望對越上天可也燔燎於山下則固已畢祭矣登封於山上金泥玉檢之藏祕而不得宣果為何說是亦不過祕祝之意耳果何與於事天哉勞民費財上不足以格天而下無補於民徒事外虛名以驚世俗此三代聖人所决不為者後之儒者事至治之君當太平之時其母曰封禪云則善矣明帝此篇論失人君之體夫天下是非折於理不折於勢故君子論學不容以挾貴為也况夫天子有天下之尊意所子奪羣臣承望不及是是非非豈能盡當於天下之理乎漢明章皆崇儒重道之君也尊禮師傅是正經義豈不盡善盡美哉明帝臨幸辟雍自為辨說固已失人君之體矣永平二年十月幸辟雍祈行養老禮禮罪引桓榮父弟子升堂上自為辨說諸儒執經問難於前冠帶搢紳之人圜橋門而觀聽者蓋億萬計他日章帝患五經同異博集諸儒㑹議白虎觀天子稱制臨决校書郎楊終建言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則帝從之冬十一月壬戌詔太常將大夫博士郎官及諸儒㑹白虎觀議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝觀制臨决作白虎議奏名儒丁鴻樓望成封桓都班固賈逵及廣平王羡皆與焉固超之子也去聖久逺六經殘闕諸儒論難前後異說而欲以天子之尊臨定其是非於一言之間難矣哉夫有的於此十人射之不如百人之射謂其中者之多也當六經殘闕之餘諸儒各以其意說經一是一非何常之有並存不削以待後之人擇焉夫亦何惡於明經哉必將去彼取此則紛紛之見何時定乎嗚呼秦火漢壁之餘散失已久豈無字畫之訛義理之難曉哉蔡雍書五經文字刻石置諸太學觀者填咽亦安保其無失也靈帝熹平四年三月詔諸儒正五經文字命議郎蔡雍為古文篆𨽻三體書之刻石立于太學門外使後儒晚學咸取正焉碑始立其觀視及摹寫者車來日千餘兩填塞街陌孔頴逹等作五經正義雜取䜟諱之說以為注疏之學又惡可盡信乎貞觀十四年大徵天下名儒為學官數幸國子監使之講論上以師說多門章句繁雜命孔頴逹與諸生撰定五經疏謂之正義令學者習之自宣帝講五經於石渠已不能行於後世甘露三年詔諸儒講五經同異蕭望之等平奏其義上親稱制臨决焉韋元成受詔與五經諸儒雜論同異於石渠閣章帝復踵宣帝故事天子自定其是非惡保其久而不變乎夫天子之尊不當自用其聰明也隋煬帝自以詩名而忌羣臣之能此固不足責矣帝善屬文不欲人屈其右薛道衡被誣縊死帝曰更能作空梁落燕泥否王胄附楊𤣥感誅帝誦其佳句曰庭草無人隨意緑復能作此語邪帝自負才學每驕天下上嘗謂侍臣曰設令朕與士大夫髙選亦當為天子矣唐太宗命羣臣修晉史而加以御製為人君亦安用修史為也自秦漢以來小人事君為容悅者惡羣臣異議始勸人君自為制作以震服羣臣杜周欲人主自為法令周為廷尉而善候伺上欲擠者因而陷之上所欲釋久繫待問而微見其寃狀客有謂周曰君為天下决平不循三尺法專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎兒寬勸人主自為禮樂武帝議欲放古巡狩封禪之事諸儒對者五十餘人未能有所定上問寬寬對曰唯聖王所由制定其當非羣臣之所能列今將舉大事優游數年使羣臣得人自盡終莫能成上然之乃自制儀采儒術以文焉此豈可以為法哉曹褒此篇論不能制禮劉向嘗論禮以養人為本今有司請定法削則削筆則筆至於禮樂則曰不敢是敢於殺人而不敢於養人也惑莫甚焉夫去古既逺禮廢已久上之人牽文拘義無所制作下之人自出私意為淺陋鄙俚之習誠可怪笑若依倣古道增損時宜以教天下一洗世俗之習雖未必盡先王之舊不猶愈於無禮乎然則魯兩生之迂不若叔孫通之知世務通說上起朝儀曰願頗采古禮與秦儀雜就之於是徵魯諸生三十餘人魯有兩生不肯行曰禮樂所由起百年積德而後可興也吾不行通笑曰若真鄙儒不知時變遂與所徵三十人面云云因進曰諸弟子儒乃生隨臣久矣與其為儀願陛下官之帝悉以為郎諸生喜曰叔孫生聖人知當世務巢太常之拘攣不若曹褒之簡易明矣博士魯國曹褒上疏以為宜定文制著成漢禮大常巢堪以為一世之大典非褒所定不可許帝知諸儒拘攣難與圖始朝廷禮憲宜以時立乃拜褒侍中𤣥武司馬班固以為宜廣集諸儒共議得失帝曰語云作舍道傍三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣天下之事惟其未成也則可成如其已成則止此而已矣向使髙惠之時庶事草創漢儀未就典禮尚缺有如文帝之寬仁天下和平輔以賈誼興禮樂之言雖欲謙遜未遑不可得也光武中興至肅宗三世矣海內富庶百姓安堵興辟雍建明堂封禪養老禮樂彬然盛矣使博集諸儒建一世之典漢禮樂尚有望也曹褒何人獨當是責依凖舊典參以䜟記之文尚得為禮乎遂使賢明之君因陋就簡安於小成厯世相㳂浸成故事漢采秦儀唐采漢禮三代之典日逺日亡此豈非輕議禮樂之故歟嗚呼後之天下豈復有禮哉其存於世者法而已矣今之豪民自為禮樂其所不得為者豈畏禮哉畏法而已矣彼漢之禮與法令同藏於理官則禮之為法其來久矣且令法令明備上下有等踰者有罪而今之豪民田宅衣服奢侈如故也今將去法從禮使天下之人從事於勞苦降心儉約盤辟傴僂以周旋於升降揖遜之間則有非笑不為而已矣故古之王者治定制禮非謂禮之難為也謂其治未定而禮樂無所用之也故莫若先定人心使天下之人明教化而安亷恥無有乖爭陵犯之意以為禮樂之地徐為之品節則禮行而天下服矣然則後之人君欲為禮樂者其亦先為禮樂之地而已矣十先生奧論注後集卷十三
