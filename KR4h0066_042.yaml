body:
  text: 十先生奧論注續集卷十二治道論葉適府兵此篇論古者教民欲使自衛前輩論府兵皆以為兵農之合唐兵志古者兵法起於井田自周衰王制壞而不復至於府兵始一寓之於農其居處教養畜材待事動作休息皆有節目雖不能盡合古法蓋得其大意焉子細考驗却不然府兵之立乃是兵農之分而儒者但説先王寓兵於農先王何曾寓兵於農治天下之道分田使之耕築室使之居既有以衣食之則不可無以自衛故教之為兵本以自衛非以求勝亦非用是以求勝故天下之民皆可以為兵先王以仁天下為心只就他身上理會調發征行所以用也皆有常數其後春秋戰國力爭本是自要爭土地計較勝負竭民以從之孟子離婁爭地以戰殺人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死云云盡心下梁惠王以土地之故麋爛其民而戰之大敗將復之恐不能勝故驅其所愛子弟以殉之云云秦之末世至白取民為兵窮邊極逺終嵗暴露卒死於鋒鏑之下漢食貨志至秦則不然月為更卒已復為正一嵗屯戍一嵗力役三十倍於古師古曰更卒謂給郡縣一身而更者也正卒謂給中都官者率計今人一嵗之中屯戍及力役之事三十倍多於古也至於室家不相保父子不相見漢世蓋嘗㨂精鋭特置名號别立營屯要之其數甚少或大征伐盡是發天下民為兵苻堅欲伐晉自言計吾士卒可得九十七萬通鑑晉武帝紀寧康七年秦王堅會羣臣於太極殿議曰自吾承業垂三十載四方略定惟東南一隅未霑王化今略計士卒可得九十七萬吾欲自將以討之何如朱彤曰陛下恭行天罰必有征無戰此千載一時也堅喜曰是吾志也當是之時天下蕭然何緣得許多兵蓋將民數盡計之大舉伐晉民皆盡發西魏宇文周所以就中間别立頭項蓋蘇綽輩稍欲休息其民遂令各募一項人為兵蠲除科徭不復他役國家既可以長享為兵之利而民得家出一人之外亦且可以自安唐兵志府兵之制起自西魏後周而備於隋又通鑑魏敬宗大統三年安定公宇文泰始籍民之才力者為府兵身租庸調一切蠲之以農隙閲戰陳馬畜糧備六家供之合為百府一郎將主之分屬二十四軍泰任總百揆督中外諸軍後來法度漸修立至太宗府衛既成唐兵志太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內三百六十有一皆以隸諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各十人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵武騎凡發兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行農遂不復為兵亦不復為農兵農之分所以終不復合人但見其寓兵於農便以為得先王之意見上假注蓋不細考耳及府兵法變而安史之亂天下復被為兵之苦杜子美有詩數篇皆言此事蓋民之為府衛者既得以免征徭之患有復除之利而其他在野之民不知為兵於民則有利遂至今日先王之制不可復反亦是置府兵之過何者蓋當時府兵既立上面一段事都忘了不知民皆當為兵但記得府衛耳所以府兵既壞不得不變為彍騎唐兵志自髙宗武后時天下久不用兵府兵之法寖壞當役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛十一年命蕭嵩與州吏共選之明年更號曰彍騎十三年始以彍騎分𨽻十二衛總十二萬為六畨也又不得不變為藩鎮同上初府兵之置居無事時耕於野其畨上者宿衛京師而已若四方有事則命將以出事解輒罷兵散于府將歸于朝故士不失業而將帥無握兵之重所以防微杜漸絶禍亂之萌也及府兵法壞而方鎮盛武夫悍將無事時據要險專方面既有其土地又有其人民又有其甲兵又有其財賦以布列天下然則方鎮不得不強京師不得不弱故曰措置之勢使然者以此也夫所謂方鎮者節度之兵也原其始起於邊將之屯防者朝廷自募人為兵通鑑玄宗紀初府衛兵自成丁從軍六十而免其家又不免雜徭浸以貧弱逃亡略盡百姓苦之張説建議請召募壯士充宿衛不問等色優為之制逋逃者必爭出應募帝從之旬日得精兵十三萬分隸更畨上下又唐兵志德宗建中四年下詔募兵云云竭太府之財以養之如京師養兵使官官掌之唐兵志上元中以北衙軍使衛伯玉為神策軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍又通鑑德宗紀初魚朝恩既誅代宗不復使宦者典兵帝即位悉以禁兵委白志貞志貞得罪帝復以宦官竇文瑒代之從幸山南兩軍漸集帝還長安頗忌宿將握兵多者稍稍罷之十月以文瑒監神䇿左廂兵馬使王希遷監右廂兵馬使始令官者分典禁旅藩鎮各自募人為兵亦竭境內之財以養之此內有禁兵外有藩鎮之兵如李泌之流但知府衛當復通鑑德宗紀貞元二年初上與常侍李泌議復府兵李泌因為上歷敘府兵自西魏以來廢興之由但言府兵平日安居田畝每府有折衝領之折衝以農隙教習戰陳國家有事徵發則以符契下其州及府參驗發之至所期處將帥按閲有教習不精者罪其折衝甚者罪及刺史軍還則賜勳加賞云云陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之詔十六衛各置上將軍以寵功臣改神策左右廂為左右神策軍殿前射生左右廂為殿前左右射生軍各置大將軍二人將軍二人而不知先王之意自後鎮兵日重至五代人主之廢置社稷之安危國家之存亡皆兵執其權太祖因之內聚重兵於京師外而分戍天下自此綿延遂以養兵為重如歐公所言兵散于府將歸于朝故士無失業而將無握兵之重見上段注皆習見近日養兵之多治兵之難所以思府衛為善其實以五帝三王本末源流論之府衛成而兵法益壞乃是苟一時利民之近效而非古人經國之逺圖苟簡做成使天下知有府兵而不知先王之制至府兵既壞遂為今日養兵之禍舉天下之大養百萬之兵不耕不戰坐食縣官天下之財自十八以上皆以供軍所以謀臣智士朝夕經營弊精疲力奔走議論窮年卒世而無所定此豈禮樂之未明教化之未備只緣許多兵在這裏措置不暇遑遑汲汲竟無了時若就唐論之其置兵却稍善捍邊之兵各自精鋭練習足以當疆場之事而內郡不知有邊鄙之警或征伐四夷不過間遣將發少兵以助之當唐之盛所以能常以少弱擊衆大拓地最廣滅國最多而不見用兵之難然府兵所以易壞者亦緣立法太密上下急迫蓋使人長為兵則一家之賦稅皆當盡免若京師宿衛之兵則當參用漢法時復募人如五校羽林佽飛之類漢武帝紀朝鮮攻殺遼東都尉募天下死罪擊朝鮮又宣帝紀神爵元年西羌反發三輔中都官徒弛刑及應募佽飛射士蓋府兵近處畨上猶可其在外郡逺處如何教他來得唐兵志府兵之制起自西魏後周云云凡當宿衛者畨上兵部以逺近給畨又魏徴傳比者疲於徭役關中之人尤甚雜匠當下雇而不遣正兵畨上復别驅使市物繦屬於㕓遞送相望於道脫有一穀不收百姓之心不能如前日之帖泰此不克終十漸也太宗要合天下之大做一國做了殊不知成周所以立法最詳而不覺其煩碎者成周止治一國不過王畿千里之內今若舉天下之大州府縣道必欲盡發兵於京師此不可在逺者只可使自衛其郡縣若使人人必要都來京師此事甚難不可行天寶以後人主甘心於邊功大段調發逺戍民益無以為生杜子美所謂一從十五北防河便至四十西營田去時里正與裹頭歸來頭白還戍邊見老杜詩太宗初無邊戍之事若當時立法稍寬雖有暴君汚吏亦未敢盡廢惟其立法太密所以易弊也今舉天下之財盡以養兵猶且不敢憚當時若蠲免數十萬家未能當數郡之賦入何故不為耶租庸調此篇論吉者之田無不在官自古天下之田無不在官民未嘗得私有之但強者力多却能兼并衆人之利以為富弱者無力不能自耕其所有之田以至轉徙流蕩故先王之政設田官以授天下之田周禮地官遂人以嵗時稽其人民而授之田野辨田其野之土上地中地下地以頒田里上地夫一㕓百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之縣正各掌其縣之政令徴此以頒田里貧富強弱無以相過使各有其田得以自耕故天下無甚貧甚富之民至成周時其法極備雖周禮地官所載其間不能無牽合抵牾處要其大略亦可見周公治周授田之制先治天下之田以為井禮冬官考工記匠人九夫為井又地官小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都孟子滕文上方里而井井九百畝其中為公田八家皆私百畝同養公田井為疆界嵗嵗用人力修治之溝洫畎澮皆有定數同上遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以達于畿又冬官匠人九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達于川各載其名疆井既定人無緣得占田其間固有弱者遊手者不耕却無強民貪并之害後來井田不修隄防浸失毁壞絶滅至商鞅用秦已不復有井田之舊於是開阡陌前食貨志秦孝公用商君壞井田阡陌既開天下之田却簡直易見看耕得多少惟恐人無力以耕之故秦漢之際有豪強兼并之患富者田連阡陌而貧者無立錐之地同上秦用商鞅之法改帝王之制除井田民得自賣買富者田連阡陌貧者無立錐之地雖然如此猶不明説在民但官不得治故民得自侵占而貧者插手不得不去而為遊手轉而為末業終漢之世以文景之恭儉愛民孝景贊漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載至於移風昜俗黎民醇厚又武帝贊如武帝之雄材大略不改文景之恭儉以濟斯民雖詩書所稱何以加焉武帝之修立法度漢本贊孝武初立卓然罷黜百家表章六經遂疇咨海內舉其俊茂與之立功興太學修郊祀改正朔定厯數叶音述律作詩樂建封禪禮百神紹周後號令文章煥然可宣帝之勵精為治前魏相傳帝親萬幾厲精為治練羣臣核名實却不知其本不如此但能下勸農之詔文帝紀二年正月詔曰夫農也者天下之大本也其開籍田朕親率耕以給粢盛又詔曰農者天下之大本也民所恃以生也今親率羣臣農以勸之又十三年二月詔曰朕親率天下農耕以供粢盛六月詔曰農天下之本務莫大馬景帝紀二年詔曰欲天下務農蠶輕減田租漢初十五而稅一文帝二年減今年田租之半十二年賜今年田租之半十三年除田之租稅孝景帝即位減田租故食貨志云文帝乃下詔賜民十二年租稅之半明年遂除田之租稅後十三歲孝景二年令民平出田租稅之半以來天下之民如董仲舒師丹雖建議欲限天下之田食貨志董仲舒上疏曰秦用商鞅之法改帝王之制除井田民得賣買云云漢典循而未改古井田法雖難卒行宜少近古限民名田以瞻不足塞并兼之路鹽鐡皆歸於民去奴婢専殺之威薄賦斂省繇役以寬民力然後可善治也又哀帝即位師丹輔政因建言古之聖人莫不設井田然復治乃可平天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關內侯吏民名田皆毋過二十頃云云丁傅用事董賢隆貴皆不便也詔書且須後寢不行其制度又却與三代不合當時但問墾田幾畝全不知是誰田又不知天下之民皆可以得田而耕之光武中興亦只是問天下度田多少後劉隆傳隆守南郡太守時天下墾田多不以實又戶口年紀互有增減詔下州郡檢核其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨時諸郡各遣吏奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏由趣吏不肯服時顯宗年十二在幄後言曰吏受郡敕當欲以墾田相方耳帝曰即如此何故曰潁川𢎞農可問河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁將詰問吏乃實首服如顯宗對於是遣謁者考實具知姦狀隆下獄其儔輩十餘人皆死當時以度田不實長吏坐死者無數至於漢亡三國並立民既死於兵革之餘未至繁息天下皆為曠土未及富盛而天下大亂雖當時天下之田既不在官又亦終不在民以為在官則官無人收管以為在民則又無簿籍契劵但隨其力之所能至而耕之元魏稍立田制通典後魏孝文太和初李安世上疏曰量地畫野經國大式邑地相參政理之本井稅之興其來久矣田萊之數制之以限蓋欲使土不曠功民罔遊力雄擅之家不獨膏腴之美簞瓢之夫亦有頃畝之分云云愚謂今桑井難復宜更均量審其經術分藝有凖力業相稱細人獲資生之利豪右靡餘地之贏無私之澤均播兆庶所爭之田宜限年斷然後虛詐之人絶於覬覦守分之士免於陵奪帝深納之均田之制起於此九年詔均給天下人田男十五以上受露田四十畝婦二十畝至於北齊後周皆相承授民田隋食貨志齊河清三年定令百姓請墾田者名為永田其方百里外州人一夫受露田八十畝婦四十畝又每丁給永業二十畝為桑田又同上後周創制六官載師掌任土之法司均掌田里之政令司賦掌功賦之政令其初亦未嘗無法度但末年推行不到頭其法度亦是空立唐興只因元魏北齊制度而損益之其度田之法闊一步長二百四十步為畝百畝為頃一夫受田一頃唐食貨志唐制度田以步其闊一步其長二百四十步為畝百畝為頃凡民始生為黃至四歲為小十六為中二十一為丁六十為老授田之制丁及男年十八以上人一頃其八十畝為口分二十畝為永業老及篤疾廢疾者人四十畝寡妻妾三十畝當戶者增二十畝為永業其餘為口分田多可以足其人者為寬鄉少者為狹鄉凡庶人徙鄉及貧無以葬者得賣世業田自狹鄉而徙寬鄉者得并賣口分田已賣者不復授死者收之以授無田者周制乃是百步為畝見上注唐却是二倍有餘此一項制度與成周不合八十畝為口分二十畝為世業世業是一家之田口分須據本來人數占田多少見上注周制八家皆百畝孟子滕文公上使畢戰問井地孟子曰云云方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事所以别野人也此其大略也唐制若子弟多則占田愈多此又二項與成周不合所謂田多可以足其人者為寬鄉少者為狹鄉狹鄉之田減寬鄉之半其地有厚薄嵗一易者倍授之寬鄉三易者不倍授工商者寬鄉減半狹鄉不給見上注亦與周制不同先王建國只是有分土無分民但付人以百畝之地任其自治蓋治之有倫則地雖不足民有餘苟不能治或德不足以懷柔民不心恱而至則地雖多而民反少唐既止用守令為治則分田之時不當先論寬鄉狹鄉當以土論不當以人論今却寬鄉自得多狹鄉自得少自狹鄉徙寬鄉者又得并賣口分永業而去見上段注成周之制雖是授田與民其間水旱之不時凶荒之不常上又有賑貸救恤使之可以相補助而不至匱乏周禮地官廪人凡萬民之食食者人四釜上也人二釜下也若食不能人二釜則令邦移民就穀倉人辭九穀之物以待邦用若穀不足則止餘法用有餘則藏之以待凶而頒之司稼掌均萬民之食而稠其急而平其與云云若唐但知授田而已而無補助之法縱立義倉賑給之名唐食貨志自太宗時置義倉及常平倉以備凶荒髙宗以後稍假義倉以給軍費至神龍中略盡玄宗即位復置之其後第五琦請天下常平倉皆置庫以畜本錢至是趙贊又言置常平輕重本錢積米粟布帛絲麻貴則下價而出之賤則加估而收之諸道津會置吏閲商賈錢每緍稅二十竹木茶稅十之一以贍常平本嵗有凶荒則有社倉賑給不足則徙民就食諸州尚書左丞戴胄建議自王公以下計墾田秋熟所在為義倉嵗凶以給民上善之後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著為令而既令自賣其田便無恤民之實矣周之制最不容民遷徙惟有罪則徙之禮記王制公家不畜刑人大夫弗養士遇之塗弗與言也罪之四方唯其所之不及以政示弗故生也唐却容他自遷徙并得自賣口分之田見上段注方授田之初其制己自不可久又許之自賣民始有契約文書而得以私相賣易故唐之比前世其法雖為粗立然先王之法亦自此大壞矣後世但知貞觀之治執之以為據故公田始變為私田而田終不可收蓋緣他立賣田之法所以必至此租庸之法每丁入粟二石為租調隨土地所宜綾絹絁布皆有差用民之力嵗役不過二旬不役則收其庸日三尺唐食貨志凡授田者丁嵗輸粟稻謂之租丁隨鄉所出嵗輸絹綾絁綿謂之調用人之力嵗二十日不役者日為絹三尺謂之庸此即孟子所謂粟米之征布縷之征力役之征也然孟子却云用其一緩其二不敢兼用以取民孟盡心下有布縷之征粟米之征力役之征君子用其一緩其二用其二而民有殍用其三而父子離唐初正要立法之時乃用戰國苟簡之法盡取諸民周制用民嵗不過三曰王制用民之力嵗不過三日雖立法於此其實未嘗盡用今唐用民力非特倍其六七為一定之制否則必收其庸此正犯孟子之所諱蓋唐初君臣不學無術所以至此其間有近古處如里有手實具民之年與地闊狹為鄉帳鄉成於縣縣成於州州成於戶部唐百官志戶部郎中員外郎掌戶部土田賦役貢獻蠲免優復姻婚繼嗣之事以男女之黃小中丁老為之帳籍古者所謂均民之田先自比閭族黨始以至于國都而後達于王府所謂民之貧富有無強弱之數都要自夫至纎至悉處做成而唐亦能自根本處做去但其後無繼耳如國有所輸先奏而斂凡嵗斂之數書于縣門坊村與衆知之此却是他元立法好處當時先王分民以田自至纎至悉處皆與民謀慮經營朝廷之上所以建官立司又是為民而設所以做得一件事成今其勤勞憂嘆之詩可見唐但付其法於守令唐百官志縣令一人從七品凡民田收授縣令給之每嵗季冬縣尉分判衆曹收率課調又玄宗開元八年頒庸調法于天下然是時天下戶未嘗升降宇文融獻策括籍外羡田逃戶自占者給復五年每丁稅錢千五百以攝御史分行括實二十二年詔州縣上戶口登耗採訪使覆實之刺史縣令以為課最守令既不能遍行其境內故雖有良法美意竟做不成何况又有苟簡處雖是授田有式租庸調取民有定分見上段注又食貨志唐之始時授人以口分世業田而取之以租庸之法只緣當時許其賣易未幾天下之田十已八七變為私田矣其後官雖欲授民己自無田由此田制易壞至于今官私遂各自立境界民有沒入官者則封固之時或召賣不容民自籍所謂私田官執其契劵以各征其直要知田制所以壞乃是唐世使民得自賣其田始前世雖不立法其田不在官亦不在民唐世雖有公田之名而有私田之實其後兵革既起征斂煩重遂雜取於民同上趙贊言諸道津會置吏閲商賈錢每緍稅二十竹木茶漆稅十之一以贍常平本錢德宗納其言屬軍興用迫蹴亦隨而耗竭不能備常平積趙贊復請稅間架算除陌而民益愁怨餘見下段注逺近異法內外異制而民得自有其田而公賣之天下紛紛遂相兼并故不得不變而為兩稅唐食貨志由是財利之説興聚斂之臣進蓋口分世業之田壞而為兼并租庸調之法壞而為兩稅至於鹽鐡轉運屯田和糴鑄錢括苗榷利借商進奉獻助無所不為矣蓋愈煩而愈弊以至於亡焉云云要知其弊實出於此禮樂此篇論唐世禮備樂缺唐世禮備樂缺唐志所載其間儀品最密節目最詳貞觀初己自行得一畨上下儀制整肅施之宗廟朝廷交際各有其節唐禮樂志唐初即用隋禮至太宗時中書令房玄齡祕書監魏徴與禮官學士等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后太子入學太常行陵合朔陳兵大社等為吉禮六十一篇賓禮四篇軍禮二十篇嘉禮四十二篇凶禮十一篇是為貞觀禮張説開元禮又從而為繁縟盛大之文蓋遺文古事在開元方始畢具張説適當盛時故能銓採詳備如此同上玄宗開元十年以國子祭酒韋縚為禮儀便以掌五禮王嵒上疏請刪去禮記舊文而益以今事張説以為禮記不刋之典不可改易唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔徐堅王仲丘等撰定為百五十卷是為大唐開元禮是以唐之五禮之文始備而後世用之雖時有所損益不能過也云云考其文記可謂備矣以之施於貞觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虛名也歟云云禮樂既至開元而備然自此亦遂壞矣古之聖人以禮樂治天下因人情而不敢過使之上下可以通行此所謂就他本根處做工夫後世為禮苟簡但文飾已備便休更不復以推行堅久為意而以禮文亟備為心所以開元之後人主狃於奢泰隄防決壞别開門路遂至崇非聖之書行不經之禮求方士神仙以為樂同上玄宗紀及侈心一動窮天下之欲不足為其樂溺其所甚慕忘其所可戒又帝方寖喜神仙之事詔道士司馬承禎製玄真道曲茅山道士李會元製大羅天曲又酷愛法曲選坐部伎子弟教於黎園號皇帝黎園弟子又好羯鼓又稱羯鼓八音之領袖諸樂不可方也蓋本戎羯之樂其聲焦殺開元二十四年升胡部於堂上而天寶樂曲皆以逺地名若涼州伊州之類後又詔道士調法曲與胡部新聲合作明年安祿山反梁州伊州并州皆歸吐蕃漢世亦如此禮文至武帝稍備武帝以為治天下止於如此故其欲無窮唐至開元之禮備而玄宗之心亦遂壞故曰禮樂非聖人不能行非積德不能興前漢叔孫通傳二生曰禮樂積德百年而後可興也其上下和合君臣際會皆能通知禮樂之情偽為治之時斤兩皆到一處政事備舉室家給足奪攘之禍屏息信遜忠厚之心油然而生各就本身做到然後為禮樂之成而成康之盛號稱禮樂最備後世則不然但考求其節目考論其制度使為禮樂之備不知精神運動全不相關則禮之備乃所以為禮之壞也漢武帝唐明皇同出一律樂之要處在於聲音感人記樂記樂者音之所由生也其本在人心之感於物也不知舜曰豫欲聞六律五聲八音在治忽以出納五言汝聽書益稷篇正文皆就微眇處察之則歡樂愁怨悲傷愈佚皆由聲音可見古之聖人薰陶天下之人納之於律吕導之於五聲和之於八音播之於鐘鼓拊搏管磬弦匏上自天子下至庶人同出於一便是禮之至樂之極以之事天則天神降以之事地則地祗格以之祭山林川澤神靈並至福祥自臻周禮春官大司樂以六律六吕六同五聲八音六舞大合樂凡六樂者文之以五聲播之以八音一變而致羽物再變而致羸物三變而致鱗物四變而致毛物五變而致介物六變而致象物若樂六變則天神皆降可得而禮矣七變則地示皆出可得而禮矣九變則人鬼可得而禮矣他全自人本心做出以禮樂為正其所以防範斯民周旋情偽之至皆是禮樂之功用惟不可化者然後以刑折之書吕刑篇折民惟刑云云此朝廷之上所以不可一日無禮樂也後世治天下不如此但以刑法獄訟簿書期會為本而以大勢服民乃是劫持天下之道使以力相從别去不得方始更要立禮成樂語泰伯立於禮成於樂却是别立一箇道理根腳不牢所以做不成漢時賈誼董仲舒劉向王吉為之臣者欲興禮樂而其君不可前漢禮樂志云云今大漢繼周久曠大儀未有立禮成樂此賈誼仲舒王吉劉向之徒所為發憤而增嘆也唐太宗欲興禮樂而其臣不能雖君臣各有所偏然漢唐禮樂自無緣可以制作文中子載王通河汾往來之人房杜王魏皆許以經濟之才獨是禮樂不許惟以許董常不知就使董常在禮樂又如何興得文中子録唐太宗論禮樂事魏徴嘗與諸賢侍文中子謂徵及房杜等曰先輩聰明特達雖逢明主必愧禮樂及貞觀之始徴房杜獲攀龍鱗上謂徴等曰禮壞樂廢朕甚憫之今急急於卿等徵奏曰非陛下不能行臣等無素學徴與房杜等並暫辭而出房杜謂徵曰玄齡與公竭力輔國然言及禮樂則非命世大才不足以望陛下清光矣昔文中子不以禮樂相許良有以也向使董薛在適不至此噫有元首無股肱不無可嘆也文王之詩言雍雍在宫肅肅在廟不顯亦臨無射亦保詩思齊篇云云有這般資質方可與務禮樂自立國之始至於治國之成須是逐節做得無憾處唐太宗貞觀之治於一二節已做不盡而况禮樂之由興自非太宗資質之所及也古樂最是散亡而唐制度尤為苟簡不復可考只是器數已不能合所謂律度長短自天寶後更安史之亂盡用胡樂雅樂於是而亡見上注樂本起於黃鍾之律天下之數皆由此起前漢律厯志數者一十百千萬也本起於黃鍾之數始於一而三之三三積之又五聲之本起於黃鍾之律然其説不一其義難知往往當世明智之士敝精力以求之猶未得其當本朝仁宗世盡合天下論樂推本其致迄無成説歐陽文忠公文皇祐中仁宗祀明堂遂鋭意樂律詔訪天下通知音律之士而胡瑗阮逸之徒相繼而起故瑗以上黨之黍考正鍾律而鍾之不合於古制有三磬之不合於古制者七莫不按古而為之也仁宗遂造七均十二律造乾安之曲化俗右文威功睿德之舞與夫大善大寧大順大慶大定大盛大明之舞相間之郊廟明堂故一代之典鼎新大備蓋由先和民之後正律吕也又范蜀公文景佑中李照作新樂下其聲太常歌工以其太濁歌不成聲當鑄鐘時乃私賂鑄匠使減其重而聲稍清歌乃平而成聲而照竟不知以此知審音作樂之難財計此篇論理財與聚斂異理財與聚斂異今之言理財者聚斂而已矣非獨今之言理財者也易繫辭理財正辭禁民為非曰義自周衰而其義失以為取諸民而供上用故謂之理財而其善者則取之巧而民不知上有餘而下不困斯其為理財而已矣故君子避理財之名而小人執理財之權夫君子不知其義而徒有仁義之意以為理之有必取之也是故避而弗為小人無仁義之意而有聚斂之資語先進篇季氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也云云雖非有益於已而務以多取為恱是故當之而不辭執之而不置而其上亦以君子為不能也故舉天下之大計屬之小人雖明知其負天下之不義而莫之恤以為是固當然而不疑也嗚呼使君子避理財之名小人執理財之權而上之任用亦出於小人而無愧民之受病國之受謗何時而已夫聚天下之人則不可以無衣食之具衣食之具或此有而彼亡或彼多而此寡或不求則伏而不見或無節則散而莫收或消削而浸微或少竭而不繼或其源雖在浚導之無法則其流壅遏而不行是故以天下之財與天下共理之者大禹周公是也古之人未有不善理財而為聖君賢臣者也若是者其上之用度固已沛然滿足而不匱矣後世之論則以為小人善理財而聖賢不為利也聖賢誠不為利也上下不給而聖賢不知所以通之徒曰我不為利也此其所以使小人為之而無疑歟當熙寧之大臣慕周公之理財為市易之司以奪商賈之贏分天下以債而取其什二之息曰此周公泉府之法也周禮地官泉府餘見下段注天下之為君子者又從而爭之曰此非周公之法也周公不為利也其人又從而解之曰此真周公之法也聖人之意六經之書而後世不足以知之以此嗤笑其辨者然而其法行而天下終以大弊故今之君子真以為聖賢不理財言理財者必小人而後可矣夫泉府之法斂市之不售貨之滯於民用者以其賈買之其賖者祭祀喪紀皆有數而以國服為之息周禮泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之凡賖者祭祀無過旬日喪紀無過三月凡民之貸者與其有司辨而授之以國服為之息若此者真周公所為也何者當是時天下號為齊民未有特富者也開闔斂散輕重之權一出於上均之田而使之耕築之室而使之居衣食之具無不畢與然而祭祀喪紀猶有所不足而取於常數之外若是者周公不與則誰與之將無以充其用而遂與之也則民一切仰上而其費無名故賖而貸之使以日數償而以其所服者為息且其市之不售貨之滯於民用者見上段注民不足於此而上不斂之則為不仁然則二者之法非周公誰為之蓋三代固行之矣今天下之民不齊久矣開闔斂散輕重之權不一出於上而富人大賈分而有之不知其幾千百年也而遽奪之可乎奪之可也嫉其自利而欲為國利可乎嗚呼居今之世周公固不行是法矣夫學周公之法於數千嵗之後世異時殊不可行而行之者固不足以理財也謂周公不為是法而聖賢之道不出於理財者是足為深知周公也乎且使周公為之固不以自利雖百取而不害而况其盡與之乎然則奈何君子避理財之名苟欲以不言利為義坐視小人為之亦以為當然而無怪也徒從其後頻蹙而議之厲色而爭之耳然則仁者固如是耶今天下之財亦可得而略計矣黃帝堯舜以來財之在天下今其不知取者幾也秦漢之後創取於民後世日以增益今其棄而不求者幾也天下之遺利天下之所不知不得而用之者幾也抑猶有上之所未斂者乎抑已盡斂而不可復加歟然則有民而後有君有天下而後有國有君有國而後有君與國之用非民之不以與其上也而不足者何説今之理財者自理之歟為天下理之歟父有十子闔其大門日取其子而不計其後將以富其父歟抑愛子者必使之與其父歟抑孝其親者固將盡困其子歟抑其父固共其子之財者歟然則今之開闔斂散輕重之權有餘不足之數可以一辭而決矣奈何以聚斂為理財而其上至於使小人君子以為不當理財而聽其絶而不繼若是者何以為君子哉十先生奧論注續集卷十二
