body:
  text: 十先生奥論註後集巻十聖賢論上楊萬里顔子上此篇論問仁一節學至乎大足矣乎曰可以止未可以足也踰乎大則荒故欲止安乎大則忘故患足君子之學至乎大而止矣雖然止而未足者樂心誘之也蓋至其大則見其大見其大則樂其大未見則未樂愈見則愈樂樂心之長足心之消也人之未有得而足心生者無怪也彼未嘗食熊掌也而强告之以熊掌之美彼固不肯以易膾炙也非安於膾炙而不願於熊掌也未有以誘其願而遷其安也人必食熊掌而後知天下之無味學必至大學而後知天下之無學甚矣道之能誘人也至則見見則樂人惟無所樂也有所樂則競而不厭不厭故力焉而不倦非不倦也忘倦也競故禦焉而益厲挫焉而益振窒焉而益決奪焉而益悲夫如是奚其足奚其足且大學無淺深卑髙之序也有淺深卑髙之序者未離乎小學也吕與叔大學解云大學之書聖人所以教人之大者見序如此盖古之學者有小學有大學小學之學藝也行也大學之學道也徳也禮樂射御書數藝也孝友睦婣任恤行也自致而至于修身徳也所以治天下國家道也古之教者學不躐等而由小學然後進於大學自學者言之不至于大學所正則不進自成徳言之不盡乎小學之事則不成何也見其卑則非卑無見見其淺則非淺無見見非卑則卑者不足照也見非淺則淺者不足臨也蓋有隔而不得見者矣未有不隔而不見不見而有不見者也見則無不見矣而猶卑髙淺深之足存哉雖然至而後見耶見而後至耶吾以為至至焉見次焉平地而觀天以為山之端即天也至乎山之端而後見有山而無天聞京邑之麗者謂與里之市無異也至京邑而後見其異耳是故不至不見不見不樂顔淵之問仁夫子一語之間入藩牆去陛級徹堂室而納之於甚大之地付之以一日克己復禮天下歸仁之事何其大也此君子之所驚也及顔淵領其大請其目則不離於視聴言動之間儆於非禮而已又何其小也此君子之所忽也語顔淵篇云云惟其大而不驚此顔子之所以獨往小而不忽此顔子之所以獨来何也已也者人之欲也禮也者天之理也仁也者性之覺也克而復復而覺人者去而天者還則天髙地下吾性之湛也雲行雨施吾性之游也君臣父子仁義禮樂吾性之觸也一理徹而萬理融當是之時一者非寡萬者非衆徹者非唱融者非隨夫何故吾性之仁無寡也焉得衆無唱也焉得隨至則皆至不至則皆不至見則皆見不見則皆不見至矣見矣頃刻而天下皆吾仁吾猶遲之而何驚於一日而天下歸仁也哉雖然夫子於此遺顔子以其憂者也何也顔子領之而樂既樂而憂憂也者樂之生也非樂之生憂也至其大見其樂而憂乎不得居也儆非禮於視聴言動之間顔子也其求所以居其大者歟孟子曰仁宅也人有聞宅之安而不得至則戚至不得見則戚見矣而又曰吾将卜日而後居則向之戚徒戚而已矣蓋見而不居則宅自宅也於吾何有吾亦於宅何有夫子指是宅以居顔子顔子而少緩於居則一動目一揺足而失是宅矣得之之不易失之之不難豈不大哀耶是則顔子之憂也夫子曰吾見其進未見其止嗟乎顔子有憂而夫子無憂矣顔子中此篇論終日不違如愚一節道可遇而不可傳非真不可傳也遇則可傳不遇則不可傳矣何謂遇以吾之有迎彼之有是謂遇遇則不相拒而不遇則不相受不相受而求相傳是煑石以求其為粥也薪可盡釡可穿而粥不可成何也粥固石之所必無也天下之事從其有而迎其有則其功易取其無而納以有則其功難而况於以道傳人而傳於不相受者耶蓋不相受而求其傳吾雖挈然有以與之彼則茫然不知所以受之吾雖昭然有以示之彼則暗然不知所以覩之彼非不受不覩也彼固無以受無以覩也舉珠玉以授無指而責其不翫指日月以示無目而責其不仰可乎若夫手與目具者惟恐吾之不授不示也授則受示則覩矣不惟授而後受示而後覩也雖不授之猶将取之雖不示之猶将窺之何則彼固有以遇也手與珠玉遇則其取不可禁目與日月遇則其覩不可閉大哉遇乎聖人以道而傳於人不有遇之何以傳之雖然聖人之於人固不忍以不遇而不傳亦不可以不遇而必傳不遇而不傳天下将以吾為絶不遇而必傳天下将以吾為拂拂之則有所不勝而絶之則又有所不悦聖人於此難矣哉以夫子而傳顔子顔子之幸耶曰非顔子之幸也夫子之幸也何也夫子之無難也何也遇而非傳也夫惟遇而非傳是以傳而必遇吾嘗觀夫子與囘言終日而囘不違其契盖如此也子曰吾與囘言終日不違如愚退而省其私亦足以發囘也不愚契原於順順原於遇今夫日能消氷而不能消木豈日之樂乎氷而怯乎木哉氷與日相順順而契也然則囘與夫子之契豈夫子之言能啓人而顔子之聴能聴人也耶夫子之言能啓人也則難言之童啓矣囘之聴能聴人也則車馬輕裘之言入矣子路曰願車馬衣輕裘與朋友共敝之而無憾然則夫子之言言不以言囘之聴也聴不以聴荘人間世篇囘問仲尼曰敢問心齋仲尼曰若一志無聴之以耳而聴之以心無聴之以心而聴之以氣聴止於耳心止於符氣也者虚而待物也唯道集虚虚者心齋也言不以言則言者天也聴不以聴則聴者亦天也以夫子之天觸囘之天以囘之天感夫子之天是惟無合合則遇矣夫何違之有當其未言囘意已傳及其既言囘意無外使夫子一笑而囘已領矣而况與之言終日耶或者曰囘何功於後學也參如囘則無孝經矣史孔子弟子傳參字子輿孔子以為能通孝道故授之業作孝經門人皆如囘則無論語矣語序魯論語二十二篇皆孔子弟子記諸善言也有經而道猶不傳也回也日居於韶濩鐘磬之側而弗考弗擊使有耳者無聞焉非過歟違生疑疑生問問生道而囘也不違也嗟乎道以言而通亦以言而塞非言之能塞道也失之也一失而為訓詁再失而為辭章言之盛道之衰也不有囘之學何以使學者知有妙學哉學者棄其學以學囘之妙學則盛者衰衰者盛矣盛者未衰而衰者未盛曰囘之無功於後學也宜也顔子下此篇論不逺復一節顔子勇者歟夫子曰顔氏之子有不善未嘗不知知之未嘗復行也知不善而不能不行無勇也無勇而知知而不去是徒知而已矣是故知之不如勇勇者患不知而已顔子知不善則不復行非勇歟曰非也顔子知之極也勇足為顔子道哉今夫火樂於燥而怒於擊愈擊則愈怒愈怒則愈樂勃然發於一熒之初而欣然進於不可禦之勢此其勇非不俊也然勢方盛而雨驟至則一息之間至於熄滅寒棄而不能復振有所勇者必有所怯也人之情初而勇久而習終則頽隳委靡而不可起何則情固有所怠也使顔子之於不善勇於去其一怠於罷其二則勇不如怯勇足為顔子道哉是故勇於去不善不若安於去不善勇於去不善則必有所不去安於去不善則無所不去顔子之去不善非勇也安也然則顔子何以能安於去不善曰知之極也鴆之能殺人也明矣而遇鴆以死者夷然飲之而不悟非喜於鴆也非喜則曷為飲曰不知也知則不飲矣天下之善何以異於水之可飲天下之不善何以異於鴆之不可飲然人之於不善明憎之明踐之何也豈非天下之不善或有似於善者耶不善之似於善鴆之似於水者也似而不知不知而不疑則亦夷然飲之而死爾甚矣君子之學急乎致其知也知不善如知鴆則終身而不行其不行非有所勉而能亦非有所思而喻思而後喻則夫不喻者必出夫思之所不及勉而後能則夫不能者必乗夫勉之所不繼顔子之不為不善固無所不及亦無所不繼去思去勉而惟照之以一知故不善之来迎者則敗過者則逝攻者則堅彼敗且逝故初不能欺而卒不能留吾堅固不可入夫使天下之不善雜至乎吾前而不能欺不能留且不可入則不善之来曷嘗有而不知知而復行哉大學曰致知在格物知極其致矣物奚遁焉故曰顔子之知知之極也知而不極猶未免不善之欺飛蟲之觸牖而求出也其身去牖之外無毫髪之間爾毫髪而有所隔則終日求達而不得達知而不極雖其不知者毫髪也而於聖賢之真知千萬里之絶顔子之知極矣豈有毫髪之隔哉有毫髪之隔猶足以為顔子病無毫髪之隔斯足為顔子賀夫子曰顔子有不善未嘗不知知之未嘗復行所以賀顔子之無毫髪之隔也曾子上此篇論孔子傳一貫之道一節道不可以易言也徑則詣差則離道之難言不差之難也夫子稱囘之愚參之魯囘愚見上篇注參也魯注魯鈍曾子性遟鈍也而聖人之傳乃愚與魯者得之學者求其説而不得則曰愚與魯道之資也智與慧性之翳也嗟乎言之似也而差也何也囘之愚夫子蓋嘗言其如愚而不愚矣則囘之愚豈其真而學者猶以為真也若參之魯夫子言之未及盡也執夫子未及盡之言而以參為真魯參又何辭焉雖然參不病也學者病也右愚魯而左智慧則納天下之人於荘周之瓦礫佛者之寂滅也荘知北遊東郭子問於荘子曰道惡乎在荘子曰無所不在東郭子曰期而後可荘子曰在螻蟻曰何其下邪在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應後漢明帝初聞西域有神名曰佛因遣楚王英之天竺求其道得其術及沙門以求其書大抵以虚無為宗貴慈悲不殺以為人死精神不滅隨復變形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏濶勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圖其形像豈不病哉且參之魯豈其蒙然蚩暗然昧耶子曰吾道一以貫之門人相顧莫知所依據之參也領之以一唯子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣蒙然蚩暗然昧者能之乎然則參非真魯者也非魯而曰魯無乃言語之不給文學之未敏歟言語之給文學之敏君子非有廢也而非所先盖言語者道之汲而汲者非道也文學者道之寓而寓者非道也言語之不給曰魯可也文學之不敏曰魯可也而魯非道之賊也非道之賊而亦非道之資人之資有所明有所能能者事之資也明者道之資也參之魯者短於能者也非事之資而已矣非事之資而移以為道之資道固無用於能而亦何用於不能哉謂能可以入道者妄也謂不能可以入道者大妄也道則有可以入者矣曰明是也參也能之短而明之卓則其為道之資者以其卓者也今也取其短者而謂為道之資又欲去其卓者而謂為性之翳不知其所謂翳者乃參之所以為資而其所謂資者乃參之無所用於道者也今夫錐之鋭刀之利此物之敏者也然其能不出於錐刀之用而已窮日之力以瑩焉曾不能以燭跬步至於鏡其規不盈尺而天地之大萬象之衆秋毫之微一照而洞見焉以為鏡往而鏡未始往以為物来而物未始来非往也而無拒也非来也而無逃也則明之功也錐刀有是哉雖然鏡之明也反而照焉則與錐刀何擇曾子之心鏡也曾子之心非鏡則一以貫之之妙何以一照而洞見也則其所謂魯者亦不能為錐刀之敏而已不能為錐刀之敏而以為道之資則錐刀之鈍者亦可以為鏡乎且人之學於道惟根於一明也去明則於道何徹焉謂智慧為性之翳則是欲反鏡以求照也豈不誤天下之後學哉故曰言之似也而差也子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也語先進篇云門人之敬不敬於吾子路無所損益也而門人可憐也聖人之言不心造其微而貎執其粗聖人安能一一而盡也哉子曰參也魯夫子未及盡也而參遂為真魯嗟乎參真魯也參何病哉學者不學參之非魯而學參之魯參誤學者耶學者自誤耶曾子中此篇論日三省吾身一節學道者必有以用道也學之而無所用之則親見堯舜周孔而無所覿博極詩書禮樂易春秋而無所涉洞貫仁義忠信而無所歸何也堯舜周孔道之人也六經道之林也仁義忠信道之器也見其人極其林洞其器謂之不學道不可也謂之學道亦不可也學則學矣用則未有以用也布之可以温故人取之以衣其身粟之可以飽故人取之以實其腹今且有人積布而不衣藏粟而不食則雖積藏如丘山而夫人者不免於凍餒而死矣夫布與粟如丘山而不免於死非不富之罪也富而不用其富之罪也學道而不用安以道為哉曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎此曾子之始學也彼固有所用之也然則曾子之用何所用用之者體之也體之者身之也學道而至於體之以身夫然後道為吾之有矣故夫世之學道者吾見其學道矣未見其有夫道也學而不能有則道自道我自我也夫惟道即我而我即道者可以言道為我之有矣曾子之三省其身非省其身也省其身與道之一二也身與道果一也曾子之幸也若猶二也曾子其得不省乎省之則不二矣且夫身與道為二者豈身非道而道非身哉道與身為一者又豈道自外至而身從中受哉謂身非道則身安得有夫道謂道非身則道安得有於身謂道自外至則有所至必有所見謂身從中受則有所受必有所盈迎其至而無見也反其受而無盈也則道非自外至而身非從中受也道非外而身非内則不可謂身非道而道非身也身與道本一也一而二者不察之過也二而一者察之功也子思曰鳶飛戾天魚躍于淵上下察也記中庸云人之一心察之之妙上際于天下極于淵無一理之逃也而況於反是察而用之於吾身之道乎匹夫有璧而償之於家既久而偶忘之不勝其困而假匄於其鄰自以為天下之至貧也而不知其冨也三年而忽憶其璧也出而鬻之一朝而獲千金夫千金非自外至也匹夫之所自有也有千金而困於貧既貧則富則察與不察也當其不察璧亦不亡及其既察璧固自若道也者吾身之璧也學者有璧而弗察弗察而忘者也曾子者有璧而日察之日察之而日憶之者也為人謀而忠與朋友而信傳道而必習學者豈無是哉有而不有者誰之過歟曾子一日而察者三豈有脱而不存也哉孟子曰萬物皆備於我矣反身而誠樂莫大焉知備而不知反宜學者之無所樂也曾子三省之學惟孟子傳之也歟曾子下此篇論任重道逺一節無聖人之天而求至乎聖人之地其至者否也然則其孰為地孰為天仁也者聖人之地也力也者聖人之天也堯舜之所性湯武之所身孔顔之所傳惟此一亊故夫仁也者聖人之地也學聖人而不求至其地是欲歸其家則未及門而宿於牆之外也然則仁何事於力子曰仁之為器重舉者莫能勝其為道逺行者莫能至記表記云又曰有能一日用其力於仁矣乎而冉求亦曰非不説子之道力不足也故夫天下之重者莫重於不重之重而泰山為至輕天下之力者莫力於非力之力而烏獲為至羸仁也者不重之重也聖人也者非力之力也夫惟有非力之力者然後能舉不重之重不然子貢之辯子路之勇足以屈天下震諸子而一登聖人之門則寂然黙弛然廢舉其辯與勇納之懐而無所用之家語致思篇孔子北遊於農山子路子貢顔淵侍側孔子笑曰二三子各言爾志子路曰云云夫子曰勇哉子貢曰云云夫子曰辯哉然則必有非力之力而後能舉此不重之重者也盖夫口易强而有辯也身易强而有勇也資難强而有力也非有其天其誰實能之故曰力也者聖人之天也無其天而求至其地無其力而求舉其仁此楚人之所以學烏獲而死者也昔者楚人有慕烏獲之力而學之其里之父欲持千鈞之負而適秦者聞楚人之力也而請焉楚人者欣然而試負之然肩之而不能勝勝之而不能步步之而不能至秦强而趍焉不十步而絶筯折脛以死學者無聖人之力而求舉聖人之仁吾懼其肩而不勝勝而不步步而不至秦也故夫烏獲可慕而不可學也有烏獲之力而舉烏獲之負可也無烏獲之力而試烏可乎烏獲之力千鈞之負不可試也而况聖人之仁而可試乎哉有其力而堪其負其惟曾子歟曾子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎曾子之力庶乎聖人之力者也何也其力𢎞然後肩之而能勝其力毅然後勝之而能步曾子之於仁𢎞以肩之毅以步之其至於秦無難也雖然輕天下之重者重而不之覺邇天下之逺者逺而不之慮曾子猶覺其重而慮其逺者也子曰仁者安仁安則重者輕夫何覺又曰我欲仁斯仁至矣至則逺者邇夫何慮此聖人之事也曾子未及也故曰曾子之力庶乎聖人之力者也雖然任重而能堪堪之而不釋道逺而能趍趍之而不息秦雖去楚逺矣其庸不可至乎而況吾仁非若秦之去楚也哉曾子也雖未能如聖人之不覺其重不慮其逺之安也仁以自任死而後已曾子其不至於仁乎子思曰或安而行之或利而行之或勉强而行之及其成功一也中庸云曾子之謂矣十先生奥論註後集巻十
