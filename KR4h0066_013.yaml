body:
  text: 十先生奧論注前集卷十三雜論陳傅良兵論上嗟夫天下不可以近慮慮之也以近慮慮天下而不誤天下者無有也先王惟知夫天下難合而其隙也易開將以固其難合之勢不可一日而去德至於隄防其易開之隙亦不可徹其備而示之可乘之間故兵之制常與德並行而不可廢三代而後人君始以兵爛天下而世之好名之士苦其毒而厭其多亂必欲一芟而去之其説蓋借夫詩書之放牛馬櫜弓矢以自證書武成偃武修文歸馬于華山之陽放牛于桃林之野詩時邁載戢干戈載櫜弓矢嗚呼是其為慮也亦不逺矣夫武王之偃兵非武王之意也勢也上注武王以商之諸侯序八百國之衆而遷商之鼎義士薄之史伯夷傳武王伐紂伯夷叔齊叩馬而諌曰父死不葬爰及干戈可謂孝乎以臣弒君可謂仁乎左右欲兵之太公曰此義士也扶而去之則天下之疑於周者或不少也蓋至於成王周公之世猶未能固不靜之心武王不亟釋其取天下之具以安天下之反側則夫洶然而變者未止一祿父也書大誥武王崩三監及淮夷叛王若曰有大艱于西土西土人亦不靜越兹蠢殷誕敢紀其敘云云故其道不得不權其宜以自固然其所以為天下計者未嘗廢司馬也禮夏官司馬掌邦政以佐王平邦國而又其時足以制殘商之死命亦得以安意為之而無忌好名之士不度天下之勢而借其説以文太平乃始闢户斬關開盜之路而招之天下之禍不始於此也夫昔晉之平吳非晉之福也唐之得兩河於季世亦非唐之盛事也武帝侈然自以無虞不聽山濤之諫而去州郡之兵晉山濤傳吳平之後帝詔天下罷軍役示海內大安州郡悉去兵帝嘗講武于宣武場濤從因與盧欽論用兵之本以為不冝去州郡武備其論甚精帝不能用及永寧之後屢有變難寇賊焱起郡國皆以無備不能制天下遂以大亂如濤言焉蕭俯段文昌之屬亦無永圖競為武偃之談以中穆宗偷安之欲藩鎮甲士月雕日耗唐蕭俯傳穆宗初兩河底定俯與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之嵗限一為逃死不補謂之銷兵既而籍卒逋亡無生業嘯聚山林間為盜賊會朱克融王廷湊亂燕趙一日悉收用之朝廷調兵不充乃召募市人烏合戰輒北遂復失河朔矣一旦盜起永寧禍發燕趙而國家無誰何之者晉祚遂以不久唐之故壤復淪盜淵上注嗚呼為天下慮而使淺謀卑見盜太平之名者為之天下之不及晉唐者亦幸矣兵論下此篇論用盜銷兵之禍非止無兵而巳也而將殘天下之民蓋不幸而有變其勢不得不驅民而用之夫驅民而用之者皆所以餧賊也以不教之民而置之無罪之死地故夫銷兵者乃所以殘民也又非止殘民而巳也而且將召天下之亂廣澤之陂深山之原武夫悍士臂弓而腰刃以幸國家之釁而不得逞者世未嘗訖無也方無事時則亦竄迹乎牛力羊肆之間犬偷鼠盜以活其生一旦瞰可乘之隙則嘯聚崛起角出而衡行皆勍敵矣嗚呼其禍豈止於外陵也哉於此有術焉可以一舉而兩獲非惟可以弭亂而反籍之以集天下之功而人主常難於行之則亦不知變也上篇注昔管仲嘗取人於盜記雜記下孔子曰管仲遇盜取二人焉上以為公臣曰其所與逰辟也可人也而髙祖爭天下往往皆販繒屠狗之人前灌嬰睢陽販繒者也樊噲市人也以屠狗為事武帝剪伐四克亦嘗求跅弛之士而用之前武帝紀詔士或有負俗之纍而立功名夫跅弛之士亦在御之而巳則夫此一族者雖足以擾天下亦足以利天下也州綽刑蒯欒氏之勇也范氏而能欒氏則亦宣子之勇也左傳宣公云云人主方窘於無兵而可棄斯人也哉致斯人而用之不猶愈於肉股栗之孱民以飽垂涎之吻哉不然而棄之山澤以自貽患君子所深憂也揚子雲曰御得其道則狙詐咸作使御失其道則狙詐咸作敵揚問道篇云云故狙詐非不可用也而御之之難也羅之以禮以愧其心鼓之以禮以作其氣蒙之以重賞以盈其欲貰之以寬以責其效亦庶乎其可矣謀論上此篇論因敗為謀古之謀人不惟其善因天下可為之資而至於摧敗奔衄之餘九亡而一存者尤善謀者之所貪也蓋天下之福不在於福而生於禍負者勝之基弱者強之府故善謀者尤欲得之昔者勾踐之喪邦亦嘗有所不忍欲死於一決之快矣獨范蠡知夫會稽之棲乃所以餌夫差而釣之者也於是諫止其君隂携而陽厚之以豢吳而飽其欲故吳之心自以為無越而不知越之志未嘗不在於無吳也黃池之會一舉而蹙之范蠡之蓄此久矣史越世家吳王闔廬伐越越王勾踐擊吳師射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越勾踐聞夫差且以報越越欲先吳未發往伐之范蠡諌曰不可越王遂興師吳王擊越敗之夫椒越王乃以餘兵􅍖棲於會稽蠡曰卑辭厚禮以遺之不許而身與之市勾踐乃令大夫種行成於吳乃以美女玉器令種間獻於吳太宰嚭嚭因説吳王赦之吳既赦越越王乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰女忘會稽之恥邪身自耕作夫人自織折莭下賢與百姓同其勞云云吳王北會諸侯於黃池范蠡乃伐吳吳師敗越遂復棲吳王於姑蘇之山吳王請成勾踐欲許之范蠡乃鼓進兵吳王自殺漢之留侯蕭相國亦越之蠡也夫以髙帝百敗之困不足以當楚之鋒亦明矣而二子者乃深喜之會之鴻門而不恥遷之南鄭而不恨示之焚棧而不與爭委之以太公吕后而未嘗一日即而取也凡此數者皆留侯蕭相國之謀就髙帝之敗而為之地所以驕項氏而昏其智也項氏侈然自大旁若無敵垓下之圍一合而項氏之肉巳臠於漢軍之刃矣前髙祖紀項羽聞沛公巳定關中大怒欲攻沛公沛公旦日見羽鴻門謝曰今者有小人言令將軍與臣冇隙羽因留沛公飲云云羽自立為西楚霸王都彭城更立沛公為漢王都南鄭漢王怨羽之背約欲攻之蕭何諌乃止張良辭歸韓因説漢王燒絶棧道以備諸侯盜兵亦視項羽無東意審食其從太公吕后間行反遇楚軍羽常置軍中以為質後歸太公吕后羽解兵東歸漢王欲西行張良陳平諌曰楚兵罷食盡此天亡之時漢王從之圍羽垓下斬羽東城楚地悉定故夫天下之不可為者是乃大可為者也而無謀者又失之有髙皇勾踐之勢而不出於范蠡留侯蕭相國之䇿反以其所驕人者自驕而甘於敵國之豢一旦隙開摶手無䇿不得己驅久厭之兵而戰之每遇輒却則曰用兵者之罪也嗟乎用兵何罪哉謀論下此篇論戰不可無謀或曰戰可以無謀勝乎曰有之矣幸也非福也一勝之幸雖趨亡之國垂沒之將亦有之而曉兵者不之畏昔秦之二世諱於言反狼貪而鷹搏者滿天下而二世宴如也前叔孫通傳秦時以文學召待詔博士陳勝起二世召博士諸儒生問曰何如博士諸生前曰願陛下急發兵擊之二世怒作色通曰安有反者此特羣盜鼠竊狗盜何足置齒牙間哉二世喜盡問諸生諸生或言反或言盜於是二世今御史按諸生言反者下吏非所宜言諸生言盜者皆罷之俄而周文百萬之衆叩關而攻二世倉卒舉山西之甲付之章邯以禦之邯師一出三擊而三走文矣前陳勝傳勝立為王周文陳賢人也自言習兵勝與之將軍令西擊秦秦令章邯擊大敗之周文走出關止屯曹陽二月餘章邯追敗之復走澠池十餘日章邯擊大破之周文自剄注周文即周章也未幾而馘魏咎尸田儋仆項梁蹙趙歇堂堂之師所向如壓卵而竟無救於秦之亡捷奏未絶而漢王席卷之師巳瞰秦鼎矣蓋秦之兵本於無謀而出於倉皇救敗之急而章邯復輕用之此固在劉項掌握中也史始皇紀戍辛陳勝等反遣諸將徇地山東郡縣少年皆反以應陳涉合從西鄉名為伐秦武臣自立為趙王魏咎為魏王田儋為齊王沛公起沛項梁舉兵會稽陳涉所遣周章等將西至戲二世使章邯將擊破周章軍而走遂殺章曹陽殺陳勝城父破項梁定陶滅魏咎臨濟邯乃北渡河擊趙王歇等故夫曉兵者知夫無謀者之戰不可以久也則為之退避以老其師淹延以匱其財欲和欲鬬以疑其心一軍驚其東一軍擾其西以分其力陽遣使以緩其怒隂遣間以開其隙夫以不素定之謀加之以不素信之將而又用之以不素練之卒幸而一勝而敵以多方誤之必有墮其畫中者矣嗚呼為天下者不幸而失先定之謀幸而得偶然之勝正當守之以堅養之以徐而發之以審其無為敵人所誤吏論此篇論憂不可不及吏昔者秦人之趣亡非一道也而其若是焉亟者吏不肖也吾觀始皇之初陋三代之封建其弊至於戰國髖髀相依以蹙王室故夷其城而郡縣之其慮誠逺也史始皇紀丞相綰等言諸侯初破燕齊荆地逺不為置王無以填之請立諸子始皇下其議於羣臣廷尉李斯議曰置諸侯不便始皇曰廷尉議是分天下以為三十六郡郡置守尉監既而天下之吏習於嬴氏之暴斬艾琢剝草芥其民而弊之重之以頭會之斂閭左之徭前陳餘傳秦為亂政虐刑百姓罷敝頭會箕斂以供軍費又食貨志始皇發閭左之戍又重之以阿房驪山土木之役史始皇紀乃營作朝宫渭南上林苑中先作前殿阿房天下謂之阿房宫或作驪山發北山石椁乃寫蜀荆地材皆至關中計宫三百關外四百餘當時之吏非殘忍漁侵病民以逢其君者則貪釁幸災不逞之人也於是民欲亡秦者十戶而八九矣關東之豪投袂而起一呼響從毛奮而鱗集僇力以傾秦族者不可勝計烏合之師所至如破竹者大率皆郡馘其首邑俘其令以應之者也史始皇紀戍卒陳勝等反遣諸將徇地山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數又賈誼過秦論曰山東豪傑遂共起而亡秦族矣不然則吏為自全之計挈地以賂敵而市一旦之命者也又不然則談士掉三寸之舌傳檄而風靡者也而孰為秦守哉其間黨秦之惡不肯遽臣妾者如三川之守由南陽之守齮泗川之守壯亦徒驅欲潰之民疾鞭而戰之不敗而塗地則亦為降虜而巳亦奚救於秦之斃耶史髙祖紀秦二世二年項氏起兵秦泗川守壯敗於薛沛公左司馬得壯殺之沛公與項羽略地與秦軍戰大破之斬三川守李由三年沛公與南陽守齮戰犨東大破之秦以虎狼之強尺攻寸取以吞天下一夕有變三十六郡皆無人之墟子嬰之席未暖而天下為漢何也史始皇紀子嬰為秦王四十六日沛公破秦軍至霸使人約降子嬰奉天子璽符降軹道太史公曰子嬰度次得嗣賔婚未得盡相勞餐未及下咽酒未及濡唇楚兵己屠閧中真人翔霸上奉其符璽以歸帝者秦人之憂素不及吏也故天下之禍莫大乎視以為常而不之憂視以為常而不之憂者皆他日之不可支持者也且天下之不可以一人守也分疆析壤環居而羅衛之者皆吏也吏之不肖人主誰倚仗之哉而朝廷之上方病夫財之不豐兵之不強以為大患至於守令之姦民號而訴者按牘相銜也則謾不之省重者不過罷去次則僅免而己舒之嵗月民之血未乾而謫籍之書又以恩貸矣甚者至於公卿大夫貪沓冗耗以不勝任聞者皆剖符而左遷之嗟乎不意父母斯民之職而為逐臣之淵藪也有秦之弊幸而無秦之亂吁可畏哉可畏哉士論此篇論人主畏莭義之士故士得以窺其逆順售説天下之士未嘗不沮於人主之所畏而疾趨乎人主之所喜也節義美名也雖甚庸之君亦知髙其名而願致之及見其人鮮有合焉何也畏之也蓋惟忠義之士識髙而見明慮逺而憂大世方無虞若可以少安矣而為痛哭流涕以發天下大難之端前賈誼傳上疏云云乘輿無甚失德猶可以為善也而盡言極諫甚者有幽厲威靈之比百官效職亦無大姦邪未去也而深懼指鹿之禍發於朝夕史始皇紀趙髙欲為亂指鹿為馬二世笑曰丞相誤耶佳祥美瑞人主之所罕見而竒焉者則視以為不足信至於一日月之變一雨暘之愆則又從而尤之曰此疵政之招也射獵巡幸歌舞之娛似未足病於治則禁而抑之宵旰之勤吐握之疲非人所願為者則強其必行夫人之情惡危而好安樂因而憚改自庶人達于天子均也而義士常責其所難共振其所欲為人主安得而不畏之耶故雖漢武帝唐明皇之賢猶有憚於汲黯韓休之直前汲黯傳以嚴見憚武帝召為中大夫以數切諌不得久留內唐韓休傳帝嘗引鑑默不樂左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘠天下肥矣噫視時趨向天下之人不少也人主方是之畏彼亦孰肯自冒人主之所畏而取踈逺擯斥之苦哉於是乎爭迎其好而逢其欲覘其所向而伺其歸有所愛也則徇之以為歡有所懼也則寢之以安其意有所可否之間也則兩存之以聽其所自擇其為術也翺翔而不遽而為之説也進退而不甚堅夫然後豢其説而穽其術而莫之辨是以姦欺之患生嗟夫此武帝明皇之所以不免也隕石妖也而方士以為嘉瑞前郊祀志武帝時隕石二黑如黳有司以為美祥以薦宗廟殺三子大亂也宰相以措刑受賞唐玄宗太子瑛傳云云帝怒召宰相議廢之張九齡諫曰奈何一日棄三子俄而九齡罷李林甫専國楊洄復搆瑛瑶琚與妃之兄鏽異謀惠妃使人詭召太子二王曰宫中有賊請介以入太子從之妃白帝曰太子二王謀反帝召林甫議答曰陛下家事帝乃詔瑛瑶琚並廢為庶人鏽賜死瑛瑶琚尋遇害天下寃之刑法志玄宗時羣臣稱賀幾致刑措然而李林甫用事矣又通鑑云上歸功宰輔賜李林甫爵晉國公大旱之災則曰乾封之祥前郊祀志夏旱公孫卿曰黃帝時封則天旱上乃下詔天旱意乾封乎雨霖之害則曰非禾稼之損通鑑玄宗紀上憂雨傷稼楊國忠取禾之善者獻之曰雨雖多不害稼也武帝明皇皆英主也初豈可以愚弄也哉惟其畏節義之士故士得以窺其所逆順而售其所喜之説而天下皆幾於危亡然則欲養天下之士氣唯受人之所畏而不甘於人之所喜者能之嗚呼人主不可不自強也形勢論上此篇論形勢無定自昔形勢之論詳矣皆以山西足以制山東而山東之地得之則河洛不難控至於西河之間則自淮而江又有不可得而窺者故秦負崤函之阻下一面之師以蠶食山東諸侯訖于始皇卒合六而一之自魏宋齊陳隋起隋仆不能混一土宇隋文亦若人也無以過數君而家天下者得山東也至於晉元合江左之勢不敢一警江洛取中原之故壤天下之勢其上下逆順亦可睹矣雖然是則固矣而不知漢髙帝席秦之舊四方皆劉氏有矣彼黥布挾區區之淮南抗衡上國若可以咄嗟叱吒馘左耳於戲下也而當時善謀之士以為布能出上計固守其所取吳并楚以厚其資傳檄燕趙則山東非漢之有前黥布傳布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而卧矣上曰何謂上計薛公曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之險勝負之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣上曰是計將安出曰下計果如薛公揣之然則淮南亦足以撼山東哉曹氏擁河南之全區提兵四出所向無敢當者而孫仲謀以江之東偏崛起一隅鼎腳於魏蜀之間卒之蜀噬於魏魏吞於晉而吳獨晚亡苻堅指秦涼之甲順流而下其視秣陵之晉而以左挈而取之而百萬之師衄於淝水反未及國姦雄起而乘之晉載記苻堅大舉入寇遣苻融督張蚝慕容垂等步騎二十五萬為前鋒兵既盛都下震恐朱序説謝安曰若秦百萬之衆誠難與為敵堅與苻融登壽陽城望見晉兵部陳嚴整又望見八公山上草木皆以為晉兵始有懼色張蚝列陳逼肥水王師不得渡謝元遣使謂融小退師融麾車却陳王師乘勝追擊堅為流矢所中然則河之南山之西亦豈能遽得志於江耶噫能知乎此則天下形勢蓋未始有定論形勢論下此篇論可守不可攻或曰江之勢止可以守而不可以攻信乎曰非特江也雖山之東西與河洛亦皆然矣而非形勢之使然也昔者六國與秦其勢均足以自固也而六國就屠於秦秦之於勝廣何也一旦聽蘇氏之縱擁百萬之兵聚於函谷之口期以拔秦卒以自敗而無損秦之一毛嗟乎其計甚陋矣六國之形猶聚鹿也秦則穴之虎也以駢首之聚鹿而欲搏深藏之穴虎豈不納死也哉秦人開關而延之六國之師巳潰非必秦人之善勝亦知六國自以其勝鬻於秦耳使六國而知守之之説秦趙齊楚合師而戍韓魏之郊以坐伺秦師之東則秦尚不敢左盼而下而况得而吞之哉史始皇紀太史公曰賈生言秦孝公外連衝而鬬諸侯於是秦人拱手取西河之外孝公沒惠武蒙故業南兼漢中西舉巴蜀東割膏腴之地取要害之郡諸侯恐懼會盟而弱秦合從締交相與為一是時齊趙楚魏四君約從離橫并韓魏燕楚齊趙宋衛中山之衆六國之士嘗以十倍之地百萬之衆叩關而攻秦秦人開鬬延敵九國之師逡巡而不敢進秦無亡矢遣鏃之費而天下諸侯己困矣至於秦二世之不道足以自踣然其亡如是之遽者亦有以也二世恥為一隅之計閉關嚴距以遏西嚮之鋒方且殫關中之卒脫險逺出渡河而北聚於不急之趙使沛公得因章項之鬬以躡崤隴無人之境使二世而固守之髙帝瓦合之卒能不為周章之敗哉史始皇紀二世用法益刻深戍卒陳勝等反自立為楚王遣諸將徇地山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數二世大驚曰奈何章邯曰盜至衆強今發近縣不及矣驪山徒多請赦之授兵以擊之二世乃赦天下使章邯將擊破周章而走遂殺章云云然則山之東西亦有時而不可攻耶曹操擅中原之富雄於天下而烏桓之舉空國踰界搏殘寇於窮荒之地是役也劉備嘗側目睨之矣其計蓋出於乘虛李訴所以入蔡者也蜀先主傳曹公北征烏桓先主説劉表襲計表不能用曹公南征表會表卒唐藩鎮傳吳元濟并其衆洄曲以備李訴訴用所得賊將自攻城因天大雪疾馳夜半到蔡破其門取元濟以獻向非劉表之庸而備志得逞卷荆州之甲徐行而傅許下孟德雖返而漢之赤幟巳滿趙壁矣上注又前韓信傳信擊趙使萬人先行出背水陳趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良久信張耳棄旗鼓走水上軍復疾戰趙空壁爭漢鼓旗逐信耳信所出竒兵二千騎者候趙空壁即馳入趙壁皆拔趙旗幟立漢赤幟趙軍欲還歸壁見皆漢赤幟大驚遂亂於是漢兵夾擊破虜趙軍奚及哉故夫河洛亦可守也亦可攻也故天下之勢初無定論在用之如何耳可以守亦可以攻不能攻而區區於守巳損威矣而又併守失之吁可悲哉古人有言曰形勢不如德史記年表云德不足也無以勝人矣乎十先生奧論注前集卷十三
