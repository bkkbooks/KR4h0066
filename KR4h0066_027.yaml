body:
  text: 十先生奧論注後集卷十二聖賢論下楊萬里孟子中此篇論智聖巧力學不至於聖則不至於定孟子曰天下定于一豈惟天下求哉惟學亦然學而不至於定則難於守而易於奪得而不能守守而不能奪自非聖人誰不肯者求定者必至於聖而後可也雖然至於聖而得其定矣有以定其聖無以運其聖則是鑄金以為天地之儀某氣之至某地之震無不應者天地則非不天地也而不能生萬物則其為天地者特末爾學至於聖者天地也至其聖而不能運其聖者不能生萬物者也是故運天地者非天地者也運其聖者非其聖者也蓋天地以氣運而聖人以智運智非仁義禮智之智也智者神之用也以其聖運其聖而後參天地澤萬世之功可得而凝矣神泯則無所運其聖孟子曰伯夷聖之清伊尹聖之任柳下惠聖之和孔子聖之時孔子之謂集大成集大成者金聲而玉振之金聲者始條理玉振之者終條理始條理者智之事終條理者聖之事智譬則巧也聖譬則力也學者於此每難言之而説者有曰聖人猶力賢者猶巧有曰巧或有不能力無不至是不以巧為悅者也不知夫孟子之意正以巧為説也孟子不云乎猶射於百步之外也其至爾力也其中非爾力也射者悅於至乎悅於中乎射而不悅於中則天下皆后羿矣天下不皆后羿是以中為悅者也蓋有至而不中者矣未有中而不至者也是故至者中之所兼也中者非至之所兼也故曰其中非爾力也中非力則至非巧矣然則力者尚乎非力者尚乎聖之尚乎智猶射之尚乎巧也孟子之所謂智即吾之所謂神所以運夫聖者也至於聖而不能運則三子者是也聖而運運而聖則夫子是也三子者惟其聖而未智是故任者不能清清者不能和和者不能清與任夫子之聖非能離於清任和也而能離於清任和也不離於清任和夫子之所以聖離於清任和夫子之所以智雖然以智為加乎聖則曷為曰始條理曰始終云者非序也用也荀卿曰始乎為士終乎為聖人始言户終言室也此序也非用也孟子曰始終云者用也非序也始言施終言收也有投乎吾前者無以施則不集無以收則不正謝而不集釋老以之集而不正申商以之智以施之聖以收之動則集集則正千轉萬變而不踰乎同條一貫之天理此夫子之神而孟子獨見之也壺丘子與列禦冦射壺丘子登髙山履危石足二分垂在外而下臨百仞之淵揖列子而進之列子汗流而不敢進嗟乎壺丘子能怖列子爾使遇孟子豈不敗哉莊應帝王篇云壺丘子能垂足於危石者二分而已加乎此者壺丘子能之乎孟子則能之者也夫子之見道者至乎聖極矣出乎聖之表而進乎智之事者孟子也壺丘子而遇孟子吾恐壺丘子之汗流也嗟乎壺丘子之不遇孟子也孟子下此篇論舍生取義之説君子能輕富貴歟君子非能輕富貴也能出乎富貴也未有以出乎富貴而曰我能輕富貴將以輕之適以重之夫惟出乎富貴者然後不為富貴之所誘何則此固有以破其誘也市井之人窮日之力竭智巧以爭錐刀之利人人自以為得也登山而下視之此與蟻蚓之爭糞壤有以異乎非彼之暗而吾之明也彼方居其中而吾則立其表也然則破富貴之誘者必立乎富貴之表者也然則其孰為富貴之表禮義是也君子者登夫禮義之山以下視禮義之市而明見富貴之糞壤則天下之富貴有不破者乎夫既被之則無所用之天下之所為汲汲於富貴者夫固有以用之用之故求之無所用之則安以求為哉貴極人爵而富以萬鍾反視吾身而無關焉而有怍焉無關則何所知有怍則有所病得富貴也未有所加而先以自病則富貴者真何用哉孟子曰生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也此孟子之所以出乎富貴而立其表也且義之必取則生猶必舍也而不能舍富貴也耶又曰非獨賢者有是心也人皆有之賢者能勿喪耳一簞食一豆羮得之則生弗得則死呼爾而與之行道之人弗受蹴爾而與之乞人不屑也萬鍾則不辨禮義而受之萬鍾於我何加焉為宫室之美妻妾之奉所識窮乏者為之此之謂失其本心此孟子破富貴之巨力也歟蓋簞食豆羮之非禮而乞人辭焉萬鍾之非禮義而士君子受焉乞人之辭辭有用者也士君子之受受無用者也何則簞食豆羮之不受則乞人者飢而死矣萬鍾之不受士君子之身無乃未至於死耶身未至於死則曷為受之曰為宫室之美也妻妾之奉也知識之求也且夫疏食曲肱聖人樂之啜菽飲水聖人以為孝也顔路請車聖人不與也聖人之自奉與奉親與交際夫固不以外為悅也今也非自奉非奉親而特為宫室妻妾知識之奉而安於受不義之富貴此為誰計耶乞人能不曖其身之死以不離於義士君子不能不受奉人之具以不離於不義可怪也平日身無一毫之加而有丘山之損妻妾知識享萬鍾之奉而吾身不逭乎萬世之誅豈必明者而後見哉故孟子曰鄉為身死而不受今為妻妾知識而為之是亦不可以已乎且乞人之心心也士君子之心心也曰士君子之心無乞人之心可乎有之也而失之也故曰失其本心士君子之膏肓孟子其痛針之矣嗟乎欲天下之不為者不可使天下之不為也必窮其為之之由而折之孟子不使天下之不受不義之富貴而深折其所以有用於富貴者使天下曉然見其有用之無用也禮義之未亡聖學之不絶誰之力也哉韓子上此篇論道德虛位之説韓子原道之書孟子以還一韓子而已大哉韓子乎雖然其猶有不合於聖人者歟若曰道與德為虛位之類是也曰此乃韓子之所以合於聖人者也聖人之道非以虛為道聖人之道非以虛為德道德非虛而曰虛位者道德之實非虛也而道德之位則虛也天下之物惟其位之實是以莫得而入也其位不實則虛與實皆得入而居之夫惟有以實其位之虛則其位不可入矣韓子之言所以實其虛者也且夫道德也者果何物也謂之無也何以不無其名謂之有也何以不有其形惟其有名聖人之所以實之以用虛也惟其無形異端之所以入之以欺世也昔者生民之初蓋有所甚不安也生不養死不葬居焉而無别羣焉而無臨爭焉而無決也聖人者倫以經之具以維之仁以親之義以愧之經之故立維之故不散親之故不相棄愧之故相憚由乎此者謂之道體乎此者謂之德根乎心而形乎事進則賢至則聖執則神皆不外焉者也聖人者以為是足以安天下澤萬世而無憂矣孰知夫聖人之力有所不及而遂遺聖人之憂蓋天下之未安則惟安之求而不暇乎其他天下既安而侈心生焉於是道德之名日起而道德之實日亡非道德之名果能亡道德之實也天下玩其實而疑其名也自天下之玩也而道德之位始虛自天下之疑也而異端之道德始入蓋聖人之道德既行而天下大安天下既安而不知其所以安者乃聖人之道德也不知故玩舉君臣父子日用飲食之事彼皆玩以為常而不足異也而聞聖人有所謂道德云者樂其名而求之不知其所以常者即其所求也不知故疑彼以為道德公者必有所甚異而世皆未之見也於是舍日用而求新竒而異端斯入之矣何則有虛之可乘也人有居巨室享膏粱者久而厭之以為是不足居不足享也而聞山林之姦人有異説者以為天之可以飛而升風露之可以食而壽也則舍其室而從焉其室既虛則姦人者何憚而不乘以入之哉道德者天下之巨室也非如曠野之空虛也而其位則虛久矣天下之人去其室以求其室其位得而不虛耶異端乘之韓子塞之異端入之韓子出之韓子曰仁與義為定名又曰吾之所謂道德者合仁與義言之也老子之所謂道德云者去仁與義言之也而後道德之虛位可得而實矣匹夫細民見其鄰之徙而去也則私其土田而耕之它日其鄰者歸焉則為匹夫細民者將避而去乎猶將私之也老子以空虛為道德此私吾聖人之田者也韓子出而仁義還則聖人之田宜誰歸故曰韓子之言所以實其虛者韓子下此篇論異端君子之去異端非異端不去之可憂而異端既去之足慮異端之不去蓋有能去之者矣去之矣其患有大於未去之時何其有以去之無以處之也如去盜焉方盜之作也紛紜震擾若無以支持之為者於是深計以圖之盡力以角之圖之而中角之而勝其遂無盜矣乎曰未也盜之未敗而降也有不可以不受者矣及其敗也有不可以盡殺者矣不受其降而不寬其殺不可也受其降而寬其殺不可也蓋聚姦宄之民而驟散之散之而無以處之則其復為盜也又有甚焉者矣天下之入於佛老豈皆好其清淨寂滅之道者哉有好焉者有畏焉者有利焉者士之為髙者則妄意以為此可以悟性命而超死生也則之焉此好之者也士民之悻於福田利益之誘而憟於死生報應之誑者則亦之焉此畏之者也愚夫細民之惰者無能者廢疾者鰥寡孤獨者進而窺二氏則見其不業而食不劬而居反而顧其身則茫乎無依於是亦之焉此利焉者也韓子也固憂夫好焉者之不可奪畏焉者之不可祛也而利焉者之無以處尤韓子之所大憂也何也好焉者可以理遷舉先王之道而力明之以實夫位之虛閉其入而開其歸韓子則有原道之書畏焉者可以事曉善而祥不善而殃此天下同見之事也烏有福田利益之妄旦則夕生則死此天下不足怪之事也烏有死生之怖韓子則有與孟簡氏之書與武侍御氏之書使韓子之言行則奪以祛何難若夫民之利焉者一旦驅而散之其徒之為萬者不知其幾也散而無以處也歸而無以生也廢疾者坐而死鰥寡孤獨者坐而死惰者無能者肯坐而死哉坐而死者奚罪焉君子何忍置之於心也其不肯坐而死者不去而為盜決而為人亂者無之去異端所以仁也而無罪者得死所以為治也而反得亂則是不如不去之安也是故韓子既思所以去又思所以處韓子曰人其人火其書廬其居明先王之道以道之所以去也又曰鰥寡孤獨廢疾者有養也所以處也文王之治岐也必先夫民之窮而無告者此非惟既其仁也亦防其民之利於為異也三代之時異端之不興豈特一道德而同風俗之力歟亦其所以處民者盡爾韓子之意真先王之意也然則韓子曷為言之而不行曰韓子能行而不得行者也蓋有得行而不行者矣將能行而不得行者罪耶得行而不行者罪耶十先生奧論注後集卷十二
