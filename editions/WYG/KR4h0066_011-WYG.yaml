body:
  text: 十先生奥論註前集巻十一五經論張震易此篇論窮理盡性至於命无无者无之宗也有无者一之宗也一者天地之宗也天地者萬物之宗也以无出有其來為无窮以有入无其往為不通知夫有无之非而非之又有也始可與言易矣茫乎忽乎其无所從乎杳乎冥乎其莫之名乎莫之名也將烏乎誰哉俄焉有誰矣而後有形形具而生之數不可窮矣天動而清地静而寧老三十九章天得一以清地得一以寧動者為闢静者為闔夫乾其静也專其動也直是以大生焉夫坤其静也翕其動也闢是以廣生焉一晦一明一剛一柔日月代照寒暑代興隂陽代勝變化代作自一而二自二而三自三生五自二生四而兩儀形焉五合一而生六合二而生七合三生八八合四生九而四象成焉五五而生五六而成五十有五各定其位而八卦合焉易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶四九而六其䇿為乾四六而六其䇿為坤合而分之極于萬有一千五百三十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也王弼注二篇三百八十四爻隂陽各半合萬一千五百二十策自此以往數有所不能圍而吉凶憂樂死生治亂存亡消息盈虚進退失得小大貴賤是非利害之理相摩盪於天地之間者吾不得而知也天下之變於是極矣而未知其果有變耶將不變耶變與不變不可得而知也是故爻以見其位彖以明其象象以盡其意使天下各然其所以然者一身之中無不自知也性存而心存心存而識存識存而形存形存而錯於萬物者相與為化而不知其極嘗試反而思之使其早興而暮罷者其誰乎皇皇焉與接為鬬而不暇者非心耶既而忘之其久也求其所以忘而不得也則渾然同流而萬物不能與之化夫又烏能為吾累哉易曰窮理盡性以至於命説卦云是非其至歟今人以為不然見善惡知愚從而謂之性見窮達死生從而謂之命則是因聲而求響因形而求影也可不謂之大惑歟易曰无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此繫辭上云夫无思者非无思而无无思无為者非无為而无无為其於天下之故也寂然而通則謂之有耶謂之无耶吾將以名名之而不可得則神焉而已此之謂大化禮此篇論性與禮俱生性也者與禮俱生不以禮存亦不因禮而亡故禮者天之道也惟聖人能安其天不安其天非性也情也天下之議禮者情而已其言曰器偽於埏埴木偽於斫削性偽於禮義荀性惡篇禮義者是生於聖人之偽非故生於人之性也故陶人埏埴而為器然則器生於工人之偽非故生於人之性也故工人斵木而成器然則器生於工人之偽非故生於人之性也性與偽合則天下治矣而達生者笑之无埏埴而後土安於土無所削而後木安於木無禮義而後人安於性雖然彼其心猶有滅禮而存性者也滅禮而存性則既云二矣而惡能以言性哉木柔於金而冶不能銷冰柔於土而工不能斵性之所无有者聖人能以偽為也无埏填則不如无土无斫削則不如无木无禮義則不如无人以為无人而後安者也是无人而後可也不亦傷性矣乎凡若是者情也非性也性也者與禮俱生不以禮而存亦不因禮而亡是故非禮勿視非禮勿聴非禮勿言非禮勿動吾豈規規然為是影守形哉安吾之天而不貳於物則已矣一於聼者不見泰山一於視者不聞雷霆而况於道乎一於道者見之而非見聞之而非聞終日言動而未嘗言動也是言也非以其化之之至而不自知耶夫因物而見則物奪其目因聲而聞則聲奪其耳因理而言則理奪其心因事而動則事奪其形一復於性則是數者皆為吾用而不吾用也吾又何容心於其間哉規矩無心於方圓繩墨無心於平直聖人無心於禮義凡君臣父子之倫貴賤長幼之宜居之而安行之而通皆性也是以君子静而不居動而不揺博而不流約而不溺無求守之而所性存焉故曰動容周旋中禮者盛徳之至也詩曰巧笑倩兮美目盼兮素以為絢兮子夏以此問夫子夫子於此告之曰繪事後素夫繪後於素則禮後於性矣禮其後於性哉商也以此有疑焉則復問曰禮後乎而夫子曰起予者商也及其删詩則從而去之夫子之意則然而曰忠信之人可以學禮者妄説也彼妄之尤者則又曰是區區者非性也孰若忘禮以求性禮忘而性之大本者先失焉夫子曰吾七十而從心所欲不踰矩夫從而不踰矩者是乃真從者也彼求有以從之則是規矩而已矣夫豈從心哉吾以是為學禮之辨詩此篇論中和中之詩其至矣乎人皆有之而不自知也嬰兒之生䝉然而已饑之則呱呱然戲之則啞啞然故人皆有中而不自知者和之失也中不自中以一故中和不自和以中故和中與和相習而莫之能名謂之道者喜而忘喜怒而忘怒哀而忘哀樂而忘樂不以喜怒哀樂而傷其真是中之至和之極也中則誠和則明昔者中山王聞樂而悲前中山靖王勝傳建元三年勝來朝天子置酒勝聞樂聲而泣問其故勝對曰云云今羣臣羣居黨議朋友相為使夫宗室擯卻骨肉冰釋斯伯竒所以流離比干所以横分也子琴張臨尸而歌記檀弓子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉樂非所以為悲尸非所以為歌也然則其感之者真在内也故感人心者莫深於詩而蕩人心者亦莫甚於詩蕩之者過而已矣喜之過流怒之過暴哀之過傷樂之過滛聖人惡其過也是故通之以情而正之以性性通於情不情其性情止於性能性其情使天下之人雖和而不失中者性之至也凡人之情喜均則無喜怒均則無怒性其不均故喜怒生焉然天下之至異者胡越也至其歌則同於樂其哭則同於悲同之者非天歟然天同之其有不同歟蟲鳴乎秋唧啾淒悲其聲不同而同於氣同其天也人之為聲也平則淳以深樂則舒以和縱則肆以緩急則迫以數凡歡愉高暢堙欎感憤抑揚變化莫不一理而其情同焉雖聖人豈能為之哉故雅之二小雅始於鹿鳴終於何草不黄大雅始於文王終於召旻頌之三周頌始於清廟終於般魯頌始於駉終於閟宫商頌始於那終於殷武風之正變十有五周南召南正始之道王化之基邶栢舟言仁而不遇也頃公之時仁人不遇小人在側鄘柏舟注紂都以南曰鄘衛淇澳注紂都之東王黍離閔宗周也鄭将仲子刺荘公也齊雞鳴思賢妃也哀公荒滛怠慢魏葛縷剌褊也唐蟋蟀刺晉僖公也秦車鄰美秦仲也陳宛丘刺幽公也檜羔裘大夫以道去其君也曹蜉蝣刺奢也豳七月陳王業也皆出乎天下之自然者也大者曲而歸諸直小者怨而歸諸正深者嚴淺者夸雅頌之别然爾二南王化之基也邶鄘衛商民之相變也俗變於近而王不能正則王不王也鄭首叛也齊首霸也晉并魏則又霸而秦其甚也是皆王之不王而諸侯肆行莫之禁也陳滛也檜亂也曹奢也紛紛乎益甚而益不可正苟有后稷先公之化如豳者庶乎其可也此名之先後也雖孔子之聖亦安能離衛降王進鄭退齊分晉與秦以一己之私定天下之誠然哉且獨不見夫風乎蓬然起於東而入於西髙者折堅者㧞竅者呼林者靡若是者其風耶物耶風與物且不能一名之而謂人為之其可哉故知夫寂然之初者可與言風之自知中與一之未始有也而後可與言詩之變嗚呼孰知不言之言吾将與之言書此篇論三代之變天地無異化聖人無異治萬物無異性聖人順天理而理萬物者也物之生林然熙然孰吾榮乎孰吾枯乎已然而莫知其然者其性也旦而暴之夜而濡之一日而風之二日而霖之三之日蕩然矣惟人亦然無攖則寧無拂則全驅之以刑齊之以政臨之以徳而天下之性慘然矣所性一也弗一者人異之也帝以道仁王以徳洽霸以功勝由是天下之俗有弗同焉夫道者徳之郛也徳者功之域也道行則徳存而不自知徳立則功成而不自見故無徳之徳徳之至而非形也無功之功功之大而非名也及其失之小大分焉銖兼於兩寸兼於尺尺兼於丈自文觀之何有於小哉堯之治天下也不舉善不去惡不治小不教民人視堯亦天耳天何心於我乎舜之治天下必治之而後安焉左文十八年髙陽氏有才子八人天下謂之八愷髙辛氏有才子八人天下謂之八元此十六族也以至于堯堯不能舉舜臣堯舉八愷八元帝鴻氏有不才子天下謂之渾敦少皥氏有不才子天下謂之窮竒顓頊氏有不才子天下謂之檮杌此三族也以至於堯堯不能去縉雲氏有不才子天下以比三凶謂之饕餮舜臣堯流四凶族雖然猶未始與民相攖也國而國爾天下而天下爾吾何與夫民哉三王之於民如恐赤子之啼而亟乳之至五霸則又鞭朴隨其後也大道何從而行乎故夫使天下之至于此則亦治天下之過爾以治天下之過而曰民性之異不可也自有天地以至于今天下之人欲生而惡死欲逸而惡勞欲冨而惡貧其同乎其異耶冬之不能葛夏之不能裘旦暮而已矣隂陽歟寒暑歟其與吾為盛衰歟不同而同者有所不能易也故書之作亦因天下之不同而同之云爾而自漢以來言者始曰忠之變質質之變文不知大道之中果有是乎哉唐選舉志夏之政忠殷之政質周之政文文與忠質皆統人行孔子曰商因於夏禮周因於商禮皆可知而其繼周者雖百世可知也夫百世而猶可知者非損益之所從出歟襁褓也垂髫也白首也一身之變然也得一物而識之終身不忘焉夏之商商之周天下亦自若爾於三王何有而自周之衰治天下者莫或能繼也有欲繼之則紛紛然跡彼之芻狗以為天下續曰三王之治如此又烏覩夫治之意乎夫行之而攖天下之性者性之所同也天下之偽極矣不知所以同之又将以偽蓋焉從爾脊脊我則變變從爾呻呻我則瞶瞶是囿毛羽而復弋之沼鱗介而復釣之也悲夫春秋此篇論夫子欲明王道也孟子曰王者之迹息而詩亡詩亡然後春秋作又曰其事則齊桓晉文其文則史其義則丘竊取之矣孟子數言何其盡春秋之旨也昔予嘗怪平王之詩不列於天子之大雅而下同於諸侯之變風久而得之乃知平王之時無復有王道矣王黍離詩閔宗周也夫平王之詩何以獨無王道蓋父子君臣夫婦兄弟王道也隱公即位不稟于天子左傳魯夫人生桓公而惠公薨是以隱公立而奉之注隱公繼室之子當嗣位以禎祥之故追成父志為桓尚小是以立為太子帥國人奉之為經元年春不書即位傳與邾儀父盟于蔑而授之私盟而天子不問經元年三月公及邾儀父盟于蔑是無君臣之道也鄭伯克段天子又不問夏五月鄭伯克段于鄢注不稱國討而言鄭伯譏失教也段不弟故不言弟是無兄弟之道也平王已前未至此極夫子傷之此春秋所以始於隱公也或削去即位或書其私盟或削去公子名而書鄭伯或書天王而名宰咺秋七月天王使宰咺來歸惠公仲子之賵注宰官咺名也咺贈死不及尸弔生不及哀豫凶事故貶而名之此天子大夫稱字之例是皆以王道正之也嗚呼天下不可一日而無王道也久矣天下一日而無王道是滅天理而窮人欲者也吾夫子憫人欲之日起悼天理之將滅所以因魯史而作春秋葢將以續三王之道而扶天理之將亡也夫子自衛反魯然後樂正雅頌各得其所又刪詩書又定禮樂又繫周易如是足以明王道矣而又區區作春秋者何哉葢詩書禮樂先世之遺言而夫子之心曽未見之行事是吾道於經莫之見也聖人以謂吾道在我而不遇湯武之位不登王道無復見之行事於是宗魯史之筆以見王道之施設焉夫舊史自付之魯史而春秋乃傳之弟子意以傳來世而初不以示人也彼魯史者特一實録耳安知所謂王道哉予奪抑揚夫子以王道注之筆削其筆也見聖人之所在其削也見聖人之所歸學者儻於筆削之間上遡聖人之心乃知夫子雖千古而常在也且以隱公元年論之書元年書正月公即位此魯史也付之魯國者也筆王字於春下而削去公即位此夫子春秋也此付之門弟傳來世也誠如魯又有何義哉惟聖人寓於筆削此所以其義無窮請試言之夫筆王字於春下乃知王之所為天之所為也削去公即位三字乃知隱公之即位不稟於天子也自此類而推之則知不書賵𦵏成風文五年王不書天經隱元年又隱三年吳楚之人卒不書𦵏者皆聖人削之以正王道也邲之敗魯之舊史書先縠也而春秋乃書荀林父宣十二年衞侯出奔魯舊史書孫林父甯殖也而春秋乃獨書衞侯出奔齊耳襄十四年皆聖人筆之以見王道也因筆削以求聖心王道豈不昭昭乎儻於此而求之則二百四十二年之筆削森然在目皆聖心之發見也聖心之所與王道之所與也聖心之所奪王道之所去也學者儻未遽得夫子之心莫若先明大學之道夫大學之道王道也王道何在在格物也格物者窮理之謂也伊川曰格至也格物言窮理也天下之理無所不窮則幾㣲之至無不極其所至矣故曰物格而後知至知至而後意誠意誠而後心正心正而後身修身修而後家齊家齊而後國治國治而後天下平儻知格物之學則可以知聖人之心知聖人之心則可以知聖人之筆削知聖人之筆削則雖生乎千百載之下一讀春秋乃如歴鄒魯之國登洙泗之堂親見吾夫子之威儀聞吾夫子之謦欬親傳吾夫子之心法既傳其心則飲食寢處洒掃應對無非吾夫子之運用窮而獨善也隱㣲之間有廟堂之顯幽暗之際有日月之明達而兼善也乾旋坤轉雷厲風飛百物阜康萬邦綏緝旂常彛鼎不足以形容鐘鼓管絃不足以傾寫而髙車駟馬衮冕圭璋有不足以榮輝也十先生奥論註前集巻十一
