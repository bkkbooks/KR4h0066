body:
  text: 十先生奥論註前集巻一歴代聖君論吕祖謙堯舜道離於天下或者聖人為之也亦時之變為之也道函於泰始隱於渾淪而藏於未雕未斵之天者未離也已而裂於乾坤洩於河洛分於八卦散於九章而其體始離矣雖然體固離矣而猶若未離也何者乾坤判而未鑿也河洛呈而未支也八卦具而未演也九章敘而未疇也迨夫既鑿而支既演而疇析之而後分也斵之而後散也詳之而後乖也彰之而後晦也嗟夫道之全體至是而始暌矣吾嘗求易於未有易之前葢未始有一畫也而畫則始於伏羲羲之畫未詳也畫而三之卦而八之其端倪畧發也已而文王重之孔子繋之而易之體始分矣雖然不重不繋不可也人心懵然中則無見也不灼其影昧者弗覩也不烈其聲瞶者弗聞也洗心退蔵者聖人之分也吉凶與民者聖人之餘也為其餘而不及其分聖人之心亦缺然也是故易之書為憂世而作也無所憂則不作也嗟乎彼文王仲尼又何等時耶吾固曰非聖人為之也亦時之變為之也昔者堯以是道而傳之舜則曰中舜以是道而傳之禹則亦曰中中果何物耶意者堯不免於強名而舜不過於循襲也夫強名以言道循襲以語人非意也勢也河洛出矣八卦具矣而中之名未立也雖然言之可矣堯之命自中之外則無説而舜則有曰人心道心也危㣲精一也營營然若慮夫其擇之不精也其語之者不詳也其守之者不固也繼而曰無稽之言勿聴也弗詢之謀勿庸也吁强名而言中亦既贅矣而奚至於是哉吾深悲夫舜之時不逮夫堯也自堯舜而有執中之說精一之説然後有吾道一以貫之之説有喜怒哀樂未發之説已而為性善性惡之説為善惡混之説而道始益離矣嗟乎堯固憂乎後世之不知中也而中之名立舜固慮夫後世之失中也而精一之説立二説立而後世之説卒以窮吾又悲夫堯舜之不得以歸乎天也不特此也九疇之錫禹得之無説也而箕子則反覆言之未㡬漢儒得竊之以文其誕而皇極之道孤向非箕子開其源而漢儒何以承其流也噫彼箕子又何等時耶吾固曰道離於天下非聖人者為之也亦時之變為之也然則處時之已變則何為則亦曰伏羲堯舜而已矣文王箕孔而已矣以酒而解酲可也惡酲而去酒不可也吾獨悲夫聖人之不得以歸乎天也大禹聖人之舉事亦難乎其始也曷難乎其始也始者終之的而創者述之表也始者創之終者述之吾見創之者一線而述之者滔天也嗟乎聖人則亦無心待天下來世而已矣奈之何天下後世之不以無心待聖人也葢嘗讀書而至於苖未嘗不悲舜而嘆禹也舜聖人也禹亦聖人也而有心乎哉苖之不率非一日也在堯之時則然也堯嘗一遏絶之矣而苖不悟舜嘗一分北之矣而苖復不悟然則堯舜何汲汲於苖之悟也悟不悟無足介也而鰥寡則有辭也庶戮則無辜也民棄則弗保也堯舜無心於苖而有心於民也徂征之舉葢再悟之也嗟乎聖人其亦待苖以速化而示以無心之太過也歟吾聞聖人無心也以有心議聖人者凡民也奈之何其不以無心議之也彼固謂揖遜之治征伐則未見也都俞之化誓師則未聞也征伐未見而見於舜誓師未聞而聞於禹則是起戎者舜先之而召亂者禹首之也雖然苖逆命猶可也苖不逆命則舜之征也為無名禹之班也為無功而益之賛也為不切矣夫起戎而至於無名召亂而至於無功吾固悲夫聖人以無心之用而得有心者之議也嗟乎聖人亦不計後世之議此也夫有心於伐人者其籌之必工也其計之必審也工而審焉者故其勝必決勝而必者功巧於中人者之為也然則聖人固巧於中人也哉聖人寧可以失師之名歸之已而不忍中人以圖幸也吾固曰聖人無心也有心者之議不計也吾亦不責有心者之議而嘆聖人不幸而有苖也向使無苖則無征無征則無誓征誓之名不立吾知舜可以逰乎堯之天禹可以逰乎舜之天而天下來世有心者之議皆可以相忘於不可致詰之域矣惜也以舜禹之無心而不得以遂乎此也是故自夫有舜之征然後有𦙍侯之征成湯之征武王之征雖征其所可征然征之名此乎出也自夫有禹之誓然後有甘野之誓鳴條之誓孟津之誓雖誓其所當誓然誓之名此乎立也舜禹之心夫豈以征誓而示後世也哉吾固悲夫始者之一線而終者之滔天也吾固曰聖人無心也有心者之議不計也吾亦不責有心者之議而嘆聖人不幸而有苖也成湯言不足以孚乎民也言出而民孚者是必有孚於其先者焉非言也言焉而孚未若不言之孚也易之革曰已日乃孚又曰未占有孚葢孚之於己日者革而孚也孚之於未占者孚而革也然則已日之孚又不若未占之孚也何者求信於人者是必難乎其信也難信而信非信也中孚之繇曰鳴鶴在隂其子和之而夫子以為居室言善而千里之外應夫居室之言若無與於千里也而千里之外應者理之所在不求孚而自孚也君子烏可以言而求孚哉吾觀典謨所載葢數千語不啻也而未嘗有一語令乎民且堯舜非愚乎民也知民之不可以一語令也以天下之大而傳之人前此未聞也而堯舜徑行之不告也已而薦之天暴之民而謳歌訟獄者自來也諸侯朝覲者自至也堯舜非期之而使㑹約之而使同也無他孚焉而言言焉而孚是以未施信於民而民信之也嗟乎以言孚人者其出於季世之聖人也歟葢嘗讀書而至於湯未嘗不悲湯之窮也吾聞湯聖人也奚為而至於是也湯居時之窮者也居時之窮而不能變則益窮也夫窮則變變則通聖人之易也而奚以累乎湯吾不悲湯處時之窮而悲湯無以示天下來世之窮也湯之誓曰非台小子敢行稱亂有夏多罪天命殛之者示民以不敢專之之辭也又曰汝曰我后不恤我衆舍我穡事而割正夏示民以所未諭之辭也又曰予其大賚汝爾無不信爾不從誓言予則孥戮汝者責民以信而督民以必信之辭也嗟乎動天下之兵而加諸天下之主其迹誠逆也其理誠悖也而曰予不敢專爾所未諭也信之者賞而違之者誅也吁迹逆而掩之以順理悖而覆之以誠如之何而冀民之孚也吾固知非聖人之事也而湯之心亦卒以不安雖然使湯安於其窮而不變不可也安而不變者是助桀者也放桀之罪身罪也助桀之罪心罪也身罪之罪其罪小心罪之罪其罪大小不可以易乎其大而身不可以掩乎其心者身罪而心非後世或可以原心而定罪身脱而心陷焉者吾不知其罪之如何也嗟乎此湯之本心也而難以告夫人吾觀當時曰舍穡曰其如台者非助桀之言也不急以伐桀者之言也夫安於虐而不急以伐焉者何也意者執於其好而不忍也夫不忍以賊乎其君而上之人誠忍焉湯之心又何如也吾固曰湯處時之窮者也雖然此猶可也湯之慙有曰予恐來世以台為口實葢憂無以釋後世之辭也夫有所創而懲其述焉者難免也而湯顧憂之湯非為武王伐紂者設也為千萬世聖人者設也夫自加乎人之君而憂其子孫加於人是笑房杜者之智也非為匹夫匹婦復讐者之為也過非桀也心非湯也罪非紂也心非武也援湯之言定桀之罪按武之訓數紂之非其禍不淺也嗚呼此湯所以終慙而不釋也而虺之誥則曰王無慙天之錫於王者然也民之戴於王者然也王之聲色則不邇也貨利則不殖也其寛仁是信也其大徳是昭也王奚慙哉吁虺之誥誠然也湯然乎哉吾固曰湯處時之窮未窮也而無以示天下來世之窮也雖有百虺之誥亦奚釋文王古今論無憂者必曰文王憂之深者亦莫若文王夫文王果無憂也而奚憂曰憂不在於文王者深憂也憂而在焉非憂也人咸知有憂之憂而不知無憂之憂無憂之憂深憂也憂不在堯而有驩兜之憂者堯之深憂憂不在舜而有瞽瞍之憂者舜之深憂然則文王之憂者亦不于其身于其人者乎人皆曰父王季而子武王者文王可以無憂也予則曰無王季之父無武王之子無憂也父而季也子而武也文王之所以深憂也何者王季宜王而不王者也武王宜王而未王者也彼天下之人思其所不王而疑其所未王文王之憂何如也雖然是憂也文王以為憂也易之他人則非憂也幸也廣土衆民君子欲之人所同然也而文王則顧以為憂嗟乎文王之憂其異乎人之心歟天下之生久矣尊卑之分不可易也而紂為之君夫紂誠君也文王誠臣也臣不可加乎其君者理也而天下亦必知其王夫文王固宜王也而文王之心則以為我奚王也岐山之民王之民也江漢之民王之民也東海北海亦王之民也無王則無岐無江漢無東海北海而予奚得以君之也今岐之民則曰是文王之仁也江漢之民則曰是文王之化也東海北海則曰是文王之善養老也嗟乎我何有於天下而天下顧知有我也已而虞芮不質成於王而質成於我昆夷不遣聘於王而遣聘於我甚矣文王其無以謝天下也吾將有以率邠岐之民江漢之民東海北海之民與夫虞芮之臣昆夷之聘而歸之王可也是故羑里之囚人皆以為文王之不幸也而文王則以為宜也我無以取信於君而得罪焉者宜也君奚過哉是故易之書為明大分而作也自夫文王安於羑里之囚而不敢以過紂明夷養晦益堅事上之小心然後天下皆曰文王聖人也聖如文王而且不敢過紂我何有哉是以當時之人怨不至於叛憤不至於激者皆文王以身挽之也雖然文王固可以身挽之也然文王能挽之於其身而不能挽之於其子孫能使其民之不叛而不能使紂之必改能遏汝墳之怨而不能遏孟津之畢集能率天下以事紂而不能止牧野之投戈是則文王之憂至此而終不可釋也吾固曰憂不在於文王者深憂也不在其身而在其子孫者尤文王之深憂也文王望道之心何如哉惜也文王有此心而不得以如其時也昔者堯以天下與舜舜逃之舜以天下與禹禹逃之二聖人者逃之而不能免焉者也禹以天下與益而益之避卒得以遂其志吾嘗謂舜禹之心之不得以如益也使文王而生於此時則堯自堯舜自舜禹自禹文王自文王交相忘於無事之域縦有不得已焉則猶可以為益之避而得以遂其心惜也文王不生於舜禹之時而生於商也武王天下不可一日無君也一日無君者固武王之憂亦伯夷之憂也武王憂今日之無君而伯夷憂後世之無君憂不同而君一也吾嘗讀泰誓之書未嘗不悲武王有無君之心也然武王之無君天下之有君也武王得無君之非而天下獲有君之幸以已之非而幸易天下之幸奚不可也而伯夷則不之恕也吾觀湯之慙未釋於伐夏之日而仲虺則釋之武王自謂于湯有光而伯夷則非之何者湯無伯夷則慙而武王之臣皆虺故非也慙不見於湯則非必見於夷光未見於武王則釋先見於虺湯之慙夷之非武王之光虺之釋皆同此憂也無武之光無虺之釋則天下無善治無夷之非無湯之慙則後世無寧君吾固謂數聖賢者同乎其憂不同乎一世萬世之憂也雖然湯為之而身慙而武王則假於人者何也處武王之勢然也文王葢嘗有慙矣非徒為湯之慙而且慙乎為湯也使武王而復慙焉是視天下之無其主也故武王任無君之非而有伯夷非無君之責使今日有得君之利而後世無従亂之虞嗟乎武王之意亦深矣而其迹則逆也其理則悖也而亦難以孚乎人今觀數紂之辭則詳而明誓衆之辭則曲而直援文王之辭則大而著意者明紂之罪直取其心而著文王之徳期以取信於天下而已吁以已之意而求以孚乎人人亦既徳矣而况於援親之徳而强以説人吾未始不為武王病也雖然武王誠病也文王之徳天下皆知之而亦何俟於予言然不如是則人無以取信於我也泰誓之書吾當畧其數紂之辭而考其自誓之辭然後可以見武王之心且其言曰天視自我民視天聴自我民聴百姓有過在予一人曰予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良意者以天下之意如此其孚文考之徳如此其著今日之過非天人也非文考也乃予一人之過也夫以必勝之辭而伐至不仁之紂天眷人予而猶懼其有差吾以是知武王之心也不怨天不尤人不咎文考之過不知當時之非不避後世之議以天下之責而萃於一已天下何與於武王而武王為之若是力也誠不忍視天下之病而自居其身以忠也是以放牛歸馬為天下也散財發粟為天下也武王何與焉吁葢至是而後見武王之心昔者夫子序洪範之書則曰武王勝商殺紂立武庚以箕子歸作洪範洪範者大法也訪大法於亡國之臣吾固謂非武王則不訪非箕子則莫陳也而夫子則詳直而序之者意者以謂可勝則勝非求勝也可殺則殺非過殺也可立則立立之所以為仁可歸則歸歸之所以為義而武王一以無心處之斯其所以為皇極之君也歟吁葢至是而後益見武王之心十先生奥論註前集巻一
