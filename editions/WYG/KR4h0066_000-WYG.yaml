body:
  text: 十先生奥論註總集類提要臣等謹案十先生奥論註四十巻不著編輯者名氏亦無刋書年月驗其板式乃宋時建陽麻沙坊本也書中集程子張耒楊時朱子張栻吕祖謙楊萬里胡寅方恬陳傅良葉適劉穆元戴溪張震陳武鄭湜諸人所作之論分類編之加以注釋據其原目凡前集後集續集各十五巻此本續集脱去前五巻僅存十巻而前集第七巻以上亦屬後人抄補其原註并佚去不存所亡之巻己無篇目可考不知作者凡㡬即此四十巻中核其作者已十六人但題曰十先生中間宋史有傳者凡十一人其餘若張震字東父益寧人孝宗時中書舍人龍大淵曽覿除知閤門事嘗繳回詞頭事見胡沂傳鄭湜有二其一字溥之福州人光宗時為従臣奏立太子監國見留正傳其一則紹熙元年為従政郎進治術十巻見書録解題此所載之鄭湜其進治術者歟方恬劉穆元陳武三人則史傳俱無可考見矣宋人文集名著史冊者今已十佚其八九而名姓無聞篇章湮滅如集中方恬諸人者更指不勝屈此書雖不出於科舉之學而殘編㫁簡得存於遺佚之餘議論往往可觀詞采亦一一可取固網羅放失者所不廢也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:99616913cce2b1e1b12b52793b7c4ea6cc7180e52fb774daab93d15a273e707f
