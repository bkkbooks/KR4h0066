body:
  text: 十先生奥論註後集巻七西漢臣論陳傅良王陵此篇論諌吕后欲封諸吕利於其自便饕安者之為也而古之君子或便於其私而不失成天下之大功於是好名者趍之而小人亦資焉以濟其妍欺悲夫天下之禍蓋出於君子之權而小人盜之也故夫權者道之變而義之賊也士而未能道之變則亦莫若無功其無求以賊義而已矣吕后欲封諸吕王陵固爭之而平勃適順其意卒安劉氏平勃也故夫天下愚陵之忠惠帝崩髙后欲立諸吕為王問陵陵曰高帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也太后不説問左丞相平及絳侯勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸吕無所不可太后喜罷朝陵讓平勃曰始與髙帝唼血而盟諸君不在邪今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見髙帝於地下乎平曰面折廷爭臣不如君全社稷定劉氏後君亦不如臣陵無以應之嗚呼其功不至於平勃吾未見其不為陵而非小人者哉昔者管仲不死於子糾子路疑而問諸夫子曰管仲未仁夫子曰九合諸侯一匡天下管仲之仁也而不曰其仁則在於不死子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜然則聖人之意亦恕乎其晚之有以蓋乎其初而薄其悦生以逃難之責故嘗論之子路惟講於此也而自虞無以贖過而不敢徒襲其為是以寧死於衞而或者以為由也一决之躁亦失於攷之不詳矣嘗觀夫子見南子應公山之召皆行之孤者也而諸子以意安之汎然莫之疑者獨由也不悦子見南子子路不説又公山弗擾以費畔召子欲往子路不説蓋子路審於自料固其守而不眩於名者如此是故食焉而任其患者其智之所以知而反是則彼誠有所未見夫舍其所安冐而姑為而幸合焉則亦可以謝天下不幸而不合則流而入於小人與其幸焉而庶幾於合孰若不欺其中之無愧由之死衞也夫豈偶然暗者之决哉左哀十五年衞亂使告季子季子将入子羔曰弗及不踐其難季子曰食焉不辟其難子路入公孫輒曰無入為也季子曰是公孫也求利焉而逃其難由不然乃入曰太子焉用孔悝雖殺之必或繼之太子聞之懼石乞孟黶敵子路以戈擊之㫁纓子路曰君子死冠不免結纓而死孔子聞衞亂曰由也死矣聖人於衞之難固以死處之蓋好髙而取名者非由之素也夫惟天下之士好髙而取名也則曰子路愚於勇者也王陵愚於忠者也於是黨邪以孤正榮存而醜亡身圖而國不計君逋而讎是與而風俗之弊至於頹壊而不可起而人主莫之倚仗以愚觀之非管仲平勃則凡若是者亦皆利於自便僭君子之美名以文小人之奸而已矣君子恕之乎不恕也周勃此篇論才不足而質有餘久矣天下喜夫才也自周衰士以才相髙孔子傷之曰吾欲從先進之野人蓋思古矣古之君子弱乎其形也而其氣固樸乎其貌也而其心察是故簡直而不苛鎮靜而不浮吾觀趙文子言不出諸口而所舉管庫之士七十餘家生不交利死不屬其子記檀弓晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家呉起與田文論功屈於起者三不如也而至於主少國危大臣未附則文以自居起亦愧弗及史記傳魏置相相田文呉起不悦謂文曰請與子論功可乎起曰将三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親力民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賓從子孰與起文曰不如子起曰此子三者皆出吾下而位加吾上何也文曰主少國危大臣未附百姓不信是時屬之子乎屬之我乎起曰屬之子矣文曰此吾所以居子之上也是烏可以其才喜之耶吁世之人主則亦無誘乎其所可喜也今之君子巧而文甚矣震整而翹秀閑麗而辯學問之工而氣質之陋也詞藻之華而忠信之薄也機辯慧巧者蒙不仁之具也威儀丰度者蓋空中之質也是以攻之不窮而用之必亂摘之無尤而動則為奸上之人其亦何便於此哉吁吾是以悲絳侯之不可復見也文帝初立勃為右丞相朝而問曰天下一嵗决獄幾何勃謝不知問天下錢榖一嵗出入幾何勃又謝不知汗出浃背媿不能對上亦問左丞相平平曰各有主者上曰主者為誰乎平曰陛下即問决獄責廷尉問錢榖責治粟内史居今之世而有如勃者則天下譁然以為斯偶人而已矣而不知夫子之所思而呉起之所媿者斯人也夫叔孫通此篇論制禮古之治天下者嚴於禮而寛於法後之治天下者嚴於法而寛於禮嗚呼亦各其世之安巳乎古者天下之民皆閑於周旋曲折而無病其難知止於其分而非敢求過是故天下輕於自治而重於自棄夫是以便禮之詳而宜法之簡何者不出於此固入於彼也書曰伯夷降典折民惟刑典無與於刑而省天下之刑由是也夫自周衰上無令徳而民無愧心其貴者習於僭儗而賤者快於放肆夷踞其口腹耳目之欲恣而骸骨手足弗堪於自檢故禮至於不可行及秦之興且惟功利之急也又舉先王之制廢之而齊民於一切之法至於不可避夫周公之禮至於不可行而秦之法至於不可避如是而又强其所不可行之禮而待之以不可避之法則斯人也將無動而不獲戾是何也禁人者巳甚而人情不自勝也禁人者己甚則人将苦其苛而情不自勝其勢将至於蕩焉而弗忌故凡設甚苛之禁者開弗忌之情則艱天下之禮者滋天下之罪也故能有所畧於禮而復有所不赦於法使夫庸人可以勉强而非甚過無至於干誅而苟入於刑則莫不有定議嗚呼民散久矣則君子亦固不可不如此也夫子作春秋削人之爵去人之氏絶人之族甚嚴也桓十一年九月鄭忽出奔衞注忽昭公也不稱爵者鄭人賤之以名赴荘三年春溺㑹齊師伐衞注溺㑹大夫疾其專命而行故云氏不盡以周公之法繩也猶三望猶朝于廟幸之之辭也僖三十一年夏四月四卜郊不從乃免牲猶三望文六年閏月不告朔猶朝于廟雖喪其大者而存其小者姑為之幸而已矣宰我短喪之問罪之深矣語宰我問三年之喪期己久矣子曰云云至於子路笑魯人之朝祥暮歌者而咎其責人無巳記檀弓魯人有朝祥而莫歌者子路笑之夫子曰由爾責於人終無巳夫三年之喪亦巳久矣夫子路出夫子曰乂多乎哉踰月則其善也夫朝祥暮歌短喪之真情也而聖人恕之且不深探其微盖自周之季猶幸諸侯存禮之萬一而不深探夫人無禮之心不然春秋一書将盡削之去之絶之而已爾聖人所以不盡繩者懼不勝誅也吁世之君子如之何其欲舉三代纎悉之文以過望於久散之民也由是觀之髙祖制禮欲度其可行者叔孫通亦採秦雜就寧有所闊畧而無敢極備則亦便漢而已矣髙帝悉去秦儀法為簡易羣臣欲爭功上患之通説上曰願徵魯諸生共起朝儀願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通徵魯諸生與其弟子百餘人為綿蕞野外習之通曰上可試觀上使行禮曰吾能為此嗚呼惟無至於上下之亂而足以便於民是亦可矣盖求備於民而重其罪戾者亦君子不為也陸賈此篇論以詩書説高祖漢之人主好經術者莫如武帝本贊卓然罷黜百家表章六經然以春秋復讎一言甘心夷狄匈奴傳漢既誅大宛天子意欲遂困胡迺下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復九世之讎春秋大之汲黯仁義之諫則每以不學鄙之而弗為聽上方招文學儒者上曰吾欲云云黯對曰陛下内多欲而外施仁義奈何欲效唐虞之治虖上怒變色而罷朝至於髙帝嫚儒不可以詩書説酈食其傳沛公不喜儒諸客冠儒冠来者沛公輒解其冠溺其中與人言常大罵未可以儒生説也雖末年猶有馬上之氣然及陸賈一説且慚且喜終身不事逺畧賈時上前説稱詩書髙帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎帝不懌謂賈曰試為我著秦所以失天下吾所以得之者及古成敗之國賈凡著十二篇每奏一篇帝未嘗不稱善稱其書曰新語議者惑焉竊嘗論之人主之患莫大於多知而不暇為古之王者惟知之未至而樂為之意先入夫其先入也得之之專故其至也趍之之决至於多知而不暇為則雖有異聞亦莫之肯行盖惟其習而玩之而故易違之也故凡天下之事狎於其説也而苦其難者則不可誘而進愧其非也而不能自勝者則不可諫而卻昔者魯昭公娶於呉為其同姓謂之呉孟子陳司敗問於孔子曰昭公知禮乎夫子曰知禮司敗以為聖人之黨而説者亦曰諱魯聖人非諱魯也蓋非魯也昭公而不知禮則雖娶姬氏焉亦奚不敢惟其知之也而畏人之議而逃夫名聖人以是悲昭公之不足與有為也然則世之人主則亦悔於其知之之晚而已知之而不為則不可以强譬夫人之疾也其藥之則效其砭之則達必其所未嘗試故也及其久也瀆於藥矣則補之弗滿矣玩於砭矣則刺之弗動矣無他其備嘗而試之也由是言之武帝所以不可諫而髙帝所以慚而悔也有以夫賈誼此篇論以制度説文帝天下之事鮮不强其才之不足而才之不足猶强而為之者皆其中之定論不立也夫是以眩於其名也而浮其實誘於其利而卒蒙其害嗚呼世之君子亦毋有所貪焉斯可矣孔子嘗曰知及之仁不能守之雖得之必失之知及之仁能守之不荘以涖之則民不敬知及之仁能守之荘以涖之動之不以禮未善也夫有天下者自其及之之積而至於動之之難其任有差而其力之堪也皆止焉而不可過過而冐之則必以自禍瑚璉之器千金之寳也蓄千金者能得之然能得之也而藏之不周或者盜之矣能藏之也而御之不謹或者傷之矣其藏之也周其御之也謹是亦可矣雖然居有焉而已矣奉之而趍吾懼其足之蹶也負之而馳吾懼其馬之佚也則愛器者不敢以輕何者誠不敢試其所甚愛於其所未安也至於治天下則輕動之吾不知夫愛於天下者而薄於愛器也是故古之君子凡其所欲立必有所甚便也寧有所畏而毋有所恃蓋亦所愛者大而寘吾力焉於其力之所精而非惑乎天下之可否是以未嘗一日出其定論之素而圖罔功茲文帝之治漢是矣陳武以用兵説晁錯以削國説帝雖郤之可也史律書帝即位将軍陳武議曰南越朝鮮擁兵阻阸選蠕觀望宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此錯遷為中大夫言宜削諸侯事文法令可更定者書凡三十篇孝文雖不盡聽然竒其材甚者賈生以制度説帝猶未暇誼以漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂迺草具其儀法色上黄數用五為官名悉更奏之帝謙遜未遑也夫豈固為冲退之行哉其見者審也嘗觀子産相鄭焚載書左襄十年子孔當國為載書以位序聽政辟大夫諸司門子弗順将誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定作丘賦昭四年子産作丘賦國人謗之曰其父死於路巳為蠆尾以令於國國将若之何子寛以告子産曰何害苟利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣云云犯人之議不恤可謂勇於必為而健於决者及鄭國有災或勸之遷國子産曰吾不足以遷矣卒弗之聽昭十八年里析子告子産曰将有大祥民震動國幾亡吾身遷泯焉弗良及也國遷其可乎子産曰雖可吾不足以定矣嗚呼文帝賢君也而難於制度子産賢士大夫也而難於遷國無乃優於守之之仁涖之之荘而動也中禮猶未也歟而後之君子恥曰未能也而獵之以為名曰吾将必為堯舜伊周吁賢而至於文帝子産亦足矣而堯舜伊周未易以僭也張釋之此篇論劾梁王不敬君子之用法不可貶亦不可僭賤而屈乎貴者貶也疎而間其親者僭也夫貶也偏國之政而僭也䙝君之威為法者固不可以害政然君威亦奚可損哉昔者周公相成王其叔父也成王有過可以禁矣而弗禁也撻伯禽以愧之者盖尊之也記文王世子篇抗世子法於伯禽欲令成王知父子君臣長幼之道也成王有過則撻伯禽所以示成王世子之道也至於設官以秩事唯王及后世子之用不㑹禮天官膳夫掌王之食飲膳羞以養王及后世子凡祭祀之致福者受而膳之摯見者亦如之嵗終則㑹唯王及后世子之膳不㑹則亦示羣臣無敢議焉者孔子作春秋殊王子於諸侯之㑹且不敢列而盟之周公孔子其欲重君之威也如此哉而後之人過苛而好名持一切之論以加乎其上之子弟吁其亦何果於此也夫政自執而一縱焉未頗也而君威不可以替彼今日君之家嗣而它日天下之君者也而專以法繩豈重國之道耶吾嘗觀江充擊戾太子之使其始與釋之劾景帝等爾而卒以譖殺太子漢果大亂至今寃之充為直指繡衣使者從上甘泉逢大子家使乗車馬行馳道中充以屬吏太子聞之使人謝充充不聽遂白奏上曰人臣當如是矣大見信用後上疾病充見上年老恐晏駕後為太子所誅因奏言疾祟在巫蠱上以充為使者治巫蠱充言宫中有蠱氣遂掘太子宫得嗣木人太子懼不能自明收充自臨斬之太子繇是敗又釋之為公車令太子與梁王共車入朝不下司馬門釋之追止遂劾不敬奏之文帝繇是竒釋之文帝崩景帝立釋之懼誅景帝不過也然於釋之猶賢焉彼充之誅固也而釋之之賢亦或不在此也夫昔魏絳戮楊干之僕襄三年晉侯之弟魏楊干亂行於曲梁絳戮其僕晉侯怒曰必殺魏絳絳對曰軍事有死無犯為敬臣之罪重請歸死於司寇公曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也敢以為請晉侯以絳為能以刑佐民矣衞鞅黥太子之傅商君定變法之令太子犯法鞅曰法之不行自上犯之将法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈識者亦韙荘子之能刑而虐商君以予論之鞅則忍矣而絳亦傷恩何者君子之尊尊也亟規而緩討規之不行則討之未失而胡若是遽也以匹夫之責行於其君而長姦臣之禍心惜也絳亦未純乎君子矣嗚呼江充固一鞅也若釋之若絳之過也歟季布魏尚孟舒此篇論文帝懲髙帝之寛而過於審圖天下者取人貴寛保天下者用人貴審矯寛而過於審賢主所不免也始髙祖之與楚角也其收一世之豪傑雖屠狗販繒之倫寸長而不棄也樊噲沛人也以屠狗為事迎髙祖立為沛公又灌嬰傳睢陽販繒者也以中涓從髙祖天下既定坐沙之謀擊柱之爭没髙帝齒而不寧六年上巳封大功臣其餘爭功未得行封上居南宫從復道上見諸将往往耦語以問張良良曰陛下與此屬共取天下今巳為天子而所封皆故人所愛所誅皆平生仇怨今軍吏計功以天下為不足用徧封而恐以過失及誅故相聚謀反爾云云漢王為皇帝悉去秦儀法為簡易羣臣飲争功醉或妄呼拔劒擊柱上患之嗟乎烏喙殺人而良醫用之時也幸而疾去餘毒猶存髙祖晚年其亦食烏喙之餘毒也哉葅醢屠戮曾不一少顰其顔者非帝之忍也勢也十一年正月韓信謀反夷三族三月彭越謀反夷三族黥布傳髙后誅淮陰侯布因心恐夏誅彭越盛其醢以徧賜諸侯至淮南淮南王見醢大恐遂反洎乎孝文天下幸於無事惟恐蹈前日之轍而智且勇者喜於自躍以開天下復撓之隙也故李廣賈生皆竒才也帝徒嘆其不遇而疎之誼為長沙王太傅又為梁懐王太傅贊曰誼之所陳畧施行矣亦天年早終雖不至公卿未為不遇也孝文十四年廣以良家子從軍擊胡殺首虜多帝曰惜廣不逢時令當髙祖出萬户侯豈足道哉以一令官嗇夫豈為害治一聞釋之之爭輒内媿止上登虎圏問上林尉禽獸簿尉不能對嗇夫從旁代對甚悉帝詔釋之拜嗇夫為上林令釋之曰陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實不可不察帝乃止彼嗇夫固不足道帝豈不知廣之賢於周仁石奮之庸誼非絳灌申屠木强者之比哉然念夫勇鷙者易於貪功而豪鋭喜於多事吾懼其有以擾天下則亦寧負二子也噫文帝真保世之主也哉世多疑孝文以使酒一言而疑季布孝文時人有言布賢召欲以為御史大夫又言其勇使酒難近至留邸一月見罷以出兵一戰而奪魏尚孟舒之爵馮唐曰尚為雲中守虜嘗一入尚擊之斬首捕虜上功莫府差六級陛下下之吏削其爵繇此言之雖得李牧不能用也帝説令唐持節赦尚復以為雲中守田叔為漢中守文帝召叔問曰公知天下長者乎對曰故雲中守孟舒長者也時舒坐虜大入雲中免上曰先帝置舒雲中十餘年虜嘗一入舒不能堅守士卒戰死者數百人長者固殺人乎叔曰貫髙謀反天子詔有敢隨張王者罪三族舒自髠鉗隨張王以身死漢與楚相距北夷来為邊寇舒知士卒罷敝不忍出言士卒爭臨城死敵以故死者數百人舒豈毆之哉是乃所以為長者上曰賢哉復召以為雲中守遂使田叔馮唐增嘆而發憤布亦有以為言嗚呼懲羮者吹虀懲咽者廢食有懲而過焉固也文帝懲髙帝之寛而過於審奚疑哉唐人有言武后以易得人徳宗以精失士陸贄傳云愚於髙祖文帝亦云十先生奥論註後集巻七
