body:
  text: 十先生奥論註續集巻七時政論呂祖謙苟且此篇論心不可二用目不兩視而明耳不兩聼而聰人之心固不可二用也勤於公則必苟於私勤於私則必苟於公二者不可得而兼惟觀其所向之何如耳古人之材即後人之材也古人之智即後人之智也然古之治後之亂者豈材智之有異耶特古人用之於公後人用之於私而已惟古人用之於公故於私不得不苟以衛公子荆之事觀之其宫室始有則謂之苟有及言其少有富有則又謂之苟全苟美其言每謂之苟者非薄於私也不苟於公則必苟於私也惟後人意在於私故於公不得不苟以漢賈誼之言觀之其論大臣則以為有患苟免及論羣下則又言俱亡耻俱苟安誼疏生上遇其大臣如遇犬馬彼將犬馬自為也廉恥不立且不自好苟若而可主上有患則吾苟免而已立而觀之耳人主將何使於此羣下至衆而主上至少也所託財器職業者粹於羣下也俱亡恥俱苟安則主上最病其俗每趨於苟者非薄於公也不苟於私則必苟於公也葢水盛則火滅寒往則暑來陽消則隂長公私之相勝亦若是則已矣自漢及唐以公滅私苟且之風盛於天下如董晉為相史臣譏其懦弛苟安時則有苟且之相唐晉賛懦弛苟安滋欲以恩信傾賊迂暗之人烏可語功名㑹哉如劉知幾謂牧伯遷代太速懷苟且之謀時則有苟且之牧武后天册萬歲元年知幾表云今之牧伯遷代太速倐來忽往蓬轉萍流既懐苟且之謀何暇循良之政如趙憬議考課欲格庶僚苟且之心時則有苟且之吏德宗時憬獻審官六議四議考課曰若課在中考如限者平轉而歴試之則无苟且之心滯淹之慮如劉祥道謂官懷去就而民苟且時則有苟且之民顯慶中祥道疏今任官率四考罷官知秩滿則懷去就民知遷徙則苟且上至於相下至於民莫不趨於苟且則政事何由而理乎紀綱何由而振乎風俗何由而厚乎如使當時之人移謀身之心而謀國移富家之術而富民移保子孫之志而保治移求爵祿之意而求義則可以不下席而躋咸五登三之盛矣竊嘗歴考漢唐之際其粗能去苟且之弊者惟漢宣帝而已迹其綜核名實信賞必罰本賛云上下相安蔑有苟且之意樞機周宻品式備具上下相安莫有苟且之意也亦庶於古矣然宣帝之革苟且徒變其外而不變其内也徒制其末而未制其本也而黄龍之詔有計簿之欺避課之戒元年詔方今民多貧盗賊不止其咎上計簿具文而已務為欺謾以避其課三公不以為意御史察計簿疑非實者按之使眞偽母相亂豈非苟且之俗未盡除乎楊惲之言有縣官不足為盡力之謗惲兄子譚謂惲曰建平杠侯前以罪過出今徵為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力豈非苟且之志未盡遷乎蓋宣帝導之以政而不以教束之以刑而不以德苟且之弊所以迹化而心不化也如使人君皆能本德教以化苟且之心則荀卿不苟之篇可以無作君子行不貴苟難說不貴苟合云云責實此篇論尚實所以去名善除弊者不去弊善治疾者不去疾善抑虛名者不去虛名盖天下之事將欲奪之必先與之將欲拘之必先縱之苟驟禁而遽絶未有不反受其害者也故不忍弊之多欲一朝而去焉外雖若去而弊源實藏於冥冥之中矣不忍疾之苦欲一朝而去焉外雖若去而病源實藏於㝠㝠之中矣彼善除弊者初未嘗驟去其弊也徐以待之黙以觀之使姦態偽迹蠭起於前然後從而鋤其窟穴則弊不得而遁矣善治疾者亦未能驟去其疾也寛以養之綏以療之使宿疹積毒發見於外然後從而窮其標本則疾不得而留矣抑虛名之道亦猶是也世之尚虚名者其根甚固其流甚長其風甚熾苟疾虛名之亂眞播為號令制為賞罰欲言掃而去之豈不足以稱快於目前哉然異時邀名之士皆將矯為務實以投吾之所好今日之朴野即前日之浮華也今日之木訥即前日之辯捷也今日之恬退即前日之奔競也服勤簿書者乃不解訴牒之人恪居官次者乃不辯馬曹之士巧詐百出而渾厚質實之君子併為當世所疑賢否一區真偽一塗愚智一揆憒憒然莫之能分非特名不可見而實亦不可見矣始欲去名而終至於失實是豈為治者之意哉亦取之太迫致之无術而己大抵致剛必以柔致寛必以猛致實必以名欲為之於此必形之於彼欲為此而先以此示天下亦迫而無術矣是故明君之治天下也將責之以實先取之以名開之以其塗示之以其利天下之名爭至於吾前以文學之名至者吾從而察之則董仲舒之實公孫𢎞之偽皆見矣公孫𢎞治春秋不如仲舒而𢎞希世用事位至公卿仲舒以𢎞為從諛𢎞嫉之以政事之名至者吾從而察之則黄霸之實王成之偽皆見矣王成為膠東相流民自占八萬餘口賜爵關内侯詔使丞相御史問郡國上計長吏守丞以政令得失或對言前膠東相成偽自増加以䝉顯賞黄霸為潁川太守百姓純化興于行誼以忠直之名至者吾從而察之則劉向之實谷永之偽皆見矣劉向傳薦更生宗室忠直明經有行谷永建始三年詔與方正直言極諫永於經書汎為疏達不能浹洽如劉向黨於王氏上不甚親信也以理財之名至者吾從而察之則劉晏之實裴延齡之偽皆見矣晏賛斂不及民而用度足可謂知取予矣延齡素不善財計乃廣鉤距取宿奸老吏與謀以固帝幸彼皆趨之吾始得而知之是則自獻其名乃自獻其實也世之好名者知吾必察其實皆砥礪澡濯言不敢過行譽不敢過情苟實之未副惴惴然惟恐名之聞於上以蹈浮虚之罰又豈有求名者乎由是言之善為治者尚名乃所以去名不善為治者尚實乃所以失實善為治者天下以名為實不善為治者天下以實為名特在用之如何耳名何負於治哉聞漢宣帝之綜核名實矣不聞其去名也本賛孝宣之治綜核名實信賞必罰聞諸葛亮之循名責實矣不聞其去名也陳壽評曰循名責實虚偽不齒名者正吾所資以責實之具柰何先去之耶嗚呼無弊之可指為吏者之所懼也無疾之可見為醫者之所驚也無名之可稱責實者之所憂也見其弊然後可革見其疾然後可療見其名然後可核未識其實而先去其名吾不知所以為治矣抑嘗聞之立高帝之朝而進用儒之說世莫不以為踈也然用儒者實高帝之所當急立武帝之朝而進偃兵之說世莫不以為迂也然偃兵者實武帝之所當先處責實之世而論尚名人孰不以為愚且惑耶然理有似緩而實急事有似異而實同使深識之士心平氣定而思之未有不始而愕終而悟也此亦老氏所謂正言似反者歟七十八章受國之不祥是謂天下王愕言若反内外此篇論不可重内輕外終身坐談不如一時之親見終歲傍觀不如一日之親聞蓋天下之事及之而後知履之而後喻未有不身試之而能盡其詳者也風俗既弊士大夫樂居内而厭居外趨其易而辭其難遂以謂得其理則事不待試而喻定其要則功不必勞而成故不離莘野而割烹之鼎已調人有言伊尹以割烹要湯有諸孟子曰否伊尹耕於有莘之野云云不離傅巖而濟川之舟已具高宗夢得說使百工營求諸野得諸傅􅑐爰立作相命之曰若濟巨川用汝作舟楫不離磻溪而牧野之陣已成尚書中候云太公釣於磻溪大明詩牧野洋洋維師尚父時維鷹揚彼為伊傳太公者曷嘗徒勞州縣屈首簿書然後知之哉殊不知有非常之材而後有非常之舉商有天下六百年其不試而用者二人而已今人輒以此自許何後世之多伊傅耶周有天下八百年其不試而用者一人而已今人輒以自許何後世之多太公耶多見其不知量也然則用人之道詎可信其虚言而不試之以事乎是以明君將欲付大任於是人必納之於膠擾繁劇之地以觀其材處之於間暇寂寞之鄉以觀其量使之嘗險阻艱難以觀其操使之當盤根錯節以觀其斷投之州縣磨之歲月習之既久養之既深異時束帶而立於朝天下之事莫不迎刃而解然後知其始困之乃所以深愛之也請以近取譬之言世有愛其子者坐之高堂食之芻豢足迹未嘗及門自以為愛之之至矣彼鄰人之父則不然使其子躡屩擔簦犯風兩冐霜雪以從師取友于數千里之外伶俜顚頓雖道路之人莫不竊議其父之不慈也及觀其終則有一人焉不辨菽麥左成十八年周子有兄而無慧不能辨菽麥故不可立頑嚚無知又十八年頑嚚不友問之何人也乃向之足迹未嘗及門者也有一人焉知類通達為世名儒問之何人也乃向之顚頓數千里者也彼為人父者將使其子無知為愛耶將使其子有成為愛耶雖甚愚者亦知所擇矣君之於臣猶父之於子也欲成逺大之器其可循姑息之愛耶世之人自非伊傅之生知太公之絶類乃欲不出都門坐致卿相脫塵埃之賤而日侍無間釋朱墨之勞而從容風議舍邊郵之繁而深居禁嚴其初豈不甚美而可樂哉一旦而有大政事大議論大征伐大典章則皆心醉語塞流汗浹背傍徨而不知所對然後追悔前日之未嘗居外亦無及已歴觀自古公卿以未嘗更事而敗政害民者多矣愚者不必論也不肖者不必論也今獨以世之所共賢者論之賈誼一出長沙而計不自得是誼未免重内而輕外也惟其重内而輕外故於天下之事不能徧察論正朔服色則近乎緩論系單于頸則近乎夸論三表五餌則近乎疏誼遷大中大夫以漢宜改正朔易服色制度定官名興禮樂悉更奏之帝謙讓未遑也為長沙王太傅既以適去意不自得及渡湘水為賦以弔屈原歲餘帝思誼徵之拜為梁懷王太傅賛曰及欲試屬國施五餌三表以系單于其術固以疏矣使誼安於居外身歴天下之事豈有此失耶蕭望之一為郡守而内不自得是望之未免重内而輕外也惟其重内而輕外故於天下之事不能徧察其挑馮奉世則近乎刻其毁常平倉則近乎迂其恥對獄吏則近乎躁望之為平原太守雅意在本朝逺為郡守内不自得乃上疏云云馮奉世以節諭告諸國王因發兵擊莎車莎車王自殺奉世還宣帝議封望之以奉世奉使有指而擅矯制違命發諸國兵雖有功不可為後法不宜受封大司農中丞耿壽昌奏設常平倉上善之望之非壽昌對獄吏事見前望之論注使望之安於居外身歴天下之事豈有此失耶與誼同時者未有居誼之右者也誼猶不可不更外事則下於誼一等者又可知矣與望之同時者未有居望之之右者也望之猶不可不更外事則下於望之一等者又可知矣昔者孔子之教人未嘗不使之多識天下之事故以天縱之聖而制行未嘗不以已焉其為乗田為委吏為中都者孟孔子嘗為委吏矣曰㑹計當而已矣嘗為乗田矣曰牛羊茁壯長而已矣家語相魯篇孔子初仕為中都宰行之一年而四方之諸侯則焉非有司之細務眞有所未知也所以使後世知聖人猶必親細務也其之齊之衛之陳者非四方之風俗眞有所未察也所以使後世知聖人猶必歴四方也故一時高弟有為季氏宰者史閔子騫冉求子路為季氏宰有為中牟宰者有為莒父宰者子夏為莒父宰問政有為費氏宰者子路使子羔為費宰家語執轡篇閔子騫為費宰家臣之微邑令之賤循循然安處之未嘗有卑小官之意豈非師友淵源固有所自耶嗚呼天下之事有逸必有勞天下之官有貴必有賤皆趨其逸誰任其勞皆樂其貴誰處其賤猶之於身有心腹焉有皮膚焉苟去其皮膚則何以衛心腹猶之於木有本根焉有枝葉焉苟去其枝葉則何以庇本根若在官者皆欲内而惡外則茫茫禹迹人主誰與共治之耶舉偏救弊抑揚之權正今日所當急奔競此篇論奔競不當禁由上之人有以誘之天下之害風俗者莫不當禁而不當禁者有一焉曰奔競是也世之禁防多矣不孝不友則有禁偽言偽行則有禁竒技淫巧則有禁姦聲異服則有禁禮記王制云何獨至於奔競乃不當禁耶奔競之名果何從而生耶爵祿在上下皆趨之故名之為奔則其弊非起於下也爵祿在此彼皆爭之故名之為競則其弊非起於彼也誘之於上而欲禁之於下誘之於此而欲禁之於彼是猶乞醯而却蚋聚羶而去蟻雖刀鋸日用亦有所不勝矣大抵上之人輕名器而輒以假人則多為之禁而奔競益甚上之人惜名器而不以假人則不為之禁而奔競自消論至於此則奔競不惟不當禁又且不可禁不惟不可禁又且不必禁也何以知其然耶唐虞三代之時禮義修明風俗淳厚凡為士者三揖而進一辭而退記聘義介紹而傳命敬之至也三揖而后至階一遜而后升所以致尊遜也禮如此其峻也三十而仕五十而爵記王制五十而爵六十不親學七十致政進如此其迁也論定然後官任官然後爵同上司馬論辨官材論進士之賢者以告于王而定具論論定然後官之任官然後爵之位定然後禄之仕如此其難也不傳贄為臣則不敢見諸侯孟滕文公章云分如此其嚴也然處之甚安守之甚固無滯淹之歎無僥倖之心是豈有法制以驅之乎又豈有刑罰以禁之乎亦曰上之人未嘗啓奔競之門而已蓋當是時持黜陟以佐天子者非臯陶稷契之徒即伊尹傅說之儔也持黜陟以佐諸侯者非隨㑹子文之屬即子產叔向之輩也是數聖賢者以公道而立公朝以公心而臨公選材之外無餘位位之外無餘材天下之士道德苟充爵祿自至初無求於上之人則巍巍廊廟殆為無求之地故巧者無所用其智貴者無所用其權詐者無所用其謀諂者無所用其佞貪而往戚而歸躁而往靜而歸於斯時也雖求奔競之名猶不可得况有所謂奔競之禁哉逮德下衰禮義廢風俗薄名器濫左成二年新築人仲叔于奚救桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯名與器不可以假人杜預注器車服也名爵號也爵祿輕唐陸贄傳德宗幸梁道有獻𤓰菓者帝嘉其意欲授以試官贄諌曰爵位天下公器不可輕也不使官求人而使人求官不使上求下而使下求上奔競成風莫之能禦權在於左右則為之掃門前曹參傳魏勃欲求見齊相曹參家貧無以自通乃常獨早起掃齊相門舍人怪問之勃曰願見相君無因故掃此門於是為勃通參參乃以勃為舍人權在於嬖寵則為之控馬權在於妃主則為之邑司權在於貴戚則為之主事高爵重祿如取如攜無不得其欲焉彼介然自守之士十年不調者有之張釋之以貲為騎郎事文帝千年不得調無所知名三世不徙者有之揚雄賛當成哀平間莽賢皆為三公權傾人主所薦莫不抜擢而雄三世不徙官及莽簒位以耆老久次轉為大夫六世不遇者有之利害之相形如此人安得而不奔競乎上之人既誘天下以奔競乃屑屑然制限年之舉禮記四十强而仕七十致仕凡三王養老皆引年後左雄傳雄上言郡國孝亷古之貢士出則宰民宣協風教若其靣墻則無所施用孔子曰四十不惑禮稱强仕請自今孝廉年不滿四十不得策舉本朝之制二十出仕七十致仕嚴三互之法著崇遜之論晉劉寔以世多進趣廉遜道缺乃著崇遜論以矯之其辭曰古之聖王之化乎天下所以貴遜者欲以出賢才息爭競也多見其無益也然則為人上者不必沮人之奔競勿勸之斯可矣不必罰人之奔競勿賞之斯可矣開其源而塞其流忘其本而齊其末豈不甚可嘆哉竊嘗譬之朝而趨市駢肩相摩暮而過市掉臂不顧非朝貪而暮廉也朝有所求而暮無所求也一免走野百人逐之積免在市過者不顧非前爭而後遜也前則未定而後則已定也彼為士者在治古則靜退在後世則奔競豈情性之頓異邪盖治古之爵祿不可求而後世之爵祿可求也治古之爵祿皆有定而後世之爵禄無定也操爵禄之柄者苟端本澄源於上則濟濟多士可以一旦還之於唐虞三代之域矣風俗豈獨厚於古而薄於今耶十先生奥論註續集巻七
