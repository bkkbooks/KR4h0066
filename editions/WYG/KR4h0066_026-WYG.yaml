body:
  text: 十先生奥論註後集巻十一聖賢論中楊萬里子思上此篇論喜怒哀樂未發謂之中一節道必有措手之所而後學者得以用其功邈然如天淵然如淵則學者安所措其手哉子思曰喜怒哀樂之未發謂之中夫不言所以處喜怒哀樂者而止言其喜怒哀樂之未發夫喜怒哀樂之未發者初無影之可捕而况求其形哉學者求其説而不得則流而入於槁木死灰之學夫槁木死灰之學非洙泗之學也西學也然則學者不入於此而入於彼無乃子思不示人以措手之所而納之於茫洋之地而然乎子思不然也子思蓋有示人以措手之所者矣而章句之學離之也離而不合此學者所以止求之於喜怒哀樂未發之言而不知子思所以處夫喜怒哀樂未發之妙則固在於言前也且子思不云乎天命之謂性率性之謂道修道之謂敎又繼之曰君子戒不睹懼不聞莫見乎隱莫顯乎微故君子敬其獨然後曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之逹道致中和天地位焉萬物育焉蓋天下未有無用之道而君子亦不為不蔕之言也中也者固性之有也然性不可見而中不可能使子思曰天命之謂性而止耳曰喜怒哀樂之未發謂之中而止耳則此言無乃鄰於不蔕而此道無乃墮於無用耶故子思之學不恃其性而恃其率不恃其中而恃其致率也者循是而教焉者也致也者力而來之者也性不可見而率性者可見中不可能而致中者可能致則率矣中則性矣是則子思之意也而學者不之詳也象犀珠玉絶域之産也而人得而用之者夫固有以致之也吾性之中不如是之逺也不逺也而不邇也則未有以致之爾致犀象珠玉則犀象珠玉至致中則中而相競非君子之不幸歟且君子發聖人之微非以為功也為道也或者不察以為學聖人而不能發聖人之微則天下將以我為無功於聖門邀功之心生則相競之説起競則異異則朋異之中又有異而朋之中又有朋則以强弱怪竒為勝負爾非惟君子之不幸也亦聖道之不幸也蓋自夫子有性習近逺之論而不明言性之善惡至孟子則斷之以性善之説孟子道性善於是荀楊韓三子者各出一説以與孟子競荀性惡篇人之性惡其善者偽也揚修身篇人之性也善惡混修其善則為善人修其惡則為惡人韓原性篇性之品有三而其所以為性者五性之品有上中下三上焉者善焉而已矣中焉者可通而上下也下焉者惡焉而已矣説者以為夫子不立論以起爭而起三子之爭者孟子喜於立論之過也嗟乎夫子非不立論也夫子而不立論而持兩端則仁義禮樂於何而折衷哉性習近逺之説是夫子之立論也立論而微者也孟子豈喜於立論者哉入夫子之海先得夫子之珠瞥然見其性相近之㫖悟其真而發其微不忍自秘而分於人此亦仁人君子用心之切者也而孟子何過焉三子之競豈孟子起之耶三子邀功之急者也三子邀功而孟子遂為過君子於此亦難於處也哉蓋將附三子則悖於聖人附孟子則三子者不服然則何以處之昔者秦緩死其長子得其術而醫之名齊於緩其二三子者不勝其忌也於是各為新竒而託之於其父以求勝其兄非不愛其兄也以為不有以異於兄則不得以同於父天下未有以決也他日其東鄰之父得秦緩枕中之書而出以證焉然後長子之術始信於天下有所訟者必有所質也中庸之書夫子枕中之書也而子思得之中庸曰天命之謂性率性之謂道又曰能盡其性則能盡人物之性可以贊化育參天地質之以此而後孟子之説始信也歟性果惡耶則曰道性之謂道可也烏用率且性既惡則盡性之所至當逆天地而戻人物矣奚其贊又奚其參然則何以致夫中庸曰喜怒哀樂之未發有以處之是也然則何以處夫喜怒哀樂之未發曰君子敬其獨是也蓋天下之理莫隠於十目之所視而莫顯於喜怒哀樂之未發當其未發吾已知之非吾知之也心知之也非心知之也天知之也天且知之而曰不顯可乎曰不顯而不戒不懼則喜怒哀樂未發之初内不既其養外不既其閑未發而不養則其發必妄未發而不閑則其發必肆妄與肆相遭喜與怒相激哀與樂相戰將以致中是閑蠅蚋千百於一室而求其靜也是以君子敬其獨也敬心不以隱顯而去留則内有養外有閑方其獨也若不勝其衆也方其未發也若不勝其動也方其不暏不聞也若不勝其耳目之屬也何也獨者衆之源也靜者動之機也一息之頃心與天已知之矣知而養養而閑則一妄起一察應一肆動一儆隨察與妄應則察至而妄者除儆與肆隨則儆至而肆者伏妄者除而肆者伏當是之時此心瑩然真而法矣未發而真發而非真未發而法發而非法天下有是理乎去妄去肆而一之於真與法而中在其間矣人有病目者不求其本而急其末以為所以病吾目者翳而已去翳則目宜必明然去一翳生一翳則不知養肝之過也肝得其養而目自明則夫翳者不去而去矣喜怒哀樂未發謂之中其自中也耶其有以養其中也耶子思中此篇論性聖人之言愈大則愈微此非有所隱也微之者顯之也言愈微故求之者愈力求之者愈力故浚之者愈深求之力浚之深而聖言之微者顯矣雖然後之君子有能發之微而置之顯天下之幸而君子之不幸也三人同行而入海一人得珠焉則三人者必擠夫一人者三人者亦何仇於一人也珠也者擠之招也遊聖人之門而先發聖人之微則前有愠後有忌愠與忌並起人性之有善惡善則惡不得以寄惡則善不得以居如冰之寒而濕火之燠而燥也今曰善惡混吾將曰冰之性燥濕混而火之性寒燠混也可乎至於裂性而三之裂三而五之則亦不勝其勞矣蓋三子言性而未見性者也曷為言性而未見性也不自盡其性也自東海而趨西海必至於西海而後盡也未至於西海而止也而曰西無海也之二三子者是也吾性一盡而育人物參天地者在焉性為善耶惡耶三子者亦嘗進於此也乎三子者自有性而不盡也冝其言之不徹也質之中庸而後三子者心服矣三子非服孟子也服孔子也三子服而後孟子之説信孟子之説信而後孔子之意明孔子之意明而後性善之論定性善之論定而後天下之為善者衆則子思之功豈不大哉子思不邀功者也不邀功而大有功者也子思下此篇論賢智之過愚不肖之不及學者病乎無見亦病乎有見學而無見學之俗也學而有見學之妙也俗則病矣妙矣而亦曰病可乎妙亦病也妙而不反斯病矣人惟無見也人而有見則逐於見而不反蓋世有病於能俯而不能仰者終身不知有天也一日而其病愈仰而見天之髙自以為未始見也而喜焉喜而不足則終日觀天而不復視地焉坐亦觀天行亦觀天不知逢荆棘蹈溪壑也躓而傷焉豈天使之躓而傷哉傷生於喜喜生於見見生於不見故也學者其初患於無見也而盡鋭以求於一見見矣其患反甚於不見何也不見則喜其見則自夫人之喜心一生也而道始逺非心之害道也喜其髙則必厭其下喜其逺則必弃其邇喜其大則必厭其細不知夫道也者下不二於髙邇不二於逺而細不二於大也而二之是故崇先覺卑後學務遐想蔑近思以君臣父子之日用為淺易以仁義禮樂之名教為粗迹於是探混茫以為深極孤絶以為髙而不知入於空虛無有此地舉空虛無有之學以治身濟世此猶取夢中之飲食以濟飢渇也不已踈乎古之君子蓋有窮百家究六合極師友博論辨而無得也非無得也有得而無用也有得而無用則是吾見之為病也從其見而反焉則有得矣見不損於今亦不加於今見不異於昔亦不同於昔至此得向之所謂百家六合師友論辨皆非也而皆是也百家一人六合一室師友一户論辨一口孰為髙孰為下孰為逺孰為邇孰為大孰為細耶道之歸有在矣中庸曰道之不行也道之不明也賢智過之愚不肖不及也夫愚不肖之不及固離於道矣而賢智之過之乃中庸之所甚憂而道之不行與不明乃賢智者之罪此無他見而不反之病也又曰君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮是故居上不驕為下不倍夫學之功至於居上而不驕為下而不倍此真有用之學也求其所以然者則本於不以性廢學不以大忽微不以髙弃卑不以新忘故不以質去文嗟乎學至於此其斯以為子思中庸之學也歟好遊者以為九州之内四海之外其山川人物非復其鄉里所有之山川人物也竭其家以為糧以求博觀於天下三年而貧也而倦也悔而歸則其鄉里之山川人物即九州四海之山川人物也而後釋然悟飜然喜學者之學而有見見而不反蓋游而未悔者也安得游而悔者與之共學子思之中庸也耶孟子上此篇論仁之端仁可得而求乎曰可仁可得而聞乎曰不可仁不可聞則學者烏乎求曰求以不言不求以言蓋體仁者心也而心非仁喻心者言也而言非心言猶非心也而言可以求仁乎哉言之非心也以言有所不能言也非惟彼心之仁不能言於吾也吾自求之吾自得之吾自不能言之矣人有生而不能飲酒者問酒之何味其能飲酒者不過告之以酒之美而已若酒之所以美者雖能飲酒者亦不能自言也非吝於告也極天下之善言酒者止於此也就使能言而不止於此亦不能使不飲者之知味何則吾以其言言酒而彼以其聴聴酒而言與聴卒非酒也韓子曰博愛之謂仁程子曰非也仁者覺也吾將是韓子則夫子之言有不然者顔回問仁子曰克已復禮為仁於博愛何與焉吾將是程子則夫子之言有不然者樊遲問仁子曰愛人於覺何與焉仁之不可言也如此然則仁不可善則二子之論烏乎歸曰吾將歸乎夫子然則夫子之論自不一也烏乎而得歸於夫子曰吾將由孟子以歸夫子程子者得夫子之潜者也韓子者得夫子之彰者也孟子者得夫子之潜與彰而據其㑹者也孟子曰惻隱之心人之端也又曰今人乍見孺子將入於井皆有􅇶惕惻隱之心嗟乎孟子之言仁蓋至於此少乎然則曷謂惻隱曰是不可言歟孟子之言及於惻隱蓋假惻隱以明仁而惻隱非仁也今於惻隱之外又求惻隱之説正使惻隱之説明而仁愈晦矣雖然試言之隱也者若有所痛也惻也者若有所憫也痛則覺覺則憫憫則愛人之手足痺而木者則謂之不仁蓋方其痺而木也搔之而不醒抶之而不恤彼其非不愛四體也無痛痒之之可覺也至於無疾之人誤而㧞一髪則百骸為之震何也覺其痛也覺其一髪之痛則愛心生不覺四體之痛則愛心息孟子曰不仁者以其所不愛及其所愛此不覺於人者也曰人病舍其田而芸人之田此覺於人而不覺於身者也曰指不若人則知惡之心不若人則不知惡此覺於身而不覺於心者也以覺吾之痛覺彼之痛則愛人以覺彼之痛覺吾之痛則自愛自覺而自愛則何理之不悟覺人而愛人則何物之不覆是故不愛始於不憫不憫始於不覺不覺始於不痛古之君子以不如舜為憂此一痛也以一夫不被其澤為責此亦一痛也故曰痛則覺覺則憫憫則愛然則克己復禮仁也愛人仁也博愛之謂仁仁也仁者覺也仁者何也均惻隱之心也故曰孟子得夫子之潛與彰而據其㑹者也雖然孟子則善言仁矣何與乎學者之事哉學者誦孟子之言也吾知惻隱之為仁也市門之儈終日導千金之賈而鬻金於市歸其家無一錢之藏則外而不内也孟子之言仁何與乎學者之事哉孟子曰苟能充之足以保四海苟不充之不足以事父母學者蓋亦求其所以充之也哉十先生奥論註後集巻十一
