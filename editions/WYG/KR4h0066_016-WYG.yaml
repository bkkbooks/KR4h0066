body:
  text: 十先生奥論註後集巻一性理論朱熹皇極辨此篇論皇者君極者至極標凖非大中之義書洪範五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比徳惟皇作極凡厥庶民有猷有為有守汝則念之不恊于極不罹于咎皇則受之而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極曰皇極之敷言是彛是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王洛書九數而五居中洪範九疇而皇極居五故自孔安國訓皇極為大中洪範五皇極注云大中之道大立其有中謂行九疇之義而後之諸儒莫有以為非者予嘗考之皇者君之稱也極者至極之義標凖之名常在物之中央而四外望之以取正焉者也故以極為在中之至則可而直謂極為中則不可若北辰之為天極屋棟之為屋極其義皆然而周禮所謂民極者禮天官惟王建國辨方正位體國經野設官分職以為民極於皇極之義為尤近顧今之説者既誤於此而並失之於彼是以其説展轉迷謬而終不能以自明也即如舊説姑亦無問其它但於洪範之文易皇以大易極以中而讀之則所謂惟大作中大則受之之屬為何等語乎故予切獨以為皇者君也極者至極之標凖也人君以一身立乎天下之中而能修其身以為天下至極之標凖則天下之事固莫不恊於此而得其本然之正天下之人亦莫不觀於此而得其固有之善焉所謂皇極者也是其見於經者位置法象蓋皆本於洛書之文其得名則與夫天極屋極民極者皆取居中而取極之意初非指中為極也則又安得以是而訓之哉曰皇建其有極者言人君以其一身而立至極之標凖於天下也曰斂時五福用敷錫厥庶民者言人君能建其極而於五行焉得其性於五事焉得其理洪範初一曰五行次二曰敬用五事至次九曰嚮用五福威用六極則固五福之所聚而又推以化民則是布此福而與民也曰惟時厥庶民于汝極錫汝保極者言民視君以為至極之凖而從其化則是以此還錫其君而使之長為天下之標凖也曰凡厥庶民無有淫朋人無有比徳惟皇作極者言民之所以能若此者皆君之徳有以為至極之標凖也曰凡厥庶民有猷有為有守汝則念之不恊于極不罹于咎皇則受之者言君既立極於上而民之從化或有遲速深淺之不同則其有謀為操守者固當念之而不忘其不能盡從而未抵於大戾者亦當受之而不拒也曰而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極者言人有能革面而以好徳自名雖未必出中心之實亦當教以修身求福之道則是人者亦得以君為極而勉其實也曰無虐煢獨而畏髙明人之有能有為使羞其行而邦其昌者言君之於民不當問其貴賤强弱而皆欲其有以進徳故其有才能者必皆使之勉進其行而後國可賴以興也曰凡厥正人既富方榖汝不能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎者言欲正人者必先有以富之而後納之於善若不能使之有所顧於其家則此人必將陷於不義而不復更有好徳之心矣至此而後始欲告之以修身求福之説則己緩不及事而其起而報汝惟有惡而無善矣蓋人之氣稟不同有不可以一律齊者是以聖人立極於上者至嚴至正而所以接引於下者至寛至廣雖彼之所以趍於此者遲速真偽才徳髙下有萬不同而吾之所以應於彼者矜憐撫奄懇惻周盡未嘗不一也曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極者言民皆不溺於巳之私以從夫上之化而歸㑹于至極之標凖也析而言之則偏陂好惡以其生於心者言也偏黨反側以其見於事者言也遵義遵道遵路方㑹其極也蕩蕩平平正直則己歸于極矣曰皇極之敷言是彛是訓于帝其訓者言人君以身為表而布命于下則其所以為常為教者一皆循天之理而不異乎上帝之降衷也曰凡厥庶民極之敷言是訓是行以近天子之光者言民於君之所命能視以為教而謹行之則是能不自絶逺而有以親被其道徳之光華也曰天子作民父母以為天下王者言能建其有極所以有作民父母而為天下之王也不然則有其位無其徳不足以建立標凖子育元元而履天下之極尊矣天之所以錫禹箕子之所以告武王者其大指盖如此書洪範武王訪于箕子云云箕子乃言曰云云天乃錫禹洪範九疇彛倫攸叙注云天與禹洛出書神龜負文而出列於背有數至于九雖其奥雅深微或非淺聞所能窺測然嘗試以是讀之則亦坦然明白而無一字之可疑者但先儒昧於訓義之實且未嘗講於人君修身立道之本既誤以皇極為大中又見其辭多為含洪寛大之意因復誤認以為所謂中者不過如此殊不知居中之中既與無過不及之不同而無過不及之中乃義理精微之極有不可以毫釐差者又非含糊苟且不分善惡之名也今以誤認之中為誤認之極不謹乎至嚴至宻之體而務為至寛至廣之量則漢元帝之優游前本紀贊上牽制文義優游不㫁孝宣之業衰焉唐代宗之姑息刑法志代宗性仁恕常以用刑為戒諫者諷帝政寛帝曰刑法峻急朕不忍也范祖禹曰徳宗粃政尤多而大弊有三一曰姑息藩鎮云云一冇奉天之亂而心隕膽破惴畏姑息惟恐生事皆是物也彼其是非雜揉賢不肖混殽方且昏亂陵夷之不暇尚何歛福錫民之可望哉吾意如此而或者疑之以為經言無偏無陂無作好惡則所謂極者豈不實有取乎得中之義而所謂中者豈不真為無所去就憎愛之意乎吾應之曰無偏無陂者不以私意而有所去就爾然曰遵王之義則其去惡而從善未嘗不力也無作好惡者不以私而自為憎愛爾然曰遵王之道遵王之路則其好善而惡惡固未嘗不明也是豈但有包容漫無分别之謂又况經文所謂王義王道王路者乃為皇建有極之體而所謂無所偏陂反側者自為民歸有極之事其文義亦自不同也邪必若子言吾恐天之所以錫禹箕子之所以告武王者上則流於老荘依阿無心之説史荘子傳荘子著書大抵率寓言也以明老子之術畏累虚亢桑子之屬皆空言無事實下則溺於鄉原同流合汙之見孟子盡心下萬章曰一鄉皆稱原人焉無所徃而不為原人孔子以為徳之賊何哉曰非之無舉也刺之無刺也同乎流俗合乎汙世云云故曰徳之賊也雖欲深體而力行之是乃所以幸小人而病君子亦将何以立大本而序彛倫哉作皇極辨或曰皇極之為至極何也予應之曰人君中天下而立四方面内而觀仰之者至此輻湊於此而皆極焉自東而望者不能過此而西也自西而望者不能踰此而東也以孝言之則天下之孝至此無以加以弟言之則天下之弟至此而無少過此人君之位之徳所以為天下之至極而皇極所以得名之本意也故惟曰聰明睿智首出庶物記中庸聰明睿知足以有臨也易乾卦首出庶物萬國咸寧如所謂天下一人而已者然後有以履之而不疚豈曰含容寛裕一徳之偏而足以當之哉客曰唯唯因復記于此以發前之未盡皇極辨後此篇辨論荘子執中之失荘子曰為善無近名為惡無近刑緣督以為經荘養生主篇為善無近名為惡無近刑縁督以為經可以保身可以全生可以養親督舊以為中上文注縁督以為經李云縁順也督中也經常也蓋人身有督脉循脊之中貫徹上下見醫書故衣背當中之縫亦謂之督見記深衣篇注皆中意也老荘之學不論義理之當否而但欲依阿於其間以為全身避患之計正程子所謂閃姦打訛者也見二程語録故其意以為為善而近名者為善之過也為惡而近刑者亦為惡之過也唯能不大為善不大為惡而但循中以為常則可以全身而盡年矣見上注然其為善無近名者語或似是而實不然盖聖賢之道但教人以力於為善之實初不教人以求名者自非為己之學盖不足道若畏名之累已而敢盡其為學之力則其為心亦已不公而稍入於惡矣至謂為惡無近刑則尤悖理夫君子之惡惡如惡惡臭非有所畏而不為也今乃擇其不至於犯刑者而竊為之至於刑禍之所在巧其途以避之而不敢犯此其計私而害理又有甚焉乃欲以其依違苟且之兩間為中之所在而循之其無忌憚亦益甚矣客嘗有語予者曰昔人以誠為入道之要周子通書恐非易行不若以中易誠則人皆可行而無難也予應之曰誠而中者君子之中庸不誠而中則小人之無忌憚耳記中庸仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也今世俗苟偷恣雎之論盖多類此不可不深察也或曰然則荘子之意得無與子莫之執中者類耶曰不然子莫執中但無權耳盖猶擇於義意而誤執此一定之中也孟盡心上子莫執中執中為近之執中無權猶執一也所惡執一者為其賊道也舉一而廢百也老荘之意則不論義理專計利害又非子莫之比矣蓋迹其本心實無以異乎俗鄉原之所見而其揣摩精巧校計深切則又非世俗鄉原之所及乃賊徳之尤者孟盡心下孔子曰過我門而不入我室我不憾焉者其惟鄉原乎鄉原徳之賊也所以清談盛而晉俗衰蓋其勢有所必至而王通猶以為非老荘之罪文中子周公篇詩書盛而秦世滅非仲尼之罪也虚𤣥長而晉室亂非老荘之罪也齋戒修而梁國亡非釋迦之罪也則吾不能識其何説也既作皇極辯因感此意有相似者謾筆之於其後云顔子所好何學此篇論性之明誠程頤聖人之門其徒三千獨稱顔子為好學語哀公問弟子孰為好學孔子對曰有顔囘者好學夫詩書六藝三千子非不習而通也然則顔子所獨好者何學也學以至聖人之道也聖人可學而至歟曰然學之道如何曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣是故覺者約其情使合於中正其心養其性故曰性其情愚者則不知制之縱其情而至於邪僻梏其性而亡之故曰情其性凡學之道正其心養其性而已中正而誠則聖矣君子之學必先明諸心知所往然後力行以求至所謂自明而誠也故學必盡其心盡其心則知其性知其性反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心造次必於是顛沛必於是見語全句出處語黙必於是久而弗失則居之安動容周旋中禮則邪僻之心無自生矣故顔子所事則曰非禮勿視非禮勿聴非禮勿言非禮勿動語十二篇句仲尼稱之得一善則拳拳服膺而弗失之矣記中庸句又曰不遷怒不貳過見語全句有不善未嘗不知知之未嘗復行也易繫辭子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也此其好之篤學之之道也視聴言動皆禮矣所異於聖人者盖聖人則不思而得不勉而中從容中道記中庸句顔子則必思而後得必勉而後中故曰顔子之與聖人相去一息孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神見盡心篇顔子之徳可謂充實而有光輝矣所未至者守之也非化之也以其好學之心假之以年則不日而化矣故仲尼曰不幸短命死矣盖傷其不得至於聖人也所謂化之者入於神而自然不思而得不勉而中之謂也孔子曰七十而從心所欲不踰矩是也或曰聖人生而知之者也今謂可學而至其有稽乎曰然曰堯舜性之也湯武反之也性之者生而知之者也仄之者學而知之者也又曰孔子生而知也孟子則學而知也後人不達以謂聖本生知非學可至而為學之道遂失不求諸已而求諸外以博聞彊記巧文麗辭為工榮華其言鮮有至於道者則今之學與顔子所好異矣盡性上此篇論内外之道同出於性張文潜一言而盡天下之道者性而已夫道之在萬物雖泮散殊别無所往而不得然其歸有二而已自内而本之者為聖人之神故凡大至於參天地廣至於贊化育禍福大故也而不得蕩其和死生至變也而不得干其常所以極天下之髙明而寂然不動以待萬物之至者皆道之在内者也自外而致用者為王者之事故凡觀變以應天下之動而利用以成天下之務大之為禮樂小之為政刑所以鼓衆動民出而與一世同患無所感而不通盛徳大業待之以立者皆道之在外者也嗚呼道則廣矣大矣然不在外則必在内不在己則必在物所謂道者不外是矣且天下之道不過於内外而内外之道其初曷出哉凡在内者乃吾之所受於天而虚靜明達無所待於外者所謂喜怒哀樂之未發者記中庸喜怒哀樂未發謂之中發而皆中節謂之和凡在外者取吾所受於天者而顯諸形名事物之際與物兩得而布之天下取諸心而施諸事本乎天而成乎人動於無為而著於有形使天下萬物䝉其利所謂喜怒哀樂發而中節者也故内外之道雖殊而同出於吾性故兩言而盡天下之道者曰内外一言而盡内外之道曰性而已然則天下之物未有逃於吾性之表則吾性者盡天下之能事者也聖人之所以為聖人者豈能强其性之所無而附益其所不足哉然盡其性之所受於天者而無有闇蔽不照之累天下全受於我者全得之而已矣故能盡已之性則能盡天下之道能盡天下之道而後為聖人自聖人而下之至於庶人其别蓋多矣彼其為是大小之辨者亦豈有他哉其於性也所見有廣狹故其為徳也所立有小大性猶山也自聖人至於庶人登山者也或蹈其半或止其下而其强立者出入上下無所不至陟焉而窮其髙降焉而極其深盡一山之視而無不至之處故無不至者聖人也或蹈其半或止其下者賢否之别也均是性也因其所見而為聖賢之别均是山也因其所止而知强弱之異故人之繕性也有不求而性之於人也無不足人之登山也有不盡而山之於人也無不與子思曰天命之謂性率性之謂道修道之謂教記中庸云故道出於性教出於道一得吾性而道與教舉矣盡性論下此論聖人盡已之性趍善避惡兩極其至孟子曰萬物皆備於我矣嗚呼此性之説也盖孟子嘗以謂性善矣孟告子上人性之善也猶水之就下也人無有不善水無有不下云云夫善者萬物之一也萬物皆備於我則我之所受於天者獨善矣乎故吾知孟子為性善之説其有救乎當世之變而非性之至論也揚子曰善惡混修身篇人之性也善惡混修其善則為善人修其惡則為惡人揚子之論出於萬物皆備於我者也然則盡已之性而為聖人則聖人之於性豈有兼受其惡者哉是不然聖人之於聖其智足以知之者無不盡矣凡性之可以為善者聖人者達之無不至其極凡性之可以為惡者聖人察之無不極其微於是乎有學焉開其所由達之途使趨者必至其極而無蔽閼於前治其所能察之隙使避而逺者必盡其微而無有鑠奪陷溺之累故能盡性之大體則趨善而逺過也兩皆至其極故善之在我者無不舉惡之在我者無不去自聖人而下之至於庶人自上智而下之而為下愚所以為賢否之殊者亦計夫所趨之善有淺深所避之惡有小大之殊者豈有他哉其於性也所見有全有不全故也昔者顔子之於孔子盖仰之彌髙鑽之彌堅語子罕顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽然在後夫髙與堅也凡人之性舉有之也孔子至焉而顔子之力幾疲於是矣是何也孔子得其善之授於天者盡而顔子得之也有不至者矣夫子之門人自子路子貢之徒皆嘗有不善於其身賜之貨殖語十一賜不受命而貨殖焉億則屢中由之兼人同上公西華曰由也問聞斯行諸子曰有父兄在子曰由也兼人故退之是也二人者盖終身而不知止而顔子之於不善也未嘗不知知之未嘗復行也易繫辭子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也夫顔子之於子路子貢其性之質一也然其於不善也逺之者至於未嘗復行而不改者至於終身何也豈顔子逺其惡之授於天者盡而由也賜也有不盡者矣譬之毉也不盡知天下之善惡則其治疾也有所遺毒石惡草知之不周則其於逺害也必有所不盡故良毉盡天下善惡之藥而聖人盡吾身善惡之性夫性所至有淺深所盡有廣狹而人之才能自是别矣十先生奥論註後集巻一
