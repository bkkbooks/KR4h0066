body:
  text: 十先生奧論注續集卷六考古論吕祖謙漢文帝此篇論不盡人之財力情治天下者不盡人之財不盡人之力不盡人之情是三者可盡也而不可繼也彼治天下者不止為一朝一夕之計固將為子孫萬世之計也為萬世之計而於財於力於情皆使之不可繼則今日盡之將如來日何今嵗盡之將如來歲何今世盡之將如來世何是以聖人非不知間架之稅足以盡𣙜天下之利而每使之有餘財唐德宗建中四年六月稅屋間架算除陌錢非不知閭左之戍足以盡括天下之役而每使之有餘力前食貨志始皇內興功作外攘夷狄收泰半之賦發閭左之戍非不知鈎距之術足以盡擲天下之詐而每使之有餘情趙廣漢精於吏職尤善為鈎距以得事情其去彼取此者終不以一時之快而易千萬世之害也古之人有行之者漢文是也露臺惜百金之費後宫衣不曳地可謂不敢輕靡天下之財本贊嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為身衣弋綈所幸慎夫人衣不曳地胸奴三入而三拒之未嘗敢窮兵出塞可謂不敢輕用天下之力胸奴傳帝三年夏胸奴右賢王入居河南地為冦下詔遣灌嬰將擊右賢王走出塞十四年胸奴單于以十四萬騎入朝那蕭關殺北地都尉使騎兵入燒回中宫候騎至雍甘泉帝以周含張武等為將軍往擊胡月餘漢逐出塞即還不能有所殺後四年車臣單于立歲餘胸奴復絶和親大入上郡雲中漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邊亦各堅守以備胡冦又置三將軍長安西細柳渭北棘門霸上以備胡胡騎入代句注邊蜂火通於甘泉長安數月漢兵至邊胸奴亦逺塞漢兵亦罷吳王不朝賜以几杖張武受賂賜之金錢木贊吳王詐病不朝賜以几杖張武等受賂金錢覺更加賞賜以愧其心可謂不敢輕索天下之情當是時流澤淳厚極熾而昌使心一向於靡民財則固可以建神明通天之臺郊祀志公孫卿曰仙人好樓居乃使卿持節設具而候神人作通天臺置祠具其下將來神仙之屬固可以備千乘萬騎之駕選班固東都賦千乘雷起萬騎紛紜固可以泛沙棠木蘭之舟固可以設魚龍曼衍之戲而文帝不為使心一向於用民力則豈無絳灌之將高祖賜爵列侯周勃食絳惠帝六年為太尉十年誅諸呂文帝時灌嬰為丞相胸奴入北地上令嬰將騎八萬五千擊之豈無表餌之策賈誼贊及欲試屬國施五餌三表以係單于其術固以疏矣豈無南北之軍呂后紀周勃遂將北軍然尚有南軍豈無銅虎之符二年初與郡守為銅虎符竹使符而文帝亦不為使心一向於索民情則命朝錯以任術數鍇上書言人主所以尊顯功名揚於萬世之後者以知術數也皇太子未深知術數者不問書說也願陛下擇聖人之術可用今世者以賜皇太子命郅都以按刑獄都以郎事文帝景帝時為中郎將又遷中尉行法不避貴戚列侯宗室見都側日而視號曰蒼鷹命朱建以治縱橫時淮南厲王殺辟陽侯以黨諸呂孝文聞其客朱建為其策使吏捕欲治命周湯以窮暴酷武帝時張湯為廷尉舞文巧詆義縱為南陽太守以杜周為瓜牙薦之張湯為廷尉史後為廷尉其治大扺放張湯而善候司而文帝又不為文帝可為而能不為以其所餘貽厥子孫凡四百年之漢用之不窮者皆文帝之所留也及至武帝志大而心勞功多而志廣材智勇敢之臣與時俱奮桑𢎞羊之徒算舟車告緡錢以罔天下之財武帝元光六年初算商車元狩四年用度不足初算緍錢元鼎三年令民告緡者以其半豫之其心以文帝之所以不能取自我始取之也衛青之徙絶大漠開朔方以竭天下之力元朔六年夏衛青復將六將軍絶幕大克獲詔曰日者大將軍巡朔方征胸奴斬首虜萬八千級其心以文帝之所以不能舉自我始舉之也張湯之徒窮根柢究黨與以盡天下之情見上注其心以文帝之所以不能察自我始察之也取文帝之所不能取舉文帝之所不能舉察文帝之所不能察則𢎞羊張湯衛青之屬果勝文帝耶蓋文帝為天下計而𢎞羊張湯衛青之屬為一身之計故不同也惟其為一身之計故興利之臣則曰窮乏者漢之民也非吾民也罔漢民之財則可以釣吾之爵位何愛焉至於財盡而散則他日司㑹之責耳武力之臣則曰疲敝者漢之民也非吾民也竭漢民之力則可以釣吾之爵位何愛焉至於力竭而亂則他日將帥之責耳典獄之臣亦曰煆煉者漢之民也非吾民也探漢民之情則可以釣吾之爵位何愛焉至於情盡而變則他日執政之責耳利在於已害在於君利在於近害在於逺此所以安為而不顧也嗚呼桑𢎞羊衛青張湯之屬方欲謀身固不暇為漢慮矣而武帝獨何為棄六世之業以快二三臣之欲耶君子以是益知文帝之不可及也雖然舉事求可繼非惟人君為然也至於人臣謀身者亦如之白起為秦將長平之事坑趙卒四十萬是不可繼之師也可一不可再也起惟顧身而不顧國故竭智力於一舉以僥幸不次之賞豈復料其再駕於趙哉及秦復命之伐趙卒不行而死非惡行而樂死也雖欲行而法不容再行也使起預知己之復用師也則必撫納新附還定新集不為長往不來之計矣趙王使趙括代廉頗將以擊秦秦使白起為上將軍擊之秦軍射殺趙括括軍敗卒四十萬人降武安君武安君計曰前秦以拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之何晏注曰白起之降趙卒詐而坑其四十萬豈徒酷暴之謂乎後亦難以重得志矣故求為可繼者非特為國亦為身也求為不可繼者非特不為國亦不為身也吾又論之以為小人之戒武帝此篇論假儒術以欺天下人君之道與人臣不同人臣假儒術以為姦將以欺其君也將以欺君而取爵祿也小欺則爵祿小至大欺則爵祿大至假儒術而每有所得則小人假之以自售亦其職也至於人君假儒術將何所求哉天下者吾自有之天下也治則吾自受其利亂則吾自受其害今內為貪暴奢泰之行而外假仁義禮樂之名使其不足以欺人耶其亂亦自若也治亂之實初無一毫加損而徒為是紛紛吾不知其果何為哉昔漢武帝假儒術以欺天下講東封開西域平南越討北戎峻宇雕牆淫刑酷罰其去始皇不能以寸而稽古禮文之事洋洋乎若與唐虞三代比隆本贊號令文章煥焉可述而有三代之風一時尊寵之臣如公孫𢎞以春秋欺武帝位至丞相爵為通侯儒林傳序𢎞以治春秋為丞相封侯天下學士靡然鄉風矣其假儒術之所獲亦大矣張湯以古義欺武帝為御史大夫位列三公時上方鄉文學張决大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史後為御史大夫其假儒術之所獲亦大矣惟武帝之假儒術非徒無利而反有害焉非徒無益而反有損焉觀其北邊蕭然盜賊並起老妻長子不保首領高祖之業幾墜於地其禍不亦酷乎嗚呼𢎞湯假儒術則有利武帝假儒術則有害𢎞湯假儒術則有益武帝假儒術則有損武帝之智不及𢎞湯逺矣雖然假儒術之害非特及於當時其害乃見於宣帝之時宣帝之尚雜霸不喜儒元帝為太子見宣帝所用多文法吏以刑名繩下嘗言陛下持刑太深宜用儒生帝曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時宜好是古非今何足委任乃嘆曰亂我家者太子也是非特宣帝之罪也彼見用儒之效事勢之流相激使然耳折膠墮指之寒不生於冬而生於盛夏流金爍石之旱不生於暘而生於淫雨然則宣帝之不用儒豈非生於武帝之假儒術耶宣帝此篇論好申韓之說嗚呼申韓之害流毒後世何其逺耶史申不害為韓相學本於黃老而主刑名著書號申子韓非喜刑名法術之學亦著書傳于後世秦始皇二世用之以亡其國趙高李斯用之以亡其身史始皇紀斯曰若學法令以吏為師制曰可始皇為人天性剛戾自用專任獄吏樂以刑殺為威始皇崩太子胡亥襲位為二世皇帝尊用趙高申法令行誅大臣及諸公子以罪過者宗室振恐三年趙高為丞相競按李斯殺之闕東盡畔二世使使責讓高以盜賊事高懼乃與其壻閻樂謀誅二世二世自殺二世兄子公子嬰為秦王遂刺殺高三族高家以徇咸陽生乎秦之後者可以戒矣而漢朝錯復明申韓佐景帝更律令削七國天下幾至於亡錯學申商刑名所景帝即位錯軹張恢生言事輒聽法令多所更定遷為御史大夫請諸侯之罪過削其支郡後七國俱反以誅錯為名錯斬東市甘蹈亡秦之轍而不顧焉生乎朝錯之後者可以重戒矣宣帝復好觀申子君臣之篇所用多文法吏以刑名繩下見前篇注甘蹈朝錯之覆轍而不顧焉彼申韓之說其入人之深雖明君賢臣皆陷溺而不能出何也其令行禁止奔走天下誠足以稱快一時也樂其一時之快而不暇顧其它日之害此其說所以盛行於世歟觀宣帝之為君綜核名實信賞必罰其所以功光祖宗業垂後嗣者蓋勵精之效初非申韓之功也本贊孝宣之治信賞必罰綜核名實信威北夷單于慕義功光祖宗業垂後嗣可謂中興侔德商宗周宣矣至於用恭顯而啓元帝之信宦者石顯𢎞恭皆少坐法腐刑為中黃門以選為中尚書宣帝時任中書官恭為令顯為僕射元帝即位恭死顯代為中書令時帝被疾遂委以政事貴許史而啓成帝之任外戚外戚傳孝宣許皇后許伯皇后父史商宣帝外家成帝立以元舅王鳳為大司馬大將軍殺趙蓋韓楊而啓哀帝之誅大臣元康二年京兆尹趙廣漢有罪要斬神爵二年司𨽻校尉蓋寬饒有罪下有司自殺五鳯元年左馮翊韓延壽有罪棄市二年平通侯楊惲大逆不道要斬哀帝贊睹孝成世祿去王室權柄外移臨朝屢誅大臣欲彊主威以則武宣開三大釁終以亡國此豈非擇術不審之流弊乎故論其功大為中興之君論其罪則亦為基禍之主其功罪相半者蓋失於欲速而用申韓也昔者聖人亦知遲之不如速鈍之不如利矣然其為治乃曰王者必世而後仁語如有王者必世而後仁曰久於其道而天下化成易恆卦云日計不足月計有餘其遲鈍迂闊每不若申韓之速獨何歟使聖人而不知此理耶是不智也使聖人知而不行耶是不仁也不仁不智豈所以為聖人哉殊不知聖人慮事至精也其舉事厭遲而惡鈍亦與人同也使有道於此加頃刻之捷則聖人己先為之矣惟其原始要終探端窮本知吾道雖有歲月之遲而終成千百年之安申韓雖有歲月之速而終貽千百年之害故去彼取此也由是論之則莫速於聖人莫遲於申韓莫利於聖人莫鈍於申韓其理甚明宣帝不知此理反非太子用儒之諫見前篇注豈天未欲斯民見三代之治耶于定國此篇論不言四誅治獄者非死生禍福不入其心未足與議也苟死生禍福入其心則迫於權勢奪於威武雖有平恕之志亦變而為暴酷矣張歐之在文景時世共謂之長者也每上具獄事有可郤郤之不可者不得已為泣涕面而封之其慈祥豈弟之風溫然可挹也至於與莊青翟等劾朝錯加以大逆無道之罪腰斬錯而父母妻子同産無少長皆棄市其殘賊忮忍雖張湯杜周亦不過如此以其前後觀之判然若二人焉此無它歐雖天資平恕而胸中初無所守故當景帝之怒錯則震懾失趍黽勉順指陷於暴酷而不能自拔也于定國為廷尉民自以為不寃後世言治獄者必稽焉然吾嘗考其實亦張歐之流耳定國以地節元年為廷尉而以甘露二年遷御史大夫凡十七年之間麗於刑書者無不出於定國也趙廣漢以元康二年誅蓋寬饒以神爵元年誅韓延壽以五鳳元年誅楊惲以二年誅並見前篇注皆當定國為廷尉之時然此四誅皆宣帝之太過而千載之所痛憤流涕者也吾不知定國嘗爭之耶其亦未嘗爭之耶若其不爭則其罪固無所逃就使嘗爭之有官守者不得其職則去未聞可以不從而但已也爭與不爭其失等耳夫定國身為廷尉上則陷君為淫刑之主下則自以為暴酷之吏以事君則不忠以謀已則不智不忠不智君子之大節己虧矣乃反屬意於郡國鰥寡之間略於大而謹於小吾未見其為平恕也向使定國有剛毅之操不以死生禍福移其心如張釋之斷犯蹕盜環之獄雖帝之所甚怒而必輕之釋之為廷尉頃之上行出中渭橋有一人從橘下走乘輿馬驚使騎捕之屬廷尉釋之奏當此人犯蹕當罰金上怒釋之曰廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足上曰廷尉當是也後人有盜高廟坐前玉環得帝怒下廷尉治奏當棄市上大怒釋之曰法如是足也劾太子梁王之失雖帝之所甚愛而必糾之為公車令太子與梁王共車入朝不下司馬門釋之追止太子梁王母入殿門遂劾奏之當官而行不吐不茹則趙蓋韓楊之徒亦庶幾不死矣成王命君陳曰商民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中定國獨未見此論耶韓延壽此篇論風俗如古風俗之變初無常也道隆則從而隆道汚則從而汚記檀弓云曷嘗有古今之異哉昔之陋儒以為風俗自厚而之薄猶人自少而之老古之俗厚猶人之方少者也今之俗薄蓋人之己老者也薄者不可復厚亦如老者不可復少張末論法云嗚呼何其不思甚耶將以三皇之俗為厚乎則黃帝之末胡為有蚩尤之亂史紀黃帝乃徵師諸侯與蚩尤戰於涿鹿之野遂殺蚩尤將以五帝之俗為厚乎則帝舜之世胡為有三苖之亂書竄三苗于三危將以三王之俗為厚乎則夏商之季胡為有桀紂之亂蚩尢之亂無以異於項羽之亂也亂既除而俗有厚薄之異者非秦民之不如古特高帝不如黃帝耳三苗之亂無以異於七國之亂也亂既除而俗有厚薄之異者非漢民之不如古特景帝不如大舜耳桀紂之亂無以異於煬帝之亂也亂既除而俗有厚薄之異者非隋民之不如古特太宗不如湯武耳自古至今同戴一天同履一地同賦一性日月不變也耳目鼻口亦不變也風俗何為而獨不如古哉善乎魏鄭公之言曰五帝三王不易民而教行帝道而帝行王道而王顧所行如何耳若人漸澆詭不復返朴今當為鬼為魅尚安得而化哉見唐魏徴傳云云蓋嘗觀韓延壽之治潁川而益信風俗之未嘗不如古焉延壽本傳蓋承戰國孤秦之弊禮樂廢弛異端並奮世以古先聖人化民之道為姗笑賢如高帝乃曰以馬上治之安事詩書陸賈傳云賢如文帝乃曰卑之無甚高論張釋之言便宜事帝曰云云令今可行也於是釋之言秦漢之間事賢如宣帝乃曰漢家自有制度本以霸王道雜之見前元帝紀云君臣上下同趨於刑名法律簿書期㑹之間無復逺略賈誼疏大臣特以簿書不報期㑹之間以為大故王吉疏公卿務在於期㑹簿書斷獄聽訟而已非太平之基也惟延壽承潁川趙廣漢告訐之俗獨能取世所姗笑為陳腐迂闊者次第而行之百姓遵用其教至於賣僞物者棄之市道其在東郡馮翊如潁川之治洋洋乎弦誦之聲肅肅乎爼豆之容庶幾乎治古矣徙潁川太守潁川多豪强難治先是趙廣漢患其俗多朋黨令相告訐潁川由是以為俗民多怨讎延壽欲改更之教以禮讓因與議定嫁娶喪祭儀品略依古禮令文學校官諸生皮辨執爼豆為吏民行喪嫁娶禮百姓遵用其教彼謂風俗不可復古者果如何哉大抵後世之患出於待古太高而待已太卑惟待古高故自疑而不敢為待己卑故自棄而不復為殊不知三代雖逺其理常存苟能盡其理則夫何逺之有哉故萬石君處家而子孫燕居申申此一家之三代也子孫勝冠者在側雖燕必冠申申如也僮僕欣欣如也唯謹王烈居鄉而訟者望塵而還此一鄉之三代也魯恭治中牟而童子不取乳雉此一邑之三代也恭拜中牟令肥親往廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親曰豎子有仁心此三異也延壽之治潁川庸非一郡之三代乎以是而論之則風俗古不必厚今不必薄古不必易今不必難惟其人而已安可是古而非今哉蕭望之此篇論剛褊不受辱而死君子必有堅忍不拔之操然後小人不能犯吾之所忌嗚呼小人之害君子何其多端也遇人之介者則必辱之遇人之廉者則必汚之遇人之剛者則必折之遇人之直者則必誣之蓋介者必不受辱廉者必不受汚剛者必不受折直者必不受誣凡此者君子之所忌也小人知君子之所忌而直犯之君子不知而墮其計中大則死小則亡前後相望可不為大哀乎昔驪姬將有奪嫡之謀謂優施曰吾欲為難安始而可優施曰必於申生其為人也小心精潔又不忍人精潔易辱不忍人自忍也驪姬用其計以歸胙誣申生申生自殺見晉國語云魏公叔為相尚主而害吳起公叔之僕曰起易去也吳起為人節廉而自喜名君先與武侯曰吳起賢人也而侯之國小臣恐起之無留心也試延以主起有留心則必受之無留心則辭矣君因召吳起與歸令公主怒而輕君起見公主之賤君也則必辭公叔用其計吳起果辭武侯疑之遂奔楚見史記起傳云夫申生有精潔易辱之形見於外故優施因其間而排之吳起有節廉喜名之形見於外故公叔亦因其間而排之使二人渾然天成削去圭角置之不慍用之不懌則小人亦安能乘間而犯吾之所忌哉蕭望之秉直道而不容於恭顯終於殺其身吾以望之亦有罪焉望之自始見霍光不肯露索挾持甘心於抱關之役時霍光秉政丙吉薦王仲翁與望之等召見先上官桀與蓋主謀殺光光既誅桀等後出入自備吏民當見者露索去刀兵兩吏挾持望之獨不願見吏牽持胸胸光聞之告吏勿持望之至前說光曰今士見者皆先露索挾持恐非周公致白屋之意光獨不除用望之而仲翁等皆補大將軍史三歲仲翁至給事中望之以射䇿甲科為郎署小苑東門候仲翁顧望之曰不肯録録反抱關為望之曰各從其志其後為平原太守則不自得時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝逺為郡守內不自得乃上疏云云為左馮翊則移病宣帝察望之經明持重論議有餘材任宰相欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病為御史大夫則與丙吉鈞禮代丙吉為御史大夫後丞相司直䋣延壽奏侍中謁者良使丞制詔望之望之再拜已良與望之言望之不起因故下手而謂御史曰良禮不備故事丞相病明日御史大夫輒問病朝奏事㑹廷中差居丞相後丞相謝大夫少進揖今丞相數病望之不問病㑹廷中與丞相鈞禮時議事不合意望之曰侯年寧能父我耶其介然剛褊狷潔之操不以一毫挫於人天下共知之矣當恭顯之欲害望之深思熟慮以為望之帝之師傳著節老臣苟驟使帝誅之誰肯從乎惟納之囹圄使俯首對刀筆吏則望之剛褊必不受辱忍而死遂收望之下廷尉而望之果如其所料終以自殺宣帝崩太子襲尊號是為孝元帝望之本以師傳見尊重上即位數宴見言治亂陳王事望之選劉更生金敞拾遺左右上甚鄉納之初宣帝不甚從儒術任用法律而中書宦官用事中書令𢎞恭石顯久典樞機明習文法與史高為表裏議論不從望之等恭顯又時傾仄見詘望之以為中書政本宜以賢明之選用宦者非國舊制違古人不近刑人之義繇是天與高恭顯忤恭顯奏望之堪更生朋黨相稱舉欲以專擅權勢為臣不忠請謁者召致廷尉上赦望之罪㑹望之子伋上書訟望之前事有司復奏望之教子上書失大臣體不敬請逮捕恭顯等知望之素高節不詘辱建白望之深懷怨望教子上書歸非於上自以託師傳懷終不坐非頗詘望之於牢獄塞其怏怏心則聖朝亡以施恩厚上曰蕭太傳素剛安肯就吏顯等白望之坐薄罪必無所憂上可其奏顯等封以付謁者敕令召望之手付吏者至召望之望之竟飲鴆自殺天子聞之驚曰曩固疑其不就牢獄果然殺吾賢傅恭顯定計於前收效於後如取如攜無錙銖之差者以望之之賢而不能出於小人之所料此有志之士所以為之流涕太息而不能已歟嗚呼望之社稷之鎮也使不感慨自殺則元帝雖不盡用恭顯亦終有所忌憚而不敢發其惡亦少瘳矣幸而天假之年至于成帝之世安知其不能坐銷王氏代漢之禍乎是望之死生實漢室之所由存亡也望之縱不自惜獨不為漢惜乎又况望之素以大儒自處一旦臨事乃自經溝瀆與田光侯嬴之徒比豈天之棄漢而奪其魄耶何其謬戻若斯之甚也十先生奧論注續集卷六
