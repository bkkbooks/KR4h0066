body:
  text: 十先生奥論註前集巻十二雜論陳傅良恢復論上此篇論收天下者有所愛是以難自古争天下者常易收天下者常難唐人有言神堯以一旅取天下後世子孫不能以天下取河北嗟夫是亦其勢然也夫以匹夫而争天下與失天下而收之者其勢甚不相若也凡人之情輕於用人之所有重於用已之所愛輕則勇重則怯何者非吾有而有之雖失之於吾無損也其勢烏得不勇以其所愛而用之一或不濟則併亡之矣其勢不能無怯此争天下與收天下之所以異也昔漢髙帝資三尺之任五載而成帝業前漢諸侯王表漢無尺土之階繇一劍之任五載而成帝業且秦以虎狼之强由數世而合之漢獨何其鋭也盖髙帝崛起豐沛之微無寸土為之階兵秦兵也粟秦粟也城邑秦之城邑也驅非已之民食非已之粟而收非已之城邑故得以肆意而為之降數十郡而喪之不恨也捐數千里以授三將不惜也睢水之逃滎陽之脱濱於死而不衰也前髙祖紀項羽擊漢軍睢水上大破漢軍多殺士卒睢水為之不流圍漢王三帀大風折木發屋晝晦楚軍大亂而漢王得遁去又項羽圍漢滎陽漢王患之紀信誑楚漢王出西門遁以匹夫而争天下其幸而集則帝王不幸而不集吾如彼何哉髙帝亦不得不勇為之矣晉元之南渡也撫江都之勝兼吳㑹之饒亦足以奮矣而没齒不能歸侵彊之咫尺者非他也其心愛夫一隅之可以自託惴惴然惟恐夫用之而併失之也見晉本紀又云元戎屢動不出江畿經畧區區僅全吴楚故曰是亦其勢然也三代以後中興之功莫易於光武豈光武獨能也哉葢其勢亦髙帝之勢而光武亦以其髙帝為之也嗚呼後之人主不幸而失天下之全願得為漢之光武猶幸而獨得天下之半乃止於晉之元帝亦孰能處元帝之勢而以光武用之也哉恢復論下此篇論有志於取天下者有所棄則有所就處晉元之勢而以光武用之者未必學光武也亦有所棄而已矣大抵不有所棄不能有所就有志於取天下者特未可深留而固閉之也以天下之大深留而固閉之雖守之不足况於攻乎哉髙帝之所以踣項氏者以其棄燕齊於韓信劉備之不能一駕於魏者以其不棄吳於孫氏也方信之虜魏豹也請益兵三萬北舉燕趙東擊齊帝灑然與之不吝也及其破歴下也請自王之帝幾誤矣良平附耳一語帝翻然置之不争也嗚呼何帝之明於前而良平善料於其後也且帝以五諸侯之兵顛頓於滎陽成臯之間幾不脫者屢矣帝之力果能遂并齊哉假如帝之能并齊項氏以躡而奪之矣三秦之事可見矣以燕齊之壤綿亘萬里而為楚得之則楚全而漢孤嗟夫楚全而漢孤則漢之不敵楚决矣孰若棄之於信使之自戰其地自兼其衆而又自王其國時出而佐我則項氏必不能捨相持之漢而東矣羽之使龍且救齊也非不勇於自行也有漢王者在也則夫棄齊於信所以錮項氏於不能進退之域分其力而弱其權也漢之帝也信實犄角之歟見前漢髙祖紀及韓信張良傳劉備亦一時之傑也而其志不若髙皇之大且蜀之讎莫若於魏而其力之不能有吳亦明矣蜀之急於吳者失也使其掃巴蜀之甲趨於江陵一舉而兼之則曹氏肯拱揖之而授之蜀哉是以其勢必争争則便且强者勝是蜀之併吳所以資魏也斃吳而踣魏蜀能自為蜀哉故莫若使吳自吳與之權而并力於魏方權之請降也其機至矣因其欲降而徳之權之所以奮於魏也以吳蜀之二當魏之一其力足以舉魏蹙魏而圖吳未晚也惜乎其不棄於孫氏而更生之敵是以卒無所成夫不忍棄之而委之為敵人之資取天下者為之哉見魏武帝紀及蜀先主吳孫權傳昔祖逖之渡江也晉之中興其兆成矣而元帝不棄之逖遽使戴若思代之鳴呼君子是以知晉之不能西也祖逖傳帝以逖為奮威將軍渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壮烈衆皆慨歎方當推鋒越胡掃清河朔㑹朝廷将遣戴若思為都督逖以若思是吳人雖有才望無𢎞致逺識且巳翦荆棘收河南地而若思雍容一日來統之意甚怏怏俄卒備論上此篇論輕於所戒而重於所玩者雖兵孰難曰備為難備孰難曰輕於所戒而重於所玩者為難大抵敵人之曉兵者必不肯犯吾之所戒而突吾三軍必向之鋒也夫不肯犯吾所戒而突吾三軍必向之鋒而其計必將趨於吾之所玩而卒然畢集於一隅不警之地故夫非甚愚之將而以其師壓坦然之境者皆以聲餌我也而其實必有所不至嗟乎其以聲餌我而其實不至則亦愚我而巳矣是正智將之所貪而用兵者多失之葢乏備之罪也韓信之擊魏也陳舟於臨晉而以木罌渡軍襲安邑亦信之愚魏豹也前韓信傳信擊魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵従夏陽以木罌缶度軍襲安邑魏主豹驚引兵迎信信遂虜豹昔者晉人伏兵於二陵以邀秦而蹇叔巳知之左僖三十二年秦穆公召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收兩骨焉秦師遂東吳楚匿死士於淆澠之間以伺漢而趙渉亦己知之前周亞夫傳趙涉說亞曰將軍東誅吳楚吳王素富懐輯死士久矣此知将軍且行必置間人於殽澠阸陿之間且兵事上神密將軍何不從此右去走藍田出武闗抵雒陽間不過差一二日直入武庫擊鳴鼔諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜殽澠間果得吳伏兵兵未有形而二子預料於千里之外必知其潜師之所使其謀人如謀國則夫可入之間可乘之隙豈不盡在掌握間哉然則淮隂之師設虛於臨晉而出其實於安邑亦幸其無蹇叔趙涉而巳魏而有二子者為之計而嚴備於夏陽之間則浮罌之衆可以坐覆故夫以其虚聲壓吾坦然之境而其實出於一隅不警之地者智将可以兩得之何者吾以虚臨虚以實待實彼之所恃者實也吾敗其實則虚者潰矣兹固季良所以謀楚者哉噫是非輕於所戒而重於所玩者不能也備論下此篇論用兵必乘敵人之所不備善用兵者必掩人之所不意夫掩人之所不意者所以乘其所不備也如乘人不備而不知人之乘其不備亦豈長於兵者哉大抵邀虚擊懈之師非惟吾能知之敵亦有能知之者矣恃我之所能而墯於人之所能故曰用兵之道竒為難昔者吳楚之西向也條侯以其三十六將之兵填然而東趙涉以為不可也莫若寂鼔仆旗走藍田出武闗抵洛陽入武庫然後聲而馳之則諸侯愕眙失色以為從天而墯矣見上篇注嗟夫孰知吳有田禄伯亘將軍者巳慮及此乎田生之謀盖欲以竒兵循江淮而上先入武闗而亘氏亦欲西據洛陽武庫食敖倉之粟以徐俟漢軍之至則夫趙涉之所以說亞夫以出吳楚之所不料者正田生亘氏之所欲疾馳以先漢兵之所不及者也使二子之計行則亞夫以其堂堂之軍巻甲而趨不虞吳兵之至吳人以其未試之鋒適㑹亞夫於其所貪之境吳楚之師不遇於武闗亦必接刄於洛陽武庫之間以漢不虞之懈當吳未試之全嗚呼兹固鄧都尉之所憂也哉吾觀周侯之功盖出於鄧公之謀委梁以敝吳而深營固壘以坐待其羸乏故得以全制之使吳而聴二臣之言以其死鬬之銳不耗於梁而决戰於漢則夫趙涉之說是乃嫁禍於亞夫也亞夫不危乎哉然則涉之說獨行於漢而二臣之言不售於吳者天之相漢焉耳前吳王濞傳七國反書聞天子遣周亞夫将三十六将軍往擊吳楚初吳楚反書聞故吳相表盎召入見上問以吳楚之計以盎使吳吳王聞盎來欲刼使将盎夜亡走梁遂歸報條侯云比至淮陽問故父絳侠客鄧都尉曰䇿安出客曰吳楚兵銳甚難與争鋒楚兵輕不能久為将軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝髙壘使輕兵絶淮泗口饟道使吳楚相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其䇿遂堅壁昌邑南輕兵絶吳饟道吳王之初發也吳臣田禄伯為大将軍田禄伯曰兵屯聚而西旡它竒道難以立功臣願得五萬人别循江淮而上收淮南長沙入武闗與大王㑹此亦一竒也嗚呼為将者其無愚敵而幸於天之所相哉守論此篇論守不在險而在人天下之言守者則形勢而巳矣形勢者以險為本嗟夫險未足以盡守之說也秦之函谷吳之長江蜀之劒閣天下之言險者無先也而子嬰降漢劉禪孫皓翦為魏晉之俘且夫雍梁之西荆陽之東非有變也金城棧道之固驚波之阻猶無恙也沛公瓦合之卒不繁於曩時六國之衆也鄧艾王濬之徒又非白公曹公司馬懿之敵也而二君束手就擒一地之茅土盡為喪國之社何也非其人也善乎賈生太史公之言曰使嬰有庸主之材僅得中佐山西之地尚可全有史秦紀賈誼論秦論曰向使嬰有庸主之才僅得中佐山東雖亂秦之地可全而有宗廟之祀未嘗絶也噫非特秦然也葛亮陸抗而不死吳蜀亦未可以侮矣故曰守以險不若守以人昔者劉項之争衡也楚以拔山之力卒為漢臠議者多咎項氏捐天險之勝形懐區區之故國榮於匹夫晝錦之歸斯以取亡前項籍傳羽壁垓下軍少食盡漢兵圍之數重羽夜聞漢軍四面皆楚歌乃驚曰漢皆巳得楚乎是何楚人多也乃自歌曰力抜山兮氣盖世時不利兮騅不逝乃自剄又羽屠咸陽殺秦降王子嬰燒其宫室於是韓生説羽曰闗中阻山帯河四塞之地肥饒可都以霸羽又懐思東歸曰冨貴不歸故鄉如衣錦夜行以愚觀之項氏所以亡者亦或不在是也方羽之霸𤓰分闗中之壤授三叛將其意盖在於障漢軍之東也羽之心自以三秦足以限漢雖髙枕於彭城之地而巴蜀之師亦未敢越境而下也而不知夫僨軍降虜非漢之敵楚之旋斾未巻而劉季巳刼而奪之矣羽不能止徒王鄭昌於韓以為西蔽終亦以伺漢而已矣則夫闗中之不守者羽之失人也同上羽陽尊懐王為義帝徙之長沙都郴分天下以王諸侯立沛公為漢王王巴蜀漢中而參分闗中王秦降將以距塞漢道乃立章邯為雍王王咸陽以西立司馬欣為塞王王咸陽以東立董翳為翟王時漢王還定三秦羽聞漢并闗中且東齊梁畔之大怒乃以故吳令鄭昌為韓王以距漢令蕭公角等擊彭越越敗及羽之擊彭越也亦慮夫漢之過成臯也而令樅公守之未幾而樅公破則属之大司馬曹咎堅壁以捍漢甚矣夫羽之愚也且漢之不駕於楚者皆羽之身與之角者也羽引而東雖百海春侯曽何足以礙漢哉不數日而咎斃於圯水之上則夫成臯之不守羽之再失人也同上羽急圍漢王滎陽漢王従西門出令周苛樅公魏豹守滎陽漢王西入闗時彭越渡睢殺薛公羽乃東擊彭越漢王亦引兵北軍成臯羽巳破走彭越引兵西下滎陽城烹周苛殺樅公虜韓王信進圍成皐漢王跳獨與滕公得出北渡河至修武從張耳韓信楚遂拔成臯漢王得韓信軍留止使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍攻下梁地十餘城羽聞之謂海春侯大司馬曹咎曰謹守成臯即漢欲挑戰慎毋與戰勿令得東數而巳我十五日必定梁地復從將軍於是引兵東漢挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵汜水卒半渡漢擊大破之大司馬咎長史欣皆自剄汜水上至於漢髙以一韓信守齊羽巳有腹背之憂武涉之説足以見羽之無聊矣嗚呼漢之獲信豈信之素宦於漢耶羽不能用而弃之漢則信之歸漢實羽之助漢而自孤也使羽而用髙帝雖欲不鬱鬱於西可乎然則項羽之失天下非失險也失人也韓信傳信属項羽為郎中信數以䇿干羽羽弗用漢王之入蜀信亡楚歸漢未得知名膝公竒之言於漢王漢王未之竒也蕭何曰諸將易得至如信國士無雙王必欲長王漢中無所事信必欲争天下非信無可與計事者顧王䇿安决王曰吾亦欲東耳安能欎欎久居此乎何曰王計必東能用信信即留不能用信終亡耳王以為大将曰將軍何以敎寡人計䇿信遂平齊請自立為假王王曰即為真王何以假為立信為齊王召其兵使擊楚項王恐使武涉往説信曰足下何不反漢與楚楚王與足下有舊故且漢王不可必足下何不與楚連和三分天下而王齊信謝云云髙帝嘗曰羽有一范増而不能用此所以為我擒髙祖紀云云噫豈惟一范増哉屯田論此篇論不可誘古人美名而忘今世之實患圖天下之利者不可誘於古人之美名而忘今世之實患也夫誘於古人之美名而忘今世之實患則見其利而不見其害奮而為之其利之効也未收而害之形己先見矣兹事之所由不濟而忌者得以乗而破之也昔者漢之憂在乎諸侯之偪而唐之深禍亦以歴世之兵拏而未解也則夫鼂錯建削地之䇿於七國方横之時前鼂錯傳景帝即位錯請諸侯之罪過削其支名郡奏上諸侯讙譁後吳楚七國俱反以誅錯為蕭俛段文昌之徒開銷兵之議於兩河甫定之日唐蕭俛傳穆宗初兩河底定俛與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之嵗限一為逃死不補謂之銷兵既而籍卒逋亡無生業嘯聚山林間為盜賊㑹朱克融王廷湊亂燕趙一日悉收用之朝廷調兵不充乃召募市矣人烏合戰輒北遂復失河朔豈非漢唐之大利也哉況夫强本以固國戢武以安民者三代之所歴行而未盡者也以漢唐之大利而文以三代之美談則其説之易使而其聴也易甘天下之士必疾趨而樂附之矣其誰曰不可嗟夫孰知夫削地之畫一下而吳楚之變幾危劉氏之宗社銷兵之計一行而燕趙之盜復瀦河朔之地而卒無以禁之也哉故夫誘於古人之美名而忘今世之實患者將以利天下適以害天下也雖然是豈真不可為耶士大夫深思而逺慮不為名鉗斯得之矣天下皆以為安吾不遽而安也而猶以為甚危天下皆以為可喜吾不雷同而喜之而獨為之深憂其慮之也過則其備之也豫備之也豫則其應之也亦不跲是故處之而固行之而成雖有樂敗人之功者亦無得為之矣今之屯田巳試之事也而其效莫著於漢之趙充國魏之棗袛嗟乎二子之迹古人之美名也充國以方隆之漢斃垂盡之先零前趙充國傳充國擊先零羌度其必壊欲罷騎屯田以待其斃奏曰臣謹條不出兵留田便宜十二事衹以未裂之中原營於無虞之許下魏太祖建安元年用棗祇韓浩等議始興屯田又任峻傳太祖欲經畧四方苦軍食不足羽林監棗袛建置屯田太祖以峻為典農中郎將募百姓屯田於許下得穀百萬斛郡國例置田官數年中所在積粟倉廩皆滿軍國之饒起於棗袛而成於峻其從事於此也専其所以害其成者無有則其為之也暇而其責效也亦不亟二子處之奚患哉今日之事未可以是論也秋髙馬肥馳突而蹂禾稼者中行說之所以折漢使正胡虜之心未嘗一日忘我者也然則求其利者其無借趙充國棗衹之美名以籍口而不忍思中行說之實患而緩其備也哉十先生奥論註前集巻十二
