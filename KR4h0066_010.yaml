body:
  text: 十先生奧論注前集卷十西漢論戴溪武帝一此篇論有好儒述之名漢自文景以來上喜黃老下習刑名未知其六藝也武帝即位之初春秋尚富田蚡傳上初即位富於春秋注謂年幼也年齒方少故云富於春秋豈復真知儒者可貴特樂聞其名求勝黃老刑名之説以為名髙耳丞相衛綰車戲之士也本傳以戲車為郎事文帝寧復真知申商韓非之不可用亦逆探武帝之意以中其欲耳丞相衛綰奏所舉賢良或治申韓蘇張之言亂國政者請皆罷奏可蓋武帝之於儒術陽喜其名而隂諱其實公孫𢎞張湯知其意而徇其名故上以名取之上察公孫𢎞習文法吏事緣飾以儒術大悅之上方向文學張湯陽浮慕事董仲舒公孫𢎞等以兒寬為奏讞掾胸奴請和親博士狄山以為便上問張湯湯曰此愚儒無知山曰臣固愚忠若湯乃詐忠於是上作色遣山乘障至月餘胸奴殺之董仲舒申公逆其意而辨其實故上以實棄之對䇿曰今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進帝初即位趙綰請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以迎申公至見上上問治亂之事申公時已八十餘老對曰為治者不至多言顧力行何如耳時上方好文辭見公對默然然已招致即以為太中大夫議明堂事竇太后喜老子言不説儒術得綰臧之過以讓上上因廢明堂事下綰臧吏自殺申公亦病兔歸汲黯之戇又從而發其隱伏以切中其心術之微是真武帝之所謂愚哉上方招文學儒者上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戇也雖然趙綰王臧首當武帝隆儒之選而人物如此是固武帝所輕棄戮辱也安有帝始即位一見之初便勸帝明堂之理建議紛然不樂者衆相與排擯去之耳誅死不足怪也且世亦安有儒者為嬰蚡所知其辱申公亦多矣上雅向儒術丞相嬰太尉蚡俱好儒推轂趙綰為御史大夫王臧為郎中令綰請立明堂以朝諸侯且薦其師申公時太皇竇太后好黃老言不説儒術綰請毋奏事東宫太后怒求得綰姦利以責上上因廢明堂事諸所興為皆廢下綰臧吏自殺太后以為儒者文多質少萬石君家無文學而恭謹不言躬行乃用石建為郎中令石慶為內史申公進力行之説趙綰建明堂之議其事正相反尚得為知其師乎並見上注不特此也請毋奏事東宫離間人母子之間而欲以此集事亦真可哀矣哉不先正其君之心而欲以儒術與黃老爭勝負一軒一輊迭為輕重而曰儒術不行其與申韓黃老相去無幾爾武帝二此篇論逞意於所欲為漢武帝以英偉特異之資招致天下文學材智士若嚴助主父偃之徒皆以文墨小技一言悟意驟置左右用為天子私人使得與外庭相應辨論蜂起數折辱大臣此最害治之大者禮記曰君無以小謀大無以逺言近無以內圖外則大臣不怨邇臣不疾而逺臣不蔽矣今也捨大臣而與小臣謀使左右小臣得參外庭謀議挾天子之重以折服大臣幸而大臣賢者守正不阿猶有有所畏忌不幸如公孫𢎞之徒依阿取容陽為不敏遜謝自屈一時輕鋭小才氣焰方張言聽計行則亦何所不至上自初即位招選天下文學材智之士待以不次之位四方士多上書言得失自鬻者以千數上簡拔其俊異者寵用之莊助最先進後又得朱買臣吾丘壽王司馬相如枚臯終軍等並在左右每令與大臣辨論中外相應以義理之文大臣數屈焉然相如特以詞賦得幸朔臯不根持論好詼諧上以俳優處之雖數賞賜終不任以事也蓋武帝逞意於所欲為而不快於外庭之論非與此輩議而行之則牽制不決故發兵會稽嚴助為之建元三年閩越圍東甌東甌告急遣中大夫嚴助持節發會稽兵浮海救之未至閩越定云云起上林苑吾丘壽王為之帝欲起上林苑東方朔諌上拜朔為太中大夫賜黃金百斤然遂起上林苑如吾丘壽王所奏開西南夷司馬相如為之建朔方郡主父偃為之主父偃嚴安徐樂皆上書天子召見皆拜為郎中主父偃尤親幸大臣畏其口賂遺纍千金偃建議立朔方郡上方通西南夷東置滄海北置朔方之郡公孫𢎞數諫以為罷敝中國以奉無用之地願罷之天子使朱買臣等難以置朔方之便發十䇿𢎞不得一乃謝曰山東鄙人不知其便願專奉朔方許之𢎞為相每朝奏事因言國家便宜上亦使左右文學之臣與之論難𢎞嘗奏請禁民無挾弓弩上下其議吾丘壽王以為不便上以難𢎞𢎞屈服焉入則橫議於內出則專行於外大抵從君於昏而彌縫其惡大臣不敢爭逺臣不敢議在當時之禍猶小使武帝有輕視大臣之心誅死戮辱相繼公孫賀傳時朝廷多事督責大臣自公孫𢎞後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴後之人君寵信近臣以疏外庭其禍不細夫人君左右當得識治體敦朴老成之人朝夕議論遊處如古者三公之任後世經筵之官是也集一時年少浮薄之人以行快意一切之政不問其所從來借之氣力使私作威福此豈有安靜之理哉衛太子開博望苑以通賓客初上得太子甚善及冠就宫上為立博望苑使通賓客從其所好故多以異端進者淮南王安好文學喜立名譽招致賓客為人好書鼓琴不喜弋獵狗馬馳騁亦欲以行隂德拊循百姓流名譽招致賓客方術之士數千人作為內書外書又有中篇皆以此取敗蓋自天子至於諸侯一是彼輕去墳墓遊行郡國上書衒鬻髙自稱道以僥幸一時之利其言行相反類非忠臣孝子此先王之所必斥也雖然東方朔比諸子中最為諌諍有益者獨以詼諧自置見輕當時取譏後世士君子固不自重哉武帝三此篇論自欺其心人之自欺其心何所不至哉然隱然不能自欺之意不自禁於文墨口舌之間此亦出於天理人心者不可誣也漢武帝好符瑞求長年君臣相諛自蔽其聰明公肆誣罔豈復顧天下後世笑已哉然以史考之曰獲一角獸蓋麟而非麟也祠五畤天錫一角獸蓋麟云從官在山下聞若有言萬嵗者若言而非言也祭中嶽太室從官在山下聞若有言萬嵗者三夜若有光則非光矣屑然如有聞則非聞矣若將可得豈真可得若云欲見豈真欲見哉封泰山禪肅然山其封禪祠夜若有光詔曰用事八神遭天地况施著見景象屑然如有聞天子既已封泰山而方士更言蓬萊諸神若將可得上欣然庶幾遇之公孫卿言見神人東萊山上若云欲見天子向使君臣之間自信其欺傳示天下誰敢議之文致疑似髣佛之説於恍惚罔象之間而不敢正言之若將有所畏焉於是知人心昭然亦毋置如許欺罔也雖然唐明皇嘗自言聞空中語聲云聖壽延長等事言之不怍居之不疑范太史曰漢武封太室而從官諂諛言有呼萬嵗者明皇乃自為詐人甚於漢武帝矣唐鑑天寶四年正月帝謂宰相曰朕比以甲子日於宫中為壇為百姓祈福朕自草黃素置案上俄飛升天空中語云聖夀延長范祖禹曰明皇假于怪神以罔天下言之不怍而居之不疑何以使其臣下不為欺乎是率天下欺已也云云夫始為詐猶有疑也尤而效之無復畏矣故秦始皇猶不如漢武帝武帝猶不如唐明皇益逺益誣矣鳴呼人之諂諛亦何所不至哉嵗旱矣而曰天將以乾封星孛矣而曰天示報德星郊祀志元封元年秋有星孛于三能望氣王朔言候獨見填星出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云明年夏旱公孫鄉曰黃帝時封則天旱乾封三年上乃下詔天旱意乾封乎取災異以為祥瑞此與指鹿為馬何異史始皇紀二世三年趙髙欲為亂恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或默或言馬以阿順趙髙或言鹿者髙因隂中諸言鹿者以法而武帝受之甘心焉羣臣何憚而不為詐况率天下而教之欺已乎武帝四此篇論多得小人孟子曰今之諸侯皆好臣其所教而不好臣其所受教蓋自秦漢以來上之人有志於求士者類知求才而不知求賢以智術籠絡才智之士役使如意指則不吝爵賞以答其勞稍或負犯則誅死戮辱無所愛惜特不過以奴𨽻遇之爾士亦頑頓無恥見利則折有便則奪君臣之間交相脫誤雖有賢者恥立其朝且不可得而見況得而用耶不可得而用況得而殺耶漢髙帝正坐慢易侮人爾四皓義不為帝臣張良曰上有所不能致者四人四人年老矣皆以上嫚侮士故逃遁山中義不為漢臣注四人謂商山四皓也苟以刑戮刀鋸為術而欲來天下之賢則所得者小人而已矣甚矣武帝之求士也取髙帝馭韓彭英盧之術以待天下士大夫方其欲見也快意於所欲取及其欲殺也快意於所欲去惜才智之力以為甘心快意之地此與興禮樂伐胸奴用財幣同一快意爾寧復有一毫為人才地觀當時所得人才皆戮具也浮躁淺露自致夷滅固宜獨一汲黯不肯少屈下斷然與帝爭勝負無所假借帝亦卒無如黯戇何上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治呼上怒變色而罷朝退謂人曰甚矣汲黯之戇也班孟堅猶謂漢得人武帝為盛安有如武帝者而能得賢亦多得小人而已矣公孫𢎞等贊上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息羣士慕嚮異人並出卜式拔於芻牧𢎞羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋而已漢之得人於兹為盛晚年誅殺過當名臣欲盡乃始下詔求跅弛之士出於無術行此下䇿上招延士大夫常若不足然性嚴峻羣臣雖素所愛信者或小有犯法或欺罔輒按誅之無所寬假元封五年上以名臣文武欲盡乃下詔曰云云夫泛駕之馬跅弛之士亦在御之而已其令州郡察吏有茂才異等可為將相及使絶域者彼亦見賢者不肯至而齷齪無他技能者亦震懾於積威之後思欲脫略規矩準繩求小人之才以行一切之政而已矣夫內而得罪於父兄外而不容於鄉黨遊行郡國甚者以睚眥殺人豈非世所謂跅弛之士耶舉兼并之徒擇有罪之士是又在跅弛下矣武帝五此篇論借聖經以濟私欲韓文公論盧登封於書無所不讀然止用資以為詩前輩亦言杜子美讀書萬卷止解下筆可恨爾夫書生於六經猶不當用為筆墨之娛吾不意漢武帝表章六經立博士學官而用以資樂府為也自宣帝顯宗猶能集諸儒論難同異天子臨定其是非今但會集五經家通知樂律訓詁恐我將清廟等詩類不若此此與用太常少卿教樂何異又使宦者佩二千石印綬絃次初詩得與諸儒生上下講習是嵗得神馬於渥窪水中上方立樂府使司馬相如等造為詩賦以宦者李延年為協律都尉佩二千石印綬絃次初詩以合八音之調詩多爾雅之文通一經之士不能獨知其辭必集會五經家相與講習讀之乃能通知其意及得神馬次以為欹汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音耶上默然不悅何異魚朝恩作國子祭酒哉代宗立朝恩好引輕浮後生處門下講五經大義作文章謂才兼文武徼伺誤寵永泰中詔判國子監始詣學詔宰相常參官六軍將軍悉集京兆設食內教坊出音樂俳倡侑宴大臣子弟二百人朱紫雜然為附學生寵幸宦官輕薄儒生狎侮聖言褻慢宗廟孰謂隆儒重道之君而顧若此且帝不特此也借經術以濟私欲多矣於春秋得復讎之義而從事胸奴胸奴傳帝既誅大宛威震外國天子意欲遂困胡乃下詔曰髙帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復五世之讎春秋大之注公羊傳莊四年春齊襄公滅紀復讎也於易得九變之説而更變法令刑法志孝武即位窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法侈封禪以為禮比詩歌以為樂若是而曰表章六經是殆不如不知經者愈也夫儒有以詩禮發冡者莊外物篇儒以詩禮發冡大儒臚傳曰東方作矣事之何若小儒曰未解裾𥜗口中有珠詩固有之曰青青之麥生於陵陂生不布施死何含珠為接其鬢擪其顪儒以金推控其順徐别其頰無傷口中珠假竊經義以濟諛佞如祝欽明山惲等多矣景雲初侍御史倪若水劾奏欽明山惲等腐儒無行以諂佞亂常改作百王所傳一朝墮放今聖德中興不宜使小人在朝請斥逺之以肅具臣乃貶欽明饒州刺史山惲括州刺史欽明以五經為該淹自見坐不孝免乃阿附韋氏圖再用又坐是見逐諸儒共羞之彼司馬相如輩何責焉汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音耶孰謂汲黯反不知學乎十先生奧論注前集卷十
