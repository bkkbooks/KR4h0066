body:
  text: 十先生奧論注續集卷九西漢論陳傅良項羽此篇論不殺高帝昔者鄧侯不殺楚文王而楚卒滅鄧左莊六年冬楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥𣆀甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之楚子不殺晉文公而晉卒敗楚僖二十三年晉公子重耳之及於難也遂奔狄及楚楚子饗之子玉請殺之楚子曰晉公子廣而儉文而有禮天將興之誰能發之違天必有大咎乃送諸秦經二十八年夏晉侯齊師宋師秦師及楚人戰于城濮楚師敗績云云項籍不殺高帝而漢卒誅項氏漢元年十月沛公西入咸陽十二月項羽欲入關關門閉聞沛公已定關中羽大怒使黥布等攻破函谷關欲攻沛公亞父范增說羽曰沛公入關吾使人望其氣皆為龍成五色此天子氣急擊之勿失項伯馳告張良沛公與伯約為婚姻項伯還具以沛公言告羽羽許諾沛公旦日從百餘騎見羽鴻門謝羽羽留沛公飲范增數目羽擊沛公羽不應云云志士至今惜之嗚呼必殺其所忌而以得國則安知天下之禍將不出於其所不足忌者哉夫變之來也無常而英雄猾桀其伏也無盡變之來也無常則不可以逆定英雄猾桀其伏也無盡則形索而計取也必不及是故詳於禁者有法外之遺姦工於謀者有術中之隱禍詩曰魚網之設鴻則罹之二子乘舟詩云網以伺魚也而顧以得鴻天下之事又焉用專於其所圖而淫怒焉以逞哉夫專於其所圖而淫怒以逞者則必有所不可支者根之於其不意昔秦覆滅諸侯其所憂者六姓之逋士也於是不愛重寶致天下之豪傑而殱其黨賈生過秦曰始皇吞二周而亡諸侯履至尊而制六合於是墮名城殺豪俊天下已定始皇之心自以為關中之固金城千里子孫帝王萬世之業也始皇既沒然而陳涉甕牖繩樞之子氓𨽻之人遷徙之徒也帥罷敝之卒轉而攻秦山東豪俊遂並起而亡秦族矣始皇之為計亦密矣而不知亂秦者則刑餘之㺯臣史始皇紀三十七年始皇出游至平原津而病崩於沙邱平臺趙高嘗教胡亥書胡亥私幸之高與胡亥丞相斯隂謀詐為斯受始皇遺詔立胡亥為太子更為書賜公子扶蘇䝉恬以罪賜死胡亥襲位為二世皇帝趙高為郎中令任用事二世乃遵用高申法令關東盡畔二世使使責讓高高懼乃隂與其壻閻樂謀誅二世二世自殺而卒亡之者皆其不虞之厮𨽻戍卒也見上注高帝定天下亦惟韓彭黥布易動而難蓄二人死宜於果無事者而祿産之孱弱幾盜天下高后臨朝稱制乃立兄子呂台産祿台子通四人為王封諸呂六人為列侯八年太尉勃丞相平誅諸呂孰謂秦漢之盛而忌此族哉由是觀之患不在於縱敵而多殺無益於弭冦故先王無盡敵之術而有無敵之仁非其佚冦之為虞而惟速冦之為懼蓋以吾為致力焉於此足矣而掩詐以墮讎而幸其不吾釁則亦不敢知也抑嘗觀書至於周公之命微子乃曰洪乃烈祖萬邦作式且以新造之周待未盡亡之商而侯其賢子則錮之之辭隄防之具也宜悉而周公勸之以祖若不屑於留天下而欲其復商之舊云者至於所畏則無告窮民而其勢不能患乎上者嗚呼周公可謂知所畏矣彼范增者滋羽之暴徒欲斃漢於一擊吾恐項氏之憂不在沛公而在肘腋之間也項羽吳王濞此篇論二人利小無所就天下之大利非利於小者能圖之也圖天下而利於其小則終不足以有就何者所安者陋焉能及逺見其食而貪焉是不過飽其欲則已矣昔黥布崛起淮南薛公遂揣其必無上計布以論輸驪山驪山之徒數十萬人布與其徒長交通乃率其曹耦亡之江中為羣盜歸漢立為淮南王後發兵反上召諸侯問布反為之奈何滕公問其客薛公薛公曰是固當反上乃問薛公對曰使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而卧矣上曰云云何謂下計東取吳西取下蔡歸重於越身歸長沙漢無事矣上曰是計安出薛公曰出下計上曰胡為廢上計薛公曰布故驪山之徒也致萬乘之王此皆為身不顧後為百姓萬世慮者也故出下計上曰善遂發兵自將擊布果如薛公揣之高帝一見陳豨决知其為易與漢十年代相國陳豨仄上自至邯鄲喜曰豨不南據邯鄲而阻漳水吾知其亡能為者蓋以布驪山之徒必甘心於長沙而無後慮豨不能守邯鄲而負漳水其志固已狹矣姦雄盜賊之所不得志於天下其惟利於小而害之也哉故項羽捐關中之勝而榮於歸故鄉之楚羽屠咸陽殺秦王子嬰燒其宫室秦民失望韓生說羽曰關中阻山帶河四塞之地肥饒可都以伯羽見秦皆以燒殘又懷思東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生吳王濞不趍洛陽用武之地而豢於食梁以厚其資吳王之初發也吳少將桓將軍說王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣王不用其計君子已知其不能西矣人皆咎羽却韓生之謀吳有桓將軍不能用以愚觀之二子之計行亦僅足紆吳項之死而已鳥能使之得志乎以羽之淺中其易盈也如此豈復有王者之量設得全關而居之亦不保其躑躅而東也以濞之冒於一逞而急於徇地之利雖至洛陽亦豈能安食敖倉之粟以徐應漢軍之懈哉猶將疾馳而嘗試之矣鳴呼羽日躍而東濞以其鋭疾馳而嘗試之是豈足以當高帝百戰百敗之忍撓條侯堅壁之守哉不失之彼則失之此利於其小而克有就者未之聞也昔重耳之亡至齊而遽安從者力以為不可僖二十三年晉公子重耳之及於難遂奔及齊齊恆公妻之有馬二十乘公子安之從者以為不可姜氏謂公子曰子有四方之志公子曰無之姜曰行也懷與安實敗名公子不可姜與子犯謀醉而遣之劉季入秦一無所貪范增已信其有大志沛公已定鬬中亞父范增說羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為龍成五色此天子氣急擊之勿失自古覘人之成敗者其說蓋如此范增此篇論勸羽疾攻恣殺高祖畏范增幾為所禍者數也范氏在豈真足以帝楚者哉君臣之間非其相濟不足之患而惟其相正以裁其過之難項氏之斃惟其暴也力罷於亟戰勇衰於屢逞而恩信失於好殺是皆羽之所以取亡而增也又佐而决之猶御奔馬且疾鞭馬汗而不知止以速其逺至焉有不敗者哉是故亞父未去楚亡兆矣何者其鋭略盡則其末固易與也蓋嘗論之羽雖悍戾猶有可感而入者欲坑外黃而愧於舍人兒之一言史記項王紀云欲烹太公而悟於項伯之微諫前項羽傳則戮子嬰賊義帝斬韓生坑秦二十萬衆見史記及前項羽傳亞夫獨不可嘗試曉之耶不惟不曉羽意者增實教之也觀其始末勸羽自急攻之外無異策見前項羽論注是所謂火濟火也始增之計一行而楚果亡漢則羽又一秦也增又一商鞅也天下豈能久安楚也哉管仲相桓公桓公好內而管仲亦三歸語管仲有三歸桓公死五公子爭立齊亂者纍世左僖十七年齊侯好內多內寵內嬖如夫人者六人長衛姬生武孟少姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋君子曰齊之亂管仲為之也仲不約公以禮而滋其淫君子咎以亂齊况增怒羽而虐其民則弊楚之咎非增而誰鄢陵之役范文子不欲戰蓋憂厲公之侈將以全晉也左成十六年晉楚遇於鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命郯之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂蓋釋楚以為外懼乎高帝之所以勝亦蕭何留侯全之而已其遷於南鄭與淮隂自王帝有所不能忍者向微二子幾以怒敗元年羽自立為西楚霸王都彭城背約更立沛公為漢王于巴蜀漢中四十一縣都南鄭漢王怨羽之背約欲攻之丞相蕭何諫乃止餘見前韓信論注而增則欲疾攻恣殺以就栗悍之項羽豈所以全羽者乎色氣盛於年少而志量淺於更事之不多增以垂老謀楚而暴不減籍若其尚壯殆將尢焉嗚呼是雖高帝之所畏吾意蕭相國留侯未嘗不笑其踈而墮於其畫也哉張耳陳餘酈食其此篇論立六國後圖天下者自有天下之勢書生之論不知也圖天下而守書生之論不敗事者寡矣昔者秦之趍亡陳吳劉項之徒崛起荆棘以匹夫爭天下無隻民塊土以為之階其勢非可以仁義為也故惟急攻而疾戰寸攘而尺取世謂十夫逐鹿一夫得鹿九人拱手倚人以為外援則不足以自固矣而陳餘張耳以立六國之說薦之楚涉以弱秦陳涉起蘄至陳耳餘上謁涉涉見耳餘大喜雨人曰願將軍急引兵而西遣人立六國後自為樹黨如此野無交兵誅暴秦據咸陽以令諸侯則帝業成矣涉不聽酈生亦以其謀用之漢高以橈楚漢三年項羽數侵奪漢甬道漢軍乏食與酈食其謀橈楚權食其欲立六國後以樹黨漢王刻印將遣食其立之以問張良良發八難漢王輟飯吐哺曰豎儒幾敗乃公事令趣銷印吁書生之陋如此哉夫六國之君亟用其民而魚肉之卒不能守一折而入虎狼之秦天下之苦六國者不減秦也知秦之可亡而不知六國之不可復其術固已疏矣况夫六國之後而能信其民果不為陳劉之憂也哉盜主人之金而寄諸其鄰責其不吾歸不可也以匹夫謀人之天下而又借助於人是更生一敵也以項氏之强掌握土宇裂置諸將而王之不保其不叛楚天下既定漢髙帝刑白馬以封功臣恩甚渥也高惠高后文功臣表封爵之誓曰使黃河如帶泰山若厲國以永存爰及苖裔於是申以丹書之信重以白馬之盟注刑白馬歃其血以為盟也然環視而爭衡者沒高帝之齒而不絶孰謂搶攘之際憑之以掎角而能使之不吾敵耶嗚呼將以仆敵反以滋敵此書生之論圖天下者不為也張良此篇論招四皓以立太子夫人惟有所愛也而後有所溺方其溺於所愛而視天下無以易此也是以不可奪則有天下之所可愛者而甚於其所溺者以動之亦將忘其中而忽變其初何者所樂則大於彼也昔者陳子車死其妻與其家臣謀以殉葬定而後告陳子亢子亢曰彼疾固當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者為之也於是弗果用記檀弓云且其所以謀殉葬者愛其夫與主也而不免以身為之愛其夫與主豈甚於愛其身哉夫惟其愛夫與主也而不暇言禮則與之辨理之是非而必亡以禁夫惟其愛身者尤甚於愛夫與主也則與之以不死之利之勢將至於自沮是故人情之偏可以利誘而不可以理劫嗚呼彼其偏於情也豈不知夫越理也而不能自勝是以冒為之而於人之議也弗顧以姑快其欲而曉人者持區區之理以厭服之無惑乎攻之而愈堅却之而愈戾也高帝之立如意也唯愛而已矣愛之入於內也固則視嫡庶之說末焉爾雖然以高帝愛戚氏豈能愈於愛漢耶且其始也以為如意之賢足以嗣其位而惠帝之弱不足以堪是以有廢立之謀蓋其謀生於為天下之公而成於女子之私於此也非有天下樂於歸惠帝而弗順於如意之已形觀之而折之以其末爾之說求攻其既固之心則亦甚踈是故叔孫通之徒力爭而不可得四皓一侍太子以安上欲廢太子立戚夫人子趙王如意大臣多爭未能得堅决也呂后恐乃使呂澤劫良良曰今天下安定以愛欲易太子骨肉之間此難以口舌爭也顧上有所不能致者四人四人年老皆以上嫚娒士故逃匿山中義不為漢臣然上高此四人今公誠能令太子為書使辨士固請宜來來以為客時從入朝令上見之則一助也呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客呂澤所十二年上疾益甚愈欲易太子良諫不聽叔孫太傳稱說引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子上怪問之何為者四人前對各言其姓名上驚曰吾求公則避逃我今何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人趍去上召戚夫人指示曰我欲易之彼四人為之輔羽翼已成難動矣上起去罷酒竟不易太子者良本招四人之力也嗚呼委之以不爭之便而示其利於無意之地若留侯者亦巧於悟人也矣趙欲以長安君質齊太后不可大臣强諫太后益怒左師觸龍以王趙之福一說而行夫以質齊之辱而可以博王趙之福則雖婦人猶忍小以就大史趙世家孝成王元年太后用事秦急攻之趙氏求救於齊曰必以長安君為質兵乃出太后不肯大臣强諫太后不聽左師觸龍見太后曰老臣以為媪之愛燕后賢於長安君太后泣曰不若長安君之甚左師公曰媪之送燕后也為之哀祭祀則祝之曰必勿使反豈非計長久為子孫相繼為王也哉太后曰然左師公曰今媪尊長安君乏位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君之計短也故以為愛之不若燕后太后曰諾於是長安君質於齊齊兵乃出云云彼高帝以艱難辛苦僅得之天下而其人安於太子亦必不肯棄天下之所安而付之於其所嬖而不保其不危故曰留侯可謂巧於悟其君者矣陳平此篇論取其謀而不取其行古之君子正矣而不固譎矣而不詐故宜其粹然者甚嚴而不亂而亦或曲而通焉以濟其所遭之窮昔者嘗怪陽虎以瞰亡歸孔子豚夫子亦瞰亡而往拜之且詭道以要見虎之賤為也而聖人襲其為而報之以其意則無乃害吾誠者陽貨欲見孔子孔子不見歸孔子豚孔子時其往也而往拜之遇諸塗伯高之喪冉有攝束帛乘馬以將之孔子曰是使我不誠於伯高記檀弓上云愧弗躬也而聖人於此則奚為而弗愧蓋彼以詭要吾以誠報則是小人之智中也凡小人之中則君子之危也夫子以聖聞魯而虎得以中則小人之心謂君子可以巧致而天下之竒禍則必自此集矣是故掩吾之不意者不可以情往劫吾之所必至者不可以真遂雖孔子亦有之而非所以害道則亦正與譎並行而後可以濟天下之事也歟嘗觀管仲晏子皆齊之賢大夫也管仲近譎晏子近正而晏子之功卒不大於管仲何者謹守者拙於謀而多變者善適機㑹也後之君子道散而學不明有才者趨利而恥於為非者過拙是以士之正者不過廉畏而介潔而其譎者則入於桀猾姦雄而不可御夫惟廉畏而介潔故居天下之名而不可與成功而桀猾姦雄故雖足以成天下之功而又不可與有守昔者嘗聞楚漢之際天下之人廉潔好禮者歸項頑鈍無恥者歸劉高帝收屠販之徒卒以滅楚而項羽所謂骨鯁臣往往誅斥當是時田橫有死士五百人而亦無救於亡漢滅項籍為皇帝田橫懼誅與其徒屬五百餘人入海居島中高帝使使赦橫而召之橫至自剄五百人在海中亦皆自殺魏無知薦陳平則曰取其竒謀而不取其行平降漢因魏無知求見漢王漢王與語而說之拜為都尉使參乘典護軍絳灌等或讒平曰平雖美丈夫如冠玉耳其中未必有也聞居家時盜其嫂事魏王不容亡而歸楚歸楚不中又亡歸漢今大王尊官之令護軍聞使諸將全多者得善處少者得惡處反覆亂臣也漢王疑之以讓無知無知曰臣之所言者能也陛下所問者行也今楚漢相距臣進竒謀之士顧其計誠足以利國家耳盜嫂受金又安足疑乎漢王乃拜以為護軍中尉其後楚急擊絶漢甬道圍漢王於滎陽漢王患之謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之廉節好禮者多歸之至於行功賞爵邑重之士亦以此不附今大王嫚而少禮士之廉節者不來然大王能饒人以爵邑士頑頓嗜利無恥者亦多歸漢顧楚有可亂者彼項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黃金四萬斤豫平平多以金縱反間於楚軍項王果大疑亞父亞父怒發病死嗚呼彼惟其廉潔好禮也則間之而易踈攻之而易窮而此得以頑頓無恥者徐伺竊應以乘其隙是以楚亡而漢興然而天下已定叛者四起必屠戮殆盡然後無事然則楚之士蓋不足與成功而漢之士亦非所以守天下者哉世之君子欲以楚之亡而收漢之利固踈矣而懲楚之失專於用漢之士者亦異日之憂也韓信此篇論不納武涉蒯通之說世之君子蓋有忠而被戮者矣然未必皆其不察者之罪而或者亦自取也夫可疑之形見則徒信不足以自孚相忌之隙開則徒廉不足以自潔是故君子之善處此也必先有以固人之心以自固其身魯隱之欲遜於桓也公子翬諂於隱曰將為子殺桓而終立隱公不聽翬卒譛於桓而弒隱左隱十年羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營菟裘吾將老焉羽父懼反譛公于桓公而請殺之羽父使賊弒公而立桓公悲夫隱有遜國之心而不能免者亦其斷不足而無以自固也矣夫已與聞其邪說拒之而貰之雖翬不譛則桓亦不能安於隱何者彼固有無君之心而動於桓而隱之不誅則是縱桓之賊也攝桓之位而又縱其賊而不治豈所以固桓之心也哉使隱而正子翬之誅則桓將義隱之為雖有他諫不能入矣故夫君子必有所公以成其私者謂此類歟韓信不納武涉蒯通之說其忠於漢也甚矣已而卒執於高祖天下悲之然信有以來之也信之王齊也豈不知夫高帝之情而出於强勉而獨以堅漢耶信平齊使人言漢王曰請自立為假王漢王大怒張良陳平曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守漢王亦寤遣張良立信為齊王徵其兵使擊楚楚以亡龍且項王恐使武涉往說信曰足下何不反漢與楚足下雖自以與漢王為金石交然終為漢王所禽矣何不三分天下而王齊今釋此時自必於漢王以擊楚智者固若此耶信謝曰漢王親信我背之不祥武涉已去蒯通知天下權在於信深說以三分天下之計信不忍背漢又自以為功大漢王不奪我齊遂不聽項羽死徙信為楚王羽將鍾離昧素與信善亡歸信漢詔信捕之信初之國行縣邑陳兵出入有變告信欲反上患之用陳平謀僞游於雲夢欲襲信信謁於陳高祖令武士縳信載後車信曰果若人言遂械信至雒陽赦為淮隂侯信知漢王畏惡其能稱疾不朝從由此日怨望居常鞅鞅其舍人弟上書變告信欲反狀於呂后呂后使武士縳信斬之長樂鐘室信方斬曰吾不用蒯通計反為女子所詐豈非天哉遂夷三族武涉蒯通之說信之計可以施矣公愜天下之議而私不失為一已之謀者二子之計也而信失之嗚呼其卒為漢擒也宜哉或曰雲夢之會信嘗斬鍾離昧以說矣而卒不解則亦徒為是忍也見上注是不然疑甚而隙大亦已晚矣惜也此計不行於二子也韓信二此篇論高祖不能保全之君臣之際非惟下之人有以自全而上之人亦有以全之者也大凡反側生於猜嫌而離隙開於讒慝之口當是時也取之則危捨之則亂故其道莫若全之以固其心是故有所曲而豫之也以竟其歡有所寬而示之也以弛其忌陽浮而厚之而隂奪其所欲是所謂借信以室疑緣公以敗私雖古之君子亦不廢昔者秦穆公赦食馬者三百人而又飲之酒韓之戰出穆公於難者皆盜馬者也史記秦紀晉擊繆公繆公傷於是岐下食善馬者三百人馳冒晉君晉君解圍遂脫繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之公曰君子不以畜産害人吾聞食善馬肉不飫酒傷人乃皆賜酒而赦之三百人者閒秦擊晉皆求從從而見繆公窘亦皆摧鋒爭死以報食馬之德子孔為載書而國人弗順將誅之子産焚書而鄭衆以定左襄十年子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆犯怒而焚之是衆為政也國不亦難乎子産曰衆欲難専欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎乃焚書於倉門之外衆而後定夫盜不可縱也而飲之以滋惡書以治衆也而焚之則政替然則秦鄭賴焉何也蓋負不宥之罪者遭非意之幸藴欲逞之怒者獲不爭之便此固人情之所因以死也由此觀之欲全夫人也如此而况於岐下之盜而其罪未彰於鄭之誅子孔者哉而况於天下之大臣也哉吾觀高帝諸將其方介可以義間厚潔可以禮固者獨韓信一人也而帝莫之全卒以戮死悲夫信有以取之而帝亦若無賴子之為者君子是以閔信而甚漢高也見前篇注且使或者之告信也帝縶告者以歸誠於信信烈人也吾見其愧死矣而何至於詐計以襲信而使之自危然則帝之心亦無信久矣或曰彼訴信者忠漢也帝而戮之無乃墮黨而崇讎此景帝所以僇夫朝錯也景帝即位錯為御史大夫請諸侯之罪過削其支郡後吳楚七國俱反以誅錯為名爰盎曰方今計獨有斬錯發使赦吳楚七國復其故地則兵可毌血刃而俱罷上曰可乃斬錯東市錯已死上問曰吳楚罷不鄧公曰錯尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也錯徒死而吳楚不弭則訴者徒縶而信亦必逆嗚呼是未達乎輕重之權投鼠忌器而愛牛者摶其虻賈誼疏里諺曰欲投鼠而忌器此善諭也宋義曰摶牛之虻不可以破蝨何則小固不可害大也欲以全信則何愛於一人况信之反未有形而七國之兵已西向告信者未必不誣而錯則朝廷之謀主也却告之誣以安未反之大將孰與誅朝廷之謀主以說叛國哉孟子曰為政不難不得罪於巨室傳曰從政者有所反焉以取媚左昭七年子産曰從政有所反之以取媚也不媚不信不信民不從也夫得罪於巨室者以其昵乎小也欲不得罪於巨室則亦有所不愛於其小以安其大是故反焉以取媚者以安大也吁將以安大也雖媚可也而何必行詐以危諸將之心乎韓信黥布此篇論布不如信世之所謂英雄豪傑之士不於其履常居易者見之也臨之以無故之辱而不怒加之以非望之寵而不驚然後可以見天下之英雄豪傑矣大凡立天下之大功非安於天下之大變者不能也士而能安天下之大變視之若無則天下有不足辨者矣何者履坦塗而遇猛獸不能不失色而却走無因而見夜光之璧鮮不按劒而顧天下之事惟出於人之所不虞者易以亂人也揚子雲之寂寞也一懼而投閣莽誅甄豐父子辭連及雄使收不請時雄校書天祿閣上治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死有詔勿問京師為之語曰惟寂寞自投閣謝安之閒暇也一喜而折屐晉謝安傳苻堅次于淮肥𤣥入問計安夷然無懼色答曰已别有旨𤣥不敢復言乃令張𤣥重請安遂命駕出山墅親朋畢集𤣥等既破堅有驛書至安方對客圍棊看書既竟便攝放牀上了無喜色棊如故客問之徐答云小兒輩遂已破賊既罷還內過户限心喜甚不覺屐齒之折其矯情鎮物如何人之處事不於其卒然之頃者覘之亦何以見其守哉世多言韓信黥布同功一體豫觀布之歸漢一不如意則大恨一溢所望則大喜布與隨何歸漢至漢王方踞牀洗足召布入見布大怒悔來欲自殺出就舍張御食飲從官如漢王居布又大喜過望立為淮南王後反薛公曰是固當反前年殺彭越往年殺韓信三人皆同功一體之人也自疑禍及身故反耳而信以寄食之貧跨下之辱連敖治粟之不遇一擢而拜為登壇之將受之而不盈居之而不靦雍容暇豫决楚漢之雌雄於談笑間信家貧無行常從人寄食淮隂衆辱信曰能死刺我不能出跨下信熟視俯出跨下一市皆笑信以為怯及項梁度淮信乃從之梁敗又屬羽為郎中數以䇿干羽羽弗用亡楚歸漢未得知名為連敖滕公言於漢王漢王以為治粟都尉上未之竒也數與蕭何語何竒之至南鄭信亡何追之何來謁上曰諸將亡者公無所追追信詐也何曰諸將易得至如信國士無雙王必欲爭天下非信無可與計事者能用信信必留王曰吾為公以為將何曰雖為將不留以為大將何曰王素嫚無禮今拜大將如召小兒此信所以去也玉必欲拜之擇日齊戒設壇場具禮乃可王許之信已拜上坐王曰將軍何以教寡人計䇿信曰云云漢王大喜嗚呼布之所以止於布而信之與三傑之列者此也土曰子房蕭何韓信三者皆人傑吾能用之布豈信之匹彚儔伍耶十先生奧論注續集卷九
