body:
  text: 十先生奥論註續集巻十三治道論葉適士學此篇論古者取士必先養士天下之物養之者必取之養其山者必材養其澤者必漁其養之者備則其所取者多其養之者久則其得之也精夫其所以養之者固其所以為取也古者將欲取士而用之則必先養之故族黨州鄉皆為之學禮記學記古之教者家有塾黨有庠術有序國有學又前食貨志云里有序而鄉有庠序以明教庠以行禮而視化焉在諸侯者達於國學在天子者達於太學其在諸侯之學者必達於天子之學性有仁義聖智之本行有中和孝友之實周禮大司徒以鄉三物教萬民而賓興之一曰六德知仁聖義中和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數云云教有歌舞進退之容誦有詩書禮樂之文其為術也備而詳故其取之也必得其雋異之甚者夫必待之以卿相而養之既若此矣其後世衰不復取士而養之之術壊至於兩漢有急士之心不暇于養而遽取之多為之科目以待其來者文帝紀詔舉賢良方正能直言極諌者十二年設孝弟力田之科又孝武紀舉賢良方正能直諌之士召吏民有明當世之務明先聖之術者縣次給食令與計偕又東方朔傳武帝初即位詔天下舉方正賢良文學材力之士待以不次之位四方多上書言得失自鬻者以千數其所不足采者輒報罷其所選拔有不暫而為卿相於是天下之士始去本忘實争為其名以應之雖其所以得之者猶有所取之而視三代則已陋矣後世習見其事始以不養而取者為士之常故人材衰薄乃不足以庶幾於兩漢嗟夫豈三代之士獨賢哉然獨未至如今之世既養而不取雖取而不養而其養之也常於其所不取其取之也常於其所不養事具而其法不舉兩異而莫適為用此亦執事大臣因循之過也今三嵗詔舉進士州以名聞者數千萬人禮部奏之而天子親為之發策於庭去為州縣吏者數百人而與大政當國論者取焉侍從人主之左右者取焉諌諍彈擊者取焉有不暫而遂至者焉然其在髙等者天下多以其詞藝為不當得而况乎其人憃騃浮躁鄉里之無行者巍然躐處於其上朝廷既已取之雖知其不可而亦不敢較則取而不養此天下之所共知而莫能革者也今州縣自嶺海莫不有學宫室餼廪書籍器用無所不具來學者誦讀之聲嵗月不息州必有師而教之其禮甚優其職甚専而又月第其進否時定其去留不知三代之學亦何以異此然而取士之法無考察之意學官與諸生汎汎焉不相知名無教無勸幸其嵗滿則掉臂而去既去若素所不至者盖一官司耳嗚呼四五十年矣則養而不取此亦方今之所未知也能勿為之計乎夫科舉之患極矣何者昔日専用詞賦摘裂破碎口耳之學而無得於心此不足以知經耳使其知之則超然有異於衆而可用故昔日之患小今天下之士雖五尺童子董仲舒仲尼之門五尺之童羞稱五霸無不自謂知經傳寫誦習坐論聖賢其髙者談天人語性命以為堯舜周孔之道技盡於此彫琢刻畫侮玩先王之法言反甚於詞賦南方之薄者工巧而先造少北之樸士屈意而願學衆說潰亂茫然而莫得其要人文乖繆大義不明無甚於此而智者曽不察歟噫其過在於不養耳昔之養士誠難為也州縣無學無師無餼廪器用其創之也勞今皆具矣加之以法度則一日而定矣法度不立而學為無用凡今之士惟其稚而未成貧而無食者乃肯入學惟其昏眊不才貪鄙而無節行者乃皆聚於學其有罪而不受罰者乃求籍於學故凡茂異秀傑之士以不至於學為髙其有在者則必共指以為無恥而皆以為諺故其養之常於其所不取而取之常於其所不得養然則今之學校乃為棄材之地乎噫三代之王獨何以取天下之士而使之皆由於學哉夫折今之取士而入於學可也因今之學而後取士亦可也且三嵗所官數百人而天下之士常有不遇之歎何者其一日而至者不足以厭服天下也忠信孝悌必修於家必聞於鄉前漢孝宣帝紀地節三年詔郡國舉孝悌有行仁義聞於鄉里者各一人材智賢能必見於事必推於友舉其茂異秀傑者前漢孝宣帝紀元康四年詔舉茂才異倫之士孝元帝紀詔舉茂材異等云云畢至而務養其心以稍息其多言然後少變今之意而足以取之則先王之道庶乎可復矣夫禮義廉恥管子禮義廉恥為四維惟上所厲故士得以自重今天下囂囂然養之而不以道而上不免有嫚士厭儒之心譬猶父母不素教子一旦以其不肖而欲盡棄其所愛尤不可之大者也士風此篇論後世養士不以道昔者論大雅之詩至於官人用吉士之際詩棫樸文王能官人也又巻阿詩召康公戒成王也言求賢用吉士也而其詞曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜並棫樸詩全句又曰有巻者阿飄風自南巻阿有巻者阿飄風自南豈弟君子來游來歌盖喟然而嘆曰周之為國至矣哉天下之人才不能無異而不能皆賢此天地之理而易之所著於隂陽消長之際者也其間盖亦有背公異趣奉已而後其君者矣周之先王知其為國之要在於士也是以巻曲虚下而能容受之其歌頌之所稱追琢磨勵之功棫樸詩追琢其章金玉其相勉勉我王綱紀四方論選汲用之法巻阿詩叙見上段注博大光美而無窘曲不滿之意方其盛時郊天祀地祼將簠簋駕乘有旗旌和鑾之節被服有雲龍藻火之章修其仁義禮樂之序而節廉退遜之風雍容洋溢於天下然後無一事之為非一民之不肖矣至戰國而衰至秦而亡自是以來諸夏之無統者屢矣世方以功利為急雜霸為要而參考推見間有表章而尊好之則其一時之用亦必有可觀者何者君臣父子三綱君為臣之綱父為子之綱夫為婦之綱五常君臣父子夫婦兄弟朋友五者固士之所由出也其上者可以為聖其下亦知義矣而天地有不正乎共惟我宋肇基立本獨求此意於數千百年廢絶之後而固守之兵民雖分文武雖異而要官重權與凡為治之大體無不一出於士者當其時士亦未必能盡知大雅之所謂者也植黨者有焉好名者有焉空談無用者有焉而吾祖宗容之養之禮之任之不數且不惡也其道殆與周之先王均矣是以天下之士翕然並進庶幾於三代而過絶於漢唐至於明見性命之學扶持人紀之具是皆與國家相持於無窮者也嗚呼使下雖不能無不善之士而其上亦不使之有不善之名亦可以為至矣今天下之士不幸而並見其不善者孰為之始也十年於此矣明聖卓然獨運天下反觀而深思固守而不變則為士者不獨知所自持而亦可以自媿矣且改節而俟採擇焉其猶有及乎士風此篇論士大夫當自貴重士大夫之自知貴重而不待夫立法以繩之則天下之風俗善矣人徒見夫風俗之未善必曰法制之未立也法制固人之所不可廢而士大夫㓜學壯行者孟子夫人㓜而學之壯而欲行之果何事抱負所有以自見於一世者果何術而必待上之人肆而成之耶詩肆成人有徳小人有造夫富貴利慾人孰無是心也爵禄名器人主所以奔走天下之權也竊其所可慾羡其所可樂翕然而趍之是孰使之然哉要之上所以鼓舞天下之心不得不然而我之所以自待者不容以自輕伊尹處於畎畆之中而樂堯舜之道其君民之亊業非聘幣之勤伊尹終不輕其所就也並孟萬章上云云二疎父子辭榮出闗時人莫不榮之前疎廣父子並為師傅朝廷以為榮在位五嵗廣謂受曰吾聞知足不辱今仕宦至二千石官成名立豈如父子相辭出闗歸老故鄉以夀終不亦善乎遂上疏乞骸骨上皆許公卿大夫故人邑子設祖供帳東都門外送者車數百兩道觀者皆曰賢哉二大夫不為斗米折腰而甘心三徑之適此元亮之所以不流於世俗也晉陶潛傳潛字元亮素簡貴不以私事上官郡遣督郵至縣吏白應束帯見之潛歎曰吾不能為五斗米折腰事鄉里小人遂解印去縣乃賦歸去來云三徑就荒松菊猶存一時風俗為若人而振起之則浮躁之習亦少瘳彼眷眷於鳯池之榮晉荀朂守尚書令初在中書專管機事及失之甚憫悵或有賀之者朂曰奪我鳯凰池諸君賀我耶云云而歆羨夫登瀛之盛者獨何心哉褚亮傳太宗作文學館収聘賢士以杜如晦等並以本官為學士凡三畨逓宿閤下毎暇日訪以政事命閻立本圖象使褚亮為之賛題名字爵里號十八學士方是時在選中者天下所慕向謂之登瀛州夫聚金玉於堂而聽令自取人能安其分之所當得則物與我不相及矣苟有人焉奮然而先之則紛紛乎其後者將不可遏於是執敲朴以杜其來計已晚矣由此觀之則風俗之弊豈無所自來哉昔司馬公辭樞宻使而不受迫之而後進中國夷狄以相為幸而天下之士亦有我後子先時不可失之嘆范蜀公南宫首選於殿試法當自陳而公毅然不以為意其安恬自守頴出於流俗之中士大夫而皆若人也士風寧不為之有變乎然則抑士大夫風俗之貪躁當有以養天下恬退之心若夫趨事赴功以求自効於時者則固上之人所望也自夫利達之意勝其功名之心是以厭薄不失也上之人至於厲法禁以禁戢之豈士大夫之美事乎寛恤此篇論上以仁義為心下以正君為義孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣孟子離娄下全句盖上以仁義為心下以正君為義則天下之民被潤澤䝉休徳而唐虞三代之盛治皆可考而無疑聖上臨御富安海宇君臣之道猶在責難同上責難於君謂之恭陳善閉邪謂之敬仁義之意施於政事者至矣不可悉數也比者郊祀常典克舉彌文而近臣請禁刺史州縣毌得於名籍之外有所求取以為貢舉詔既許之矣又以往嵗郤羨錢為緡數十萬償其州之賦入也請申前事以戒天下詔許之而江漢之舟駕空航以輸征筭者謂之力勝復用奏請俾得蠲免詔又許之若是者豈非上之所以為仁義而下之所以正其君者乎隨奏即從屢請不厭曾未終月三善繼之嗚呼雖堯舜三代之君臣其何以過此哉當今之患末利盛而本業微取已盡而用不給臣工奔走爭以聚斂為先務而公私罄竭不能一朝安其故安在天下之民愁苦無告猶不為被潤澤䝉休徳也何哉將意已善而實未孚抑法有弊而勢難革或言於此者未察於彼豈先其小者姑緩其大且下有未正而上無不從推廣仁義之意而施實徳於民庶㡬復見什一之法孟滕文公夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也闗譏不征澤梁無禁孟梁恵王昔者文王之治岐也耕者九一仕者世禄闗市譏而不征澤梁無禁罪人不孥云云農樂在野民欲出途梁恵王下今王發政施仁使天下仕者皆欲立於王之朝耕者皆欲耕於王之野商賈皆欲藏於王之市行旅皆欲出於王之塗以追唐虞三代之盛治在於斯時矣其深意博考以俟詢擇君子小人此篇論君子小人相安不求勝則治君子小人之際易泰卦君子道長小人道消也否卦小人道長君子道消也甚矣其難言歟為君子之意常欲使國無小人而後天下治天下其可以無小人歟小人之於君子亦必若是矣君子之疾小人也甚小人之怨君子也深此固禍患之所從來矣嗟夫其亦何以合之歟誠使君子知小人之情而不以已之所長形其非小人樂君子之名而不敢出其不肖以與之較君子小人相安而不求勝於天下其亦可以治歟易於泰之九二曰包荒用馮河不遐遺朋亡王弼注體健居中而用泰能包含荒穢受納馮河者也用心𢎞大無遐棄故曰不遐遺也無私無偏存乎光大故曰朋亡也而否之九四有命無咎疇離祉王弼注云夫處否而不可以有命者以所應者小人也有圖於小人則消君子之道者也今初至在君處乎窮下故可以有命無咎而疇麗福也疇謂初也盖易以君子為主其否泰之時猶在於維持而安全之然則何獨不加察於此乎今國家尊名以厲俗養望以隆賢四五十年以來雖未至於甄叙清明内外不離然而小人樂君子之名而不敢較此則天下之所恃以為治也夫天下治亂其權在君子而釁兆之相尋氣燄之相乗亦可畏矣若夫漢有黨錮東漢黨錮傳序凡黨事始自甘陵汝南成於李膺張儉海内塗炭三十餘年諸所蔓衍皆天下善士三君八俊等三十五人其名迹存者並載乎篇陳蕃竇武王暢劉表度尚郭林宗則有傳荀昱附祖淑傳張邈附吕布傳胡母班附袁紹傳王考字文祖東平夀張人兾州刺史秦周字平王陳留平丘人北海相蕃嚮字嘉景魯國人郎中王璋字伯儀東萊曲城人少府卿位行並不顯翟超山陽太守事在陳蕃傳字及郡縣未詳朱寓沛人與杜密等俱死獄中唯趙典名見而已厥咎何由唐世朋黨通鑑唐順宗以失音不能決事常居深宫施簾惟獨宦官李忠信昭容牛氏侍左右百官奏事自惟中可其奏大抵計事王叔文依王伾伾依李忠信忠信依牛昭容轉相結交毎事先下翰林使叔文可否然後宣於中書韋執誼承而行之外黨則韓泰栁宗元劉禹錫等主采聼外事謀議唱和日夜伋伋如狂互相推奬曰伊曰周曰管曰葛􅍀然自得謂天下無人榮辱進退生於造次惟其所欲不拘程式士大夫畏之道路側目又唐李徳裕傳武宗召知平章事既入謝即進戒帝辨邪正專委任而後朝廷治臣嘗為先帝言之不見用夫正人既呼小人為邪小人亦謂正人為邪何以辨之請借邪為喻松栢之為木孤生勁特無所因倚蘿蔦則不然弱不能立必附它木故正人一心事君無待於助邪小人必更為黨以相蔽欺君人者以是辨之則無惑矣致患何始消弭防範豈無其道激作鬬鬩抑又甚焉所謂維持安全以為天下國家之慮而不恵其身以私其徒者又將誰属歟則可不思其故乎錢弊楮劵此篇論楮行而錢必少天下以錢為患二十年矣百物皆所以為貨而錢并制其權前食貨志凡貨金錢布帛之用夏殷以前其詳靡記至太公為周立九府圜法黄金方寸而重一斤錢圜函方輕重以銖布帛廣三尺為幅長四丈為匹故貨寳於金利於刀流於泉布於布束於帛錢有輕重大小又自以相制而資其所不及盖三錢並行相制之術盡矣而猶不足至於造楮以權之凢今之所謂錢者反聽命於楮楮行而錢益少此今之同患而不能救者也夫率意而戲造猥以補一時之缺遂貽後曰之憂大都市肆四方所集不復有金錢之用盡以楮相貿易擔囊而趨勝一夫之力輒為錢數百萬行旅之至於都者皆輕出他貨以售楮天下隂相折兊不可勝計故凡今之弊豈惟使錢益少而他貨亦并乏矣設法以消天下之利孰甚於此興利之臣苟欲必行知模刻之易而不知其為盡錢之難十年之後四方之錢亦藏而不用矣將交執空劵皇皇焉而無所從得此豈非天下之大憂乎夫見其有因謂之有見其無而因謂之無者此常人之識爾所貴於智者推其有無之所自來不反手而可以除其患且今之所謂錢乏者豈誠乏耶上無以為用邪下無以為市耶是不然也天下之所以竭誠而獻者有二議有防錢之禁有羨錢之術夫南出於夷北出於塞中又自毁於器用盜鑄者雖殽雜而能増之為器者日損之而莫知也此其禁患於不宻也是誠可宻也若夫羨錢之術則鼓鑄而已矣雖然盡鼓鑄所得何足以羨天下之錢且天地之産東南之銅或暫息而未復雖有咸陽孔僅之巧何以致之同上建元以來用少縣官往往即多銅山而鑄錢亦盜鑄不可勝數云云於是以東郭咸陽孔僅為大司農丞領鹽鐵事而桑𢎞羊貴幸咸陽齊之大鬻鹽孔僅南陽大冶皆置産累千金噫不知夫造楮之弊驅天下之錢内積於府庫外藏於富室而欲以禁錢鼓鑄益之耶且錢之所以上下尊之其權盡重於百物者為其能通百物之用也積而不發則無異於一物銅性融液月鑠嵗化其朘天下之寳亦已多矣夫徒知錢之不可以不積而不知其障固而不流徒知積之不可以不多而不知其已聚者之不㪚役楮於外以代其勞而天下有坐鎮莫移之錢此豈智者之所為哉豈其思慮之有未及哉故臣以謂推其有無之所自來不反手而可以除其患者也雖然壅天下之錢非上下之所欲也用楮之勢至於此也賫行者有千倍之輕兊鬻者有什一之獲則楮在而錢亡楮尊而錢賤者固其勢也貴莫如珠玉賤莫如泥沙至錢而平矣先王之用幣也錢居其一而後世之用錢也它幣至於皆廢誠以為輕重之適也故天下之貨未有可輕於錢者也一朝而輕千倍曾不為後日之計者何也此臣之所謂弊極而當反者也天下之事本無竒畫為竒畫者小人之自便以干其君者也不聽也雖然臣又有疑焉計今之錢自上而下者有兵之料有吏之俸自下而上者州縣倚鹽酒雜貨之入民之賣易以輸送者大抵皆金錢也故雖設虚劵以隂納天下之錢而猶未至於盡藏而不用方今之事比於前世則錢既已多矣而猶患其少者何也古之盛世錢未嘗不貴而物未嘗不賤漢宣帝時榖至石五錢所以立常平之法同上宣帝即位用吏多選賢良百姓安土嵗数豐穣榖至石五錢農人少利大司農耿夀昌遂曰令邊郡皆築倉以榖賤時増其價而糴以利農榖貴時减價而糶名曰常平倉民便之上迺下詔賜夀昌爵闗内侯唐太宗新去隋亂唐太宗賛盛哉太宗之烈也其除隋之亂比迹湯武而致富强米斗十錢或上為率虞世南上聖徳論四年天下大治流㪚者或歸鄉里米斗三四錢何者治安則物蕃物蕃則民不求而皆足是故錢無所用往者東南為稻米之區石之中價財三四百耳嵗常出以供京師而資其錢今其中價既十倍之矣不幸有水旱不可預計惟極南之交廣與素曠之荆襄米斗乃或上百錢為率耳然大要天下百物皆貴而錢賤𤓰瓠果蓏魚鼈牛彘凢山澤之所産無不盡取非其有不足也而何以至此且漢唐之賦禄較之於吾宋其用錢之増為若干以承平之賦禄較之於今日其用錢之増又若干東南之賦貢較承平之所入者其錢之増又若干昔何為而有餘今何為而不足然則今日之患錢多而物少錢賤而物貴也明矣天下惟中民之家衣食或不待錢而粗具何者其農力之所得者足以取也而天下之不為中民者十六是故常割中民以奉之故錢貨紛紛於市而物不能多出於地夫持空錢以制物猶不可而况於持空劵以制錢乎然則天子與大臣當知其本而已矣十先生奥論註續集巻十三
