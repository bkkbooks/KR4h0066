body:
  text: 十先生奥論註前集巻七雜論葉適士風士大夫自知貴重而不待夫立法以繩之則天下之風俗善矣人徒見夫風俗之未善必曰法制之未立也法制固人主之所不可廢而士大夫幼學壯行者果何事抱負所有以自見於一世者果何術而必待上之人肆而成之耶夫富貴利慾人孰無是心也爵禄名器人主所以奔走天下之權也叨其所可欲羨其所可樂翕然而趨之是孰使之然哉要知上所以鼔舞天下之心不得不然而我之所以自待者不容以自輕伊尹處於畎畆之中而樂堯舜之道其君民之事業非幣聘之勤伊尹終不輕其所就也二疏父子辭榮出關時人莫不榮之不為斗米折腰而甘心三徑之適此元亮之所以不流於世俗也一時風俗若人而振起則浮躁之習亦少改矣眷眷於鳯池之榮而歆羡夫登瀛之盛者獨何心哉夫聚金玉於堂而聴令自取人能安其分之所當得則物與我不相及矣苟有人焉奮然而先取之則紛紛乎其後者將不可遏於是執敲扑以杜其來計已晚矣由此觀之則風俗之弊豈無所自来哉昔司馬公辭樞密使而不受迫之而後進中國夷狄以相為幸而天下之士亦有我後子先時不可失之嘆范蜀公南宫首選於殿試法當自陳而公毅然不以為意其安恬自守頴出於流俗之中士大夫而皆若人也士風寧不為之丕變乎然則抑士大夫風俗之貪躁當有以養天下恬退之心若夫趨事赴功以求自效於時者則固上之人所望也自夫利達之意勝其功名之心是以厭薄不失也上之人至於厲法禁以禁戢之豈士大夫之美事乎苟且目不兩視而明耳不兩聴而聰人之心固不可二用也勤於公則必苟於私勤於私則必苟於公二者不可得而兼惟觀其所向之如何耳古人之材即後人之材也古人之智即後人之智也然古之治後之亂者豈材智之有異耶特古人用之於公後人用之於私而已惟古人用之於公故於私不得不苟以衛公子荆之事觀之其宫室始有則謂之苟合及言其少有冨有則又謂之苟全苟美其言毎謂之苟者非薄於私也不苟於公則必苟於私也惟後人意在於私故於公不得不苟以漢賈誼之言觀之其論大臣則以為有患苟免及論羣下則又言俱亡恥俱苟安其俗毎趨於苟者非薄於公也不苟於私則必苟於公盖水盛則火滅寒往則暑來陽消則隂長公私之相勝亦若是而已矣自漢及唐以私滅公苟且之風盛於天下如董晉為相史臣譏其懦弛苟安時則有苟且之相如劉知幾謂牧伯遷代太速懐苟且之謀時則有苟且之牧如趙憬議考課欲格庶僚苟且之心時則有苟且之吏如劉祥道謂官懐去就而民苟且時則有苟且之民上至於相下至於民莫不趨於苟且則政事何由而理乎綱紀何由而正乎風俗何由而厚乎如使當時之人移謀身之心而謀國移富國之術而富民移保子孫之志而保治移求爵禄之意而求義則可以不下席而躋咸五登三之風矣竊嘗歴攷漢唐之際其粗能去苟且之弊者漢宣帝而已迹其綜核名實信賞必罰上下相安蔑有苟且之意亦庶乎古矣然宣帝之革苟且徒變其外而不變其内也徒制其末而未制其本也而黄龍之詔有計簿之欺避課之戒豈非苟且之俗未盡除乎楊惲之言有縣官不足為盡力之謗豈非苟且之志未盡遷乎盖宣帝導之以政而不以教束之以刑而不以徳苟且之弊所以迹化而心不化也如使人君皆能本徳教以化苟且之心則荀卿不苟之篇可以無作奔競天下之害風俗者莫不當禁而不當禁者有一焉曰奔競是也世之禁防多矣不孝不友則有禁偽言偽行則有禁竒技滛巧則有禁奸聲異服則有禁何獨至於奔競乃不當禁耶奔競之名果何從而生耶爵禄在上下皆趨之故名之為奔則其弊非起于下也爵禄在此彼皆争之故名之為競則其弊非起於彼也誘之於上而欲禁之於下誘之於此而欲禁之於彼是猶乞醢而却蚋聚羶而去蟻雖刀鋸日用亦有所不勝矣大抵上之人輕名器而輒以假人則多為之禁而奔競益甚上之人惜名器而不以假人則不為之禁而奔競自消論至於此則奔競不惟不當禁又且不可禁不惟不可禁又且不必禁也何以知其然耶唐虞三代之時禮義修明風俗淳厚凡為士者三揖而進一辭而退禮如此其峻也四十而仕五十而爵進如此其迂也論定然後官任官然後爵仕如此其難也不傳贄為臣則不敢見諸侯分如此其嚴也然處之甚安守之甚固無濡淹之嘆無僥倖之心是豈有法制以驅之乎又豈有刑罰以禁之乎亦曰士之人未嘗開奔競之門而已盖當是時持黜陟以佐天子者非臯陶稷契之徒即伊尹傅說之儔也持黜陟以佐諸侯者非隨㑹子文之属即子産叔向之輩也是數聖賢者以公道而立公朝以公心而立公選材之外無餘位位之外無餘材天下之士道徳苟充爵禄自至初無求於上之人則巍巍廊廟殆為無求之地故巧者無所用其智貴者無所用其權詐者無所用其謀謟者無所用其佞貪而徃戚而歸躁而往静而歸於斯時也雖求奔競之名猶不可得況有所謂奔競之禁哉或逮徳下衰禮義廢風俗薄名器濫爵禄輕不使官求人而使人求官不使上求下而使下求上奔競成風莫之能禦權在於左右則為之掃門權在於嬖寵則為之控馬權在於妃主則為之邑司權在於貴戚則為之主事髙爵重禄如取如携無不得其欲焉彼介介自守之士十年未調者有之三世不徙者有之六世不遇者有之利害之相形如此人安得而不奔競乎上之人既誘天下以奔競乃屑屑然制年限之舉嚴三互之法著崇遜之論多見其無益也然則為人上者不必沮人之奔競勿勸之斯可矣不必罰人之奔競勿賞之斯可矣開其源而塞其流忘其本而齊其末豈不甚可嘆哉竊嘗譬之朝而趨市駢肩相摩暮而過市掉臂不顧非朝貪而暮㢘也朝有所求而暮無所求也一走野百人逐之積金在市過者不顧非前争而後遜也前則未定而後則已定也彼為士者在治古則静退在後世則奔競豈性情之頓異哉盖治古之爵禄不可求而後世之爵禄可求也治古之爵禄皆有定而後世之爵禄無定也操爵禄之柄者苟端本澄源於上則濟濟多士可以一旦還之於唐虞三代之域矣風俗豈獨厚於古而薄於今耶十先生奥論註前集巻七
