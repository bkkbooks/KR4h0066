body:
  text: 十先生奥論註續集巻八時政論吕祖謙漢輿地圖序此篇論光武有恢復天下之志輿地之有圖古也自成周大司徒掌天下土地之圖以周知廣輪之數禮地官大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國以天下土地之圖周知九州之地域廣輸之數而職方氏之圖復加詳焉夏官職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民東南曰揚州其山鎮曰㑹稽正南曰荆州其山鎮曰衡山河南曰豫州其山鎮曰華山正東曰青州其山鎮曰沂山河東曰兖州其山鎮曰岱山其澤藪曰大野正西曰雍州其山鎮曰嶽山東北曰幽州其山鎮曰醫無閭河内曰冀州其山鎮曰霍山正北曰并州其山鎮曰恒山云云迨漢滅秦蕭何先收其圖書始具知天下阨塞户口多少之差前蕭何傳沛公至咸陽蕭何先入收秦丞相御史律令圖書藏之沛公具知天下阨塞户口多少强弱處民所疾苦者以何得秦圖書也然則尚矣武帝元狩六年將立三子為王御史大夫奏輿地圖請所立國名乃開齊燕廣陵之封輿地圖之名至是始見史遷之所載可考也史三王世家大司馬臣去病再拜上疏云願陛下詔有司因盛夏吉時定皇子位六年三月戊申朔乙亥御史大夫臣張湯等皇上言云云制曰下御史云云臣青翟臣湯等昧死請立子臣閎臣旦臣胥為諸侯王昧死請所立國名制曰云云維六年四月乙巳皇帝使御史丈夫湯廟立子閎為齊王子旦為燕王子胥為廣陵王云云光武皇帝之徇河北鄧禹杖策而從之說以大策有天下不足定之語其後帝登城樓披輿地圖指示禹曰天下郡國如是今始乃得一子前言天下不足定何也禹復申言之盖光武志在天下當神州赤縣未入經畧之際其君臣更相激厲如此鄧禹傳禹聞光武安集河北即杖䇿北渡追及於鄴先武見之甚懽禹曰但願明公威德加於四海禹得效其尺寸垂芳名於竹帛耳光武因留宿間語禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸將皆庸人崛起志在財幣爭用威力朝夕自快而已非有忠良明智深慮逺圖欲尊主安民者也於今之計莫如延攬英雄務悦民心立高祖之業救萬民之命以公而慮天下不足定也光武大悅及王郎起兵光武自薊至信都使禹自將從至廣阿光武舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海内殽亂人思明君猶赤子之慕慈母古之興者在德厚薄不以大小光武悅故能兼制六合司空之所掌無寸地尺天不歸於封域按圖分封並建諸子以為藩屏嗚呼盛哉後光武十王傳東海恭王强沛獻王輔楚王英濟南安王康東平憲王蒼阜陵質王延廣陵思王荆臨淮懷公衡中王簡王焉琅邪孝王京用敢細繹其意而為之序曰自古合天下於一者必以撥亂之志為主志之所向可以排山嶽倒江海開金石一念之烈無能禦之者光武之在河北﨑嶇於封豕長蛇之間瞋目裂眦更相長雄積甲成山積血成海積氣成雲積聲成雷九流渾淆三綱反易雖十家之市無寧居者則光武何所恃哉亦恃其撥亂之志而已光武之志以皇天全付所覆於我有漢今乃八分幅裂淪於盜賊此子孫之責也責之所在雖有登天之難不敢辭雖有暴虎之危不敢避雖有蹈水火之危不敢回奮然直前以償吾祖宗之所負必使吾祖宗之舊物咸復其初然後吾責始塞焉此志一立故雖處一郡之地而視天下之廣慷慨憤悱氣干雲霄撥亂之志蓋肇於此矣方其志之未立則一郡至小而羣賊之地奚啻十倍吾衆至少而羣賊之兵奚啻十倍恢復之功猶捕風係影若不可期者及既有其志則規模先定幾謀先立兆之於前而必之於後若青若齊若隴若蜀若楚若越皆吾志中之一物也光武紀時長安政亂四方背叛梁王劉永擅命睢陽公孫述稱王巴蜀李憲自立為淮南王秦豐自號楚黎張歩起琅邪董憲起東海延岑起漢中田戎起夷陵並置將帥侵畧郡縣又别號諸賊銅馬大彤高湖重連鐵脛大槍尤來上江青犢五校富平獲索等所在冦掠光武將擊之若盆子若王昌若囂若述若歩若豐皆吾志中之臣僕也劉盆子王昌一名郎隗囂公孫述張歩各有傳奉豐見上注彼方繕寨置戍而不知吾已破之於堂上彼方峩冠被衮而不知吾已縳之於胷中是以論光武克復郡縣之蹟則有難易焉有先後焉若夫光武恢復之志則一披輿圖而三萬里之幅員皆人於靈府豈嘗得一邑而始思得一州得一州而始思得一部大矣光武之志也斯其所以祀漢配天不失舊物歟左哀元年少康復禹之績祀夏配天不失舊物厥後建武二十二年匈奴右薁鞬日逐王比遣使奉匈奴地圖光武紀云二十四年北欵五原塞願為藩蔽廼立之為南單于俾預藩臣之列同上是知光武有一天下之志非特輿地圖之所紀皆為臣妾而匈奴地圖之所紀亦為臣妾焉則志也者其撥亂濟世之樞極歟故述之以告來者武備此篇論治世不可去兵人常有言曰兵者治世之所諱也治世之士不言兵治世之民不執兵變刀為犢變劒為牛變矛㦸為鋤耰變營壘為畎畆前龔遂傳民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢凡鳥占雲祲金版六韜之書皆束之高閣唐李靖賛世言靖精風角鳥占雲祲孤虚之術為善用兵莊子云獻說則以金版注太公謀術論國政事六韜太公兵法書行于世使天下不復知有兵之名然後足為至治之極嗚呼何其不思之甚邪治世雖未嘗好戰也亦未嘗忘戰也雖未嘗用兵也亦未嘗去兵也先王於太平至治之世嚴師徒肅號令謹閱習所以銷患於無形保治於無極曷嘗以兵為諱哉且虞舜之時為治耶為亂耶雖甚愚者知其為至治也舜當至治之時固可以忘戰而去兵矣然典謨所書在内則明射侯以為教養之術在外則奮武衛以為備禦之防汲汲然惟恐兵之未練固不聞其以兵為諱也書益稷欽四鄰庻頑讒說若不在時侯以明之撻以記之書用識哉欲並生哉禹貢五百里綏服三百里揆文教二百里奮武衛武王之時為治耶為亂耶雖甚愚者亦知其為至治也武王當至治之時固可以忘戰而去兵矣然司馬所掌於春於夏則有振旅茇舍之名於秋於冬則有治兵大閱之法汲汲然惟恐兵之未練固不聞其以兵為諱也禮夏官大司馬中春教振旅遂以蒐田中夏教茇舍如振旅之陳遂以苗田中秋教治兵如振旅之陳遂以獮田中冬教大閲乃陳車徒如戰之陳遂以狩田舜之備既具固可以鼓琴而詠南風之詩家語辨樂解舜作五弦之琴造南風之詩武王之備既具固可以建櫜而奏戢戈之頌記武王克商車甲藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使之為諸侯名之曰建櫜乂詩頌時邁載戢干戈載櫜弓矢人見其鼓琴之逸而不知其為備如此之勞也遂以為舜之盡於鼓琴人見其建櫜之易而不知其為備如此之難也遂以為武王之治盡於建櫜使鼓琴可以盡舜之治則房琯之有董廷蘭何為有陳濤之敗耶唐房琯傳琯請自將平賊遇賊陳濤斜戰不利邢延恩促戰故敗初琯用春秋時戰法以車二十乘繚營既戰賊乘風投芻而火之人畜焚燒琯遂還走琴工董廷蘭出入琯所琯昵之廷蘭藉勢數招賄後為有司劾治使建櫜可以盡武王之治則始皇之鑄金人十二何為有勝廣之亂耶史始皇紀分天下為三十六郡收天下兵聚之咸陽銷以為鐘鐻鑄金人十二重各千石二世元年戍卒陳勝等反故荆地為張楚鼓琴一也舜則可以琯則不可者有備無備之分耳建櫜一也武王則可以始皇則不可者有備無備之分耳房琯不善學舜者也始皇不善學武王者也論至於是孰謂練兵嚴備非太平之先務也愚故曰兵者非治世之所諱者也大扺銷兵不足以銷兵惟治兵乃可以銷兵唐蕭俛傳穆宗初兩河㡳定俛勸帝偃革尚文乃宻詔天下鎭兵十六萬限一年逃死不補謂之銷兵偃武不足以偃武惟講武乃可以偃武書武成乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗復用人徒見文帝之結和比鄰煙火萬里以為偃武之功也前本紀後二年匈奴和親史律書天下殷富鳴雞吠天烟火萬里可謂和樂者乎殊不知文帝所以致此者以有細柳棘門之備而已本紀後六年匈奴入上郡入雲中以周亞夫為將軍次細柳徐厲為將軍次棘門以備胡人徒見章帝之儒館獻歌戎亭虚候以為偃武之功也後本賛儒館獻歌戎亭虛候殊不知章帝所以致此者以有金城戍邊之備而已本紀章和元年死罪囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戍也人徒見太宗之四夷冠帶胡越一家以為偃武之功也唐魏徵傳蠻夷君長襲衣冠帶刀宿衛通鑑紀從上皇置酒故漢未央宫上皇命突厥頡利可汗起舞又命南蠻酋長馮智戴詠詩笑曰胡越一家自古未有也帝奉觴上壽殊不知太宗所以致此者以有殿廷習射之備而已通鑑高祖紀上引諸衛將卒習射於顯徳殿庭諭之曰戎狄侵盗自古有之患在邊璄小安則人主逸遊忘戰是以冦來莫之能禦於是日引數百人教射於殿廷上親臨試中多者賞以弓帛晉武帝當平吳之後可以治矣恃其治而徹去州郡之備終致五胡之亂豈非忘戰之害乎通鑑紀太康元年王濬舟師過三山舉帆直指建業吳主皓面縳輿櫬詣軍門降朝廷聞吳已平羣臣皆賀上壽帝曰此羊太傅之功也人詔今天下為一當韜戢干戈刺史分職皆如漢氏故事悉去州郡兵大郡置武吏百人小郡五十人陶璜上言州兵未宜約損以示單虛山濤亦言不宜去州郡武備帝不聽及水寧以後盜賊羣起州郡無備不能禽制天下遂大亂如濤所言元帝紀史臣曰晉氏不虞自中流外五胡扛鼎七廟隳尊𤣥宗當開元之後可謂治矣恃其治而徹去中國之備終致祿山之亂豈非忘戰之害乎本賛𤣥宗親平韋氏亂方其勵精政事開元之際幾致太平何其盛也又兵志開元六年始詔折衝府兵每六歲一簡至是虚耗散宿衛不能給更號曰彍騎自是諸府士益多不補云云開元初朔方隴右河東河西諸鎮皆置節度使及范陽節度使安禄山反犯京師天子之兵弱不能抗遂陷西京云德宗當興元之後可謂治矣恃其治而徹去河朔之備終致藩鎭之亂豈非忘戰之害乎本紀興元元年大赦改元朱泚㐲誅陸贄論縁邊守備事宜狀開元天寳之間控禦西北西蕃惟朔方河西隴右之節度使而已中興已來未遑外討僑𨽻四鎭於安西權附隴右於扶風所當西北兩蕃亦朔方涇原隴右河東西節度而已自泚逆以誘涇隴之衆懷光汙朔方之軍割裂誅鋤所餘無幾而又分朔方之地建牙擁節者凡三使焉其餘鎭軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相禀屬每俟邊書告至方令計㑹用兵今之邊備勢弱氣消建軍若此可謂力分於將多矣本賛及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎭愈强至於唐亡其患以此由是觀之銷兵乃所以召兵閱武乃所以偃武其理甚明無足疑者然則人君當無事之時其可不為先事之備乎抑嘗謂衆人之所輕乃明君之所重衆人之所後乃明君之所先凡開闢操縱之權固非常情之能窺測也何以知之以光武之事知之當用兵之際衆人之所重者騎射也所輕者詩書也光武乃投戈講藝息馬論道於戰馬擾攘之中而篤仁義禮樂之用輕人之所重重人之所輕非有先物之幾孰能與於此乎樊凖傳光武受命中興羣雄紛擾誅戰不遑啓處然猶投戈講藝息馬論道當偃兵之際衆人之所先者文事也所後者武備也光武乃疏築亭障修明烽燧於宴安閒暇之中而嚴守禦捍防之備後衆人之所先先衆人之所後非有先物之幾孰能與於此乎本紀建武十一年遣杜茂將衆郡弛刑屯北邊築亭侯修烽燧天下方尚武吾獨示之以文天下方尚文吾獨抗之以武一弛一張與時推移彼見其勝敵謂之勇見其治國謂之柔是皆刻舟膠柱而求其迹者也後漢張衡傳斯契船而求劒注契猶刻雕也事見呂氏春秋揚先知篇膠柱而調瑟烏足以知光武匈奴此篇論不可以夷狄之强弱為吾中國之安危治天下者不可以夷狄之强弱為中國之安危使夷狄之勢强耶則吾中國之不可不治也使夷狄之勢弱耶則吾中國亦不可不治也吾知治吾中國耳彼夷狄奚有於我哉譬之治家者睦其宗族制其童僕謹其扄鐍高其垣牆此治家之常法也是法也不為鄰之厚而增不為鄰之薄而損不為盗賊而設不為無盗賊而廢盖是數者之法為吾家而設非為鄰里盗賊而設也唯治天下者亦然夫中國之與夷狄其不相為用久矣仰觀天文俯察地理北戎為胡門自三危而至于朝鮮所以限戎狄也南戎為越門自岷山而至于甌閩所以限蠻夷也是中國之與夷狄風俗不同嗜慾不同彼之休戚何預吾之利害哉是故先王之待夷狄其來不喜其去不怒其欣然而朝覲也特象胥之職爾特行人之職爾禮秋官象胥之職掌蠻夷閩貉夷狄之國使掌傳王之言而諭說焉以和親之大行人之職掌天賔之禮及天客之儀以親諸侯九州之外謂之蕃國世壹見各以其所貴寳為贄吾心初不為之驕其悍然而侵略也特司馬之職爾特士師之職爾夏官大司馬之職掌建國之九法以佐王平邦國秋官士師職掌國之五禁之法以左右刑罰吾心初不為之沮彼方紛然自來自去而治吾中國者亦未嘗一日廢焉及至後世當夷狄之强則自以為危危則戒戒則治當夷狄之弱則自以為安安則怠怠則亂故夷狄之强弱雖不足為中國之安危而實兆中國之治亂此無它為人君不能自治中國而每以夷狄為輕重也漢自宣帝之前匈奴盛而漢以治自宣帝以後匈奴衰弱而漢以亂觀宣帝以前太史之所書曰某年匈奴入雲中某年匈奴入上郡某年匈奴入朔方誠艱難多事之時也前文帝紀後六年冬匈奴三萬騎入上郡三萬騎入雲中武帝元朔五年大將軍衛青將六將軍兵出朔方高闕獲首虜萬五千級觀宣帝以後太史之所書曰某年斬郅支單于祠郊廟某年呼韓邪單于來朝改元某年單于來朝赦天下誠太平無事之時也元帝紀建昭四年春正月以誅郅支單于告祠郊廟赦天下竟寧元年春正月匈奴呼韓邪單于來朝詔云云邊垂長無兵車之事其改元為竟寜成帝紀河平四年春正月匈奴單于來朝赦天下有艱難多事之形而天下反治有太平無事之形而天下反亂獨何歟多事則戒而脩政無事則怠而佚豫此治亂之所以分也吾嘗謂漢祚之亡不在於元帝而在於宣帝不生於王莽之强而生於渭橋之謁焉元帝賛上牽制文義優游不斷孝宣之業衰焉宣帝紀甘露元年匈奴呼韓邪單于遣子入侍云云三年呼韓邪單于稽侯狦來朝賛謁稱藩臣詔單于母謁蠻夷君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歲平帝賛孝平之世政自莽出方外百蠻無思不服彼匈奴自高帝以來桀驁不賔非祖宗之治不若宣帝特其勢自强耳及宣帝之世欵塞來王非宣帝之治過於祖宗也特其勢自弱耳初無一毫預於巾國而宣帝乃以為功光祖宗張皇其事以震耀于後世元成以下習熟見聞遂以為祖宗之所患者獨匈奴匈奴傳漢初定匈奴大攻馬邑韓信降匈奴匈奴因攻太原至晉陽下高帝自將兵往擊之高帝先至平城冒頓圍高帝於白登七日孝惠高后世冒頓驕迺為書使使遺高后高后大怒孝文即位復修和親與匈奴為兄弟所以遺單于甚厚武帝即位明和親約束是後往往入盗於邊不可勝數漢使四將各萬騎擊胡云云武帝崩前此者漢兵深入窮追二十三年宣帝即位匈奴降漢甘露三年呼韓邪單于欵五原塞願朝云云宣帝賛遭値匈奴作亂推亡固存信威北夷單于慕義稽首稱藩功光祖宗業垂後裔今匈奴既服則天下無復多事矣遂般樂怠傲以至于亡豈非宣帝有以啓之耶自古深謀逺慮之士多以為無外患則有内憂晉與楚戰于鄢陵范文子不欲戰曰盍釋楚以為外懼乎左成十六年云云此知其一而未知其二也夫人臣之告其君不能使之悟而徒欲其懼使夷狄敵國常强則君猶警懼敵國之患去則君必驕矣是其說雖足以致今日之懼亦所以啟他日之驕得失適相半耳盍若告人君以治内之說彼夷狄敵國之或盛或衰外患之或有或無皆無預於吾事惟專意於治内而已如是則吾說可以常行而無弊矣此又進言於君者所當知也十先生奥論註續集巻八
