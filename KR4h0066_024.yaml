body:
  text: 十先生奧論注後集卷九史論楊時藺相如此篇論奉璧之事尚有可議周室之季天下分裂為戰國遊談之士出於其間各挾術以干時君視其喜怒悲懼而捭闔之徼名射利固無足道者間有感憤激昻以就一時之功其材力有足過人而鮮克自重其身者何多耶子讀藺相如傳未嘗不壯其為人而惜其如此也夫秦藉纍世之資肆虎狼之暴搏噬天下有并吞諸侯之心非可與禮義接而論曲直也賈誼過秦論秦孝公有席卷天下包舉宇內囊括四海并吞八荒之心相如區區掉三寸舌入眥睚不測之秦卒能以全璧歸亦足壯哉然當其捧璧睨柱示以必死蓋亦摩虎牙矣趙有和氏璧秦昭王願以十五城易之藺相如奉璧入秦視秦王無意償趙城乃詐曰璧冇瑕請指示王王授璧相如因持璧却立倚柱怒髮上衝冠謂秦王曰臣聞布衣之交尚不相欺况大國乎大王必欲急臣臣頭與璧俱碎於柱相如持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請相如度秦王決負約不償城乃使其從者衣褐懷其璧從徑道亡歸全璧于趙夫死非難死不失義不傷勇君子所難也且秦趙之不敵蓋雌雄之國也身之存亡非特一璧之重而社稷安危之機亦不在夫璧之存亡也然則趙之有璧存可也亡可也初相如捧璧入秦趙之君臣計議非有親秦之心特迫其威強爾秦昭王使人遺趙王書願以十五城請易璧趙王與亷頗諸大臣謀計未定召問相如相如曰秦強而趙弱不可不許王必無人臣願奉璧往使城入趙而璧留秦城不入臣請全璧歸趙夫以小事大古之人有以皮幣犬馬珠玉而不得免者至棄國而逃孟梁惠王下滕文公問曰滕小國也竭力以事大國則不得免焉如之何則可孟子對曰昔者大王居邠狄人侵之事之以皮幣不得免焉事之以犬馬不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞之也君子不以其所以養人者害人二三子何患乎無君我將去之去邠踰梁山邑于岐山之下居焉况一璧乎雖與之可也相如計不出此乃以孤單之使逞螳怒之威抗臂秦庭當車轍之勢其危如一髮引千鈞豈不殆哉當是時使秦知趙璧終不可得則欲徼幸不死難矣若是則尚安得為不失義不傷勇乎不三數年趙卒有覆軍陷城之禍者徒以璧為之祟也趙軍長平使趙括代亷頗將以擊秦秦乃使白起為上將軍王齕為禆尉趙括出兵擊秦秦璧堅拒不得入竒兵絶其後趙軍乏食秦軍射殺趙括括軍敗卒數十萬降秦白起詐坑之然則全璧歸趙何益哉至於澠池之會則其危又甚矣方趙王之西也亷頗約以一月不返則立太子以絶秦望則是行也非有萬全之計矣雖無往可也秦王欲與趙王為好會於西河外澠池趙王畏秦欲毌行亷頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從亷頗送至境與王訣曰王行度道里會遇之禮畢還不過三十日三十日不還則請立太子為王以絶秦望王許之遂與秦王會于澠池傳曰智者慮義者行仁者守然後可以會三者一闕焉則危事矣挾萬乘之君蹈危事非得計也相如為趙卿相其智勇不足重趙使秦不敢惴焉乃欲以頸血濺之秦王與趙王會飲令趙王鼓瑟相如前進缶跪請秦王秦王不肯擊缶相如曰五步之內相如得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡於是秦王為一擊缶豈孔子所謂暴虎馮河死而無悔者歟語述而云嗚呼周道衰士無中行久矣區區戰國之際尚足追議其失哉豫於相如惜其雄傑俊偉於戰國士有足稱者而其失如此故特為之論著云賈誼此篇論其以才見忌皆輕躁之失賈誼以少年英鋭之資抱負其器頗見識拔慨然遂以身任天下本傳文帝召以為博士是時誼年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生以是為能而絳灌之徒出於織薄販繒之武夫先王之典章文物彼烏足與議哉髙皇帝所與平天下定法令又皆其身親見之也周勃以織薄為生沛公拜為將軍擊項籍封絳侯灌嬰睢陽販繒者也賜爵列侯與絳侯共立文帝誼以疏逖晚進之人欲一日悉更奏之彼其心豈能恝然耶此讒釁之所由起也誼以為漢興宜改正朔易服色制度定官名興禮樂乃草具其儀法悉史奏之文帝謙遜未皇也然諸法令所更定及列侯就國其説皆誼發之天子以誼任公卿之位絳灌之屬盡害之曰雒陽之人年少初學專欲擅權紛亂諸事天子後亦疏之古之君子自重其身常若不得已而後進非固要君也蓋天下重器不可易為之王業之大必遲久而後成故人君非有至誠不倦之心則不足與有為也其尊德樂義一有不至則引而去之萬鍾於我何加焉孟公孫丑下故將大有為之君必有所不召之臣欲有謀焉則就之其尊德樂道不如是不足與有為也又萬鍾於我何加焉非忘天下道固然也誼之草具儀法上注與夫三表五餌其術固疏矣本贊及欲試屬國施五餌三表以繫單于其術固以疏矣當是時人君方且謙遜未皇也誼身非宰輔乃汲汲然自進其説蓋亦不自重矣在我者不重故人聽之也輕及夫以才見忌不容于朝出為王傅天子不用其議以為長沙王太傅其論國事猶曰陛下曾不與如臣者議之則是欲嬰撫在庭之臣而出其上也豈不召禍歟孔子曰為國以禮其言不讓語先進云於誼有之矣鼂錯此篇論其進言行事之失鼂錯曰人君必知術數本傳言人主所以尊顯功名揚於萬世之後者以知術數也又曰五帝神聖其臣莫能及而自親事同上五帝神聖其臣莫能及故自親事處于法宫之中明堂之上操是説蓋未嘗知治體也夫天下大器非智力所能勝也舜之厚五典庸五禮用五刑皆因天而已未嘗為也書臯陶謨云雖股肱耳目付之臣而不自用書益稷云况以術數而自親事乎使後世懷姦者誤其君挾術以自用必資是言也其為禍豈淺哉若吳楚之反不在錯天下盡知之矣景帝用讒邪之謀以誅錯其失計不已甚乎吳楚七國俱反以誅錯為名丞相等劾奏錯曰吳王反天下所當共誅今錯議曰兵數百萬獨屬羣臣不可信陛下不如自出臨兵不稱陛下德信欲疏羣臣亡臣子禮大逆無道當要斬制曰可當是時兵之勝負國之安危未可知也而誅其謀首豈不殆哉而在廷之臣無一人為錯言者蓋變起倉卒各欲僥幸於無事而莫敢以身任之也然而錯亦有以取之矣夫漢之有七國未若魯之三家也仲孫叔孫季孫孔子墮三都之城而三家無敢不受命者則其取之必有道矣家語相魯篇孔子使仲由墮三都之城強公室弱私家孟子曰子以為有王者作則魯在所損乎在所益乎見告子下使孟子而得志固將損之也錯無碩德重望以鎮服其心而強為之謀其召亂而取禍蓋無足怪者武帝時淮南王欲反獨畏汲黯之節義視公孫𢎞輩如發蒙耳汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至説𢎞等如發蒙耳則天下果非智力可為也以一汲黯猶足以寢淮南之謀唐裴度傳韋處厚疏汲黯在朝淮南寢謀况不為黯者乎劉向此篇論更生不知義命之歸初孝宣循武帝故事招置名儒而更生以通達善屬文與選中可謂遇主矣本傳是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子橋等並進其後上復興神仙方術之士而更生得淮南枕中鴻寶祕書獻之言黃金可成其所為未免長君之過也上復興神仙方術之事而淮南有枕中鴻寶苑祕書書言神仙使鬼物為金之術而更生父德治淮南獄得其書更生幼而讀誦以為竒獻之言黃金可成上令典尚方鑄作事費甚多方不驗下吏當死豈其逢世希合而為之歟抑年少學猶未能無惑於異端歟其後與望之堪猛輩並立于朝為羣小側目更生乃令外親上變事其義安在哉元帝即位太傅蕭望之少傅周堪薦更生明經有行擢為散騎宗正為外戚許史宦官𢎞恭石顯譛訴皆免官乃使外親上變事云云望之自殺天子甚悼恨之乃擢堪為尤祿勳弟子張猛光祿大夫更生幾已得復進云云顯誣譛猛令自殺於公車更生傷之乃著疾讒摘要夫君子小人相為盛衰蓋天地之大義也消息盈虛天地且不能不以其漸况於人乎且許史恭顯之於漢也憑藉私昵寵嬖之恩非一日矣其培根深其滋蔓長非所以朝升而暮罷而君子之去小人又非智謀之足恃也亦有吾之仁義而已彼方欲肆欺以罔吾之信為數以敗吾之義而吾且欲決而去之而自為不信其見棄也不亦宜乎豫讀更生傳見其惓惓於其君未嘗不為之歎息也惜其不知義命之歸故一蹶而不振悲矣韋玄成此篇論其毁廟之議非是漢儒言祖有功宗有德不毁所以勸也本傳玄成等四十四人奏議曰臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者冝毁太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故許嘉等二十九人以為孝文皇帝德厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝宜為世宗之廟諫大夫尹更始等十八人以為皇考廟上序於昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰蓋聞王者祖冇功宗有德尊尊之大義也存親廟四親親之至􅋠也髙皇帝功莫大焉孝文皇帝德莫盛焉髙皇帝為漢太祖文帝為太宗世世承祀宣帝為昭帝後於義一體孝景廟及皇考廟皆親盡其正禮儀玄成等奏曰云云太上皇孝惠廟皆親盡宜毁奏可曰非也子孫之祭其親豈為其功德而後祭之乎若以為其功德然後祭是子孫得揀擇其祖宗而尊之也豈事親之道哉秦少遊以韋玄成為腐儒惡其建毁廟之議其説曰君子將營宫室宗廟為先廏庫為次居室為後夫營之先親而後身則毁之先身而後親可知矣見文集漢之離宫别館長楊五柞三輔黃圖長楊宫秦舊宫至漢修飾之以備行幸五柞宫漢之離宫也宫中有五柞木因以為名已大侈靡未聞其毁乃取韋玄成毁廟之説亟行之此元帝寢疾所以夢祖宗譴責也後嵗餘玄成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾連年遂盡復諸所罷寢廟園皆修祀如故其後又復豈容可改乎曰審宗廟也則不容以所未當毁者而毁之矣先王之禮天子祭天地諸侯祭社稷記王制云父為士子為大夫葬以士祭以大夫父為大夫子為士葬以大夫祭以士記中庸云支子不祭有事則祭于宗子之家明以繼體也記曲禮云如是則祭與不祭皆不可苟矣漢之廟在郡國蓋以千數嵗時皆諸侯王主祭豈古禮哉本傳凡祖宗廟在郡國六十八合百六十七所而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各冇寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食廟嵗二十五祠便殿嵗四祠使漢祖宗有靈當不享矣立無度之廟致不享之祭以此事神尚不欲毁邪以夢寐而復既未知鬼神之情狀引之為證其説陋矣且誠如所論先王當行之矣先王豈不敬神哉竇武何進此篇論二人幾事不密而禍成于猶豫桓靈之間昏弱相仍女后臨朝權移近習久矣桓帝紀太后與梁兾定策禁中迎帝即位年十五太后猶臨朝政靈帝紀桓帝崩無子太后與父竇武定策奉迎帝即位王甫曹節以臺厮之賤便嬖寵昵之私竊弄神器固天下之所同嫉也竇武以元舅之親操國重柄招集天下名儒碩德布在王庭相與仗義協謀勦絶凶類正猶因迅風之勢以揚稃粃耳豈不易哉然而身敗功頽貽國後患者幾事不密而禍成於猶豫也陳蕃以私謂武曰中常侍曹節王甫等自先帝時操弄國權濁亂海內百姓胸胸歸咎於此今不誅節等後必難圖武深然之蕃大喜武於是引同志尹勳等共定計策於是天下雄俊知其風旨莫不延頸企踵思奮其智力武乃白太后誅曹節等太后猶豫未忍事敗曹節矯詔王甫將兵捕收武等武自殺方武之不受詔馳入步軍營召會北軍伍校士數千人勢猶足以有為也曹節召尚書官屬脅以白刃使作詔拜王甫為黃門令共劫太后奪璽書令中謁者守南宫門絶復道使鄭颯等持節捕收武等武不受詔馳入步軍營與紹共射殺使者召會北軍五校士數千人屯都亭下令軍士曰黃門常侍反盡力者封侯重賞張奐北州之人豪素非中人之黨可以義動也不能乘機決勝收為己用而乃遲回達旦使逆賊得與奐等合豈不惜哉詔以少府周靖與中郎將張奐率五營士討武夜漏盡王甫將虎賁羽林廏騶都侯劒戟士合千餘人出屯朱雀掖門與奐等合何進親見竇氏之敗而不用陳琳鄭公業之諫躬蹈覆轍引姦凶而授之柄卒成移鼎之禍進實兆之也何進與袁紹謀誅宦官主司陳琳入諫曰云云所謂倒持干戈授人以柄功必不成秪為亂階進不聽遂召諸屯以誅宦官為言進意狐疑後入為張讓等斬之鄭太字公業諫進云云進不能用范曄乃引天廢商之言豈不謬哉范曄論曰竇武何進藉元舅之資據輔政之權內倚太后臨朝之戒外迎羣夭乘風之勢卒而事敗閹豎身死功頓為世所悲豈智不足而權有餘乎傳曰天之廢商久矣君將興之斯宋襄公所以敗於泓也荀彧此篇論從曹氏之事厲王流彘周召二公共和為政延及宣王卒有中興之功史周紀厲王無道出奔於彘二相周公召公行政號曰共和厲王薨太子靜長於召公之家二相共立之是為宣王天下之存亡豈不以其人哉當桓靈之衰其禍未甚於流彘也董卓之亂天之未厭漢德豈有異於共和之時乎董卓廢靈帝為𢎞農王殺太后何氏焚洛陽宫廟范曄論曰天厭漢德久矣山陽其何誅焉而議者謂曹公非取天下於漢其説非也方曹公以強忍之資因亂假義挾主威以令諸侯其包藏禍心天下庸人知之矣而荀彧間關河兾擇其所歸卒從曹氏志欲扶義奮謀以舒倒垂之急迹其行事可謂勇智兼人矣乃獨不知曹氏之無君乎范曄論曰自遷帝西京山東騰沸天下之命倒垂矣荀君乃越河冀間關以從曹氏察其定舉措言立策崇明王略以急國艱豈云因亂假義以就違正之謀乎誠仁為已任期紓民於倉卒也其拒董昭之議何也董昭等欲共進操爵國公九錫備物密以訪彧彧曰不宜如此事遂寢操心不能平夫豈誠有忠正之節歟抑欲以晚節蓋之歟由前則不智由後則不忠不智不忠而求免於亂臣宜乎其難矣嗚呼荀君安得無罪歟觀其臨大義斷大謀操弄強敵於股掌之間輔成曹氏之霸業至其威加海內下陵上逼乃欲潛杜其不軌是猶揚瀾潰隄以成滔天之勢而後徐以一葦障之尚可得乎而范曄猶謂彧有殺身成仁之美吾不知其説也本傳論曰方時運之屯遭非雄才無以濟其溺功髙勢強則皇器自移矣此又時之不可並也蓋取其歸正而已亦殺身成仁之義也陽城此篇論其言事雖可取然不可為法論及陽城事謂永叔不取純夫取之其言曰陽城蓋有待而為者也後世猶責之無已其不成人之美亦甚哉此論似近厚曰陽城固可取然以為法則不可裴延齡之欲相其來非一朝一夕何不救之於漸乎至於陸贄之貶然後論延齡之姦佞無益矣本傳裴延齡誣逐陸贄等帝怒甚無敢言城聞曰吾諫官不可令天子殺無罪大臣乃約拾遺王仲舒守延英閣上疏極論延齡罪慷慨引義申直贄等纍日不止聞者寒懼城愈勵帝大怒召宰相抵城罪順宗方為太子為開救得免敕宰相諭遣然帝意不已欲遂相延齡城顯語曰延齡為相吾當取白麻壞之哭於庭帝不相延齡城力也觀古人退小人之道不然易之姤卦曰女壯勿用取女夫姤一陰生未壯也而曰壯者生而不已固有壯之理也取女則引而與之齊也引而與之齊則難制矣陰者小人之象也小人固當制之於漸也故當陰之生則知其有壯之理其有壯之理則勿用取女可也是以姤之初爻曰繫于金柅貞吉有攸往見凶金柅止車之行也陰之初動必有以柅之其制之於漸乎易姤卦云蓋小人之惡制之於未成則易制之於已成則難延齡之用事權傾宰相雖不正名其為相其惡自若也延齡本傳云云何更公待其為相然後取白麻壞之邪上注然城之所為當時所難能也取之亦是但不可以為法耳虞舜漢文用刑此篇論法者天下之公因論特旨曰此非先王之道先王只是好生故書曰好生之德洽于民心書禹謨云為天子豈應以殺人為已任孟子曰國人皆曰可殺然後殺之曰國人殺之也梁惠王下云謂國人殺之則殺之者非一人之私意不得已也古者司寇以獄之成告于王王命三公參聽之三公以獄之成告于王王三宥然後致刑記王制成獄辭史以獄成告於正正聽之正以獄成告於大司冦大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三又然後制刑又與宥同夫宥之者天子之德而刑之者有司之公天子以好生為德有司以執法為公則刑不濫矣若罪不當刑而天子必刑之寧免於濫乎然此事其漸有因非獨人主之過使法官得其人則此弊可去矣舜為天子若瞽䏂殺人臯陶得而執之舜猶不能禁也孟盡心上桃應問曰舜為天子臯陶為士瞽䏂殺人則如之何孟子曰執之而已矣然則舜不禁與曰夫舜惡得而禁之夫有所受之也且法者天下之公豈冝徇一人之意嘗怪張釋之論渭橋犯蹕事宜罰金文帝怒釋之對曰法者天子所與天下公共也今法如是更重之是法不信於民也此説甚好前釋之本傳上行出中渭橋有一人從橋下走乘輿馬驚捕屬廷尉釋之奏犯蹕當罰金上怒曰此人親驚我馬馬賴和柔令他馬固不敗傷我乎廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也然而曰方其時上使人誅之則已以謂為後世人主開殺人之端者必此言也夫法既曰天下公共則得罪者天子必當付之有司安得擅殺使當時可使人誅之今雖下廷尉越法而誅之亦可也周世宗家人傳此篇論公義私恩不可偏舉豫讀周世宗家人傳至守禮殺人世宗不問史氏以為知權五代史周太祖聖穆皇后柴氏無子養后兄守禮之子以為子是為世宗世宗即位第以元舅禮之而守禮亦頗恣橫嘗殺人于市有司以聞世宗不問史臣曰豫讀周史見守禮殺人世宗寢而不問蓋進任天下重矣而子於其父亦至矣故寧受屈法之過以申父子之道其所以合於義者蓋知權也豫竊思之以謂父子者一人之私恩法者天下之公義二者相為輕重不可偏舉也故恩勝義則詘法以伸恩義勝恩則掩恩以從法恩義輕重不足以相勝則兩盡其適而已舜為天子瞽䏂殺人臯陶執之而不釋見上篇注為舜者豈不能赦其父哉蓋殺人而釋之則廢法誅其父則傷恩其意若曰天下不可一日而無法人子亦不可一日而亡其父民則不患乎無君也故寧與其執之以正天下之公義竊負而逃以伸已之私恩此舜所以兩全其適也孟盡心上舜視棄天下猶棄敝屣也竊負而逃遵海濱而處終身欣然樂而忘天下方守禮殺人有司不能執之而徒以聞故世宗得而不問也有如臯陶者執之而不釋則雖欲不問得乎哉然世宗取天下於百戰之餘未易以舜之事望之也然則宜奈何亦置諸法而已矣法有八議而貴居一焉禮秋官小司寇以八辟麗邦法附刑罰六曰議貴之辟為天子父可謂貴矣此禮律之通義也一置諸法而兩不傷焉何為不可哉十先生奧論注後集卷九
