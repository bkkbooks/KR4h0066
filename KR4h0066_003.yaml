body:
  text: 十先生奧論注前集卷三雜論胡寅秦李斯獻䇿始皇用之燒經書坑學士謂可以杜異志息誹謗者矣然沛公一起言太公兵法運籌決勝者張良也説下秦將使連和者陸賈也收秦圖籍薦大將撫根本者蕭何也陳奢麗取滅亡之戒者樊噲也將思歸之士出南鄭定三秦者韓信也脫挽輅論咸陽形百二之利者婁敬也自餘如參陵平勃之徒莫不以材智䇿勳為漢宗臣計其生時秦于楚尚未得華陽夫人也始皇又何在而此羣雄或伏於胥吏困於卒伍屠狗販繒寄食乞憐姓名不聞而往往已有喋血咸陽葅醢祖龍之志矣始皇既不得而坑之方且虞心非巷議之人治偶語非今之罪是猶大川泛濫壞隄橫決而區區於捧土增石窒罅補漏不亦愚之甚哉史謂秦愚黔首夫黔首固多愚不待秦而後愚也其不愚者非秦所能愚也然則滅仁義之塗絶諫説之辨以一身而讐視四海之人將以遏其口屈其心至於賊至而不知創迫而不免是則自愚而已矣豫讓君子為名譽而為善則其善必不誠人臣為利祿而效忠則其忠必不盡雖然滔滔皆是也之人也殆庶幾乎美觀而不足於夷考矣使智伯有後而豫子為之奮不顧其身報仇之心未可知也智伯無後矣氣勢無所可倚矣富貴無所可求矣子孫無所可托矣而讓也不忘國士之遇以死許之至再至三而愈篤則無所為而為之者故曰真義士也此非特可為委質事人之法無所為而為善雖大學之道不過是也襄子知其如此獨無以勉而旌之乎而終於殺之何以為人臣不懷二心者之勸哉前史列讓於俠士非也項羽莫強於人心而可以仁結可以誠感可以德化可以義動也莫柔於人心而不可以威劫不可以術計不可以法持不可以利奪也項籍生於戰國耳不聞先王仁義之事目不覩先王禮樂之化其所知者惟攻戰爭鬭耳彼其見白起坑趙卒於長平必以為豪敢武勇而慕向之也雖其天資禍賊亦有所效而為之此二十萬人者心既不服即速坑之使秦民皆不服可盡坑之乎昔周既勝商商之餘衆蠢有異謀周公東征去其渠魁而已建成周遷頑民選用畢公君陳為之父師教訓漸磨至千三紀然後丕變昔商今周混無異俗大哉逺乎聖人之處事也向使周家有怨疾之心奮於殄戮非無餘力仁恩不足而刑殺是煩懼而亂者衆矣不此之法而惟殺是務二十萬人不服羽得而坑之諸侯王不服四靣而起羽獨且奈何哉張良重義之人一飯必報寡恩隆怨者雖宗國猶將使人覆之心一也而差别如此夫一飯薄禮猶不忘報則可以見其仁矣相國之祿萬鍾豈真一飯也五世之相其為飯多矣良區區於此豈為利哉君臣之義不可廢也魯莊公以千乘之國不能復其父仇而良以亡國之臣匹夫之力伸志義於天下人之能否相去豈不逺哉或者著論以謂良年少輕用其心奮一朝之怒僥幸其成黃石老父素不喜也故為後期之約墮履之事以屈折其虛氣使能忍以就大者是不知良也良本為韓報仇非有事漢之志者苟能斃吕政於一椎則其心愜矣或者之言虞其敗耳是不然夫以秦皇狙詐之智虎狼之威千乘萬騎之衆揮椎奮擊既無覺者良非獨免併免力士其智略之妙固已視吕政如罝中狐兔何敗獲之憂乎是以淺淺待良矣韓信司馬氏曰韓信之功大矣觀其拒蒯徹之説迎髙祖於陳豈有反心良由失職怏怏耳盧綰里閈舊恩猶南面稱王信乃以列侯奉朝請世言髙祖負信則有之雖然信亦有以自取也下齊不報而自王固陵有期而不至是乘時徼利懷市井之心髙祖欲取之久矣顧力未能耳及天下既定則信復何恃哉愚謂功過當相凖信功齒三傑不可忘也迎陳之禮可以贖自王之釁拒通之意可以免失期之罪未有反計則當侯以次國逆謀既露猶當宥其子孫如此則漢祖紀信之功討信之罪各盡其道而無負矣十先生奧論注前集卷三
