body:
  text: 十先生奧論注後集卷十五進論四篇葉適外論一此篇論待夷狄之道有三臣為外論四篇其三篇言今事著其首篇曰為國以義以名以權中國不得夷狄義也中國為中國夷狄為夷狄名也二者為我用故其來冦也斯與之戰其來服也斯與之接視其所以來而治之者權也中國雖貴夷狄雖賤然而不得其義則不可以治不得其名則不可以守不得其權則不可以應三者并亡譬猶舍舟楫而濟深淵以勇怯為沉浮幸而得濟不可為容不幸溺沒死且及之矣後世之事是也自嚴尤論夷狄以為前世未嘗有上䇿前胸奴傳嚴尤書曰胸奴為害從來久矣未聞前世有必征者也後世三䇿周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿至唐太宗能擒頡利郡縣諸戎始以嚴尤為非通鑑貞觀三年突利可汗入朝上謂侍臣曰往者太上皇以百姓之故稱臣於突厥朕嘗痛心今單于稽首庶幾可雪前恥靺羯遣使入貢上曰靺羯逺來蓋突厥已服之故也昔人謂禦戎無上策今治安中國而四夷自服蓋非上策乎若太宗者所謂上策歟噫亦陋矣以先王之待夷狄何策之可論又况從而區别之與秦漢並稱乎若太宗者又真以為有策則是不能知先王所以待夷狄之意而何自謂上策乎堯舜之時南自淮徐東被青州之境土凡海濵廣斥山谷深袤之地教治所不及者大抵皆夷狄也蓋與中國錯居又非若後世有玁狁獯鬻乃在長城之外相去且數千里而以為難治也前胸奴傳序云胸奴其先夏后氏之苗裔曰淳維唐虞以上有山戎玁狁薰鬻居于北邊堯舜之土地至狹又無利兵危矢詐謀竒計而夷狄不能侵暴者名義與權皆得也嗟夫中國之所以為中國以其有是三者而已苟捨其所以必勝之具而獨以詐力為用是既以化為夷狄矣其至於紛紛何足怪乎蓋自戰國並起三百年之間秦人最為雄小國次第亡滅廣大其地而為六國秦又滅六國合天下而盡有之又欲兼取胸奴秦人之暴甚於夷狄矣漢起匹夫親摶天下不數年而據秦之故地此其為仁義道德足以懷柔其民者何在奈何冒頓反不能控弦數十萬以慿陵邊塞入至太原晉陽乎前胸奴傳單于有太子名曰冒頓漢方與項羽相距中國罷於兵革冒頓得自強控弦之士三十餘萬自淳維以至頭曼千有餘嵗至冒頓而胸奴最強大盡服從北夷與諸夏為敵國時漢初定徒韓信於代郡馬邑信降胸奴胸奴引兵南侵太原至晉陽髙帝自將兵擊之至平城冒頓縱兵三十餘萬騎圍髙帝於白登蓋三者自是并亡不復有中國夷狄之分矣特以地勢相别異耳力強則暴師轉餉深入屠戮如摯取禽獸力弱則俯首屈意出金銀繒帛愛女以壻之同上以金繒子女與胸奴和親使之為壻亦獨何所愛張良陳平蓋策士而絳灌之為丞相主國論者故奮梃大呼望屋以食之人也是亦安能知先王之意哉獨一賈誼知之以為戎狄召令主上之操天子共貢臣下之體賈誼上疏天下之勢方倒垂天子者天下之首何也上也蠻夷者天下之足何也下也今胸奴僈侮侵掠至不敬也而漢嵗致金絮采繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒垂如此莫之能解臣切料胸奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事羞之陛下何不試以臣為屬國之官以主胸奴行臣之計請必繫單于之頸而制其命伏中行説而笞其背舉胸奴之衆惟上之令雖然誼於制患之術淺矣請自為典屬國用三表五餌而繫之本贊誼欲典屬國施五餌三表以繫單于其術固以疏矣賈誼書云謂愛之狀好之技仁道也信為大操常義也愛好以實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壞其目盛食珍味以壞其口音樂婦人以壞其耳髙堂邃宇倉廪奴婢以壞其腹於來降者上召幸之相娛親酌而手食之以壞其心此五餌也若是者先王待夷狄之意乎真使丐奴不當漢一大郡此何足治而况本不計強弱者乎夷狄嘗苦中國無信義甘言厚利以相啖説首開兵端志在誅剪然則中國之不振其失道久矣豈一日之故也世無堯舜湯武待夷狄之意終不可見無稷契伊尹終不能秉法陳義以佐其君其所誦習以為笑於天下者蓋書籍之章句耳嗟乎有名義而不能執有權而不能用或伐或和視其勢之強弱而不能定此漢唐之事不足論也是既然矣執之於無所執用之於無所用以和為與之為一而天下之人熟於聞見不知其為中國夷狄之異者此祖宗之事臣不敢深論也臣之所論者一事自景德元年與契丹盟更六聖百二十年聘使往來天子親與之揖遜於庭未嘗一日敗盟約也女真本小種落屬於契丹者不幸天祚失道使得猖狂破取其國天祚以為與大國義兼兄弟當來役我或遂不復其國則望白溝以南自歸當是時中國以大義之故遣十萬衆制女真使不得逞彼知大國為之助其勢何遽至此也豈與約並滅其國分取幽國故地以為功者比乎失此不念遂有今日然則夷狄雖逺而常以信義望中國中國以夷狄為不義是以不用而信義之不知此其所以為中國者本不以夷狄之無而廢也夫兼考前世成敗之故深思今日致患之本復修先王三者之道則中國之待夷狄固無難矣何必勞神於智計鬬勝於士卒益趨於末而不能反哉故夫若不足聽而決不可易者臣之論是也外論二此篇論征伐和親是非利害秦漢以來待夷狄者不和親則征伐何也其術盡於此矣和親主辱名卑而民得安征伐有功則主榮名尊而民傷無功則主與民俱傷而有功常少無功常多是以後世之論是和親者十九天必有征伐之害而後知有和親之利先王未嘗征伐夷狄雖不與之為和而亦不與之為怨是故無以卑吾名而亦無以喪吾實雖然先王之道不行久矣而今日之請和尤為無名夫北地乃吾仇也非復可以夷狄蓄而執事者過計偕夷狄之名以撫之夫子弟不能報父兄之恥反懼仇人懷不釋憾之疑遂欲與之結歡以自安可乎往者紹興行之天下不厭紹興髙宗朝至於廢逐大臣誅殺名將盡黜異正者空士大夫之列洶洶數嵗而後定一旦聞其敗約始舉不得已之兵以應之天下因又自言復讎為事暴師淮水之上久未有功宰相仍用前策建請罷督師徹攻具出東西北道四要郡以與之而復為和俄而邊又大出天下之心凛然以為盟誓必不可保然自是疆圉無事又十餘年虎卧在庭其起無時室中之人不得安也使無弓矢陷穽或不免徒手以摶之以必死為決猶愈於坐而待其下也若有弓矢陷穽可也乃畏虎而不敢用何哉嗚呼失吾所操之具而聽虜之自為是獨何時而可也今天下非不知請和之非義矣然而不敢自言於上者畏用兵之害也其意以為一絶使罷賂則必至於戰而吾未有以待之故也乃其以為不可而敢自言於上者非真知其義之不可也直媒之以自進也非可用以當戰也故真知其義之不可者皆內愧竊嘆而不敢言也真知者不敢言敢言者不足信然則今之所以自備益疏略矣今日之議臣不敢獨以告於上庶幾執事者皆知之昔祖宗之世也內治已足則所謂求和親之利者為保全邊民計耳是不憚自屈而力行之可也今日存亡之憂不得尚用往事為比使其復如辛巳甲申忽擁大衆以求戰和固不可且其崛起強暴而據吾大半之土壤已五六十年矣如使復為天祚盛極將亡它人出而有之和而不可也蓋非惟其義之不可而勢則然矣昔祖宗之世也唯其有以馴養契丹使不敢桀傲則兵可以至於不用今日之兵其決不可不用矣其用有早暮遲速耳而早暮遲速又非大相遼也逺者五六年近者三四年其尤近者或在朝夕耳然而執事者畏一戰之故不敢以告其上因不復為之慮幸其事之不在已引而去之夫憂在子孫者偷吾身之不及見焉可也憂在吾身而有出於十數嵗之外者偷目前之未及見焉可也今也無十年之逺有朝夕之近是固不可免之急患也相顧而終未敢言者何也賈誼以為抱火厝之積薪之下而寢其上火未及燃因謂之安以誚絳灌之徒賈誼上疏陳政事其大略曰臣切惟事藝可為痛哭者一可為流涕者二可為長太息者六其他背理而傷道者難遍以疏舉進言者皆曰天下已安已治矣臣正以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火木及然因謂之安方今之藝何以異此今積薪盡為火矣寢然火之中不知奮迅於烈熖以自免而坐待其灼爛者是固不必誼之智而後誚之也以臣計之一戰之可畏猶未足畏也然雖絶使罷賂而臣以為猶未至於遽戰者蓋求戰在敵使之不得戰在我若此之術執事者所當思也夫勝敵固有道用兵固有法所當施行者固有次第矣執事者猶未敢聞其始而臣安敢詳其終且今之能言者衆矣不度本末不量深淺而厯數天下之至計以自衒鬻此其可用者安在夫惟以復仇為正義而明和親之決不可為自此以往庶有可得而論者外論三此篇論用兵必有先勝之形羣臣雖不敢勸言兵事知陛下意欲有所發久矣復仇之義四十年不舉過已在前矣一日之舉難以嘗敵非百全必勝不可為也今一日而驟舉之與嘗敵而無異此羣臣所以不敢言也雖然不敢言何益豈若相與善謀乎七年之前始命使祈請於敵當時舉朝以為非計其後三年又議進書事敵嘗馳一介來未見答我復遣使敵亦未測吾意所在此三者皆足以開隙於邊然而卒不聞有他釁以此策之尚未動也或者內有難不暇與吾角或者上下畏兵苟欲無事或者不肯先發坐觀吾變是皆不足為憂然陛下昨必為是何也豈非以為兵惡無名思所以致之乎吾用兵之名若雷霆久蟄藏而不震一日可用即用耳何憂無名而必為是乎臣以為過矣夫苟惡其無名則是未能知用兵之名直論彼我強弱之勢耳此其勝負未可知也吾有必勝之名又有必勝之實而患不為其所必勝者譬若尋常姑以力相摶而已此則可畏也臣聞古之善舉事者必有先勝之形使吾之國人曉然自知其所必勝而敵不知若此者勝不然敵見吾之所長亦曉然自知其不可當不必外示損弱若此者亦勝內則吾國未知其必勝外則敵人不知我為必勝若此者謂之危兵危兵難用噫今日之事豈止拔一城取一郡或敗其一將數萬人乃為勝敵乎以此為勝敵兵鬬禍結未有已也桓溫謝安嘗再得中原而無救於晉之衰事見晉載記及晉書本傳今日之兵不五合六并使北方之勢皆在已雖盡取河南鼓行入京師薦告宗廟修奉陵寢若東無齊西無秦北無趙魏三面猶為界守臣尚不知所終而况止於拔一城取一郡或敗其一將為功乎往日之事是已聚數十萬兵於境上一破靈壁虹縣遽謂一月三捷既而偏師不利又自謂敗撓因以罷兵為和輕計寡謀不翅如兒戲而謂今日之兵當復然乎豈以多殺人為用兵乎諸葛亮止用梁益故決取秦隴然猶使吳并攻事見蜀志今天下中裂四方皆可用事臣不知其為計者果何如也雖然此猶非臣之所必知臣之所必知者陛下用事之勢夫用事之勢必使輕利而易為不使重困而難舉何者夫鷹隼乘風髙入於雲漢視禽鳥所在而摶取之駿馬日馳千里過都越國恍然若無所見此其以輕利捷疾故能勝物若夫爰居腹融非不大也避風於魯東門而不能去駑馬載重行才十數里復遇天雨喘息躑躅而不能進此皆困重之勢也唐太宗取天下滅夷狄得輕利易為之勢故兵不難動動必有功兵休事已無復後患而天下卒以平治今日之事實有困重難舉之勢前日賣茗飲者數百人為曹偶以抗官軍此不過弓手十將之事一兵官足以制其命矣而猖獗嵗餘聲入閩領常罷斥兩帥選擇使者僅而獲之若此者其可以遇大敵乎使如太宗彼此前後所向必應而無後憂其將能乎祖宗以天下之大困於區區夏人之數州者蓋以上下牽制首尾顧望內外異同困重而難舉也今其勢復然陛下亦自知之矣雖然變困重難舉之意使有輕易為之風者此其事不在兵不在將在朝廷大政紀綱憲度之際而已噫是又未可以一二言者也臣所謂先勝之形蓋在此矣外論四此篇論淮南北防江形勢外可以攻內可以守全國也外不可以攻內可以守僅存之國也可以攻而不為必攻之形不足以守而為固守之勢折強大以就弱小臣不知其説也何謂可以攻而不為必攻之形今之淮南北是也使吾欲得志於邊非益進深入盡吾境而與之守立萬死百敗之地以示其不可遏之鋒則足以庶幾於有成而况委棄垣墻視為荒間無用之處而無經營分畫之要乃坐困內地助虜自攻中外抵掌但以復得故地為言是欲不出户庭而遙策門外之事者歟何謂不足以守而為固守之勢今之防江是也上流有武昌之兵下流有京口秣陵之兵皆重兵也淮無宿師故恃三鎮為巨防夫以孤江與敵為對則三鎮不得不守今淮南北尚不憂其有失也何必預憂其有失而守江乎善守者四夷左昭二十三年古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境結其四援民伸其野三務成功民無內憂而又無外懼國焉用城今不及矣守其境可也不守其境而守其室兵甲不在邊而在堂不知今日之所謂守者何名也匹夫小人衣食於千里之外當樽俎匕筯之間而能有逺思今處門內之事非必智者而後能也如農夫之自耕其田耳所以耘耨耒耜之日熟矣然且輕重失宜緩急失中首尾顛錯而無據其於天下之大計臣固知其不及也悲夫昔孫氏以謀臣之多將士之徑且精平生百戰之勤欲望淮南尺寸之地而不可得今包兩道而有之方千里十九郡使之塵沙莽然民物凋殘城戍衰弱雖建立官吏而人有搖心不能自保曽無長久自立之意徒欲內守江左以為百世不傾之基豈非與古人異謀哉雖然上則亦知淮之可重矣其所以欲為而輒止者有二患一則以為嘗與定約無置大兵今且赫然增備益守勢必來爭或備守不足則未能為益而先有所喪一則以為既分要害畫守禦必當付之其人禮有所在則或以成他且藩鎮跋扈之事而臣以為二患者皆非今日之所當慮且雖使淮上地如今日未置大兵若有善吏守之雖猝以數萬衆來攻之不能克捨之不敢過也豈有增備益守而先憂其敗者乎夫守吾之要地所以致敵之必爭大事之機蓋見於必爭之日且敵能以虛言空約禁吾不敢守要地又得吾重賂不戰而勝孰甚於此善為國者擇人而已方欲有事安能盡使權不分如文欽諸葛誕固不闕預亦可乎藥非烏喙無以療吾疾而烏喙之毒亦能殺人則善醫者制之而已以其毒而并廢其藥而吾之疾不可救矣夫今之所謂繁盛雄富者二浙七閩耳皆區區吳粵僻陋不足較之地強弱成敗之所不在也略淮而守江守江以安閩浙此其去中原也逺矣臣嘗患今世之言國事者不見天下之勢而好無益之謀蓋其形便曲折本非人主之所當盡知徒以紛亂外則失委任將帥之意而內不能為廟堂一定之策嗚呼自隆興以來天下益多言矣十先生奧論注後集卷十五
