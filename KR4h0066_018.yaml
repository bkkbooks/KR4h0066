body:
  text: 十先生奧論注後集卷三漢晉論張栻漢髙帝此篇論其勝楚者以名正義立故也惟仁義足以得天下之心三王是也髙帝之興亦有合乎此是以能翦暴秦滅强項而卒基漢業方懷王遣將入關諸老將固已謂沛公素寬大長者而心歸之本紀初懷與諸將約王先入定關中者王之懷王諸老將皆曰項羽為人慓悍禍賊不可遣獨沛公素寬大長者卒不許羽而遣沛公至於三章之約其所以得乎民者深矣此非其所謂仁者歟本紀召諸縣豪傑曰父老苦秦苛法久矣吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法吏民皆案堵如故豫每愛三老董公之言以為順德者昌逆德者亡兵出無名事故不成名其為賊敵乃可服三軍之衆為義帝縞素聲項羽之罪而討之於是五十六萬之師不謀而來從義之所感也本紀漢王至雒陽新城三老董公遮說漢王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其為賊敵乃可服項羽為無道放殺其主三軍之衆為之素服以告之諸侯為此東伐四海之內莫不仰德此三王之舉也漢王曰善非夫子無所聞於是為義帝發喪發使告諸侯曰天下共立義帝北面事之今羽放殺義帝寡人親為發喪兵皆縞素悉發關中兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者使斯時髙帝不入彭城置酒髙㑹率諸侯窮羽所至而誅之天下即定矣本紀漢王劫五諸侯兵入彭城收羽美人貨賂置酒髙㑹羽聞之以精兵三萬人擊漢軍大戰雎水上大破漢軍惜其誠意不篤不能遂收湯武之功然漢卒勝楚卒亡者良由於此名正義立故也董公蓋深知其理故其言又曰仁不以勇義不以力上注自留侯而下陳謀雖多而皆未之及嗚呼董公其一時之逸民歟文帝此篇論初政雖善奈無賢佐故不能追三代之盛文帝初政良有可觀蓋制事周密為慮深逺懇惻之意有以得人之心三代而下亦未易多見也文帝以庶子居藩國入踐大統知已之立為漢社稷非為已也故不敢以為已私本紀孝文帝髙祖中子也母曰薄姬髙祖定代地立為代王髙后崩大臣迎代王王曰奉髙帝宗廟重事也寡人不足以稱丞相平等皆曰臣等為宗廟社稷計不敢忽願大王幸聽遂即天子位有司請建太子則先示博求賢聖之議而又推之於吳王淮南王有司請王諸子則先推諸兄之無後者而立之其辭氣溫潤不迫其義誠足以感人也本紀元年有司請早建太子詔曰云云今縱不能博求天下賢聖有德之人而嬗天下焉而曰豫建太子是重吾不德也謂天下何有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也春秋髙閲天下之義理多矣吳王朕兄也淮南王弟也皆秉德以陪朕豈為不豫哉有司固請曰子啓敦厚慈仁請建以為太子上乃許之凡所以施惠於民者類非虛文皆有誠意存乎其間千載之下即事而察之不可掩也史於其編年曰帝既施惠天下諸侯四夷逺近歡洽乃修代來功同上六月令郡國無米獻施惠天下諸侯四夷歡洽乃修代來功觀諸此又可見其明先後之宜而不敢私已記史者亦可謂善發明矣其待夷狄蓋亦有道以南越尉他之强恣自髙帝猶難於服之而帝特施恩意遣使遺以一書而他即自去帝制而下令國中稱漢皇帝賢天子皇恐報書不敢慢豫嘗詳味帝所與書則知忠信之可行於蠻貊如此書之首辭曰朕髙皇帝側室之子也棄外奉北藩于代蓋後世之待夷狄往往好為夸辭於是等皆在所蓋覆矯飾以示之者也而帝一以其實告語之彼亦豪傑也見吾推誠如此則又安得不服故其報書首曰老夫故越吏也文帝不以髙帝側室之子為諱則他敢以越吏為歉哉若吾以驕辭蓋之則彼必且慢以應我矣推此一端忠信可行於蠻貊可不信哉南粵王趙他秦二世時行南海尉事秦已滅陀自立為南粵武王髙帝已定天下釋他不誅遣陸賈立他為南粵王與剖符通使使和輯百粵毋為南邊害髙后時他自尊號為南武帝發兵攻長沙邊敗縣文帝初鎮撫天下乃使陸賈賜他書曰皇帝謹問南粵王甚苦心勞意朕髙皇帝側室之子棄外奉北藩于代道里遼逺壅蔽朴愚未嘗致書王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患從今以來通使如故陸賈至南粵王恐乃頓首謝願奉明詔長為藩臣於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣他昧死再拜上書皇帝陛下老夫故粵吏也云云今陛下幸哀憐復故號通使如故則老夫死骨不腐今改號不敢為帝矣以文帝天資之美初政小心畏忌之時得道學之臣佐之治功之起豈不可追三代之餘風惜其大臣不過絳灌申屠嘉之徒獨有一賈誼為當時英俊而誼之身蓋自多所可恨而卒亦不見庸也賈誼傳天子議以誼任公卿之位絳灌之屬盡害之云云天子後亦疏之不用其議故以帝之賢僅能為一時之小康無以垂法於後世於淮南薄昭之事未免陷於刑名之家衰世之事淮南厲王長傳長立為淮南王自以為最親驕蹇數不奉法六年後所犯不軌制曰其赦長死罪廢勿王處蜀嚴道卭郵不食而死又通鑑將軍薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使羣臣喪服往哭之乃自殺又前儒林序孝文本好刑名之言至於即位嵗久怠肆亦萌新垣平之邪說故得以入之然終以其天資之髙旋即悟也前郊祀志新垣平使人持玉杯獻刻曰人主延夀所言昏詐下吏誅垣平其終詔曰惟年之久長懼于不終本紀十年帝崩遺詔曰朕既不敏常畏過行以羞先帝之遺德惟年之久長懼于不終今乃幸以天年得復供養于髙廟蓋可見帝之能察乎此矣嗚呼亦賢矣哉故豫尤惜其諸臣之無以佐下風也武帝此篇論奢侈窮黷而不至於亂亡者有四事武帝奢侈窮黷之事與秦始皇相去何能尺寸然不至於亂亡者有四事焉髙帝寬大文景惠養其得民也深流澤滲漉未能遽泯後王昌傳論髙祖孝文之寬仁結於人心深矣前武帝贊文景務在養民非若秦自商鞅以來根本已蹶民獨迫於威而强服耳前賈誼䇿商君遺禮義棄仁恩此一也武帝所為每與六經戾夫豈真能尚儒者然猶表章六經聘召儒生本紀贊表章六經又本紀遣使者安車蒲輪束帛加璧召魯申公稽古禮文之事未至蕩然盡棄名教如秦所為本贊文景稽古禮文之事猶多闕焉此二也輪臺之詔雖云已晚然詳味其辭蓋真知悔者誠意所動固足以回天人之心而詔下之後不復萌前日之為思與民休息與卒死於行而不之悟者蓋甚有間西域渠犂傳下詔陳既往之悔今請逺田輪臺是擾勞天下非所以憂民也由是不復出軍而封丞相車千秋為冨民侯以明休息思以富養民也秦穆之誓聖人取其悔過列之於書書秦誓往穆公陳戒背賢則危用賢則榮自誓攻前過之意又仡仡勇夫射御不違我尚不欲注自悔之至豫於輪臺之詔每三復焉蓋以為存亡之幾所係耳此三也惟其能悔過也故自是之後侈欲之機息而清明之慮生是以能審於付託昭帝之初霍光當政述文景之事以培植本根昭帝紀上疾病遂立昭帝為太子年八嵗以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主於是興利之源窒而惠澤復流有以祈天永命矣此四也以四者相胥而維持是以能永保其祚向使武帝老不知悔死於熾然利欲之中則决不能以善處其後雖使賴髙文景之澤以免其身旋即殆矣故豫深有取於輪臺之書以為存亡之幾所係也然其能卒知悔者則以其平日猶知講習六經之言聽儒生之論至其力衰而意怠則善端有時而萌故耳然則其所以不至亂亡者豈偶然也哉髙祖光武此篇論創業守文各有所長髙祖洪模大略非光武所及也髙祖起匹夫提三尺取天下本紀吾以布衣提三尺取天下此非天命乎光武則以帝室之胄後本紀髙祖九世孫也因人心之思漢而復舊業其難易固有間矣而髙祖之對乃項籍亦蓋世之豪也光武所與周旋者獨張步隗囂公孫述輩其去籍蓋萬萬相逺矣至於韓信彭越之徒皆如泛駕之馬實難駕御武帝詔夫泛駕之馬跅弛之士亦在御之而已而盡在髙祖掌握之中指麾使令無不如意使光武有臣如此未必能用也然而創業之難光武固不及髙祖而至於光武之善守則復非髙祖所及也大抵髙祖天資極髙所不足者學耳本紀不修文學而性明達即位之後所以維持經理者類皆疏略雄桀之氣不能自斂卒至平城之辱本紀上自將擊韓王信於銅鞮信亡走胸奴上從晉陽連戰乘勝逐北至平城為胸奴所圍七日用陳平祕計得出一時功臣處之不得其道往往赤族韓信彭越黥布相繼謀反夷三族此則由其學不足之故也光武天資雖不逮髙祖而自其少時從諸生講儒學謹行義故天下既定則知兵之不可不戢審黃石存包桑閉玉關以謝西域之質安南定北以為單于久逺之計臧宫傳論審黃石存包桑閉玉關以謝西域之質卑詞厚幣以禮胸奴之使處置功臣假以爵寵而不使之任事卒保全其終始馬武傳帝雖制御功臣而每能回容宥其小失逺方貢珍甘必先遍賜列侯而大官無餘有功輒增邑賞不任以吏職皆能保其福祿終無誅譴者又唐書李靖對太宗光武保全功臣賢於髙祖逺矣凡此皆思慮縝密要自儒學中來至於尊禮隱逸褒崇風節以振起士氣後逸民傳光武側席幽人卓茂傳光武即位先訪求卓茂封褒德侯後之人君尤未易及此非特髙祖也嗟乎以髙祖之天資使之知學為當務則湯武之聖亦豈不可至哉是尤可歎息也光武一此篇論保全功臣不使任職然於用人之道則有未盡光武之不用功臣為三公蓋鑒髙帝之弊而欲保全之前史莫不以為美談以豫觀之光武之保全功臣使皆得以福祿終身前篇云是固美矣然於用人之道則有未盡也二十八將論議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深啚逺算固將有以焉爾蓋用人之道先以一說橫於胸中則為私意非立賢無方之義矣髙祖之待功臣誠非也如韓彭黥布之徒雖有大功要皆天資小人在易之師開國承家小人勿用易師卦云蓋於用師既終成功之後但當寵之以富貴而不可使之有國家而為政也髙帝正犯此義是以不能保功臣之終為光武者要當察吾大臣有如韓彭之徒者乎則當以是待之若光武之功臣則異於是至寇鄧賈復則又識明而行修量洪而器逺以光武時所用之大臣論之若三子者類過之逺甚與共圖政豈不可乎顧乃執一概之嫌廢大公之義是反為私意而已矣抑光武之所責於大臣者特為吏事唐馬周傳周曰光武不任功臣以吏事所以終全其世大臣之職顧如是乎唯其不知大臣所當任之職故不知用大臣之道而獨以吏事之督責為憂抑亦末矣方當亂定之後正宜登用賢才與共圖紀綱以為垂世長久之計而但知吏事責三公賈復傳帝方以吏事責三公故功臣並不用其貽謀之不競亦宜矣光武二此篇論舉遺逸以助成東京風俗之美光武鑒西都末世之弊故汲汲然崇尚風節而不忘遺逸之舉亦可謂知所當務矣蓋自三代而降在上者以爵祿而驕士在下者慕爵祿而求君故上日以亢而下日以委靡人君而能降心以求遺逸則是不敢以爵祿而驕其士反有求乎士之意則於克己養德所助固不細矣况風俗委靡之中而見時君所尊禮延納者乃在於恬退隱約之士豈不足以遏其奔競之風而息其僥幸之意於風俗所助又不輕矣在光武時雖曰舉遺逸然固有召而不能致致而不能用者後逸民序光武側席幽人求之若不及旌帛蒲車之所徵賁相望於岩穴矣若薛方逢萌聘而不肯至嚴光周黨王霸至而不能屈羣方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎而其流風餘韻猶足以革西京之陋而起名節之俗則其為益固豈淺淺哉語曰舉逸民天下之民歸心焉蓋不遺賢於隱逸則天下之賢才孰不歸心賢才歸之是天下之人舉歸之也豈非為治之總要乎然嘗怪嚴子陵竟不為帝少屈何耶考子陵之言論風旨亦非素隱行怪必欲長往而不返者彼與光武少而相從知其心度為最詳也嚴光傳少與光武同游學以謂光武欲為當時之治則當時之人才固足辦之而無待乎已若欲進乎兩漢之事則又懼有未能信從者不然徒受其髙位享其尊禮之虛名則非子陵之本心也故寧不就之然而以子陵為光武之故人名髙一世而竟髙卧不屈光武亦不敢以屈之帝引光入論道舊故相對纍日因共偃卧光以足加帝腹上明日太史奏客星犯御坐甚急帝笑曰朕故人嚴子陵共卧耳除為諫議大夫不屈乃耕於富春山其所以激頑起懦扶植風化助成東京風俗之美人才之盛其為力固亦多矣豈不美哉晉元帝此篇論中興得失為國有大幾大幾一失則其弊隨起而不可禁所謂大幾三綱之所存是也晉元帝初以懷帝之命來臨江左當時之意固以時事囏難分建賢王以為屏翰庶幾增國家之勢折姦宄之心緩急之際實賴其糾率義旅入衛王室其責任蓋不輕矣見本紀而琅琊之入建鄴考觀其規模以原其心度之所安蓋有自為封殖之意無慷慨謀國之誠本紀年十五嗣封琅琊王永嘉初用王導䇿移鎮建鄴以顧榮為司馬賀循為參佐王導王敦周顗刁協為腹心賔禮名賢存問風俗江東歸心焉懷帝卒以䝉塵迄不聞勤王之舉永嘉五年懷帝䝉塵於平陽七年為劉聰所弒愍帝之立增重寄委制詔深切而亦自若也本紀愍帝即位丞相大都督中外諸軍事又建武二年宋哲至建康稱受愍帝詔令琅琊王統攝萬機祖逖擊楫渡江聊復以兵應其請反從而制之使不得有為則其意不在中原也審矣逖本傳時帝方拓定江南未遑比伐逖進說云云及渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎逖至豫州大興政事北地遂平由是黃河以南盡為晉土逖方當推鋒越河掃清冀朔㑹朝廷將遣戴若思為都督逖意甚怏怏感激發病俄卒坐視神州板蕩戎馬縱橫不以動其心不過欲因時自利云耳愍再䝉塵懼天下之議已則陽為出師之勢遷延顧望終歸罪於運餉稽緩斬一無辜令史以塞責赤眚之異亦深切矣吾誰欺欺天乎夫受君父之委託而坐視其禍變因時事之囏難而覬幸以自利三綱淪矣唯其大幾既失故其所以建國規模亦復不競亂臣賊子如王敦者不旋踵而起蓋其弊有以致之也永昌元年正月大將軍王敦舉兵於武昌以誅劉隗為名使元帝痛懷愍之難篤君臣之義念家國之讎率江東英俊鼓忠義之氣北向討賊名正理順安知中原無響應者以區區一祖逖崛强自立於羣豪之間猶幾以自振祖逖言於帝曰大王誠能命將出師使如逖者統之以復中原郡國豪傑必有望風響應者矣帝素無北伐之志以逖為奮威將軍豫州刺史遂屯淮陰起冶鑄兵募得二千餘人而後進况肺腑之親總督之任數路之勢何所不濟哉惟其不以大公為心而私意蔽之甚可歎息也其餘得失豫不暇論獨推其本而言之溫嶠此篇論絶裾之事不能無憾溫太真忠義慷慨風節表著足以為晉室名臣古今所共推不待詳言然吾獨有所恨者絶裾之事也本傳平北大將軍劉琨以嶠為參軍元帝初鎮江左琨誠繫王室遣嶠將命琨死除嶠散騎侍郎初嶠欲將命其母崔氏固止之嶠絶裾而去其後母亡嶠阻亂不獲歸葬由是固讓不拜苦請北歸詔不許嶠不得已乃受昔之人不以窮達得失纍其心聽天所命而行其性命之情故或仕或不仕皆非有所為也於其身所處之義當然耳自功名之俗興而遷就趍避之說起三綱始隳而不得其正雖豪傑之士一為功名富貴所誘失其性者多矣可勝嘆哉太真少時嘗以孝友篤至稱本傳云云一旦奉劉琨之檄將命江左母崔固止之不可至於絶裾而行上注噫太真有母若此身固不得以許琨矣獨不見徐元直之事乎元直所謂方寸亂矣蓋其天性不可已者也而太真獨忍於此乎若既以委質為人之臣當危難而無避可也將命之舉豈無他人太真念母獨不得辭乎度其意不過以江左將興奉檄勸進徼幸投富貴之幾赴功名之㑹耳而其所喪不過甚乎或曰使太真來江左則寧復有後世之事業太真固不得以兩全矣此殆不然昔人之事業皆非有欲而為之事理至前因而有成之耳若懷希慕求必之心則其私欲而已苟可以就異日之事則凡背親賊性皆可以屑為此三綱之所由壞而弊之所由生也故伯夷叔齊均不受其國夫子以為求仁而得仁史伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊遜伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子語述而子貢曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨商之三臣微子不得不去箕子不得不為奴而比干不得不死皆素其位而行也語十八微子去之箕子為之奴比干諌而死孔子曰殷有三仁焉注云微子紂之庶兄箕子比干紂之諸父微子見紂無道早去箕子徉彺為奴比干以諫見殺豈直太真之事業為不足道就使太真能佐晉室剋復神州一正天下勳烈如此浮雲之過太虛爾豈足以塞其天性之傷也夫太真順母之心而終其身雖泯滅無聞於後顧其所全者大於身無愧烏能以此易彼哉故豫謂太真稱為功臣之士則可尚論古人則可憾矣謝安此篇論其運用英豪以成肥水之功苻堅掃境入寇方是時晉室之勢亦甚殆矣梁益既非吾有而襄沔復為所破在它人宜恐懼失措之不暇而謝安方且從容應敵不過以江北軍事付之謝𤣥及劉牢之輩卒以成功蓋其方略素定非僥幸苟然也晉本傳苻堅率衆號百萬次于淮淝京師震恐加安征討大都督安夷然無懼色旋命駕出山墅親朋畢集方與𤣥圍棊賭别墅遂游涉至夜乃還指授將帥各當其任既而兄子𤣥等破堅有驛書至安方對客圍棊看書了無喜色安明於用人考察既精不以親疏而廢𤣥有謀慮善使人本傳而牢之勇鋭出衆本傳謝𤣥北鎮廣陵時苻堅方盛𤣥多募徑勇牢之以驍猛應選𤣥以牢之為參軍領精鋭為前鋒百戰百勝號為北府兵敵人畏之安所施置各得其宜蓋用兵之道當以竒正相須使元將重兵于後此正也使牢之將精兵迎擊于前此竒也秦兵既近洛澗牢之攖其鋒直摶而勝之固已奪其心矣通鑑晉孝武紀秦將軍梁成等帥衆屯于洛澗柵苻融遣朱序來說謝石等使降序私謂石等曰云云今乘諸軍未至宜速擊之若敗其前鋒則彼已奪氣可遂破也謝𤣥遣劉牢之帥精兵五千趣洛澗未至十里梁成阻澗為陳以待之牢之直前渡水以擊大破之斬成淝水之戰其勝算已在目中故秦兵一退風聲鶴唳以至山川草木皆足以懼之惟牢之先奪其心故也載記苻堅傳堅與苻融登城而望見部陳齊整將士精鋭又北望八公山川草木皆類人形顧謂融曰此亦勍敵憮然有懼色又謝𤣥傳苻堅自率兵次于項城衆號百萬𤣥等之衆凡八萬堅列陳臨淝水𤣥軍不得渡堅衆皆曰宜阻淝水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐵騎數十萬向水逼而殺之遂麾使却陳衆因亂不能止於是𤣥與琰伊等以精鋭八千涉渡淝水决戰堅中流矢餘衆棄甲宵遁聞風聲鶴唳以為王師至安之方略可謂素定矣惟其素定故安靜而不撓其矯情鎮物豈固為是哉夫有所恃故耳安本傳𤣥等破堅安了無喜色圍棊如故客問之徐答云小兒輩已破賊既罷還內過户限心喜甚不覺屐齒之折其矯情鎮物如此至於却上流之兵又其一竒也得上流之兵不足以助益而適足以銷薄聲勢搖動人心桓冲是舉亦無謀矣桓冲傳苻堅盡國入寇冲深以根本為慮乃以為遣精鋭三千來赴京都謝安謂三千人不足損益而欲外示閒暇時安已遣兄子𤣥及桓伊等諸軍冲謂不足以為廢興歎曰謝安不間將略今大敵垂至方遊談不暇惟遣諸不經事少年衆又寡弱天下事可知吾其左衽矣吾慮既定一却其兵而戰士之心益固國內之情舉安安見之明且審矣嗟乎國之所恃者人才耳以當時晉室之勢獨任一謝安足以當苻秦百萬之師以豫觀之非特安方略之妙抑其所存忠義純固負荷國事直欲與晉室同存亡故能運用英豪克成勳業誠與才合故也大抵立大事者非誠與才合不足以濟若安者其在東晉人物中傑出者哉十先生奧論注後集卷三
