body:
  text: 十先生奧論注前集卷六雜論陳傅良秦聖人之未生箕踞而坐不揖而食便於人情而適於四體之安也有聖人者出然後教之以禮樂董之以政刑而治化大行焉其衣以黼黻文章其食以籩豆簠簋其耕以井田其進退選舉以學校其治民以詩書嫁娶死生莫不有法及世之衰民風日變其始也敢疑于上而不敢議其後也敢議而不敢怨又其後也敢怨而不敢為亂其所由來者漸矣三代之末陵夷至于戰國一旦以六姓之遺黎無故而虜於不仁之秦則夫英雄豪傑之士藴怒者滿天下也而秦之自居過尊居民過卑而天子至於不可指而民至於不得言笑夫自居過尊而天子至於不可指則傲然孤立而其勢甚隔居民過卑而民至於不得言笑則窮而無所告欣蓋其屈於闕威重者易犯而峻於自立者人將有所弗堪而思亂秦之所以自威乃所以自孤也歟項羽昔者鄧侯不殺楚文王而楚卒滅鄧楚子不殺晉文公而晉卒敗楚項籍不殺髙帝而漢卒誅項氏志士至今惜之嗚呼必殺其所忌而以得國則安知天下之禍將不出於其所不足忌者哉夫變之來也無常而英雄猾桀其伏也無盡變之來也無常則不可以逆定英雄猾桀其伏也無盡則形索而計取也必不及是故詳於禁者有法外之遺姦工於謀者有術中之隱禍詩曰魚網之設鴻則罹之網以伺魚也而顧以得鴻天下之事又焉用專於其所圖而淫怒焉以逞哉夫專於其所圖而淫怒以逞者則必有所不可支者根之於其不意昔秦覆滅諸侯其所憂者六姓之逋士也於是不愛重寶致天下之豪傑而殱其黨始皇之為計亦密矣而不知亂秦者則刑餘之弄臣而卒亡之者皆其不虞之厮𨽻戍卒也髙帝定天下亦惟韓彭黥布易動而難蓄三人死宜於果無事者而祿産之孱弱幾盜天下孰謂秦漢之盛而忌此族哉由是觀之患不在於縱敵而多殺無益於弭寇故先王無盡敵之術而有無敵之仁非其佚寇之為虞而惟速寇之為懼蓋以吾惟致力於此焉足矣而挾詐以墮讐而幸其不吾釁則亦不敢知也抑嘗觀書至於周公之命微子乃曰𢎞乃烈祖萬邦作式且以新造之國於未盡亡之商而侯其賢子則錮之之辭隄防之具也宜悉而周公勸之以祖若不屑於留天下而欲其復商之舊云者至於所畏則無告窮民而其勢不能患乎上者嗚呼周公可謂知所畏矣彼范增者滋羽之暴徒欲斃漢於一擊吾恐項氏之憂不在沛公而在肘腋之間也項羽吳王濞天下之大利非利於小者能圖之也圖天下而利於其小則終不足以有就何者所安者陋焉能及逺見其食而貪焉是不過飽其欲則已矣昔黥布崛起淮南薛公遂揣其必無上計髙帝一見陳豨決知其為易與蓋以布驪山之徒必甘心於長沙而無後慮豨不能守邯鄲而負漳水其志固已狹矣姦雄盜賊之所以不得志於天下其惟利於小而害之也哉故項羽捐關中之勝而榮於歸故鄉之楚吳王濞不趨洛陽用武之地而豢於食梁以厚其資君子已知其不能為矣人皆咎羽却韓生之謀吳有桓將軍不能用以愚觀之二子之計行亦僅足紓吳項之死而已烏能使之得志乎以羽之淺中其易盈也如此豈復有王者之量設得全關而居之亦不保其不躑躅而東也以濞之冒於一逞而急於徇地之利雖至洛陽亦豈能安食敖倉之粟以徐應漢軍之懈哉猶將疾馳而嘗試之矣嗚呼羽日躍而東濞以其鋭疾馳而嘗試之是豈足以當髙帝百戰百敗之忍撓條侯堅壁之守哉不失之彼則失之此利於小而克有就者未之聞也昔重耳之亡至齊而遽安從者力以為不可劉季入秦一無所貪范增已信其有大志自古覘人之成敗者其説蓋如此范增髙祖畏范增幾為所禍者數也范增在豈真足以帝楚者哉君臣之間非其相濟不足之患而惟其相正以裁其過之難項氏之斃惟其暴也力疲於亟戰勇衰於屢逞而恩信失於好殺是皆羽之所以取亡而增也又佐而決之猶御奔馬且疾鞭馬汗而不知止以速其逺至焉有不敗者哉是故亞夫未去楚亡兆矣何者其鋭略盡則其末固易取也蓋嘗論之羽雖悍戾猶有可感而入者欲坑外黃而愧於舍人兒之一言欲烹太公而悟於項伯之微諫則戮子嬰弒義帝斬彭生坑秦二十萬衆亞夫獨不可以嘗試曉之耶不惟不曉羽意者增實教之也觀其始末勸羽自急攻之外無異䇿是所謂以火濟火也使增之計一行而楚果亡漢則羽又一秦也增又一商鞅也天下豈能久安楚也哉管仲相桓公桓公好內而管仲亦三歸桓公死五公子爭立齊亂者屢世君子曰齊之亂管仲為之也仲不約公以禮而滋其淫君子咎其亂齊況增怒羽而虐其民則斃楚之咎非增其誰鄢陵之役范文子不欲戰蓋憂慮公之侈將以全晉也髙帝所以勝亦蕭何留侯全之而已其遷於南鄭與淮隂自王帝有所不能忍者向微二子幾以怒敗而增則欲疾攻恣殺以就慓悍之項羽豈所以全羽者乎凡血氣盛於年少而志量淺於更歷之不多增以垂老謀楚而暴不減籍若其尚壯殆將尤焉嗚呼是雖髙帝之所畏吾意蕭相國留侯未嘗不笑其疏而墮於其畫也哉張良二疏事有出於君子之所同知不見於古之人而顧見於後之士者非古之人不後之人若也世不逮古而後見之也昔者周召畢榮之徒非不知居功之為美不若廉退之為髙也然周公終其身不即於所封之魯召公不恱周公挽而留之者無慮數百言畢公榮公皆嘗事文王矣蓋至於成康之世猶未去也何也道德相忘而猜忌之隙不開也士而不遇周召畢榮之世而欲襲周召畢榮之為吾未見其身之不殆者矣人皆喜范蠡髙舉穆生輕去為見幾之君子嗟乎士而志於以遁其君為賢屑然不以事務嬰懷為得計彼亦何等時邪留侯辟穀於韓彭陳黥葅醢之日二疏出關於趙蓋韓楊駢死之際天下至今髙之夫張良廣受不得與周公畢榮之列不足恨也髙帝宣帝之賢而獨與烏喙之越同科不能自齒於設醴之楚可惜也哉韓信樊噲賈誼終軍敵雖小未可以易侮之也以易為侮敵人之國而不危者幸矣秦輕鄭而覆軍魯卑邾而敗績況有大於邾鄭而侮之非天下之至危也哉古之人有以身犯天下之至危而卒成大功者是非妄庸者能之也能者必天下之豪傑也何者天下之事不能皆萬全圖天下之事如必待夫萬全之事而後為之則事之可為者亦寡矣故豪傑之士有乘時蹈不測之淵投非望之隙未見其可否之形而先決其勝負之數者蓋惟以其智必之李靖必欲蹀血虜庭諸葛亮必欲取荆州耿弇之請於光武必欲先定漁陽取涿郡還收富平而東下齊三子者躬言而躬為之卒能不愆其所素定孰謂犯天下之至危皆不足以成功耶昔韓信請兵東擊齊北舉燕趙南絶楚糧道樊噲亦欲請兵橫行胸奴終軍賈誼又請繫單于之頸而羈南越是皆犯天下之至危越國以謀人而信與軍得就其志噲沮於季布誼不用於文帝議者多以成敗優劣之吁噲真妄庸人耳貪禍幸災信不足道也若誼之䇿使帝誠用之安知其終無所成就哉賈生豪傑之士也後世其無以誼身之不行亦以妄庸愚生也哉十先生奧論注前集卷六
