body:
  text: 十先生奧論注後集卷六西漢臣論陳傅良周勃汲黯霍光此篇論三子無學事有出於異天下之常者不幸而有豪傑之士任能而為之鮮不以誤夫世之妄庸者也何者乏其器而喜為其事未能其心而逐其迹適以誤之也巳矣李廣不擊刁斗而將有廣之才可也他將而為之則必以失律敗廣出擊胡行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛幕府省文書然亦逺斥候未嘗遇害食野葛而不死舉世曹公而已強而學曹公者皆速斃之道也古之君子有餘不敢盡制行不以巳豈非樂道天下之常以無誤人也哉昔者子路使子羔為費宰夫子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學而子路失言聖人闢之固矣聖人不闢子路之失言而責其有禦人之佞何耶蓋不學而自能由也可為之而欲以強中才之子羔固夫子之所疾而所謂賊夫人之子者也它日聖人語之以六蔽以為好仁好智好直好信好剛好勇皆不可以不好學其悟子路之旨微矣世之論者皆曰周勃之安劉霍光之立宣汲黯之憚淮南皆以無學得之士亦奚貴夫學勃為人木強敦厚髙帝以為可屬大事勃不好文學每召諸生説事東鄉坐責之趣為我語其椎少文如此上曰勃重厚少文然安劉氏者必勃也可令為太尉霍光贊光處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保然不學亡術暗於大理淮南王謀反憚黯好直諌守節死義至説公孫𢎞等如發蒙耳始黯列九卿𢎞湯為小吏己而𢎞至丞相湯御史大夫黯時丞史褊心不能無少望見上曰陛下用羣臣如積薪耳後來者居上黯罷上曰人果不可以無學觀黯之言日益甚矣吁兹固子路之所獨能而欲移之子羔者哉吾見未必能其所好而溺於所蔽也必矣與嫠婦處而不亂栁下惠所自能也魯男子而為之則必以自汙故莫若以吾之所不可學下惠之可家語始生篇魯人有獨處室者鄰之嫠婦亦獨處一室夜暴風雨至嫠婦室壞趍而托焉魯人閉户而不納嫠婦自牖與之言子何不仁而不納我子何不如栁下惠然遇不逮門之女國人不稱其亂魯人曰栁下惠則可吾固不可吾將以吾之不可學下惠之可孔子聞之曰善哉欲學栁下惠者未有似於此也世之君子其亦以吾之不能學三子之所能也哉毋自陷於灌夫之倫無術不遜自取大戾以為天下戮也曹參丙吉此篇論寬厚長者嗟夫小人之情最不可使之無所顧也小人而無所顧則其心也狃於為惡而安於犯天下之不義忿戾而不可解而無復冀君子之恕巳故夫疾不仁者不可巳甚而惡惡者不可太明是非為是姑息也猶將有以全之也古之用兵者圍師勿遏窮寇勿迫豈以為不可遏且迫耶蓋窮而迫之者是示之以無生意而厚其毒圍而遏之乃所以決其怒而泄其無聊之謀者也豈惟用兵君子之治人亦烏可俾之厚其毒而泄其無聊之謀也哉彼小人之為姦也亦非不知負天下不美之名而有以來君子之所不赦也惟自知其負天下不美之名故蓋之則猶有所闕君子之赦巳故寬之則庶幾於自新急之闕為君子者不能少忍以徐伺其變而煆鍊縶束之以稔其惡然則小人之無所顧也其罪豈專於小人哉亦君子者成之也古之君子之用刑也固以懲姦也然可以懲可以無懲可懲而不懲所以長亂不可懲而懲亦以長亂周公之制酒誥也於周人之聚飲者殺而商之工湎于酒者姑教之勿殺書酒誥矧汝剛制于酒厥或誥曰羣飲汝勿伕盡執拘以歸于周豫其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之何者有可懲之罪而無受懲之情者莫若宥而勸之以仁也曹參承秦之弊而以擾獄市為深戒蕭何薨使者召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之丙吉相宣帝之刑名而不按贓吏居相位上寬大好禮讓掾吏有罪臧不稱職輒子長休告終無所按驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉因以為故事嗚呼安得寬厚長者如斯人而與之共論周公之意也哉張良二疏此篇論不得與周召畢榮之列闕兮一日不見如三秋兮且輟一日之密邇從事於蕭葛之微亦奚不可者而詩人有三月三秋之懼何者未及旋踵而乘之者至也凡人臣之事君一有所疏外則其分也日隔而君之見知也不深懼其嫌隙也易開忌其復進也交謗而不釋君子安得而不忌也哉昔汲黯與張湯公孫𢎞比肩於武帝之庭蕭望之與恭顯許史共事於宣帝之日𢎞湯之疾黯者恨無所發怒恭顯之與望之不相能又非一夕也重之武帝深昵𢎞湯而貌敬黯孝宣亦以法律右恭顯以書生忌望之二君子立於朝也危矣哉淮陽之命黯所以願出入於禁闥上召黯拜為淮陽太守黯伏謝不受印綬詔數強豫然後奉詔召上殿黯泣曰今病力不能任郡事臣願為郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣淮陽吏民不相得吾思得君重卧以治之平原之遷望之所以雅意本朝而戚於其心者宣帝時選博士諌大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝逺為郡守內不自得乃上疏云云書聞徴入守少府非擇事以為忠也懼有以中之也嗚呼彼賢者不敢離君之左右而懼讒間之中巳孰謂武宣得人為漢家之盛矣乎三代而上臯陶矢謨於內禹臯躬稼於外周召師保亦出為二伯居者無間言行者無愧色無所懼也秦漢以來此風盡矣武安一去咸陽七里而應侯之譖己行白起與應侯有隙秦使王陵攻趙邯鄲時起病不任陵攻邯鄲少利秦益發兵佐陵起病愈秦王欲使代陵將起曰不可秦王自命不行乃使應侯請之起終辭不行秦王使王齕代陵將楚使魏公子將兵攻秦軍多失亡起曰王不聽臣計今如何矣秦王聞之怒強起白起起遂稱病篤應侯請之不起於是免為士伍遷之陰密起病未能行諸侯攻秦急秦王乃使人遣起不得留咸陽中起行出咸陽西門至杜鄠秦昭王與應侯羣臣議曰白起之遷其意尚怏怏不復有餘言秦王乃使使者賜之劒自裁董仲舒左遷膠西幾不免於禍公孫𢎞治春秋不如仲舒而𢎞希世用事位至公卿仲舒以𢎞為從諛𢎞嫉之言於上曰獨仲舒可使相膠西王云云姦鋒之中人固如此也吁君子安得而不懼也乎哉衛青張安世此篇論君臣不可相忌君臣之間可以相忘而不可以相忌也相忌之隙開君臣之道喪矣大凡憂畏生於不足猜疑起於有間上之繩下也太嚴則下之奉上也不敢自盡故操權急者無重臣持法禁者無節士何則有所拘者不能有所縱戚然自危必不能泰然安意為之嗚呼人君之禁其臣使之懼不免之不暇屏迹以逃嫌損威以避禍豈國家之福也哉昔武帝以剛明之資督責臣下自李蔡嚴青翟趙周數相駢死牢户石慶雖僅以謹終亦數被譴公孫賀至於流涕不敢受命賀代石慶為丞相時朝廷多事督責大臣自公孫𢎞後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣材不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不得己拜當時處鈞衡之地如以其身陷不測之淵也至于宣帝其忮克又過之趙蓋韓楊之倫以微罪詘見前篇注其他自全唯陳萬年之順從丙吉之謙虛而已萬年善事人賂遺外戚許史傾家自盡丞相丙吉病甚薦萬年後代于定國為御史大夫吉居相位尚寬大好禮讓髙材之立於朝者未始不纍之也世多咎衛青之事武帝不招士張安世之事宣帝不薦賢青贊蘇建嘗説青大將軍至尊重而天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招賢黜不肖人主之柄也人臣奉法遵職而已何與招士莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權勢如此嗟乎魏其武安以厚賓客為天子切齒霍將軍以秉權萌驂乘之禍其鑒未逺也宣帝始立謁見髙廟大將軍光從驂乘上內嚴憚之若有芒刺在背及光死而宗族竟誅俗曰威震主者不畜霍氏之禍萌於驂乘况青握兵百萬振威沙漠見衛青本傳安世身揔禁旅司國之命魏相曰車騎將軍安世事武帝三十餘年與大將軍定策天下蒙福國家重臣也宜尊其位以為大將軍此固武宣之所以側視貌敬其心難之者使其招士薦賢以取士大夫之譽其能免乎易於否之六四曰有命無咎疇離祉豫之九四曰由豫大有得勿疑朋盍簪所居之世不同其事之所以異也若豫之九四以上行之志不能勿疑而疇離以自守則曠官之刺興否之六四履可危之地不俟有命而朋盍以自助則植黨之患生矣若二臣者未能免朋盍之疑者也孰若自處於疇離之祉也哉嗚呼是非二臣之罪也趙充國龔遂此篇論不利於其名君子之所為非利於其名而為之也利於其名而為之則凡可以得名者無不為也嗚呼飾偽以釣名非深情厚貌者不為也而謂君子為之乎伊尹之告太甲必先己而後湯仲尼於夾谷之書書齊人來歸鄆歡龜陰之田無遜辭聖人豈不知先君之義有功者之不貴矜哉然直言之而不以為愧自為而自書之若有德色何也於其可以言而言不必嫌於自賢也於其可以書而書不必嫌於自伐也聖人之心惟無所自欺而已矣其為天下計者甚重其取譽於巳者甚輕而何暇利於名之美而為之哉昔趙充國有降羌之績浩星賜勸之歸功他將非愚臣之所能及充國請罷屯兵奏事充國振旅而還所善浩星賜迎説充國曰衆人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以為虜勢窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉龔遂以治郡聞王生教之歸德天子非小臣之力遂卒用王生之對而獲長者之譽上遣使徵遂議曹王生從王生曰天子即問君何以治渤海君不可有所陳對冝曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生言天子説其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也充國力拒星賜之計而以其意自陳議者莫不多遂之有遜而薄充國之自伐也噫以渤海之治歸德天子人臣之義固也以屯田降羌而歸功出擊之將使在上者易以開釁而邀功生事之臣得以中好大之欲而售其説其禍天下豈少哉吾身獲卑牧之名而天下被其實禍君子固如是乎君子而果如是則李斯以頌美佞秦史始皇二十八年丞相李斯等相與誦皇帝功德刻于金石以為表經公孫𢎞以隱咎欺漢對䇿曰堯遭洪水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也云云亦得為近厚者矣夏侯勝眭孟此篇不言或然之數古之君子能言必然之理不能言或然之數夫必然之理言之而中者宜也其不中者非誣也戒也或然之數言之不中者宜也其或中者非信也幸也昔者夫子不語怪是豈其知弗及哉語之中不中皆不可以為道而適以藉好異者之口聖人不為也邾隱公朝於魯子貢觀焉邾子執玉髙其容仰魯公受玉卑其容俯子貢曰以禮觀之二君皆有死亡焉未幾而邾魯之君無不如其言者孔子曰賜不幸而言中是使賜多言也左定十五年云云夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不受心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月壬申公薨仲尼曰云云且子貢以禮覘二君之敗其中也聖人不以為賢而以為不幸蓋揣存亡於未形之先而臆禍福於不可致詰之際以是為賢則天下之好異者趍之矣嗟乎以理料事君子猶不樂也如此况以數乎固矣夫漢儒之溺於數也一災一祥無不預占而逆計之以責其言必驗間或驗焉則好事者趍之陰雨之變也夏侯勝以之卜昌邑之廢昌邑王立數出勝當乘輿前諌曰天久陰不雨臣下有謀上者陛下出欲何之王怒縳以屬吏吏白霍光光與張安世謀欲廢昌邑王光讓安世以為泄語安世實不言乃召問勝勝言洪範傳曰皇之不極厥罰常陰時則下人有伐上者惡察察言故云臣下有謀安世大驚以此益重經術士後十餘日光卒與安世白太后廢昌邑王石栁之立也眭孟以之讖宣帝之興孝昭元鳯三年泰山萊蕪山南有大石自立昌邑社木卧復生又上林苑中大栁斷枮卧地亦自立生有蟲食樹葉成文字曰公孫病巳立孟推春秋之意以為石栁皆陰類下民之象大石自立僵栁復起當有從匹夫為天子者孟曰漢帝宜誰差天下求索賢人禪以帝位孟使友人內宫長賜上此書時昭帝幼霍光秉政惡之下其書廷尉奏眭孟妄設祅言惑衆伏誅後五年宣帝興於民間即位噫孰知二子之幸而中者亦夫子之所謂不幸而致漢儒之多言也哉公孫臣推明土德以為證黃龍見黃龍雖果見而漢家卒火德也郊祀志魯人公孫臣上書云云漢儒之多言而中蓋至此窮矣昔晉景公疾桑田巫言之曰不食新矣晉使甸人獻麥饋人為之召巫示而殺之將食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉論者曰巫以明術見殺小臣以言夢自禍然則言怪而中不以取禍者幾希嗚呼夏侯幾死眭孟被戮其亦有以取之也夫十先生奧論注後集卷六
