body:
  text: 十先生奥論註後集卷八雜論陳傅良天此篇論髙祖光武之人事古之人君不恃其或然之數而忽其必然之理或然之數者天也必然之理者人也天意之不集人事猶可以自盡幸乎天而人不繼之鮮有不敗事者矣昔漢之髙帝光武蓋嘗得乎天矣睢水之圍幾入於項氏之掌握而以大風脱二年楚擊漢軍大戰睢水上大破漢軍多殺士卒睢水為之不流圍漢王三匝大風從西北起折木發屋揚砂石晝晦楚軍大亂而漢王得數十騎遁去滹沱之役亦幾於填餓虎之喙矣而以合氷濟王霸傳王郎起光武南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌無船不可濟官屬大懼霸往視恐驚衆即詭曰氷堅可度光武笑曰候吏果妄語遂前北至河河氷亦合乃令霸䕶度未畢數騎而氷解光武謂官屬曰王霸權以濟事殆天瑞也是豈人力也哉天也二君於此不以幾不免者自沮亦不以其偶而免者自質方且益聽三傑之謀而延攬二十八將之議以伺其隙以俟其可乗之機卒於垓下之圍合而項氏擒五年圍羽垓下灌嬰追斬羽東城楚地悉定邯鄲之戰交而王郎虜光武至信都發兵攻拔邯鄲霸追斬王郎是果人耶天耶能知髙帝五年之業不成於睢水之脱而成於垓下之勝光武之中興亦不在乎滹沱之濟而在於邯鄲之克則知人君之有為於天下者其始也雖天啓之而成之者常以人也嗟乎天之欲啓是君而使之有所就者不遽爾也置諸危而福之投諸難而全之使之迫於利害以深其謀臨於死生以固其志抑其驕矜挫其果鋭以大其所受而人君者不能因乎天之資而善用之而方且安乎天而棄其所以在人退處於無事之地以坐觀夫自定之勢則向之所心福之者乃所以禍之也全之者乃所以敗之也嗚呼人君有為天下之志其無以天之所以福我而全我者而自取禍敗也哉民此篇論天下亡秦天下之事有可畏之勢者易圖而無可畏之形者難見也易圖者亦易應難見者必難支故明智之君不畏夫方張之敵國而深畏夫未見其隙之民心蓋民心之揺慘於敵國之變其變之遲者其禍大而患在於内者必不可以復為也古者有畏民之君是以無可畏之民後之君人狃於民之不足畏而民之大可畏者始見於天下嗟夫民而至於見其可畏其亦無及也夫秦之先蓋七國也自孝公至於荘襄亟耕力戰荐食諸侯之境歴七世而并於始皇之手吁亦艱矣始皇唯知天下之難合而其患在六國也故歴其社稷裂其土地而守置之以絶内爭之釁中國不足慮而所以為吾憂者猶有四夷也於是郡桂林城積石頭係百粤而卻匈奴於千里之外始皇之心自以天下舉無可虞足以安意肆志拱視於崤函之上而海内晏然者萬葉矣而不知夫天下之大可畏者伏於大澤之卒隠於鉅鹿之盜而其睥睨覘覷者巳滿於山之西江之東也一呼而起氓𨽻雲合雖邯鄲百萬之師建瓴而下而全關之地巳税駕於灞上之劉季矣秦紀衞鞅説孝公變法修刑孝公卒子惠文君立惠王卒子武王立武王卒立異母弟是為昭襄王昭襄王卒子孝文王立孝文王卒子荘襄王立修先王功臣施徳厚骨肉而布惠於民荘襄王卒子政立是為秦始皇帝初并天下為三十六郡始皇紀三十二年盧生奏録圖書曰亡秦者胡也乃使蒙恬發兵北擊胡畧取陸梁地為桂林象郡太史公曰賈生言秦王續六世之餘烈南取百越之地以為桂林象郡使䝉恬北築長城而守藩籬却匈奴七百餘里自以為關中之固金城千里子孫帝王萬世之業也秦王既没山東豪俊遂起而亡秦族矣胡亥極愚任用趙髙髙死之後楚兵巳屠關中真人翔灞上嗚呼秦以七世而亡六國而民以幾月而亡秦以秦之强不能當民之弱天下真可畏者果安在乎人君不得巳而用其民以從事於敵國可不懼哉吏此篇論秦吏不肖昔者秦之趨亡非一道也而其若是其亟者吏不肖也吾觀始皇之初陋三代之封建其弊至於戰國髖髀相依以蹙王室故夷其城而郡縣之丞相綰等言請立諸子始皇下其議李斯議曰周文武所封子弟同姓甚衆然後屬疏逺相攻專諸侯更相誅伐置諸侯不便始皇曰廷尉議是分天下以為三十六郡郡置守尉監其慮誠逺矣既而天下之吏習於嬴氏之暴斬艾斵剥草芥其民而弊之重之以頭㑹之斂前張耳傳秦為亂政虐刑北為長城之役南有五嶺之戍頭㑹箕歛以供軍費注吏到其家令以頭數出榖以箕斂之閭左之徭食貨志始皇收泰半之賦發閭左之戊又重之以阿房驪山土木之役三十五年作宫阿房天下謂之阿房宫徙刑者七十餘萬人乃分作阿房宫或作驪山發北山石椁乃寫蜀荆地材皆至關中計宫三百關外四百餘因徙三萬家麗邑五萬家雲陽當時之吏非殘忍侵漁病民以逢其君者則貪釁幸災不逞之人也於是民之欲亡秦者十户而八九矣關東之豪投袂而起一呼響從毛奮而鱗集勠力以傾秦族者不可勝計見前篇注烏合之師所至如破竹者大率皆郡馘其守邑俘其令以應之者也秦二世元年陳涉自立為楚王郡縣多殺長吏以應涉不然則吏為自全之計挈地以賂敵而市一旦之命者也又不然則談士掉三寸之舌傳檄而風靡者也亦孰為秦守哉其間黨秦之惡不肯遽臣妾如三川之守田秦二年沛公與秦軍戰大敗之斬三川守李田注李期子南陽之守齮三年沛公與南陽守齮戰犨東大破之泗川之守壮二年沛公兵之薛秦泗川守壮兵敗於薛亦徒驅欲潰之民疾鞭而戰之不敗而塗地則亦為降虜而已亦奚救於秦之斃耶秦以虎噬之强尺攻寸取以呑天下一旦有變三十六郡皆無人之墟子嬰之席未煖而天下為漢何也始皇紀子嬰為秦王四十六日楚将沛公破秦軍入武關遂至霸上使人約降子嬰子嬰降沛公入咸陽還軍霸上秦人之憂素不及吏也故夫天下之禍莫大乎視以為常而不之憂者皆它日之所不可支也且天下不可以一人守也分疆析壤環居而羅衞之者皆吏也吏之不肖人主将誰倚仗哉而朝廷之上方病夫財之不豐兵之不强以為大患至於守令之奸民號而訴者牘相銜也則謾不之省重者不過罷去次則僅免而已舒之嵗月民之寃血未乾而謫籍之書又以恩貸矣甚者至於公卿大夫貪沓冗耗以不勝任聞者皆剖之符而左遷之嗟夫不意父母斯民之職而為逐臣之淵藪也有秦之弊幸而無秦之亂吁可畏哉可畏哉士此篇論人主畏節義之士天下之士未嘗不沮於人主之所畏而疾趨乎人主之所喜也節義美名也雖甚庸之君亦知髙其名而願致之及見其人鮮有合焉何也畏之也蓋惟忠義之士識髙而見殊慮逺而憂大世方無虞若可以少安矣而為之痛哭流涕以發天下大難之端賈誼疏云云乗輿無甚失徳若可以少安矣而盡言力諫甚者有幽厲威靈之比百官效職亦無大姦邪未去也而深懼夫指鹿之禍發於朝夕始皇紀趙髙欲為亂恐羣臣不聽乃先設騐持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或黙或言馬以阿順髙或言鹿者髙因陰中諸言鹿者以法後羣臣皆畏髙嘉祥美瑞人主之所罕見而竒焉者則視以為不足信至於一日月之變一雨暘之愆則又從而尤之曰此疵政之招也射獵歌舞巡幸之娯似未足病於治則禁而抑之宵旰之勤吐哺之疲非人所願為者則强其必行夫人之情惡危而好安樂因而憚改自庶人達天子均也而義士常責其所難而危其所欲為人主安得而不畏之耶故雖漢武帝唐明皇之賢猶有憚於汲黯韓休之直黯以嚴見憚武帝召為中大夫以數切諌不得久留内遷為東海太守韓休峭鯁時政所得失言之未嘗不盡左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘠天下肥矣噫視時趨向天下之人不少也人主方是之畏彼亦孰肯自冒人主之畏而取疎逺擯斥之苦哉於是乎争迎其好而逢其欲覘其所向而伺其所歸有所愛也則徇之以為懽有所懼也則寢之以為安其意有所可否之間也則兩存之以聽其所自擇其為術也翶翔而不遽而為説也進退而不甚堅夫然後豢於其説而穽於其術中而莫之辨是以奸欺之患生嗟夫此武帝明皇之所以不免也隕石妖也而方士以為嘉瑞前郊祀志上復修封泰山隕石二黒如黳有司以為美祥以薦宗廟而方士之候神入海求蓬莱者終無驗殺三子大亂也開元二十五年楊囘譖太子瑛鄂王瑶光王琚云構異謀上召宰相謀之李林甫對曰此陛下家事非臣等所冝議上意乃决廢為庶人賜死城東驛宰相以措刑受賞大理少卿徐嶠奏今嵗天下㫁死刑五十八大理獄院由来相傳殺氣太盛嗚雀不栖今雀巢其上百官以㡬致刑措上表稱賀上歸功宰輔賜林甫爵晉國公牛仙客豳國公大旱之災則曰乾封之祥前郊祀志武帝封泰山改元封元年明年夏旱公孫卿曰黄帝時封則天旱乾封三年乃下詔天意欲乾封乎霪雨之害則曰非禾稼之損通鑑𤣥宗紀上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也武帝明皇皆英主也初豈可愚弄也哉惟其畏節誼之士得以窺其所逆順而售其所喜之説而天下皆㡬於危亡然則欲養天下之士氣惟受人之所危而甘於人之所畏者能之嗚呼人主不可不自强也哉使過此篇論文帝非棄賈誼人主之於賢才一有所疎者必不復知之也凡人之情所昵者易於求其美而所棄者每不見其所長故曰已逐之婦無姬姜已絶之交無管鮑其勢然也世之忠臣才士不幸而有所悞取疎外於其君而終身淪廢者亦天下之常患也矣大凡愛重生於密邇嫌疑起於離間疎外之臣其君待之也輕而視之不以為賢其左右之忌其復進者多而攻其短者日至矣視之不以為賢則其交也難合攻其短者日至則其聽者易疑以難合之心聽易疑者之言其欲不棄於其君也亦難矣噫天下之士固有失於豪鋭少年之氣而涵養成就於投閒置散之日者人主烏可以其舊棄之耶人皆咎文帝棄賈誼以愚觀之帝非真棄生也而不逃歸咎者之口有以取之也漢至文帝蓋三葉矣而秦楚百鬬之瘡痍未復劉氏之徳澤於民者未深也文帝於此亦思之矣以謂今之治獨可以寛柔惠和懽斯民之心以厚其愛而夀漢家之厯其它變更有所未暇誼不念此而欲一切反秦之故以洛陽年少遽欲盡如其意兹故文帝之不安於誼而絳灌之言所由入也故帝之疎誼也盖將老其才使為後圖也長沙之謫鵩鳥之賦誼有以大過人者於此而不賢誼帝誠負誼矣宣室一見自謂不及孰謂帝不知誼乎嗚呼帝誠知誼矣且將大用之而誼不及見者天也非人也而歸咎者卒莫之赦然則世之人主於其所疎外之臣苟有所可用宜亟還之毋使至於賈生之不及以自取萬世棄賢之名也哉誼年二十超遷嵗中至中大夫誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂乃草具其儀法悉更奏之文帝謙遜未遑也於是天子議以誼任公卿之位絳灌之屬盡害之乃毁誼曰洛陽之人年少初學專欲擅權紛亂諸事天子不用其議以誼為長沙王太傳誼既謫去意不自得有鵩飛入誼舍止於坐隅不祥烏也乃為賦以自廣後嵗餘帝思誼徵之至入見上方受釐坐宣室上問鬼神之本誼具道所以然之故至夜半帝前席既罷曰吾久不見賈生自以為過之今不及也拜為梁懐王太傳國勢此篇論秦唐之亡天下之勢其立也難成其成也難變故强者不易弱而弱者不易遽强太公之治齊周公之治魯雖數十世之子孫而先覩其强弱之形者盖其積非一日也前地理志齊太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒弑之臣其後二十九世為强臣田和所滅魯周公始封太公問何以治魯周公曰尊尊而親親太公曰後世寖弱矣故魯自文公以後禄去公室政在大夫季氏逐昭公陵夷微弱三十四世而為楚所滅故夫積强之後雖甚懦者處之而其決裂猶未可以犯積弱之久雖甚强者處之而其流亦未能以頓起昔者秦祖七世之君扼六國之吭而奪之地至于始皇夷名城芟傑士係百粤之頸而走匈奴天下之立者無不側足而懼也二世以庸暗承之而山東之豪傑競起以投其罅雖嬴氏不得再傳而其救亡奔命之師猶足以弊周章蹶魏咎潰陳呉覆田項何者其强猶故也史始皇紀二世用法刻深戍卒陳勝自立為楚王山東郡縣少年苦秦吏皆殺其守尉令丞反以應陳涉相立為侯王合從西鄉名為伐秦不可勝數武臣自立為趙王魏咎為魏王田儋為齊王沛公起沛項梁舉兵㑹稽郡涉遣周章等将西至戲二世乃使章邯将擊破周章益遣司馬欣董翳佐章邯擊盜殺陳勝城父破項梁定陶滅魏咎臨濟李唐之世自中睿不綱而天下趨弱漸矣而極乎天寳之變安禄山反肅宗克復兩京而不能剪河北之盗至徳二年九月復京師十月復東京徳宗収洛博定魏地而不能俘孤窮之田悦建中二年魏博節度使田悦反一軍大變軍奪氣沮專以姑息稔藩鎮之驕本贊及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎮愈强至於唐亡至於憲宗海内八九為唐有矣其殘蘖之存者且頡頏自若也而已死於肘腋之禍本紀元和元年劉闢伏誅五年張茂昭以易定二州歸七年魏博田興以六州歸十二年呉元濟伏誅十三年横海程權以倉景二州歸十四年李師道伏誅韓𢎞以汴宋亳潁四川歸王弁伏誅十五年宦者陳𢎞志等反帝崩嗚呼數君者非不鋭而㫁也而無救於唐衰者何也其弱久也蓋嘗論秦人之勢如康强之人空中立僵而其手足利便耳目聰明猶未可狎而侮唐之勢如人之血氣疲􅠰筋力頓萎雖其脉氣猶夀而亦不能以復壯故凡善處天下之强弱者不以亟而以緩其欲敝人之强也不嬰其猶鋭之鋒而姑堅守徐伺以陰入其隙欲振其國之弱則亦不悻然而忿以徼成功日夜淬礪以作其氣厚其力而後舉此酈生張良之所以謀秦而李訓鄭注之徒所以失之而促唐之不永也髙帝之入秦也酈生憂其瓦合之卒徑入虎口而勸其盤薄陳留之間食其説髙祖曰足下起瓦合之卒收散亂之兵不滿萬人欲以徑入强秦此所謂探虎口者也陳留天下之衝今其城中又多積粟今請使下足下於是遣食其往遂下陳留至其戰嶢闗張良亦以秦未可輕試宜堅壁以㗖其将需其懈而後擊之沛公欲以二萬人擊秦嶢關下軍良曰秦兵尚强未可輕動願沛公堅壁令酈食其持重寳賂秦将因其懈擊之沛公乃大破之敝人之强其術固如此也訓注之徒不知唐勢之弱而欲浮躁躑躅盡擊閹宦以收朝廷之權而倡佯於天下謀未成而腰領己入於刑餘之手王守淮葬於滻水鄭注奏請今内臣中尉以下盡集滻水送葬注因闔門使親兵斧之俾無遺類訓與其黨謀曰如此則事成專有其功不若先期誅宦官已而并注云之一日上御紫宸殿韓約奏稱左金吾聴事後石榴夜有甘露訓奏殆非真甘露上顧左右中尉仇士良魚志𢎞帥諸宦者往觀之士良等至左仗視甘露風吹幕起見執兵者甚衆士良等驚駭奔詣上告變金吾兵登殿縱擊宦官訓知事不濟脱走士良等命禁兵出閤門討賊死者千餘人嗚呼有天下者不幸而以久弱之國當積强之寇宜以食其留侯之策處之無出於李鄭之謀以自取天下之笑十先生奥論註後集巻八
