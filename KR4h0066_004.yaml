body:
  text: 十先生奧論注前集卷四雜論方恬秦論其刑酷蓋秦之暴日設刑以罔人之罪如捕虎豹如獵麋鹿不待彼之犯而後治之也闕步過六尺者有罰棄灰於道者被刑闕由是言之輕刑未必不可止姦嚴刑者長姦以自蔽也秦之所謂豪傑者吾意其必為淺浮狂妄之徒彼其誠豪傑也秦亦安得而誅之機論事以鋭而奮亦以鋭而惰宜不惰也而鋭之終則惰繼之何也氣鋭而功不隨也古之大有為者不憑氣以舉事以事不集則惰繼之矣衝風之衰不能起羽漂流之餘不能蕩芥勢固有所窮也故明主折其氣而不使之窮蓄其鋭以待之而不肯輕用其鋒故其鋭不挫而其鋒不可犯何者彼固有以養其鋭也方陽之潛于深淵也葉焉者零波焉者氷凄焉者栗而不知其溫然者之將復也逮其久也溫然者蓊然於下勃然而達於上劃然而為雷則惰者肅懦者憤蟄者伸甲者坼萌而逹者無不遂生而如意蓋其復之也漸故其蓄之也厚其出之也遲故其震之也驚不鋭於其始而鋭於其終怯於前而勇於後靜於久而動於卒天下之事惟其發於卒然者人之所不能料也高帝之為漢王也項羽奪其關中而不敢爭驅之南鄭而不敢怒帝非真能下人也而隱忍不校以就蜀漢之封者所以安羽而求出於其不意也逮夫漢中之席未溫而三秦之師已舉鴻溝之約方成而垓下之圍已合帝於此何其鋭也夫惟其始也不鋭故其終也獨勇帝之始非真不鋭所以養其鋭而就大事也故夫人主之為天下不病其怯而病其勇不取其鋭而取其堅蓋鋭者其氣也堅者其志也髙帝曰吾亦欲東耳安能鬱鬱久居此乎此高帝之志也天下之事無必為之志而特恃其輕為之勇無先定之謀而欲求速成之效愚未見其能濟也何者輕為者不量力而欲速者不知變故也方今天下其可有為之時耶其未可有為之時耶以為可以有為也則未見其可為之機以為未可有為也而將遂不為也則愚未見可如此而遂已也古者敵國相持其為䇿有二而已可戰則戰不可戰則守過是無䇿焉其所謂守者非不戰之謂也先為戰備以待其可戰者也故以戰則勝以守則固戰則天下莫能支守則天下莫能窺惟其先莫之窺也是以一發而莫之支也今也以為戰而忘於戰以為守而懈於守在彼既有可勝之形在我亦無不可勝之備則亦僅自立耳嗚呼以今日事勢其將大有為耶其欲僅自立而已耶如其志不立於僅自立也則今日之所以待敵者愚不知其故也愚雖不肖切嘗妄論當今之故以為今日之失在於志太鋭術太疏舉事太輕責效太速此天下之事所以顛倒錯亂而無所成就也符離之舉非不鋭也愚獨歎其疏而恨其失於太早也雖然符離之事既已往矣則夫後日之事豈可不先為之謀而復蹈其轍也哉廣度昔者聖人之為天下常憂天下之不治而不敢忿天下之不治聖人固憂其如此也而未嘗忿其如此也非不忿其如此也以為天下之事未能遽如吾意也未能遽如吾意而忿心生焉則欲其一旦驟如吾意且夫天下豈有驟如吾意者耶不度其勢之利害可否驟起而決為之不以驟而屈則以驟而沮何也未可之事以驟而失機未至之便以驟而先發故也舉而失其機發而失其便則其志必益恥其心必益憤而其勇必未已以未已之勇乘易忿之心則思之不待熟講之不待精前之失未懲而後之舉復發矣嗟夫天下之事務決吾意而僥幸求逞者不可數為也昔者孝文之世天下之事其不滿人意者多矣而賈誼為之痛哭流涕誼蓋忿其如此也誼視之不勝其忿而文帝忍而不顧帝豈利其然耶帝之心固不樂乎此也不樂乎此而不敢急正乎此帝非暗於事機也以為急於正之而未得志不若緩之而徐俟其可為之時也世以胸奴之衰為武帝攘却之功而不知強本節用以務富其民文帝所以資後世者多矣嗚呼文帝可謂能忍而待者也使文帝之時而遽為武帝之事則攘却之功未保其必集矣故夫為天下者欲求非常之功則必有能忍之度迫之而不動撓之而益戒怒之而益思志髙天下而慮之以全勇過天下而守之以怯謀蓋一世而俟之以徐不萬全不取不百克不鬬使天下之人探之而莫測其端推之而不見其形則無為也敵無得而窺之而有為也敵無得而備之如此則有所不動動則震天下矣猛虎而驟來則荷戈而奮擊蜂蠆而竊乘雖壯士而失措天下之事其隂蓄不發而一旦竊乘人之懈者是敵人之所不及慮者也為天下而不從敵人之所不及慮而隂圖之而恃強以怒寇急於有為而不待其勢之可為是亦無能忍之度而已十先生奧論注前集卷四
