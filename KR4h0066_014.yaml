body:
  text: 十先生奥論註前集巻十四雜論葉適兵權上此篇論孫武子之書不可用非詐不為兵盖自孫武始史本傳云孫子武齊人也以兵見吴王闔廬闔廬知孫子能用兵以為將甚矣人心之不仁也非武之書不好焉用兵以詐古之聖智或不能免自管仲咎犯先軫管仲齊大夫管夷吾亦曰管敬仲咎犯晉狐突之子狐偃字子犯晉文公重耳之舅故云舅犯舅亦作咎先軫晉下軍之帥原軫食采於原故亦曰原軫其人巳不純於義務為争利必勝之術春秋之世日有侵伐之事國各講求其意以備之而秦楚横行於天下大抵無義兵矣然則非武之獨為詐也而謂之自武始何也曰管仲咎犯先軫致其君於霸君謂齊威晉文强本出於兵人獨變先王之法而自為法耳盖其意常先治國家崇禮信厚集人心而親附諸侯至於決戰濟師而後益之以詐不專以詐自名也故古之於兵也止言其法部曲行伍坐作進退繁簡曲直紀律號令皆法也能盡此以為不可敗則敵至而智見矣故法可傳而智不可傳至於孫武始棄法而言智其著兵之情竒正分合豫應天下之變百出而不窮七書孫子凡戰襲以正合以竒勝故善竒者無窮如天地不竭如江河終而復始日月是也死而更生四時是也戰勢不過竒正竒正相生如循環之無端孰窮之哉以詐自名於世而曰兵徒詐而巳矣並七書孫子云盖管仲咎犯之所畧用而未詳隂取而諱稱者武盡載之詳見孫子而後世之好為詐者思欲出武之外亦終不可得然則武真譎詐之雄者也國之有兵也能擇將而授之而他不與也夫武之兵書人主不得而用之其將自用之可也闔廬之時連嵗謀楚左定四年伍員為吳行人以謀楚楚之殺卻宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無嵗不有吳師嘗一入其國都卒無一人之獲暴師不返而夫㮣王先歸自立左定五年申包胥以秦師救楚使楚人先與吳人戰大敗夫㮣王于沂八月夫㮣王歸自立也夫㮣王吳王闔廬之弟闔廬與越為仇故武著書亦言越人之不足畏然吳既去楚勾踐來伐敗于檇李闔廬以戰死武者皆在其中左定十四年吳伐越越子勾踐禦之陳於檇李越子因而伐之大敗之靈姑浮以戈擊圔廬闔廬還卒於陘去檇李七里杜預曰檇李吳郡嘉興縣南檇李城夫差二十年之間卒亡其國左㐮二十二年十一月丁卯越滅吳請使吳王居甬東辭曰孤老矣焉能事君乃縊越人得歸不知武猶為用耶將廢而死耶將王孫雒之流皆受教於武耶計武著書及用事之時亂楚興越亡吳而侵壊中國然則武術之無救於國家亦可見矣然則雖為將亦不可用也而後世之兵悉祖其故智於其言有所不能通者皆深思逺慮出無端涯之見以求合之且前乎武者非無人言兵其法猶可考不必黄帝舜禹周官之司馬法也曰是純仁義者而非兵若管仲咎犯僅庶幾乎曰是猶有仁義也亦不足以為兵而為兵者必詐而後勝故無出於武之書噫其人心之不仁耶不然何其遺棄衆説而好之篤而敬之深耶韓信號善用兵自言其法出於武曹公無敵於天下猶師武術自為之傳曹公魏曹操為孫武傳唐太宗李靖近世君臣之言兵者無出其上其所問對亦止於武之意七書有唐太宗李衛公問對而天下好竒之士奮筆墨以傅益武之説而為書者數十百家而號孫子為談兵之祖其氣熖起興於百世之下若將與聖賢並稱者噫人心之不仁至此極與豈數千年之獨不幸耶今之所患者以天下之大甲兵之强謀臣智士之衆而所嗜好訓學者不出於武自為一將之術耳然且講之而不得其要求之而不中其情而今世之良䇿真智因以廢放而不舉夫選天下之士教之於學試之於庭使之讀誦以為文義者乃無先於孫子彼固無所見於此也使有所見猶無益也而徒以不仁之心上下相授授天下以不仁之心患之大者也臣嘗論之今天下或不免於用大兵大兵者以今之勢虜有百戰百敗之道吾有百戰百勝之術夫百戰而百勝者不戰而可以勝也百戰而百敗者未戰而先屈者也殺人以求勝古人之所不免也不待殺人而後勝今日可見之效也然其法皆不載於武之書今將因武之書以通之而後用今之兵乎則是捨百戰百勝之術遺虜以其具而自為是勝負相摶不可必知之形計之失者也臣非無見於此而强効世之迂闊者以黜武也盖其精者不可得而言言其粗乎則與迂濶者何異雖然臣請終言孫武之不可用夫戰國相吞無義無名而志在必勝故武之術出於名義之所棄為此下䇿而其所説者行陣之淺畫地形曲折軍勢翕張特俄頃之智耳使將帥自為之猶或不廢而國論則何為焉今之談兵者紛然皆出於此臣不知其説也夫今之所為戰者戰虜乎戰吾國乎自淮以北此非吾土地乎其來鬬者將非吾民乎抑盡虜乎然則流涕以對之猶不足而孫武之智尚忍言之嗚呼豈未有思及此者也兵權下此篇論兵難妄動當聽實言言之實者無竒無竒則難聴故天下多竒言而言兵為尤竒人主慨然欲聞天下之言則竒言得以入而言兵者入之為最深竒言漫衍於天下而天下反皆以竒為常是以下未知兵而習為多殺人之術上未用兵而先有輕殺人之心嗚呼孰能知其為天下之大禍耶平居無事嘗言兵計某衆可襲某城可攻某地最利宜先取以制敵敵有上中下計當出於某吾以何道應之其將某為良可反間以疑之可死士以刺之某兵可亂半渡以薄之倍道以掩之某處葭葦蔽虧林麓深阻可用伏兵某為竒道可用以出敵不意或欲為辯士說下其腹心大臣或使内潰或使來降或自請為將用其術以制勝或乞乘傳招集豪傑不費糧糗甲兵自以乂民殺虜古陣法兵法凡幾家今不可循用宜悉損益何事刀槊弓弩今未精者有幾更為擊伐之技或乞試上前或請頒其法於諸將或言時不可失坐論無益今當并進益取敵地以自為守因事觀變或言臣嵗月浸晚恨不及功名乞一死敵或言古者取天下凡幾其故術猶在今當何所用雖始若少緩終當有成其言邉亭敵地風沙蒼莽雨雪凍飢戰士哭聲器械解弛使人憂悲恐懼至論讎恥憤激瞋目按剱或廣大其意下城得地所過牛酒迎勞王師復故境土天下一家使人慰喜洋洋然欲不計勝負存亡而為之其人或巳在親要朝夕開說素所狎昵縱言不顧或踈逺求進嘗試上心或山林草澤之士請來獻見或在外之臣無以固結恩寵走馬面論密䟽入中或因縁稱薦無以為名必挾兵說以自重且其開口論議容止不動聲音偉然問答縱横不可窮誥至於超乗負矢意氣敢决而其上固巳壯之矣凡此者皆竒言也人主慨然而樂聴之雖未必用而其輕殺人之念巳動於中矣凡此者其意非真以為見於事也以為言之不得不竒也非謀國也非慮患也中一時之欲而己者也然而未必用者有時而用矣漢武帝聴王恢計欲擒單于單于不可得擒而漢首事結禍無巳天下幾亡前韓安國傳武帝即位匈奴來請和親上下其議王恢數為邊吏習胡事議曰漢與匈奴和親常不遏數嵗即背約不如勿許舉兵擊之安國以為不如和親羣臣議多附安國上從恢計宋文帝從江湛徐湛之之言意封狼居胥一旦魏氏臨江秣陵之人荷擔而立者累月元嘉之政衰焉通鑑宋文帝紀元嘉二十七年上欲伐魏丹陽尹徐湛之吏部尚書江湛彭城太守王𤣥謨等並勸校尉沈慶之諫曰我步彼騎其勢不敵檀道濟再行無功到彦之失利而返今料𤣥謨等未踰兩將六軍之盛不過往時恐重辱王師上曰王師再屈别自有由慶之又固陳不可上使徐湛之江湛難之慶之曰陛下與軍白面書生輩謀之事何由濟上大笑太子劭及䕶軍將蕭思話亦諫上皆不従乃大起軍旅又以兵力不足悉發青冀徐豫二兖六州三五民丁倩使蹔行縁江五郡集廣陵縁淮三郡集盱眙使王𤣥謨進圍滑臺魏主引兵南救之𤣥謨懼走魏人追擊之死者萬餘人殺傷不可勝數魏主所過無不殘滅城邑望風奔潰魏兵遂至淮上及過淮民多竄匿抄掠並無所得至𤓰步壊民廬舍及伐葦為筏聲言欲渡江建康震懼民皆荷擔而立明年魏掠居民焚廬舍而去夫不顧計天下之利害舉而聴一夫之竒言者彼其初固不知其患之將至此也今天下之士好為竒言而言兵為尤竒者十年於此矣好惡之相形權利之相誘竒言盛而實言息矣凡向之能為實者今未有不轉而為竒者也雖然臣有憂於此而亦竊以為賀焉何者天下之能為竒言者衆也昔日之竒今日之腐壊而無用者也朝對暮論接目煩矣聴聞熟矣庶幾其厭之乎庶幾其可以實言乎雖然實言不足聴也五穀之味澹然不與衆味俱嗜味者不能食也其所以食之而不敢廢者畏其不食則飢而死而衆味不能救焉耳故夫有聞實言於今世如畏不食五穀之死者而後其言可得而聴也何言謂實今世或有以為兵端可畏易開難合厚賂請和可以持久此偷安姑息之論也兵何嘗一日而不可用乎頋其用如何耳故不多殺人則兵可用邦本不揺則兵可用不横斂不急征則兵可用將非小人則兵可用天下雖不畏戰而亦不好戰則兵可用視北方如南方則兵可用功成而患不至外鬬而内不知雖不免於用詐而羞稱其術雖大啟舊國而能不矜其事若是者其兵無不可用也夫水居者好游崖居者好縁此其勢也游而不溺雖游可也縁而不墜雖縁可也故凢今世為用兵之可言者未有不犯是數患者也犯是數患是游者之必溺縁者之必墜而曰吾不頋而自為也而可乎孫武吳起穰苴孫臏巧於用兵史記吳有孫武齊有孫臏魏有此吳起秦有商鞅皆禽敵立勝當之時各相攻伐代為雌雄今雖無之不足慮伊尹太公管仲諸葛亮智於謀國今雖未有不足憂其實言之不可亂者止於如此十先生奥論註前集巻十四
