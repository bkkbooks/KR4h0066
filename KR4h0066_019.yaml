body:
  text: 十先生奥論註後集巻四五經論陳傅良五經論序易因乾坤以定君臣之分者也繫辭天尊地卑乾坤定矣卑髙以陳貴賤位矣故易作而文字始生書序伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉大傳曰有天地然後有萬物有萬物然後有男女有男女然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯故禮次之古者禮不下庶人記曲禮上云而太史氏觀民風以詩記王制命太師陳詩以觀民風盖禮施於君臣而詩作乎民故詩又次也易也禮也詩也治乎下之道也而君所以自通乎下者猶未也於是乎有書書者上所以通乎下之言也故書又次之嗚呼春秋作君臣之道衰矣聖人所以維君臣之道者亦至是焉始窮故春秋終焉吾病學者不知六經之作相次以立君臣之道而曰徒文而已作五經論易此篇論乾坤定君臣之分昔者聖人出而治天下其父子兄弟君臣之號未立也聖人惡其無别而至於相瀆故為之父子為之兄弟為之君臣夫人之情安於其所見而難於其所不知彼誠生於其父也吾從而父子之也無惑彼誠偕生於其父而後於其兄也吾從而兄弟之也亦無惑無故而貴之曰君無故而賤之曰臣則天下将以為聖人之私而不能以聽為君者又坐而賞罰其用命與不用命為臣者又奔走乎其役夫為君而無所甚利為臣而無所甚病而徒號之然也人猶以為厲已也而曰君者又從而居其逸而執其權曰臣者又從而即其勞而起其令則天下又曰均是人也强吾戴而君之强吾俯而臣之其初無甚異而何以得專其富貴而行其予奪之意於我而吾亦何畏而枉於下聖人序君臣以定天下天下顧莫之聽且将無所畏乎其上一聖人之法無以勝天下之情則君臣之道廢聖人憂焉曰是非告語之所能辨而智力之所能攻也夫解人之疑者必因其所已信而覺其迷者非自其所共曉者入之不可也於是取諸天地之間得其定分而示之易象諸天為乾曰是其髙也而吾因以為貴焉者也象諸地為坤曰是其卑也而吾因以為賤焉者也凡索乎乾者皆一陽而二陰君子之道也易一作而天下定蓋曰貴賤之分天地之位也繫辭陽卦竒陰卦耦其徳行何也陽一君而二民君子之道也陰二君而一民小人之道也胡益之解云此是孔子又自釋陽卦竒陰卦耦之所由也言陽之卦是君子陰之卦是民一陽在上則衆陰歸之一君在上則二民歸之猶天下一統衆歸於一主則成邦國之道是立治之本此是君子之道者也言陰者是小人之象也夫二陰在上而一陽居之是猶二君在上而在下之人無所適從則天下不能統一如此則乖邦國之道是致亂之本此小人之道也而聖人亦曰此天地之為也非我也嗚呼文字之作聖人不得已於天下而非其意也雖然聖人之作易其固以立君臣也親為其事而求信其事則或者疑於自為天下未習其説而一日兆其説則人亦非以為固然故聖人晦其智而神之蓍盖人之心玩於理之常而竦動於數之不可混故數也者所以濟其理之所不行今夫裂千金之藏使信士為之亦奚不均者而古之人付諸籌使自探而自取之然後多者不徳而寡者無怨故夫籌者所以濟信之所不行嗚呼易之作始於定貴賤之分而其數也所以神其道以濟君臣之理而已而非徒若是誕也禮此篇論巽伏隠約之容君臣之道其未明也天下愚既明也天下詐故聖人為之易以覺其愚而發其微為之禮以閑其詐而救其末而後君臣可以無廢且使夫人而皆食是食皆服是服皆居是位則天下無至於僭且相攘聖人之法曰必若人而後可以食此也否則不得食必若人而後可以服此也否則不得服必若人而後可以居此也否則不得居夫樂不可獨美不可專專美而獨樂爭之所由出也則僭奪相攘之患生然則聖人之為是貴賤也無乃所以開天下之利心而長其貪吁天下唯不知利而無求多也天下而知利則名分者人之賊而爵禄者相戕之器也夫如是則天下之亂必将起於公卿士大夫而不起於民何也民之勢不可以為而公卿士大夫之具可以施也是故有百乘之家則千乘之仇也有千乘之國則萬乘之盜也孟萬乘之國弑其君者必千乗之家千乗之國弑其君者必百乘之家資之可施之具以濟其欲利之心因其所據而冀其所非望則貴賤分而詐之具又甚乎其愚吁如之何其可耶聖人以為不有所不居不能有所率不有所不爭不能有所媿故夫禮者所以深為是巽伏隠約之容以退其不滿之心莫尊乎天子而諸侯膳以犢記禮器冇以少為貴者天子無介祭天特牲天子適諸侯諸侯膳以犢莫卑乎煇胞翟閽而尸及以餕祭統夫祭有畀煇胞翟閽者惠下之道也唯有徳之君為能行此明足以見之仁足以與之畀之為言與也能以其餘畀其下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊既祭之末而不忘至賤而以其餘畀之是故明君在上則竟内之民無凍餒者矣此之謂上下之際夫自其至尊有所不居以作其亷自其至卑有所不爭以平其恨使人而皆亷於其有餘皆亡恨於其不足則天下可以無亂雖然聖人舉强人之禮而必人之從則人亦誰率以聽聖人故先之以其恥曰吾為禮以待天下之公卿士大夫而為刑以待民夫吾之禮獨以待天下之公卿士大夫而不責諸民何也吾固謂公卿士大夫之賢可與行禮而不肖之民宜無與焉者也人樂為賢公卿士大夫而恥為不肖之民而後其禮行嗚呼誘於其名而安其所艱是聖人所以弭天下好亂之機而不示者也或曰聖人之禮偽也一賜而三辭一飲而百拜揚修身篇禮多儀日昃不飲酒酒必餕賓主百拜而酒三行不巳華乎嗚呼是固聖人之至權也夫一賜者人之榮而三辭者雍容之節一飲者意之通而百拜者屈折之義盖聖人藴緩取之意於人情欲速之時予之以其所慕而反致其所畏凡此者皆其所以陰伏崛强之氣而柔其躬而非屑屑然為是偽也後之説者曰跪伏拜揖無益於道吁跪伏拜揖之權去天下始有春秋之變也矣詩此篇論宣民以言天下之禍驕生於有所恃而怨生於有所忌故公卿士大夫之勢易驕而民之勢易怨嗚呼驕之禍其發速而小怨之禍其發遲而大潰血之癰不如腹心之隠疾穴隙之盗不如臣僕之竊伺天下之患唯其伏於所不敢而决裂於一日之敢者不可為也夫民之怨始於利害之不敢謁而成於是非之不敢議若是而甚焉則敢議矣而不敢謗若是而又甚焉則敢謗矣而不敢叛吁不可以復甚也均是人也有所拂於吾心惡之而不得逃有所慊於吾心欲之而不得求所惡不得逃所欲不得求而上之人又從而壅其口焉疑而不敢議憤而不敢謗則亦堙鬱甚矣夫禁之議禁之謗不過以死懼而已而斯民察夫勿議勿謗之積死且無日而或議或謗意者未必遽死也故寧犯死而不顧且議且謗之民夫一有敢死之心其去叛也亡幾唯聖人逆知夫困窮亡聊之意不可以錮而怒之巳甚藴怒而不逞其勢将至於此也故曰貴者可禁而賤者不可抑是故節公卿大夫以禮而宣民以詩禮行乎黙而詩達乎言嗚呼聖人所為維君臣之道也如此忿之舒也以嘯哀之盡也以哭蓋閟於中而泄於其外則不能以復留者人之情也嘗觀於詩政刑之苛而賦役之重天子諸侯朝廷之嚴而后妃夫婦祍席之秘匹夫匹婦皆得以肆言之聖人為詩而肆天下之匹夫匹婦皆得以言其上疑於積天下輕君之心及至於幽厲之小雅小雅菀栁刺幽王也暴虐無親而刑罰不中大雅蕩召穆公傷周室大壊也厲王無道天下蕩蕩無綱紀文章邶鄘衞陳鄭之風亟諫而不忤顯譏而不戾相與攜持去之而卒不忍邶風柏舟言仁而不遇也鄘風墻有茨衞人刺其上也衞風碩人閔荘姜也鄭風狡童剌忽也陳風宛丘刺幽公也然後知聖人使之言而至於不敢盡言而何况於教叛是故湯武之興其民急而不敢先周之衰其民哀而不敢離蓋其堙鬱不平之氣舒焉而亡聊之意不蓄也嗚呼詩不作天下之怨極矣卒不能勝共起而亡秦秦亡而後快於是始有匹夫匹婦存亡天子之權賈誼過秦論陳涉甿隸之人遷徙之徒躡足行伍之間而倔起阡陌之中率罷散之卒而轉攻秦天下嚮應山東豪俊遂並起而亡秦族矣嗚呼春秋之衰以禮廢秦之亡以詩廢吾固知公卿大夫之禍速而小民之禍遲而大而詩所以維君臣之道之功也深書此篇論君不敢自專聖人之始立君臣也懼其疑也而有易懼其福也而有禮懼其乖也而有詩故易示之象禮示之理而詩示之情而天下尊君益至矣雖然天下之待其君也日尊而君之立於天下也日孤夫成其尊而致其孤者何也天下之事患伏於一偏而變生於所積也其權之卓者其情暌其勢之隆者其分隔夫是以尊之之至而孤之所由起夫積其尊而未至於自孤既孤也則其勢将至於復喪其尊徒開其端而不計其末馴至於其所窮而後無繼吁聖人豈若是疎也哉是亦不反其本而已凡聖人所為合天下之權以成其事者非徒以自威聚天下之勢以極其重者非徒以自寵也蓋将使天下居我於其所可甚畏而吾則與天下以其所可甚愛而後可以用天下人之情得百金之惠於其己敵而不以為己重而王公大人下一語而接之則詫然以為榮蓋凡出於意之所不期而分之所不及者為能動人天下之人未可以直遂其所欲也直遂其所欲則恩者玩之始也謙者侮之導也是故聖人之道必先嚴於人之必尊而後媚於不自尊嘗觀堯舜之吁謨堯典帝曰吁又大禹謨臯陶謨禹啓湯武之誓命大禹謨禹乃㑹羣后誓于師曰甘誓啓與有扈戰于甘之野作甘誓伊尹相湯伐桀升自陑遂與桀戰于鳴條之野作湯誓武王伐殷作泰誓三篇盤庚周公成康之誥盤庚作盤庚三篇周公相成王将黜殷作大誥成王命微子啓代殷後作微子之命成王封康叔作康誥成王作酒誥成王使召公先相宅作召誥周公作洛誥遷殷頑民周公以王命誥作多士康王既尸天子遂誥諸侯作康王之誥其與當時君臣丁寧委曲通其話言而制之心腹開其利病以柔其不服若不敢自决而需民之肯也然後為之喟然嘆曰彼聞其君若是其恐也視其君若是其邈也惟其可否之聽而無得以與其予奪其求多於上之望絶而覬心不生夫惟可否之聽而無與其予奪而聖人乃不私其㫁與之酌其宜而折其是非夫所求多於上之望絶而無有覬心而聖人顧出於其所不意以役其誠盡其懽是以天下之民以為非常之遇無故之幸嗚呼聖人致其所愛於其所畏之後而天下得所不期於所不及之中夫亦何憂於居尊而自孤也哉天之於物震之以雷而澤之以雨肅之以霜而渙之以日故未雨於雷之餘而日於霜之後者天之所以不亢也易也禮也詩也期於人之必尊而書也不自尊者君之所以不孤也春秋此篇論聖人之術窮或曰春秋之作曷為曰極禮之衰而憂詩之去也春秋作聖人之術始窮曰春秋之為極禮之衰奈何曰昔聖人之作禮不過曰是足以相媿而已禮窮矣天下無足以相媿則其甚也至於相襲而無以相討又甚也至於相蓋而無以相議然則小人之惡不可以復沮也歟聖人制禮之初逆察其至於此也而為之史盖小人負不義之名雖敢於欺暗世猶懼夫後之人追而戮之也是以中其懼心而扶其媿心之衰故夫史者禮之佐春秋則史之君也曰國有史春秋奚必作左序春秋者魯史記之名也史之所記必表年以首事年有四時故錯舉以為所記之名諸侯各有國史楚謂之檮杌晉謂之乘魯謂之春秋其實一也周衰官失其守仲尼因魯史䇿書成文上以遵周公之遺制下以明将来之法曰史又窮矣崔杼弑其君太史書之兄弟為戮經襄二十五年夏五月乙亥齊崔杼弑其君光天下之史如是其直者盖寡一死而一繼者尤寡再死而再繼者抑尤寡也夫無其直也則未死可以禁無其繼也則既死不可以復然則小人之惡也勿藉矣故禮之窮至於相蓋而不相議於是乎有史史之窮至於可禁而不可復於是乎有春秋曰春秋之異於史也奈何曰史以官春秋以匹夫史以國春秋以天下曰春秋曷為必以匹夫及天下曰小人之惡幸而逃於其刑不能逃於其史幸而逃於其國之史而不能逃於天下之春秋然則惡固不可盖作者其庶有忌乎吁聖人之術蓋至是也窮故曰春秋天子之事知我者其惟春秋乎罪我者其惟春秋乎南軒張敬夫解春秋明天理遏人欲以示萬世有國家者之大法故曰天子之事又曰知我罪我者其唯春秋蓋知之則以為聖人繼天心而立人極有不可巳者不知則以為專㫁二百四十二年之行事或云僭矣不察聖人之心則匹夫而專天子之事春秋固僭也焉得無罪曰春秋懼惡之書也賤者之叛不書雖弑君不名季氏用八佾大變也不書陽虎季孫稔禍也不書聖人不赦於其顯而諱於其微也何故曰隠之也聖人嘗曰天下無道禮樂征伐自諸侯出天下有道政不在大夫天下有道庶人不議當是時天子之權凡移於諸侯者皆移於大夫矣聖人於諸侯曰天下無道自諸侯出直辭也於大夫曰不在大夫隠辭也嗚呼春秋近也大夫微矣聖人不忍大其微也大夫猶近也降是益微矣故夫諸侯之僭積而至於大夫大夫之僭積而至於陪臣陪臣之積吾未知其所終也矣畧其微者窒其漸也嗚呼是吾所謂聖人之春秋極禮之衰而憂詩之亡也十先生奥論註後集巻四
