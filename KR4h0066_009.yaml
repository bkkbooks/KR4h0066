body:
  text: 十先生奧論注前集卷九易統論劉穆元易統序道有統聖有統易亦有統聖道之傳均之易也自龍馬呈於河洛而精微廣大者不容自祕繫辭河出圖洛出書疏春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇孔安國以為河圖則八卦是也洛書則九疇是也天地以其自然者畀之人聖人以其同然者概之心遇事而形孰非妙用觸言而發孰非至理規規乎一事一言為其所得者止是殆未造乎其深者也吾嘗自其所已形遡其所未形自其所已發詣其所未發始知古人心傳之妙曽不可於爻象中求室授千古潜㑹方寸大統繩繩初無間斷神而明之存乎人也即吾之所見者釐之而八周之爻孔之翼疏第六論夫子十翼云上彖一下彖三上象一下象四上繫五下繫六文言七說卦八序卦九雜卦十鄭學之徒並同此說故今亦依之不可以一端名者復二之以繫其末岐西之亨中古之憂患不明指以告意亦微矣疏第四論卦辭爻辭誰作云其周易繫辭凡有二說一說所以云卦辭爻辭並是文王所作者案繫辭云易之興也其於中古乎作易者其有憂患乎又曰易之興也其當殷之末世周之盛德邪當文王與紂之事邪又乾鑿度云垂皇策者犧卦道演德者道文成命者孔通卦驗又云蒼牙通靈昌之成孔演命明經準此諸文伏犧制卦文王係辭孔子作十翼易歷三聖只此也故史遷云文王因而演易即是作易者其有憂患乎鄭學之徒並依此說也二以為驗爻辭多是文王後事案井卦六四王用亨於岐山武克殷之後始追號文王為王若爻辭是文王所制不應云王用亨於岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不宜豫言箕子之明夷又既濟九五東鄰殺牛不如西鄰之禴祭說者皆云西鄰謂文王東鄰謂紂文王之時紂尚南面豈容自言已德受福勝殷又欲抗君之國遂言東西相鄰而已又左傳韓宣子適魯見易象云吾乃知周公之德周公被流言之謗亦得為憂患也凡此諸說以為卦辭文王爻辭周公馬融陸績等並同此說今依而用之所以只言三聖不數周公也以父統子業故也始置之以俟其達者故書曰易統箕子包犧神農黃帝堯舜禹文王武王周公孔子顔子湯髙宗帝乙離包犧繫辭古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為罔罟以佃以魚蓋取諸離卓卓其見孰窮其原皎皎其知孰造其真尊其所受神其所得吾心之不泯者難以私之也大統之傳吾肇之始方寸之地皆圖也性中之天皆離也圖不于已而歸之河離不于已而歸之易尊其所受而俾之不容侮神其所得而俾之不容玩斯人不克自反之心幸其知所以尊之神之則吾道庶常明乎天下吁一燼之微滋而十百千萬種之不息而火之本然者燦如也一心之妙擴而十百千萬傳之不朽而我之本然者炳如也繼繼之明了然無間不得已形之竒耦以致其尊寓之罔罟以極其神二者豈足竟吾心之易哉俯仰之觀有不觀者存逺近之取有不取者存法與象可以兩忘身與物可以並置八卦不作吾之所謂離者固昭昭日月之揭今猶不泯乎反觀內照尊而且神古之王天下者在吾胸中矣益神農繫辭神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益畫蛇之足適纍其天史記楚世家楚使昭陽攻齊陳軫為齊國見昭陽曰人有遺其舍人一巵酒者舍人相謂曰數人飲此不足以遍請遂畫地為蛇先成者獨飲之一曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也續鳬之頸適戕其天莊駢拇篇鳬脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也天理混融本無盈闕概而付之自為則我之為我裕如也道學不可二觀損益不可二用方寸之外一毫已贅精微之中一介勿留聰明不作卓約安在知識不行光大若何惡念不萌善孰可遷功勳弗形過孰可改至理渾然吾任之一性粹然吾安之舞雩之風語暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸春人之雨無懷之逍遙洞庭之雅奏莊天運篇北門成問於黃帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得疏云洞庭之野天地之間非太湖之洞庭也舉不足喻吾之天樂課能計效無一得矣一物之觸一物之應一事之感一事之隨擴吾之所自裕者裕天下亦何假乎修飾充牣其所欲彼不德我優適其所利彼不庸我耜耒之作吾無斫揉之勞耒耨之教吾無誥語之諄稼穡自豐矣日用自飲食矣天保詩民之質矣日用飲食千古之民含哺鼓腹孰知其所從來者莊馬蹄篇赫胥氏之時民居不知所為行不知所之含哺而熙鼓腹而逰裕其在我我不容聲裕其在人人不容識反觀其在易易不容取此古人致益所以為益之至者吁知古人不益之益則吾於噬嗑豈屑言哉乾坤黃帝堯舜繫辭黃帝堯舜氏作通其則變使民不倦神而化之使民宜之易窮變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤妙大造於無形則我無竒能斡元用於不測則我無特效巍巍有成豈妙深機蕩蕩無名始融至理冥經緯於寂然不動之中絶意識於渾然莫窺之際我已超然世表孰有知其朕者艱哉吾道之窮也窮則變變則通敢問乾坤在我皇皇而無礙者孰為之寓幸哉吾道之通也通則久久則神敢問乾坤在茫茫而無迹者孰為之綱嚮也作而今已化嚮也使而今已冝人人自納乎至吉之地物物自造乎無所不利之境吾於運量之餘不敢課能計效每以其心傳之妙概而强之天駸駸乎天下之治尤有不足言者爾衣爾裳我無所垂爾乾爾坤我無所取號善形容者不髣佛其神化之妙駕辭乎黼黻之文寄意乎竒耦之畫何為後世苦口之深歟反遡其在我之神於方寸之微潜㑹三聖之神於千載之上則彼此一徑庭也莊逍遙遊篇大有徑庭庭敕定反古今一階陛也易與聖人一大閫域也夫何間革湯武革彖曰革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉截然不可犯者聖人之常毅然不可回者天人之變極吾之常遇彼之變適然契乎此心者理之融也聖人以天心所嚮為從違以人心所屬為去就以吾心之至理為的凖理之可天人之定也吾不規規乎天人之心而反揆乎吾心之理理之常邪堂陛不容異置冠屨不容異處天下之大分愈明誠截然有不可犯者吾順而應之非我也天也人也理之變邪鳴條無餘兵書湯誓伊尹相湯伐桀與桀戰于鳴條之野作湯誓牧野無餘戰牧誓武王與受戰于牧野作牧誓天下之大權日至亦毅然有不可回者吾順而應之非我也天也人也極聖人之常遇天人之變吾甘心任之而不之謝非樂乎其命之革也彼不克嚴其不可犯之尊往往自速其不可回之禍一或恝然乎天心之從違恬然乎人心之去就徘徊乎一事之不屑則我於至理已有乖戾安保天下之不呼舞四起而奪之亟吾不忍斯民或擠於不可救藥之時寧忍一已自冒其不可測知之勢德少慙乎吾身將大安乎天下仲虺之誥成湯放桀于南巢惟有慙德曰豫恐來世以台為口實樂未善乎一時將大聲乎後世語謂武盡美矣未盡善也君臣之分森立乎四百年之餘天人之際綿歷乎六七王之久概之心融之理孰知自素契於順應之先哉如其喜事僥覬妄意更張一不之成亂危已繼聖人本心始不表襮於千古作易者懼之故不得不以革之大者彖吁聖人之杜漸其機如此既濟未濟髙宗既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也象曰水在火上既濟君子以思患而豫防之初九曳其輪濡其尾無咎象曰曳其輪義無咎也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也上六濡其首厲象曰濡其首厲何可久也未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也初六濡其尾吝象曰濡其尾亦不知極也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也道孰為始始之則終道孰為亨亨之則窮亨者窮之基始者終之漸也終而且窮不關乎始亨之先常關乎一心之微吾之一心又始終亨窮之决也天下事固有不可無心以遂其所濟亦不可容心以極其所濟勉强竭吾力以幸其一成既而自處之不暇則向之始者今已終向之亨者今已窮吾於此求其所必濟於不可濟之後亦何䇿以應之自古髙明之君持養是心於有餘之地然後發揮以為不盡之用吾心之運孰有餘於我者終不可以我之不盡以窮其所可盡凡所以濟不濟之候耶堂堂大國擒縱小戎不啻髙屋建瓴水之易易矣遲回三年之久戒絶小人之用任其所以自附聼其所以自至不敢營營以冀其所必濟每兢兢以慮其所不濟克之之效未形而憊或乘之賞之之實未施而悔或隨之事理雖未可竟其所終而吾心之用已不勝其窮此古人之所甚虞者思異日之患豫此日之防濡尾於其初者無異議濡首於其末者無異辭濟之既者其亨小則濟之未者其亨大吾於無始之始復索意於卦爻之外則一心之妙庶乎常有餘而用之不盡也噫嘻始架屋者反瓦三之易道之所以不可終不可窮而自有生生之理歟泰帝乙泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也將開聖人必有雨雲為之先記孔子閒居嗜欲將至有開必先天降時雨山川出雲將興國家必有休祥為之兆中庸至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體古書不概乎天地之數而概乎至誠之神天下之事若不逃乎數有大物者不可以數言也君臣之異分隂陽之異處健順之異尚君子小人之異居亦豈自彼而來哉銖銖兩兩皆吾心之舊物也吾心其果誠耶禍可轉而為福亂可轉而為治塞可轉而為通天地之數吾不暇計也吾心其不誠耶妖孽有立至之形敗亡有立至之機山川鬼神有立至之變然後不得已有任數之說盍知方寸中之涇渭既分其凝結成象自不可嗇泰不泰之所由决也人主司交泰之權膺財成之責不以平不陂者而忽之不以往不復者而簡之不以消不長者而略之業業然兢兢然惟懼自速其復隍之亂以受命之符不可常保而如神之誠不可少虧也持養以謙卑下以禮忘泰通之勢而極其歸妹之誠非幸其祉而冒其言也泰否之理每定於一念之微吾於此一毫之有愧一事之過舉安保其大不往而小不來耶乾旋而坤轉雷厲而風聲韓潮州謝表云云聲作飛百物之豈弟萬民之晏溫吾不泛觀天下而以我之誠否卜之泰烏乎恃明夷文王箕子明夷利艱貞彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之象曰明入地中明夷君子以蒞衆用晦而明六五箕子之明夷利貞象曰箕子之貞明不可息也皎皎者汙昧昧者發灼灼者窮昏昏者達峻砥柱於頽波潰決之中孰若泰華屹立之為固操一壺於舟楫遺逸之餘韓讀鶡冠子學問篇稱賤生於無所用中流失船一壺千金孰若蒲輪緩步之為安甚哉運竒於險與宅平而無為者天壤絶也謨丕矣孰自而顯智大矣孰自而形圭角一呈其鋭必折芒刃一露其鋒必摧嗇吾明於遵養之地而以柔順衛之宿吾明於勇退之時而以艱正持之則今日之昧異日之發今日之昏異日之達一時之暗然者雖不可規而萬世之燦然者自不容息也嗟夫名之彌消吾德彌彰身之彌沮吾道彌光磻溪之都而龍韜虎略萃如也尚書中候云太公即磻溪之水釣其涯得玉璜刻曰姬受命吕佐之兵法六韜龍韜虎韜云云泗濱之居而春生秋殺森如也記檀弓曽子曰吾與女事夫子於洙泗之間河海泛泛自適而鼗鼓磬擊鏘如也語鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海羑里不忍辱八卦之精理寧自我而泯史周紀崇侯譛西伯於殷紂紂乃囚西伯於羑里其囚羑里蓋益易之八卦為六十四卦商祀不復續九疇之大法寧自我而隳書洪範箕子曰天乃錫禹洪範九疇彛倫攸叙謨之丕者以竒耦而顯君牙丕顯哉文王謨智之大者以彛倫而形揚問明箕子以其智為武王陳洪範靜乎天地之鑒淵乎萬物之宗白乎其虛室湛乎其靈襟吾之明明終可夷而不可晉耶閟之深者其發必宏蓄之豐者其達必碩表裏經緯暉映千古亦晦之小而明之大也復顔子繫辭顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉性中之天孰挽孰回理外之人孰遣孰排吾將排遣其在彼之人而挽回其在我之天請問此境何自而入談不容聲難以語人胸中不有卓見者不足以造乎此也念慮之不純吾身之影響已隨履踐之不至吾心之形聲已虧權輕重禍福於影響未捷之始較毫釐得失於形聲未著之先吾之鑽仰日勤博約日敏語顔淵喟然歎曰仰之彌髙鑽之彌堅瞻之在前忽馬在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已視聽言動詎犯其非顔淵問仁子曰克已復禮為仁云云顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動言辨步趨詎擬其迹莊田子方篇顔淵問仲尼曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辨亦辨也及奔逸絶塵而回瞪若乎後者過之所形何二於行怒之所發何遷於色哀公問弟子孰為好學孔子對曰有顔四者好學不遷怒不二過不幸短命死矣齊爾心莊人間世篇回曰敢問心齊仲尼曰唯道集虛虛者心齊也苦爾卓樂爾簞食瓢飲語子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂顧無所用其力耶一旦力到功深超然領㑹豈啻冰釋而風休雲舒而霧霽鵬摶鯤運吾不知天地之髙博日暉月明吾不知宇宙之寥廓帝馳王驟吾不知古今之廣莫萬象森羅皆吾方寸之故物烏呼徑庭異而氣象不同也性真頓還還之必盡理妙潜反反之無餘昔我所見者無非人今我所見者無非天極其原而索其初遡其本而扣其端洞洞屬屬了無一得如歸故家何事於復吾於此始信已私可克已之纍也不善可知善之纍也克之矣終無所待其克知之矣終無所致其知熟乎其仁庶乎其幾吉凶之兩忘悔吝之並置亦聖人復禮之警䇿也吁安得復之不逺者與共談敦復之義哉彼何人豫何人希之則是六爻周公經綸之業表著乎一時者用之小精微之理發揮乎萬世者用之大植璧秉圭之書稼穡艱難之書何諄諄乎其亟也書金榺篇周公為三壇同墠為壇於南方北靣周公立焉植璧秉圭乃告大王王季文王云云無逸篇周公作無逸曰鳴呼君子所其無逸先知稼穡之艱難乃逸則知小人之依東征閔勞之詩鴟梟毁室之詩何渠渠乎其周也鴟梟周公救亂也成王未知周公之志乃為詩以遺王名之曰鴟梟焉鴟梟鴟梟既取我子無毁我室東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也三百六十官之定制又何井井乎其秩也禮天官小宰一曰天官其屬六十掌邦治二曰地官其屬六十掌邦教三曰春官其屬六十掌邦禮四曰夏官其屬六十掌邦政五曰秋官其屬六十掌邦刑六曰冬官其屬六十掌邦事人主範之國史明之君子序之吾之才之美固足以經綸天下反觀內感知大難䝉於前者雖或伸於繼述之人而易統之傳少寓意於六畫者孰竟其所闡之緒爻而辭之我其責也一心之寄其潔净精微之所充者濡然記經解潔靜精微易教也六位之釋其潔净精微之所形者燦然天地之蘊我其擴之神明之奧我其攄之萬物之情我其捈之為萬世而作易豈容𤣥妙其迹艱深其辭以愚人之耳目哉八而八之凡可以象數名者日用之事也六而六之凡可以吉凶斷者萬事之時也吾不事其事惟時其時則爻之為爻豈梏夫三百八十有四而已矣妙乎其隂陽超乎其竒耦可以誠形可以理遇而不可以聲畫竟者自有鼓舞運轉之妙不盡之用以人而明吾所期待者有在也精微之潜交夢寐之默契易之微權必有以任其責於五百嵗之餘者盍為我索之十翼孔子道充乎一性吾則粹聖人之淵道周乎萬物吾則廓聖人之天吾道其淵耶粹然者或可養而成吾道其天耶廓然者不可强而得宗廟其美百官其富宫牆其數仞豈不足以極綏來動和之機子貢曰夫子之牆數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣又曰所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀然天下幸不幸難以自決而敦化之德卒不能廓其覆燾之天吾寧淵淵其淵不時出而用之記中庸辟如天地之無不持載無不覆燾辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也溥博淵泉而時出之溥博如天淵泉如淵春生秋殺一字已嚴左序春秋雖以一字為褒貶然皆須數句以成言陶冶諸子大巧已妙吾心所潜揚問神篇昔仲尼潜心於文王矣達之顔淵亦潜心於仲尼矣未達一間耳吾道所習學行篇孔子習周公者也自不應徒嗜韋編而不有以發其藴也史世家孔子晚而喜易序彖繫象說卦文言讀之易韋編三絶曰假我數年若是我於易則彬彬矣馬圖祕於河而斯文喜其未喪文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何周夢嗇於吾而木鐸振其遺音甚矣吾衰也久矣吾不復夢見周公儀封人曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸三古之所未該三聖之所未悉吾一概而竟發之前藝文志易道深矣人更三聖世歷三古則前日淵泉之淵豈不為今日溥博之天耶羽翼大成翶翔萬世何慊乎鳯儀之不至也鳯鳥不至河不出圖吾已矣夫吾嘗手之不置口之不釋含其英而咀其華味其腴而嚌其真書與心契心與理契曽不知天之為蓋地之為輿而世之有人已之有軀也紛紛欣欣乎其獨樂揖遜乎聖人於六十四卦之外矣易統後題古人品第三易學者繆㑹其意往往旌簡先後徇彼而置此疏第三論三代易名案禮太卜三易云一曰連山二曰歸藏三曰周易杜子春云連山伏羲歸藏黃帝鄭𤣥易贊及易論云夏曰連山殷曰歸藏周曰周易鄭𤣥又釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於其中周易者言易道周普無所不備今所不取案世譜等羣書神農一曰連山氏亦曰列山氏黃帝一曰歸藏氏既連山歸藏並是代號則周易稱周取岐陽地名以此文王所演故謂之周易題周以別餘代寧不知宇宙之中何存非易隨其所取取之約而我不豐足其所受受之富而我不竭得其廣大者可以把握隂陽剸裁天地得其清明者可以輝映河漢雕飾淵海典雅不凡者足以建謨而定䇿卓犖不羣者足以伏節而死義其精微𤣥妙純而不雜者正心而誠意致知而格物推之治國平天下亦何適而不可記大學古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平彼不此悟而屑屑於歸藏連山之間豈知在我之易隨所寓而存者形而卦爻以乾為首妙於心傳以離為先南面而治者不忘所取包犧氏始得其統決非恝然乎此也吾心之離繼繼無間明之中有益者存神農莫盡其用噬嗑之外其不測者神矣神則化化則天黃帝而堯堯而舜祐自天矣舜而禹禹而湯亦其天也天之所錫不異其辭勇智洪範寧異其理洪範易之别也勇智易之用也别者不𤣥見易非嗇禹也用者革之大湯其先之哉髙宗帝乙得心法於家法之傳屈已乎歸妹可為善保泰者從事乎鬼方亦不為無濟矣武王復革命於心法之傳烏乎操戈入室反為商之病哉文王置權守經知我一時之夷萬世之光也文明乎其中柔順乎其外全吾易於不絶之線豈直八卦之重哉箕子室授九疇於禹其發而未竟者正其志晦其明信吾易之韞櫝席珍也周公得以爻之夫子得以翼之其原原本本深矣心之所潜夢之所㑹堅髙博約之形自有卓爾之見不善之念知則泯滅天理復還其殆庶幾顔氏之子果未達乎一間耶見上十翼篇注論道統者終孟子而略顔子稽之復回無憾矣軻不言易非知軻也軻失其傳亦誣軻也韓原道孔子傳之孟軻軻之死不得其傳焉泛而觀之反而求之六十四卦皆吾胸中之故物其千古之不泯者哉十先生奧論注前集卷九
