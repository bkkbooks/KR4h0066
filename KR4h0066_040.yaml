body:
  text: 十先生奧論注續集卷十西漢臣論陳傅良朝錯此篇論不緩七國之誅天下之禍其積非一日也其來也有自其發也有所歸世之忠臣謀士不幸以其身嬰大禍之所歸者固君子之所悲惋也昔者吳王濞之謀反也其志蓋萌於太子博局之死而停蓄含忍於文帝几杖之賜西向之心未始不欲逞也景帝之立濞之側目京師狺然而噬者屢矣而朝錯以削地之䇿適犯其怒而泄其不逞之謀卒死讒鋒為言事者戒錯誠可悲也哉吳王濞傳孝文時吳太子入見得侍皇太子飲博吳太子爭道不恭皇太子引博局提吳太子殺之吳王由是怨望稍失藩臣禮稱疾不朝京師知以其子故驗問實不病天子賜吳王几杖老不朝然其居國以銅鹽故百姓無賦歲時存問茂材賞賜閭里如此者三十餘年以故能使其衆錯為太子家令得幸皇太子數言吳過可削上書說之文帝寬不忍罰以此吳王日橫景帝即位錯為御史大夫說上曰今吳王前有太子之隙詐稱病不朝於古法當誅文帝不忍因賜几杖德至厚也不改過自新乃益驕恣謀作亂逆今削之亦反不削亦反削之則反亟禍小不削之其反遲禍大漢廷臣方議削吳吳王恐削地無已因發謀舉事七國反書聞上召爰盎入問盎對曰方今計獨斬錯發使赦七國復其故地則兵可毌血刃而俱罷上從其議遂斬錯人之受病幾死醫以一藥速之世皆咎醫者夫醫者固有罪然致幾死之病者亦不得謂之無愧也景帝以兒戲殺其宗子芽蘖釁端一旦變生斬謀臣以悅叛國兾以遏其奔軼之鋒嗟乎錯誠有罪帝獨無愧耶以愚䇿六國惟緩可以圖之錯之議曰削之亦反不削亦反愚則曰亟削則必反緩削則可以亡反濞以壯年受封至是垂老矣寬之數年濞之木拱則首難無其人七國雖强皆可以勢恐之也錯不忍十年之緩假欲急其攻而躑躅為之身殞國危取笑天下俚語曰貪走者蹶貪食者噎其錯之謂耶絳灌此篇論非真蔽賢人主之用人莫難乎越其常也躐其等而亟用之而不以來讒間之口者寡矣蓋天下之情非其所素安者易以疑非其所深知者易以忽夫非其所素安者易疑故新進者常多忌非所深知者易忽故一旦而賢者未離乎見輕此情在人雖賢者有所不免也昔高宗之於傅說其知之舊矣豈真以夢得哉高宗夢得說使百工營求諸野得諸傳巖作說命三篇王庸作書曰恭默思道夢帝賚豫良弼乃審厥象俾以形旁求于天下說築傳巖之野惟肖爰立作相云云惟夫踈逺之士欲舉而置之貴近之右未有以信天下也故假諸夢以神之三代之習猶慮及此况後世乎孟子之告宣王曰如不得已將使卑踰尊踈踰戚不可以不重諸葛亮亦言於先主以黃忠之望素非關張之流若班爵遽同則必不悅先主為漢中王欲用忠為後將軍亮曰忠之名望素非關馬之倫而今便令同列馬張在近親見其功尚可喻指關遙聞之恐必不㤝得無不可乎先主曰吾自當解之遂與侯等齊位賜爵關內侯嗚呼孟子猶難之亮亦為大戚豈非以其咈天下之常也哉故夫陳平以亡楚之逐臣高帝俄置之驂乘之密見前陳平論注賈生以洛陽之少年文帝遽議以當路之任誼雒陽人文帝立吳公乃言誼年少頗通諸家之書帝召以為博士時誼年二十餘文帝說之超遷歲中至大中大夫諸法令所更定及列侯就國其說皆誼發之天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之毁曰雒陽之人年少初學專欲擅權紛亂諸事天子後亦踈之不用其議以誼為長沙王太傅絳灌之於二子豈素安而深知之耶然則求其知而不見其長未必絳灌之蔽賢也而勢使之也吁爭名者於朝爭利者於市積薪之歎雖汲黯之長者猶不能平孰謂絳灌而真蔽賢也哉周亞夫此篇論無負文帝之託明王之用人非惟樂其所可狎而亦必有所可忌者也天下之士峻於自居者不可屈而敢為者斯有所不自愛夫惟其不可屈也則其形似難制而其不自愛者疑於生事而好亂是以人主忌之嗚呼其患蓋生於疑其辨之已詳也夫天子之大臣而亦必為人所畏而後可以沮姦之萌為天子大臣而循循無忤而聽其土之所為則人將有所侮而動而一日有變則彼且有以辭吾責何則損其威者固撓其氣而既安其無能則亦不可望其有所震立是故明君必有所伸者蓋有所養也文帝之屬亞夫於景也得之於細柳之日也則文帝之察人盡矣七國之變堅壁伺便以折吳楚之鋒不以天子之命救母弟於垂亡之急以闕軍計則亞夫誠無負文帝之託者景帝固以鞅鞅非少主臣卒置之死文帝後六年胸奴大入邊以河內守亞夫為將軍軍細柳以備胡上自勞軍之細柳天子先驅至不得入有頃上至又不得入上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門天子按轡徐行至中營亞夫揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出帝曰嗟乎此真將軍矣可得而犯邪稱善者久之帝崩時戒太子曰即有緩急周亞夫真可任將兵孝景三年吳楚反亞夫為太尉東擊吳楚吳方攻梁梁急請救亞夫堅壁而守梁王使使請亞夫亞夫不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓高侯等絶吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚相擊至帳下亞夫堅卧不起頃之復定吳楚引兵去亞夫追擊大破吳王濞越人斬王頭以告吳楚平諸將以太尉計謀為是由此梁孝王與亞夫有隙遷丞相景帝甚重之上廢栗太子亞夫固爭之不得上由此疏之梁王每朝常與太后言亞夫之短其後胸奴王徐盧等降漢上欲侯之亞夫曰不可上曰丞相議不可用乃悉封為侯亞夫謝病免頃之上居禁中召亞夫賜食亞夫出上目送之曰此非少主臣也居無何亞夫子取庸苦之不與錢上變告之書聞召詣廷尉不食而死至於庸懦無所為之衛綰則謂其可相少主矣所謂朴厚洪毅以當社稷之寄者蓋其若是靡耶綰自初官以至相終無可言上以為敦厚可相少主尊寵之故自殺亞夫漢之大臣始衰太史公曰申屠嘉死景帝時及今上為丞相者齪齪備員而已無所能發明功名有著於當世嗟乎漢之禍成於大臣之無權而所謂宰相者取充位也夫大臣無權則其勢可以劫而賢者止於取充位則雖甚繆而可以無過以甚繆之人居可劫之勢是故王莽得易之以為資而其端則出於孝景然則漢之禍景帝為也汲黯此篇論斥張湯公孫𢎞甚哉人之好名也世之論者曰士不貴淺露而貴深沉有所不平於其心艴然溢於辭色不若夫深持不較之形泛乎不見其喜怒之為容也故王陵以面折廷爭無益於安劉平勃之功高后欲立諸呂為王問陵陵曰今王呂氏非約也太后不說問陳平周勃等皆曰今太后欲王昆弟諸呂無所不可太后喜罷朝陵讓平勃曰諸君阿意背約何面目見高帝於地下乎平曰於面折廷爭臣不如君全社稷安劉氏後君亦不如臣陵無以應之大抵皆以委靡適順得之彼一介自持者奚足逺到也哉嗟乎有平勃之志則可無平勃之志吾恐未免於佞也孔子不取鄉原而取狂狷非不欲中道也惡夫小人盜中庸之名以自便也孟子曰孔子不得中道而與之必也狂狷乎狂者進取狷者有所不為也孔子豈不欲中道哉不可必得故思其次也孔子曰過我門不入我室我不憾焉者其惟鄉原乎鄉原德之賊也天下之患莫大乎為士者盜名以自便使世之人臣皆以長者自飾談諧逶迤不以身嬰人怒以坐收天下之美名亦誠可樂孰與人主死事耶而主不之察方以此賢之欲士無諂不可得矣昔者漢武之世汲黯與張湯公孫𢎞同列𢎞湯順旨黯心未能平也至於以刀筆吏斥湯以詐斥𢎞積薪之嘆憤不自己黯時與湯論議湯辨常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣上方鄉儒術尊公孫𢎞及事益多湯等數奏决讞以幸而黯常毁儒面觸𢎞等徒懷詐飾智以阿人主取容而刀筆之吏專深文巧詆陷人於罔以自為功上愈益貴𢎞湯𢎞湯心疾黯雖上亦不說也始黯列九卿而𢎞湯為小吏及𢎞湯貴與黯同位巳而𢎞至丞相封侯湯御史大夫黯褊心不能無少望見上言曰陛下用羣巨如積薪耳後來者居上𢎞湯雖不皆斥黯而𢎞則謙辭遜謝引咎於已以愧黯之面毁武帝於此賢𢎞而短黯噫湯何足責若𢎞直盜名者哉黯曰𢎞位在三公奉祿甚多然為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無過黯然今日庭詰𢎞誠中𢎞之病且無黯陛下安聞此言上以為有讓愈賢之孟子曰士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也哉武帝於此謂賢相孟子之所謂穿窬孔子之所謂鄉原者乎終軍此篇論請羈南越敵雖小未可以易為侮之也以易為侮敵人之國而不以取危者幸矣秦輕鄭而覆左僖三十三年秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑云云孟明曰鄭有備矣不可兾也魯卑邾而敗績左僖二十二年邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也君無謂邾小公及邾師戰于升陘我師敗績况有大於邾鄭而侮之非天下之至危也哉然古人之有以其身犯天下之至危而卒以成大功者是非妄庸者能之也能者必天下之豪傑也何者天下之事不能皆萬全也圖天下之事如必待夫萬全之事而後為之則事之可為者亦寡矣故夫豪傑之士有時乘不測之淵投非望之隙未見其可否之形而先决其勝負之數者蓋惟以其智必之李靖必欲蹀血虜庭唐太宗時突厥部種離畔帝方圖進取靖率徑騎三千繇馬谷趍惡陽嶺頡利可汗大驚靖夜襲定襄破之可汗脫身遁帝曰靖以騎三千蹀血虜庭遂取定襄古未有輩諸葛亮必欲取荆州蜀先主見亮曰孤欲信大義於天下計將安出亮曰云云荆州北據漢沔利盡南海東連吳㑹西通巴蜀此用武之國而其主不能守此殆天之所以資將軍將軍豈有意乎十二年亮說先主攻劉琮荆州可有琮左右人及荆州人多歸先主與曹公戰赤壁大破之羣下推先主為荆州牧耿弇之請於光武必欲先定漁陽取涿郡還收富平而東下齊云云帝壯其意乃許之弇乃出兵與張步戰大破之步引去三子者躬言而躬為之卒能不愆其所素定孰謂犯天下之至危而皆不足以成功耶昔韓信請兵東擊齊北舉燕趙南絶楚糧道云云西與大王㑹於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代云云樊噲亦欲請兵橫行胸奴孝惠時單于為書嫚呂太后太后怒召諸將議之噲曰臣願得十萬衆橫行胸奴中季布曰噲可斬也以高帝三十餘萬困於平城奈何以十萬衆橫行胸奴中而謾欲搖動天下太后罷朝不復議擊胸奴事終軍賈誼又欲請係單于之頸而羈南越誼疏陛下何不試以臣為屬國之官以主胸奴行臣之計請必係單于之頸而制其命伏中行說而笞其背舉胸奴之衆唯上之令贊曰欲試屬國施五餌三表以係單于其術固己疏矣南越與漢和親乃遣軍使南越說其王欲令入朝比內諸侯軍自請願受長纓必羈南越王而致之闕下軍遂往說越王越王聽許請舉國內屬是皆犯天下之至危越國以謀人而信與軍得就其志噲沮於季布誼不用於文帝議者多以成敗優劣之吁噲真妄庸人耳貪禍幸灾信不足道者若誼之䇿使帝誠用之亦焉知其終無所就也哉賈生豪傑之士也後世其無以誼計之不行亦以妄庸愚生也哉霍光此篇論安漢於幾危凡天下之利害自非聖人則不以其身嘗焉而後知者蓋寡人主之用人其利害最難知也天下之人才匿真於似而託虛乎實雖智者易惑也故夫其人炳然其容翹然而其中無有世主必甘心焉而不疑蓋亦利其便捷奮發之形若足以成天下之功則捨而為朴魯庸鈍之取也必有所不暇而亦非近於人情惟其倚之而不濟用之而有窮然後反而思天下之事不可以形求昔秦穆公來由余於戎拔百里於虜起蹇叔於踈賤史秦紀晉滅虞虢虜虞君與大夫百里奚百里奚走宛楚人執之繆公聞百里奚贖之與語大悅授之國政百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知繆公使人迎蹇叔以為上大夫戎王使由余於秦繆公問內史廖曰今由余寡人之害將奈之何廖曰為由余請以疏其間留而莫遣以失其期戎王必疑由余終年乃歸由余繆公又使人間要由余由余遂去降秦繆公以客禮禮之春秋賢君有愧其為者矣而聽杞子之言覆師於殽乃悔過自警而深取乎介然無它技之臣書秦誓穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓云云如有一個臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉漢高帝收一時英雄共取天下天下既定叛者九國相踵而後呂后問人則曰安劉者周也陳平智有餘然難獨任上疾甚呂后問曰陛下百歲後蕭相國死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平智有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉是故非殽之敗穆公不知一介之足以託國也而懲韓彭之多事雖陳平獨以智疑嗚呼其亦嘗也已矣粱稻藥石吾審知其良於柤梨菱芡也而雜羞焉則亦柤梨菱芡之啖而不先於稻粱藥石何也快於人者誘人非有誤焉則亦未果却也士之誘人不甚於柤梨菱芡也哉嘗始怪武帝得人盛於七國而不足以辦事何也彼見夫衛霍之容若是其甚武也張周桑孔之狀若是其餂而巧也公孫鄒枚儒言而儒服又若是其文且秀也則以為天下之功得如是者共之亦奚無成而愈多愈不濟愈用之則愈窮公孫𢎞等贊上欲用文武求之如弗及羣士慕嚮異人並出漢之得人於兹為盛儒雅則公孫𢎞董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯丈章則司馬遷相如滑稽則東方朔杖臯應對則嚴助朱買臣厯數則唐都洛下閎協律則季延年運籌則桑𢎞羊奉使則張騫蘇武將略則衛青霍去病受遺則霍光金日磾然後脫然自失而憂天下之計非便捷奮發者能之而提孺子之命寄之朴魯庸鈍之霍光而光果有以當其心上老年寵姬鈎弋趙婕妤有男上心欲以為嗣命大臣輔之察羣臣唯光任大責重可屬社稷上乃使黃門畫者畫周公負成王朝諸侯以賜光受遺詔輔少主帝崩太子襲尊號是為孝昭帝帝年八歲政事一决於光既冠遂委任光訖十三年百姓充實四夷賔服至於唐太宗平生無用人之失卒繆於一李績績既忠力帝謂可託大事嘗暴疾醫曰用須灰可治帝乃自剪須以和藥及愈入謝帝曰吾為社稷計何謝為後留宴顧曰朕思屬幼孤無易公者帝疾謂太子曰爾於績無恩今以事出之我死宜即授以僕射彼必致死力矣乃授疊州都督高宗立召為尚書左僕射帝欲立武昭儀為皇后畏大臣異議未决密詔績曰將立昭儀而顧命之臣皆以為不可今止矣答曰此陛下家事無須問外人帝意遂定而王后廢詔績奉冊立武氏由此言之武帝雖創於殽之敗而太宗不自見黥彭之禍故也嗟乎霍光安漢於幾危而李績流毒數世則一霍光足以贖武帝之過而太宗之烈至于一李績而頓隳故曰人主不幸而有所誤則亦寧以其身嘗之而已趙充國此篇論善用孫吳窮古人之權謀而巧用之者天下之竒才也嗟夫善劒者死鬬善泅者死溺恃其所長者必敗則夫有才者而不聞道孟子所以知盆成括之見殺也盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣窮古人之謀而巧用之而不知有所困不亦孟子之所憂也哉孫吳之書用之桀黠變詐相傾之謀無出焉而其間豈無養威持重緘封而不泄以自固之道世之學其法者非能用其謀之為難而能求其道深藏而時出之者難也漢家之將善用孫吳者趙充國一人而已矣善戰者致人而不致於人以之伺先零之敝充國為人沈勇有大略少好將帥之節而學兵法通知四夷事上書陳兵利害臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今罕羌欲為敦煌酒泉冦宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也報從充國奏充國引兵至先零在所虜久屯聚解弛望見大軍棄車重欲渡湟水道厄狹充國徐行驅之或曰逐利行遲充國曰此窮冦不可追也緩之則走不顧急之則還致死諸將皆曰善虜赴水溺死者數百先為不可勝以待敵之可勝以之定屯田之䇿欲罷騎兵屯田以待其敝遂上屯田奏臣聞帝王之兵以全取勝是以貴謀而賤戰而百勝非戰之善者也故先為不可勝以待敵之可勝謹條留田便宜十三事而窮寇勿追又以縱湟水之餘卒見上注大抵皆略其桀黠變詐之謀而取其養威持重之道故天下不見窮兵之害而收克敵之利充國垂老無將家之禍而全俱榮之身名無它養貪於廉晦勇於怯以無用御有用固兵法之最密人之所不察者而充國知之也學孫吳而知此亦奚惡夫孫吳也哉項羽以其百戰百勝之鋭卒臠於漢軍之刃世多以學兵法不竟咎之籍少時學書不成去學劒又不成去梁怒之籍曰書足其記名姓而已劒一人敵不足學學萬人敵耳於是梁竒意乃教以兵法籍大喜略知其意又不肯竟嗟乎羽非不竟其可用也不竟其無用之用者爾以韓信之賢其智無窮而先聲後實之計不能自知而得趙之纍囚廣武君對曰當今之計不如按甲休兵百里之內牛酒日至以饗士大夫北首燕路然後發一乘之使奉咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者亦不知為齊計矣如是則天下事可圖也兵有先聲而後實者此之謂也信曰善敬奉教於是用其䇿然則兵法之所謂無用之用者固難察之也哉彼霍去病自謂無事兵法去病為人有氣敢往上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法東方生自謂識兵法武帝初方朔上書臣十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言噫使去病而能知兵法無用之用則其功當不減充國方朔而僅知其所用之用是亦孟子所憂也已矣十先生奧論注續集卷十
