body:
  text: 十先生奧論注後集卷二歷代論胡寅秦此篇論秦取天下由先破韓魏然亦本得人之力昔秦皇帝以少年英鋭之氣蹶六國而夷之首縶韓王繼削趙壤元戎橫擊而大梁不守武旅前趨而夀春以平遼東之地入我版圖臨淄之積歸我王府並見史秦本紀於是郡邑海內稱帝而治史始皇二十六年采上古帝位號號曰皇帝後世見其舉兵之尅而取亂之易也皆曰秦皇帝善將將而王李蒙白善將兵王翦李牧蒙恬將白起四人皆秦故能取天下嗟夫是未究其本也且山東諸侯六國地皆千乘而足以爭衡天下賈誼過秦論當此之時齊有孟嘗趙有平原楚有春申魏有信陵此四君者約縱離橫兼韓魏燕趙宋衛而攻中山之泉於是六國之士云云嘗以十倍之地百萬之衆叩關秦秦人開關延敵九國之師逡巡而不敢進獨秦皇帝優遊談笑以一敵六席卷而吞之同上始皇奮六世之餘烈振長䇿而馭宇內吞二周而亡諸侯是豈一朝夕之故哉蓋秦之先君皆侈然有併吞八荒之心而其大臣謀主亦皆為異世計過秦論秦孝公據殽函之固擁雍州之地君臣固守而窺周室有席卷天下包舉宇內囊括四海之意并吞八荒之心當是時也商君佐之內立法度務耕織修守戰之備外連衡而鬬諸侯自繆公以來威權形勢常雄諸侯太史公曰自繆公以來至于秦王二十餘世常為諸侯雄精兵鋭師左縈右朴勢如摧枯往必縻潰東征遣某軍西擊用某將今年圍某邑明年下某城而衡人又以其威稜恐愒於外於是六國之君寒心破膽求成請媾之不暇偷一時之安而恬後日之毒出有盡之地而充無已之求不愛膏腴沃壤以資奉之孝公既沒惠文武昭襄蒙故業因遺策南取漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合縱締交相與為一方獻名都復效大邑盟載伊始弓矢未櫜而關西之師又出於函谷矣夫惟諸侯之地日瘠秦地日肥則諸侯之勢益弱而秦勢愈強矣譬如假賊以兵惠盜以糧必産後害是以數世之後始皇帝得以拱手而取之也賈誼過秦論於是秦人拱手而取西河之外嘗以天下地圖按之韓魏之地南蔽諸國秦人破之不先則安能過都越國而致討於人乎不據要害不散從約以強我而孤敵則安能圖大事乎是故加兵全魏取城六十使魏人震懾則穰侯之為也史穰侯傳穰侯為秦將攻魏魏獻河東河西取城六十決羊腸之險塞太行之道切切然收韓是謀則范雎之為也史范雎曰今夫韓魏中國之處而天下之樞也王其欲伯必親中國以為天下樞以盛楚趙楚趙附則齊必事秦齊附而韓魏因可虜也昭王乃拜范雎為客卿謀兵事且欲發使於韓云云酈食其曰塞成臯之險杜太行之道以示諸侯形制之勢大築兾闕遷都咸陽使秦人據河山之險以制諸侯死命則衛鞅之為也史商君傳以鞅為大良造將兵圍魏安邑降之居三年築兾闕宫庭於咸陽秦自雍徙都之太史公曰秦地被山帶河以為固四塞之國也遊説列國散從解約使秦人得出甲而馳騖於外則張儀之為也史張儀遊説諸侯云云蘇秦已説趙王而得相約從親恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人激感張儀云云張儀得見秦惠王惠王以為客卿與謀伐諸侯微此二三子逆去其害而先置其利則始皇帝之君臣欲以一旦取天下可乎嗟夫祖龍之君史始皇紀使者從關東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死因忽不見置其璧去使者奉璧具以聞始皇曰祖龍者人之先也使御府視璧乃二十八年行渡江所沈玉也因前世以有天下而躬自壤之甫十有四嵗而咸陽遂亡其淫虐侈麗之迹先儒言之詳矣自過秦而下前賈誼作過秦論若仲舒谷永嚴安徐樂吾丘主父劉向揚雄蒯通伍被朝錯釋之鄒陽賈山終軍之儔皆嘗伸筆舌而數其罪愚不復論西漢上此篇論髙祖短於處事長於聽言髙祖短於處事而長於聽言班彪王命論髙祖知人善任使以信誠好謀達於聽受見善如不及從諫如順流故能仗劒三尺奮起徒步以有天下本紀吾以布衣提三尺取天下此非天命乎尋其處紛亂之際猷為經畫鮮不倒行逆施之幾敗大事賴佐命之臣反覆辨正開其如此禁其若彼髙祖釋然於心躍而從之漢王與鄜食其謀橈楚權欲立六國後漢王令刻印張良來謁漢王方食以告良良請借前箸以籌之漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印是以事無困廢之禍不然天下非髙祖有也嘗讀楚漢之書私怪髙祖之失謀其大有六而其他尚多有之始其南陽之勝遽欲引兵而西不有留侯之謀則宛擊其後秦邀其前危孰甚耶本紀秦三年六月與南陽守齮戰犨東破之略南陽郡南陽守走保城守宛沛公引兵過而西張良諫曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊強秦在前此危道也於是沛公乃夜引軍從他道還藍田之捷西入咸陽遽欲止宫休舍不有樊噲之謀則蠱於聲色沮橈軍氣害孰甚耶沛公引兵擊秦軍大破之藍田南遂至藍田乂戰其比秦兵大敗遂西入咸陽欲止宫休舍樊噲張良諌乃封秦重寶財物府庫復軍霸上刻印苴茅封六國後非聞八不可之謀則賢臣四分勍敵並起長亂必矣漢王欲立六國後趣刻印具以酈生計告良良曰昔湯武伐桀紂封其後者度能制其死命也今陛下能制項籍死命乎其不可一矣武王入殷表商容閭式箕子門封比干墓今陛下能乎其不可二矣發巨橋之粟散鹿臺之財以賜貧窮今陛下能乎其不可三矣殷事已畢偃蘋為軒倒載干戈示不復用今陛下能乎其不可四矣休馬華山之陽示無所為今陛下能乎其不可五矣放牛桃林之野天下不復輸積今陛下能乎其不可六矣且夫天下遊士離親戚棄墳墓去故舊從陛下者但日夜望咫尺之地今乃立六國後是無復立者遊士各歸事其主陛下與誰取天下乎其不可七矣且楚唯無強六國復橈而從之陛下焉得而臣之其不可八矣誠用此謀陛下事去矣漢王令趣銷印既入武關遂欲擊秦嶢關之軍非聞旗幟為疑兵之謀則以少犯衆兵力不敵覆師必矣逐西攻武關入秦秦遣將將兵距嶢關沛公欲擊之張良曰秦兵尚強未可輕動願先遣人並張旗幟於山上為疑兵使酈食其陸賈往説秦將啖以利秦將果欲連和沛公果欲聽之張良曰不如因其怠解擊之秦兵大敗項羽方強遷之於南鄭之僻反切齒而不行賴鄼侯陳屈申之説然後隱忍以圖大也羽自立為西楚霸王王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭漢王怨羽之背約欲攻之蕭何諌乃止項羽既弱分之以鴻溝之西乃束甲而欲去賴曲逆獻養虎之説然後剛決以就功也羽少助食盡乃與漢約中分天下割洪溝以西為漢以東為楚羽解而東而漢王欲西歸張良陳平諫曰今漢有天下大半而諸侯皆附不因其幾而遂取之所謂養虎自遺患也漢王從之鄉使當此機會之際髙祖率情而徑行則天下之勢何如耶由是知髙祖明於見機而精於料敵者獨能廣寬兼聽以佐裁決耳于時好善如不及從諫若轉圜梅福傳云下至販繒屠狗狂生戍卒之計皆取而用之灌嬰雎陽販繒者也樊噲以屠狗為事後班彪論曰舉韓信於行陳收陳平於亡命英雄陳力羣策畢舉云云是以能從容間暇而定帝業於五載間也異姓諸侯王表漢亡尺土之階繇一劒之任五載而成帝業且秦之末塗天下雲擾陳勝吳廣舉陳武臣張耳舉趙田儋舉齊景駟舉郢周市舉魏韓廣舉燕豪傑矯據都邑相望及夫僣偽之國以次勦滅而衡行天下獨一項羽耳彼以蓋世之材仗全楚之勢噫嗚咄嗟則三軍之士披却而不振羽令壯士挑戰漢有善騎射曰樓煩楚挑戰三合樓煩輒射殺之羽大怒自被甲持戟挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出大小七十餘戰未嘗敗北可謂難敵矣然髙祖率困之於垓下而戮之於東城者固天時亦人謀也羽壁垓下軍少食盡漢率諸侯兵圍之數重夜直潰圍南出漢追及之羽復引而東至東城追者數千自度不得脫謂其騎曰吾起兵至今八嵗矣身七十餘戰所當者破所擊者服未嘗敗北遂伯有天下然卒困於此此天亡我非戰之罪也乃自剄嗟夫我屈羣䇿以為禆助揚重黎篇漢屈羣策羣策屈羣力而彼亦能用衆謀則雌雄之勢未能安決羽乃使人謂漢王曰天下丐丐徒以吾兩人願與王挑戰決雌雄母徒苦天下父子為也惟其我能資諸人而彼憞羣策以自屈是以有興亡之異也要之西漢之興本聽言而已矣西漢下此篇論西漢之亡在於外戚之擅權人君有天下而未知治亂得失之機胡不取前世之已事觀焉某事果利乎循而行之某事果害乎矯而變之庶幾可以逺禍亂基太平也今夫天子以一身而制天下者以有權利也惟利可以役人權可以制人是以不出殿陛而天下惟吾之聽苟不能謹惜名器而輕以假人孔子曰惟器與名不可以假人倒持太阿梅福傳秦倒持太阿授楚其柄授人鐔柄則晚節末路抱持虛器而威勢下移矣又况外戚之倫少不知學狃富貴之居則志易以僣挾禁掖之勢則權易以專其始盜天子之威福為豫奪以劫持天下天下既側目而畏之則還以恐愒於上而邀望大利矣君人者奈何不加抑逺而使之立朝乎西漢之業以外戚亡議者過成哀之君縱不能逺取前世事以為規鑒胡不以祖宗之得失耳目未逺者觀之乎始文帝以后弟竇廣國賢有行欲相之既而曰恐天下以吾私廣國卒拜申屠嘉嘉本傳文帝以后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乃以御史大夫嘉為丞相元帝以馮野王行能第一欲用為御史大夫既而曰後世必謂我私後宫卒用張談元帝時御史大夫李延夀卒在位多舉野王功能第一為曰吾用野王為三公後世必謂我私後宫親屬以野王比乃下詔以太子少傅張談為御史大夫野王乃嘆曰人皆以女寵貴我兄弟獨以賤是二帝者矯私徇公若此其蚤也遏絶外戚之亂若此甚也繼其後者若之何不循而行乎異時吕氏盜朝産祿肆亂不有太尉主兵而北軍助順則海內危矣髙后紀將軍祿相國産顓兵秉政自知背髙皇帝約恐為大臣諸侯王所誅因謀有亂大尉勃與丞相平謀勃入北軍不得入乃令紀通持節矯內勃北軍勃復令酈寄説祿以兵授大尉勃勃入軍門行令軍中曰為吕氏右袒為劉氏左袒軍皆左袒勃遂將北軍産不知祿已去北軍入未央宫欲為亂殿門弗內勃逐産殺之悉捕諸吕皆斬之霍氏繼起禹山專制肆行非度陰有異謀非宣皇帝毅然加兵則宗廟恐矣霍光傳宣帝始立立微時許妃為皇后光夫人顯愛小女成君欲貴之私使乳醫淳于衍毒藥殺許后因勸光內成君代立為后光薨後語稍泄於是上始聞之而未察更以禹為大司馬冠小冠亡印綬罷其右將軍屯兵顯及禹山雲自見日侵削數相對啼泣自怨於是始有邪謀矣會事發覺雲山明友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市彼二氏者柄朝未幾而産害己若此繼其後者若之何不矯而變乎悲夫建始以後建始成帝年號政柄旁落歸于王氏五侯羣弟更迭弄權河平二年上悉封舅談為平阿侯商成都侯立紅陽侯根曲陽侯逢時髙平侯五人同日封故世謂之五侯威勢翕習青紫充滿王氏子弟皆卿大夫侍中諸曹分據執官滿朝廷排擯宗室孤弱公輔誅戮亡忌擊斷不請大將軍王鳳用事上遂謙讓無所顓左右常薦光祿大夫劉向少子歆通達有異材上説之欲以為中常侍左右皆曰未曉大將軍上於是語鳳鳳以為不可乃止其見憚如此而當時之君瑣瑣碌碌曾不敢舉手開喙以預天下事自王章以直言誅王商傳直臣王章訟商忠直言鳳專權鳳竟以法誅章劉向以正諌黜向本傳時政由王氏出向極諌曰今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充益幄內魚鱗左右大將軍秉事用權五侯驕奢行汗而寄治身私而託公管執互樞機朋黨比周兄弟據重宗族盤而忠讜之士卷舌矣杜欽谷永之朋方且逆望風旨揄揚贊頌並見本傳而張禹孔光共為持計不肯吐忠于上並見本傳由是漢室雕弱不振至于賊莽則大事去矣孝平之世政自莽出至乎變異見於上民怨於下莽亦不能文也彼且文飾休符招致琛贐作為石匱大誥之書以愚弄天下莽本傳羣臣乃盛陳莽功德致周成白雉之瑞千載同符宜賜號曰安漢公平帝崩莽自謂威德日盛遂謀即真之事梓潼人哀章見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝行璽言王莽為真天子則漢其不亡得乎噫自古天下敗於外家者惟漢與周然隋文帝東平全齊而西破巴蜀五王姦謀同日擲發則於宇文氏不為無功楊安之女為周宣帝妃堅以元舅輔政有功於國卒受周禪是為隋文帝方之安漢可異日談也王莾號安漢公東漢上此篇論光武明於料敵而長於用人世祖皇帝單車匹馬崛起閭巷東西誅戮以復漢室而君海內議者皆曰新室苛政民困水火于時豪傑之士有能倡義大呼拯援焚溺則耄倪逺近攝祍而從之矣故建武之業捷如覆掌嗟乎是不然彼公孫述據巴蜀隗季孟竊隴右彭寵張步之徒紛紛而起並本傳皆有戡亂之名胡為卒敗塗地耶議者又曰西京之民涵休於漢氏之渥澤久矣自姦臣擅命僣偽四作天下喁喁仰思漢德故南陽諸劉易以集事嗟乎是又不然劉永起雎陽盆子窺中原皆豐沛之胄而終死人手並見本傳天水之豪隗囂聞莽敗謀起兵應漢稱漢復元年據天水邯鄲之盜王郎以為河北有天子氣詐稱成帝子子輿趙繆王子林率車騎數百入邯鄲立郎為天子漢兵拔邯鄲斬之皆假託宗籍以詆欺天下而何為竟無成也從是論之則光武之興智謀英略必有加人者矣蓋光武明於料敵而長於用人是以豪傑之士不能與之競鞭並進以角中原也然則明於料敵奈何曰籌之方寸之中逺料萬里之外光武賜竇融璽書既至河西咸驚以為天子明見萬里之外揣微射隱無不如目擊者若乃遣朱祐以討秦豐諉耿純以襲劉楊任侯進以要赤眉之衆並見本傳劉盆子傳樊崇起兵於莒恐其衆兵與莽兵亂乃皆朱其眉以相識别由是號赤眉皆逆料事情而授以成算策其必勝已而果勝也吳漢之討蜀與劉尚異營鄧隆之救薊與朱浮别壘並見本傳及光武紀救援阻隔而無以濟師策其必敗已而果敗也夫是之謂善料敵而長於用人奈何曰收集以廣其來委任以課其功存撫以激其忠敦奬以厲其氣若乃設壇場以拜馬武見本傳脫左驂以遺賈復本傳王莽末時下江新市吳越復起聚衆數百人復北渡河光武召見竒之署復破虜將軍督盜賊復馬羸光武解左驂以賜之揮綬以賜李忠本傳忠遂與任光同奉世祖世祖自解所佩綬以帶忠因從攻下屬縣解衣以衣來歙見本傳明之至矣冦恂之守河內冦恂文武備足有牧人御衆之才乃拜為河內太守謂恂曰昔髙祖留蕭何鎮關中吾今委公以河內馮異之定關中本傳異朝京師引見帝謂公卿曰是我起兵時主薄也為吾披荆棘定關中耿弇建策之功本傳帝謂弇曰將軍前在南陽建此大䇿常以為落落難合有志者事竟成也王霸渡河之役本傳王郎起光武令霸至市中募人將以擊郎光武即南馳至呼沱河候吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸詭曰氷堅可度遂前北至河河冰亦合未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也皆諄諄然稱揚褒美以慰功臣之心而作將士之氣卒之授鉞四七有翼扶王運之功焉馬武傳論中興二十八將前世以為上應二十八宿又張平子東京賦世祖龍飛白水鳳翔參墟授鉞四七共工是除夫是之謂善用人也蓋善用人矣雖短於料敵亦可取天下髙祖是也乃若一身而兼有之則光武之興晚矣東漢下此篇論人重名義而其業壞於宦官之亂人君收集忠賢環布列位養其剛氣而厲其偉節使之正色立朝奮不避死則雖有姦臣決不能肆志於天下何者狡詐之謀一有暴露則正士憤疾戮力而攻之矣夫惟僉壬攢朝擊去君子圜視前後無復顧忌然後爭逞誤國之計而圖其私也在昔東漢之世人重名義仕於朝者類皆慷慨忠勇芥視爵位而喜於嬰小人之鋒學於時者亦能品核公卿崇論閎議而敦尚名節一有異此則藝夫孺子獻譏而騰笑矣觀夫孝和以後主勢陵弱前有竇憲擅朝和帝即祚幼弱而竇憲兄弟專總權威內外臣僚莫由親接所與居者惟閹宦而已後有梁冀用事梁䔬立質帝又潛行鶴殺帝復立桓帝專擅威柄凶恣日積百僚側目莫敢違命天子恭已而不得有所親豫手握王爵躬盜天憲宦者傳序句呼吸指揮可以貧富生死天下而士於此時終不肯俯意屈節少有承順而程奏顯言條疏其罪者何多也若樂恢何敞丁鴻袁安李恂伯魚之倫固嘗詆摧於竇並各見本傳而張綱杜喬黃瓊延篤周協陳龜之朋固嘗沮抑於梁矣並各見本傳是以強梁之凶禠氣而不敢動不然天下無漢豈待建安之末哉彼閹人腐夫五邪曹趙之輩中常侍單超徐璜具瑗左悺唐衡共誅梁冀五人同日封侯其後轉橫云云桓帝紀論五邪肆虐流衍四方曹節與趙封並見宦者傳既以目見前日之事矣將播虐於天下而逞已之所欲為竊計以謂孱昏之君固可愚弄於掌股之上而不足畏有能奮臂以摶我者獨四方忠義之士爾於是假手於牢修借交於朱並前見本注厚誣名賢指為鉤黨靈帝建寧二年侯覽諷有司奏李膺等皆為鉤黨之獄死者百餘人諸附從者錮及五屬制詔州郡大舉鉤黨于是天下豪傑及儒學行義者一切結為黨人欲一網而去之若李膺杜密范滂張儉之流不能以身免而其他死徙廢禁六七百人不既多乎侯覽怨張儉尤甚覽鄉人朱並素佞邪為儉所棄承覽意指上書告儉與同鄉二十四人别相署號共為部黨圖危社稷而儉為之魁大長秋曹節因此諷有司奏諸鉤黨者故司空虞放及李膺杜密朱宇荀昱翟超劉儒范滂等請下州考治黨錮之禍涉七十載寃濫之氣上通於天不既久乎李膺等百餘人皆死獄中自此結為怨隙者因相陷害睚眥之忿濫入黨中乂州郡承旨或有未嘗交關亦羅禍毒其死徙廢禁者六七百人凡黨事始自甘陵汝南成於李膺張儉海內塗炭二十餘年由是賢人君子無復居朝而閹寺之勢日以翕習回天獨坐之謡譁于民間單超傳徐璜具瑗左悺唐衡四侯轉橫天下為之語曰左回天具獨坐徐卧虎唐兩墯私竊威權公取貨賂豪奢刻虐無不為矣其後陳蕃竇武擊之而見誅陳蕃謂竇武曰曹節王甫等自先帝時操弄國權今不謀之後必難圖武深然之武白太后誅曹節等太后猶豫未忍而曹節脅尚書作詔板拜王甫為黃門令收捕武等武不受詔執蕃送北寺獄殺之武自殺何進王允謀之而不勝何進拜大將軍與袁紹謀誅宦官進召王允與謀進後為張讓所斬漢室於是大壞嗟夫東漢中葉邪不勝正故亂而不亡及其末塗正不勝邪由是逐鹿之人叩關而至矣秦失其鹿天下共逐之後之君能戒於此不使姦邪得志而君子道長誠天下之福也曹魏此篇論武帝不知人之過人君無敏識精鑒以照知人材而疑其可信信其可疑甚大患也昔者魏武帝東西征討艱苦百戰而老身於鋒鏑之間其規為志意將以合天下也而三方終不平將以傳後嗣也而胙國者止五世而已矣竊嘗誦其書而追攻其失不知人之過也今夫劉備割據於當年而司馬仲達之子孫篡奪於後世皆禍魏者也而詳觀其實乃武帝之自取何者備之困於袁吕而來奔也帝固策其英雄與已敵也劉備與袁術相持經月吕布出兵攻備備敗走歸曹公曹公厚遇之從容謂備曰今天下英雄惟使君與操耳本初之徒不足數也程昱郭嘉固嘗稱有雄才不肯為人下矣其亦宜先慮而早圖之以絶後害奈何恬不控制而又縱之乎吕布襲劉備備來奔程昱説公曰觀劉備有雄才而甚得衆心終不為人下不如早圖之公曰方今收英雄時也殺一人而失天下之心不可又劉備來奔或謂備有英雄志今不早圖後必為患太祖以問郭嘉嘉曰今備有英雄名以窮歸已而害之是以害賢為名則智士將自疑回心擇主公誰與定天下太祖笑曰君得之矣司馬仲達數以智謀禆贊大業帝固察其有雄豪志矣然惑於臨履芻牧之偽披懷而信之熟視其狐媚之謀縱觀其狼顧之相而恬不屑意晉宣帝紀魏武察帝有雄豪志聞有狼顧相欲驗之乃召使前有令反顧面正向後而身不動因謂太子丕曰司馬懿非人臣也必預爾家事是以基宇為蜀侵而國祚為晉奪皆自取之也至於楊修有射隱之才本傳序云季圭有料敵之智崔琰字季圭見本傳荀彧孔融之賢郭嘉桓邵之傑並見本傳皆可付以機要而仰其成績者也返嫉其勝已無故而斃之謀臣傷心壯士挫氣由是英偉倜儻之輩褁足而不敢向宛洛矣嗚呼於姦猾則可疑而信於英彥則可信而疑無乃左乎昔慕容垂仕於苻堅而陰有異志王猛苻融策其必叛而堅弗之察慕容垂奔秦初秦王堅陰有圖燕之志憚垂威名不敢發及聞垂至大喜王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制不如早除之堅曰吾方收攬英雄奈何殺之乃以垂為冠軍將軍其後淮淝之歸請巡撫燕岱而堅縱之遂猖獗不可制矣慕容垂傳堅之敗於淮南也垂軍獨全堅以千餘騎奔垂垂世子容勸垂滅堅垂弗從堅至澠池垂請至鄴展拜陵墓因張國威刑以安戎狄堅許之權翼諫曰垂猶鷹也飢則附人飽便髙飛遇風雲之會必有凌霄之志惟宜急其羈絆不可任其所欲堅不從未幾垂果叛魏祖之遣劉備其失類此也蕭道成仕宋明帝察其非人臣相又以謡讖知其必享天下南齊本紀髙帝姓蕭名道成宋以帝為假冠軍將軍加都督五州明帝嫌帝非人臣相而人間流言帝當為天子然而因循退怯不能早為之慮其後竟以代宋魏武之貸仲達其失類此也若曰玄德仲逹皆天所贊而非人力所能制則愚不之知矣儻曰天道逺人道邇左昭十八年子産曰云云姑以人事而揆得失則魏祖豈容無失哉蜀此篇論三傑優劣關張不及諸葛之功或問漢髙祖得三傑為輔故能芟夷逋穢亟定大業髙祖曰運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉餉不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下也唐明皇得三傑為臣故能興起太平比隆貞觀宋璟為右相張説為左相源乾曜為太子少傅同日拜有詔太官設饌太常奏樂會百官尚書省東堂玄宗賦三傑詩自寫以賜玄德之興亦有三傑以管戎旅傅斡曰劉備寬仁有度能得人死力諸葛亮達治知變正而有謀而為之相關張二人勇而有義皆萬人之敵而為之將此三者皆人傑也以備之略三傑佐之何為不濟而訖不能取吳魏以合天下賢者亦無益於國乎曰否不然也當西漢之初所與爭天下者項氏也彼方妬賢嫉能信用間謀髙祖紀上曰吾所以有天下者何項氏之所以失天下者何髙起王陵對曰項氏妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也上曰云云項羽有一范增而不能用此所以為我禽也而髙皇帝得蕭張韓信以為禆助則其興晚矣見上注唐之開元四海混一強梁之凶禠氣而未敢動明皇帝得宋璟張説乾曜以粉澤王化則其治冝矣見舊史本紀先主之興孤立一隅西有孟德宅許洛之勝曹操字孟德東有仲謀據揚越之廣孫權字仲謀挾天子以劫天下則不如曹見諸葛亮傳訓齊武備揣料敵情則不如孫見吳主傳彼且披懷虛已收集賢智而虎臣彪將交至層出樂為之用蜀於此時雖得三傑以救紛亂尚未克制勝况所用三傑者未必皆人傑乎嗟乎傅幹以孔明關張為蜀三傑以愚觀之是獨一傑耳方先主之未遇孔明也小戰輒殱大戰輒北身居袁吕掌握中者數矣蜀志袁術來攻先主先主拒之於盱眙淮陰先主與術相持經月吕布乘虛襲下邳虜先主妻子先主求和於吕布布還其妻子先主遣關侯守下邳還小沛復合兵得萬餘人吕布惡之自出兵攻先主先主敗走歸曹公一朝卧龍起而佐之教以跨有荆略取益部以據要害諸葛亮傳徐庶謂先主曰諸葛孔明者卧龍也將軍豈願見之乎由是先主遂詣亮凡三往乃見因屏主曰漢室傾頽姦臣竊命計將安出亮答曰云云荆州用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之地髙祖因之以成帝業若跨有荆益保其巖阻天下有變則命一上將將荆州之軍以逮宛洛將軍身率益州之衆出於秦川則霸業可成於是吞劉璋之國兼劉琮之衆而基宇定矣曹公南征會表卒子琮代立遣使請降主主乃將其衆去過襄陽諸葛亮説先主攻琮荆州可有先主曰吾不忍也云云益州牧劉璋勑關戌諸將文書勿復關通先主先主大怒進圍成都璋出降赤壁之戰孫權遣周瑜程普等水軍數萬與先主并力與曹公戰于赤壁大破之焚其舟船羣下推先主為荆州牧渡瀘之役諸葛亮傳率諸軍北駐漢中臨發上疏云云五月渡瀘深入不毛皆能集一時之俊功以廣疆宇已而龍驤虎視有飲馬河洛之志吳鴻臚張儼作默記論亮長驅祁山有飲馬河洛之志真可謂一世豪傑而凛凛乎管樂之上矣諸葛亮每自比於管仲樂毅乃若關雲長張益德雖曰萬人敵而程昱輩竒之張飛雄壯威猛亞於關侯魏謀臣程昱等咸稱關張萬人之敵然功業之著見者蓋鮮耳雖嘗督軍敗于禁先主為漢中王拜雲長為前將軍率攻曹仁於樊曹公遣于禁助仁秋大霖雨漢水泛溢禁所督七軍皆沒禁降雲長威震華夏橫矛挫曹公曹公入荆州先主奔江南曹公追之先主聞曹公卒至棄妻子走使飛將二十騎拒後飛據水斷橋瞋目橫矛曰身是張益德也可束共決死敵皆無敢近者故遂得免然皆勇有餘而智不足者又况驕士大夫而弗恤小人躬速禍之道而身以僇沒謂之人傑可乎然則﨑嶇萬里之蜀不能合吳魏以取天下非不幸也當天下分裂之時雄傑並起以智鬬智則智有時窮以力角力則力有時屈惟能兼衆智屈羣力者得天下矣先主寬恤洪毅有英雄之概惜其賢佐止一孔明而其餘爪牙腹心之寄類皆亡以逾人是以老於兵革而志卒不就西陵之敗飲恨而死悲夫隋此篇論廢立太子之失髙祖靖三方之難本紀周德將盡禍難頻興宗戚姦回咸將竊發顧曕宫闕將圖宗社藩維連率逆亂相尋搖蕩三方王受天明命除羣凶於城社廓妖氛於逺服破五王之謀趙王招陳王純越王達代王盛滕王逌並至于長安云云雍州牧畢王賢及趙陳等五王以天下之望歸于髙祖因謀作亂髙祖執賢斬之寢趙王等之罪因詔五王劒履上殿入朝不趍用安其心南國歸降北國遜避東隅西裔悉稟正朔史臣曰樓船南邁則金陵失險驃騎北指則單于欵塞職方所載並入疆理禹貢所圖咸受正朔而君子不以為功日晏坐朝親攬吏事登秀髦納忠讜訓兵農協禮樂並見本紀而君子不以為治何者不能長慮却顧為扶持長久計顧輕以天下授之庸弱則治雖定功雖成其亂與亡無日矣今夫太子天下本本一搖天下震動奈何輕喜怒而妄與奪耶昔者子戲僭立魯國亂史魯世家武公九年與長子括少子戲西朝周宣王宣王愛戲欲立為魯太子周之樊仲甫諫宣王曰廢長立少不順不順必犯王命犯王命必誅之云云弗聽卒立戲是為懿公括之子伯御與魯人攻弒懿公子荼繼統齊祚衰左哀五年齊燕姬生子不成而死諸子鬻姒之子荼要諸大夫恐其為太子也言於公曰君之齒長矣未有太子若何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼置羣公子於萊申生放逐全晉弱左莊二十有八年晉獻公蒸于齊薑生太子申生又驪娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公晉侯説之使太子居曲沃二五卒與驪姬譖羣公子而立奚齊至僖五年晉侯殺其世子申生扶蘇黜逺強秦喪史秦紀始皇崩於沙丘乃為書賜公子扶蘇曰與喪會咸陽而葬趙髙乃與公子胡亥丞相斯謀破去始皇所封書賜扶蘇者而更詐為丞相斯受遺詔立胡亥為太子賜扶蘇死未有儲副之位驟廢輕立而免於患者也乂况以不肖而易賢乎房陵王監撫二十年岐嶷端良無大過闕守成之良主也房陵王勇髙祖受禪立為皇太子獻皇后意有它故甚責望勇頗遣人伺察求勇罪過晉王知之彌自矯飾始構奪宗之計因引張衡定策遣褒公宇文述深交楊約令喻旨於越國公素既知意因盛言太子不才皇后遂遺素金遂有廢立意奈何聽艷后萋斐之辭蔽狡童中傷之計上注又史臣曰聽哲婦之言惑邪臣之説溺寵廢嫡託付失所滅父子之道開昆弟之隙文致其罪正坐質責楊素舞文巧詆鍛鍊成獄勇由是遂敗當是時也元旻營救而無以敵張衡左衛大將軍五原公元旻諫曰廢立大事天子無二言詔旨若行後悔無及讒言罔極惟陛下察之上不答孝政辨明而無以勝楊素文林郎楊孝政上書諫曰皇太子為小人所誤宜加訓誨不宜廢黜上怒撻其背于是降帝胄之貴而均之編列幽囚􅂒閉不翅賊讎而雅無惻隱之意乃移勇於內史省立晉王廣為皇太子仍以勇付之復囚於東宫逮至晉王之罪顯白上聞始大感悟悔不晚乎髙祖寢疾於仁夀宫徵皇太子入侍醫藥為姦亂宫闈事聞於髙祖抵牀曰枉廢我兒因遣追勇未及發使髙祖暴崩已而大業之君忲侈無度盡取秦皇漢武之迹而踵之通鑑臣光曰煬帝以悖逆計謀坐承冨強之業志驕氣溢慨然慕秦皇漢武之為人窮奢極欲兵連四夷政煩賦重盜賊蜂起云云耗儲偫於王門栁城之外發淮揚民十餘萬開邗溝自山陽至揚子入江渠廣四十步旁皆築御道植以栁頓師徒於陰山遼左之逺史臣曰頻出朔方二駕遼左海內騷然不聊生矣宫洛陽渠通濟狩揚越巡朔方斬刈民力輸掠甚衆四海之衆叩心怨上大業元年巡歷淮海觀省風俗敕宇文禮與內史舍人封德彛等營顯仁宫南接皂間北跨洛濱發大江之南五嶺汲北諸郡三百餘萬開通濟渠云云車駕發榆林歷雲史泝金河旌旗輜重千里不絶云云郡縣競務刻剝以充貢獻民外為盜賊所掠內為貪吏所賦生計無遺加之飢饉無食於是大盜焱起而無以抗之鹿遊咸陽身死人手斯則付託不效所致也嗟夫開皇之盛文軌混一皆指日以俟太平而房喬父子以殽置嫡庶獨知其將亂終如其言信標鑒通悟之士哉文帝之克陳也天下皆以為將太平監察御史房彥謙私謂所親曰主上忌刻而苛酷太子卑弱諸王擅權天下雖安方憂危亂其子玄齡亦密言於彥謙曰主上以詐取天下諸子皆驕奢不仁必自相誅夷今雖承平其亡可翹足待十先生奧論注後集卷二
