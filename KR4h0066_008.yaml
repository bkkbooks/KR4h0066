body:
  text: 十先生奧論注前集卷八六經論楊萬里易此篇論言不盡意聖人之教不離於言而未始不離於言不離於言者言也未始不離於言者非言者也言者道之因也聖人且得而離於言乎非言者道之詣也聖人且得而不離於言乎夫何故傳天下以其道而不示天下以其因天下何從而詣其詣哉詣其詣則不因其因矣雖然詣其詣而不因其因可也未詣其詣而不因其因可乎是故不得離於言不離於言者不廢其道之因也不廢則恃此之道恃彼之愚是故不得不離於言離於言者不恃其道之因也以道之因者可忘而廢言見人之迷於塗而莫之指者也以道之因者不可忘而恃言指人以塗而謂之家者也莫指其塗天下自此絶指塗為家天下自此愚堯之朱舜之均親不親而近不近也丹朱之不肖舜之子亦不肖言可以教人而傳道也則朱均久矣其堯舜也然同室之朱均不堯舜也而異世之洙泗有堯舜焉記擅弓曽子曰商吾與女事夫子於洙泗之間退而老於西河之上則夫子之心超然獨詣堯舜之詣也言可恃耶言不可恃耶聖人憂焉欲廢言而天下之人豈人人而心孔子之心詣堯舜之詣也欲恃言也則天下將死於吾言之中而不生乎吾言之外非吾言之死天下也死天下之見也天下之見所以死乎吾言之中而不生乎吾言之外者吾言之盡而天下亦以為聖人之言盡於此也天下以吾言為盡故捐其思捐其思故死其見死其見故貌信乎吾言而心無得於吾道非無得於吾道也不自得其得也嗟乎言也者心之翳也曉天下者暗天下者也易曰書不盡言言不盡意繫辭上子曰云云然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言嗟乎聖人之憂天下深矣乎而或者以為聖人之意聖人之不能盡於言聖人之言聖人自不能盡於書也嗟乎聖人天地也今夫天能生物而不能盡生地能載物而不能盡載則天下有不笑其妄者乎聖人之言非不能盡意也能盡意而不盡也聖人之書非不能盡言也能盡言而不盡也曷為不盡也不敢盡也中庸曰有餘不敢盡此易與中庸之妙也然則曷為不敢盡也憂其言之盡而人之愚也漁者之於魚也有小其得者有大其得者小其得者必澗溪者也大其得者必江海者也江海之所以江海夫豈若是澗溪然哉水石鑿然以明而蟲魚歷然以見也淵乎其茫也黝乎其幽也是故求者加深則得者加大也聖人之作易其初有卦而已象烏在其後有象矣辭烏在最後有辭也如未始有辭也杳茫深微不可得而近也非不可得而近也不可得而近者所以致人之近也人致於易則近於易矣人之常情近則知逺則疑故易之逺者所以投天下以疑而致天下之思也思則見見則悅悅則研研則詣故聖人作易也不示天下以其道之詣而指天下以其道之因既曰因矣可得而盡哉天下因吾之不盡而求吾之盡則道也者聖人得而祕也耶夢飲酒者覺而言之於童子童子曰奚而醒也彼以為真飲也不悟其夢也或者曰聖人不能盡言盡意也其見與童子異不異也禮此篇聖人示天下以可踐道無所倚有所踐有所倚則天下莫之稽無所踐則天下莫之居莫之稽道之瀆也莫之居道之棄也聖人以道而寄於經以悟於後乃至於瀆與棄瀆則道不神棄則道不行道之經首於易以易而後道不瀆以禮而後道不棄聖人之慮微矣蓋天人之理性命之源仁義道德吉凶悔吝紛然齒於卦而形於象卦之中又有卦而象之外又有象焉此所以為無所倚也無所倚則無所窮無所窮者聽天下之人各入其入隨至其至也是以天下仰其神而稽焉雖然道則神矣不瀆矣天下之人聖不數也賢亦不數也而愚不肖則不疏也聖人之經為聖賢而作也不為愚不肖而作也則有易已多矣否也則以不疏之愚不肖而舉責之以不數之聖賢是却天下之進於聖賢而堅天下之心使安於愚不肖也是故聖人本之以不倚而進之以可踐禮也者所以示天下之可踐也圜不以規方不以矩運斤而成風惟匠石可也莊徐無鬼篇郢人堊漫其鼻使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷欲舉天下之工而皆匠石也皆不規不矩也則天下之工有棄其斧斤而去爾何則無所可踐也易者聖人成風之斤也禮者聖人規矩之器也匠石不以匠石而廢規矩故無匠石而有匠石聖人不以聖人而廢禮法故無聖人而有聖人蓋道有所可踐而後天下有所可居易之言曰神無方也易無體也彼且無方則不可以體見不可以方求則契其方者出乎方者也不可以體見則得其體者遺乎體者也欲天下之人皆出乎方契其方遺乎體得其體嗚呼難哉是故有禮焉如是而君臣父子如是而冠昏喪祭如是而交際辭受如是而出處進退嚴乎灑掃之末以達乎精義之神動容周旋之頃而禮皆至焉其義粲然無所不可知而其地畫然有所必可踐其造也有塗其入也有門則不惟聖賢可踐而居也愚不肖者孰不可以勉而踐踐而居哉有可踐則天下得以不置其足於道之外有可居則天下得以置其身於道之內使天下之人置其身於道之內而不置其足於道之外相敬相愛相安相養以至于今禮之教也而老者曰失道德仁義而後禮又曰禮者忠信之薄三十八章失道而後德失德而後仁失仁而後義失義而後禮禮者忠信之薄而亂之首也嗟乎去禮以求忠信是去裘以求襖者之智也且禮亡則道德仁義其猶有存歟嘗觀老之徒有問乎聃者鴈行避影而後進而聃未輕告也已則一日不可無師弟子之禮而天下獨可一日無君臣父子之禮耶人有一朝三飯於家而教其鄰以避穀之方者此可信也哉樂此篇論觸天下之機天下有同然之機不動於靜而不得不動於動不得不動於動者執其機以觸其機也聖人欲天下之趨於道而不得天下同然之機而執之則觸焉而無動也觸焉而無動則能使天下之吾從而不能使天下之自從使天下之吾從者天下從聖人者也使天下之自從者不從聖人者也從聖人者非從聖人之至也不從聖人者從聖人之至也蓋從聖人則亦勉焉以從於人未必得於已勉而往亦必廢而歸是故所從者雖聖人也人耶我耶至於不從聖人而自從者非其心欣然而啓也其何能決然已趨也欣然以啓而後聖人之道有以投決然以趨而後聖人之道有以驅故夫天下之情不病其不決然病其欣然者之不動也欣然之心一動則聖人之道有不勸而行不挽而進不噓而髙不引而深者矣是故欣然之心者進退之機也歟聖人者得是機而執焉復執是機而觸焉惟其不觸天下也觸則天下之機動矣然則天下之所以決然趨於道者聖人有以動其道之機也其初易之道無所倚而聖人申之以禮之可踐冝亦可以少足矣雖然禮之道可以踐也而踐之者未必決然也豈非欣然者未動而勉焉者獨行歟人之情速於得而禮緩之以遜渴也而百拜乃得飲飢也而日昃未得食揚修身篇日昃不食肉肉必乾日昃不飲酒酒必酸賓主百拜而酒三行夫雍容文雅之化固天下之所不能廢而周旋委曲之節無乃天下亦有所不盡安者耶夫使天下之情有所不盡安則聖人之道其行豈得而逺也道行於暫而不行於逺是未得天下欣然之機也得其欣然之機而道可以逺矣且生者天下之至愛也死者天下之至畏也而兵家者率天下之人以趨其所至畏而捐其所至愛也此亦有所甚難者矣令發而士之坐者涕霑襟卧者涕交頥此宜有所甚不樂者矣然鼓鼙之聲鏜然以鳴則三軍之士躍然以奮悲者喜惰者激至於殺身而不自還則有以動其欣然之機故也故未得天下之機而執之者可以動之而趨於死也聖人之道非如兵家使天下趨於死之危也趨於道者趨於安也聖人者執其機而觸之則天下之趨也孰禦今夫金石絲竹八物之善鳴此其於吾道何與焉而聖人之經繼禮以樂者何也人物幽憂而不樂者散之以嘯歌有所鬱結而不平者銷之以管絃聲之入人心易也然則天下欣然之機不寓於八物之質而寓於八物之聲也聖人得其機之所寓而執之以觸天下之機是故取仁義道德之意而播之於恬愈平淡之樂使聽之者心悅悅之者心喻必有渙然而解欣然而契者矣樂之功用至此而天下不知也惟其不知乃深於知也歟善乎孟子之言道也曰樂之實樂仁義是也樂則生矣生則烏可已也烏可已則不知手之舞之足之蹈之也夫聖人之樂至於使人手舞足蹈於仁義之中而不自知此化之妙也堯舜禹湯文武周公孔子者不示其機者也孟子者不祕其機者也書此篇論聖人形道之形易者道之聚也禮者道之檢也樂者道之安也聖人之道聚之以易則求者足檢之以禮則肆者約安之以樂則入者豫使天下之於吾道足而約約而豫聖人於此畢矣乎曰未也道之聲固不親於道之形也且夫道未始有聲也而有形也耶道無聲也而聖人聲之以言是謂道之聲雖然可以啓天下之聽而未有以信天下之觀啓天下之聽者聲也信天下之觀者非聲也形也形信而後聲信道果無形耶道猶天也天果無形耶天有是形故有是聲形者非聲之聲也聲者非形之形也風起於虛而颯然霆震於空而轟然此其聲非不足以信於萬物也使無蒼蒼者以麗焉則風霆者自託之無所而何物之信也哉今夫道者道之形言者道之聲形信而後聲信雖然吾非不知道者道之形也而誰其見之見秋毫於千里之外者離婁乎抑衆人乎離婁能喻衆人以已之所見而不能使衆人見其所見聖人者道之離婁也易禮樂者離婁之所以喻衆人者也衆則何敢疑乎離婁而亦豈能信乎離婁也耶何則以已之目傳之天下之目猶非已之目也而况以已之目傳之天下之耳哉然則聖人何以信天下之觀蓋天下之無形莫鬼神若也而聖人能使鬼神之有形况於道乎祭之有尸所以形鬼神之無形也道獨無形耶堯舜禹湯文武周公者其道之尸也歟聖人作經是以有書夫書也者所以立道之尸以形道之形以申夫易禮樂之所未言者易禮樂之作也聖人曰此為易此為禮此為樂天下不可一日而不知不可一日而不行也知而行則聖則賢則君子否則愚則鄙則小人知而行則治則安則存否則亂則危則滅天下則從聖人矣雖然知而行者誰歟嚮之而成者誰歟背之而敗者又誰歟天下不見其事則曰此聖人之私言也聖人於是作書以信其道曰古之人有曰堯者有曰舜者曰禹者曰湯者曰文武者曰周公者此知易禮樂之道而行之者也此得易禮樂之學性而身之者也其成就何如也反是則桀也紂也四凶也而已矣則天下之為君臣父子者前有慕後有警慕心一生則信道而必行警心一生則不疑道而不行嗚呼不知易禮樂之可行者毋觀之易禮樂而觀之書則易禮樂豈其欺不知書之已行者毋觀之書而觀之易禮樂則書豈其難不欺故可信不難故可至易禮樂者聲教書者形教嗚呼經至於書備之矣詩此篇論聖人收天下之律天下之善不善聖人視之甚徐而甚迫甚徐而甚迫者導其善者以之於道矯其不善者以復於道宜徐而迫天下之善始惑宜迫而徐天下之不善始逋蓋逋因於莫之矯而惑起於莫之導善而莫之導是謂窒善不善而莫之矯是謂開不善聖人反是徐其所不宜迫而迫其所不宜徐經之自易而書非不備也然皆所以徐天下者也啓其扃聽其入坦其軌縱其馳入也馳也否也聖人油然不之責也非徐矣乎雖然是足以導天下之善也天下皆善乎天下不能皆善則不善亦可導乎聖人之徐於是變而為迫非樂於迫也欲不變而不得也迫之者矯之也是故有詩焉詩也者矯天下之具也而或者曰聖人之道禮嚴而詩寬嗟乎孰知禮之嚴為嚴之寬詩之寬為寬之嚴也歟蓋聖人將有以矯天下必先有以鈎天下之至情得其至情而隨以矯夫安得不從蓋天下之至情矯生於愧愧生於議議生於衆愧非議則安議非衆則私安則不愧其愧私則反議其議聖人不使天下不愧其愧反議其議也於是舉衆以議之舉議以愧之則天下之不善者不得不愧愧斯矯矯斯復復斯善矣此詩之教也詩果寬乎聳乎其必譏而斷乎其必不恕乎詩果不嚴乎惡莫惡於盜而懦莫懦於童子乎今夫童子誑其西鄰之童而奪之一金不怍也而東鄰之童旁觀而逺見之則怍焉見其奪也而又以告其不見者則怍焉者病焉不惟見也不惟告也見者與不見者朋譏而羣哂焉則不惟怍也不惟病也則啼焉則歸之金焉夫何其不怍於奪而怍於見故曰矯生於愧夫曷不啼於未譏未哂之先而歸其奪於譏與哂之後故曰愧生於議議生於衆夫奪人者汙也奪而歸之者潔也其汙也可擯其潔也可進奪於先而歸於後汙初而潔終君子將不恕其初乎將掩其終乎則譏為譽根哂為德源矣故曰愧斯矯矯斯復復斯善矣詩人之言至發其君宫闈不修之隱慝君子偕老刺衛夫人也夫人淫亂失事君子之道鶉之奔奔刺衛宣薑也衛人以為宣薑鶉鵲之不若也而亦不捨匹夫匹婦復關溱洧之過氓詩乘彼垝垣以望復關不見復關泣涕漣漣溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉溱與洧方渙渙兮士與女方乘蕳弓歌詠文武之遺風餘澤大雅文王文王受命作周也大明文王有明德故天復命武王也而歎息東周列國之亂王黍離詁訓傳第六黍離閔宗周也君子于役刺平王也楊之水刺平王也兔爰閔周也桓王失信諸侯背叛哀窮屈而憎貪讒深陳而悉數作非一人詞非一口則議之者寡耶夫人之為不善非不自知也而自赦也自赦而後自肆自赦而天下不赦也則其肆必收聖人引天下之衆以議天下之善不善此詩之所以作也故詩也者收天下之肆者也今夫人之一身暄則倦凛則力十日之暄可無一日之凛耶易禮樂與書暄也詩凛也人情之不喜暄而悲凛者誰也不知夫天之作其倦強其力而壽之也天下之於易禮樂詩書喜其四愧其一孰知聖人以至愧愧之者乃所以以至喜喜之也歟春秋此篇論夫子之所以政聖人之心有所必不肯而有所不得不肯其所必不肯者身焉則優也家焉則戾也天下焉則敗矣聖人獨得遂其所必不肯也耶聖人之心非不欲喜怒之不作湛乎以止而粹乎以和也然嘗試行之家子弟僕妾之善猶不善不善猶善也則其家立而亡也而猶可行之天下乎是故喜善怒惡聖人未必肯也不賞善不罰惡聖人得而肯哉夫子之反自衛也其於經繫焉制焉作焉定焉刪焉孟序吾自衛反魯然後樂正雅頌各得其所乃刪詩定書繫周易作春秋勤矣哉而志獨在於春秋孝經序子曰吾志在春秋行在孝經蓋老而不疲不就則不瞑何也五經者夫子之所以教也春秋者夫子之所以政也徒教而不政堯舜不能以經一世而夫子能以經萬世哉問夫子者曰子奚不為政而夫子答以是亦為政彼見夫子之不見於人也而不知其政於天也彼見夫子之不見於今也而不知其政於後也夫子之教行故天下即其善去其不善夫子之政行故天下畏其不善以利其善畏其不善者夫子有罰政也利其善者夫子有賞政也以王而不天以公而不即位隱元年春王正月注隱雖不即位然攝君行事夫子之罰政上亦不恕乎君之惡也以臣而或字之隱九年春天王使南季來聘注南季天子大夫南氏季字也以裔而或國之莊二十三年夏荆人來聘注聘書荆人蓋楚之始通未成其禮僖元年秋楚人伐鄭注荆始改號曰楚夫子之賞政下猶不捐乎小之善也或者曰春秋天子之事也孟子云知我者其惟春秋乎罪我者其惟春秋乎夫子匹夫也匹夫而行天子之政吾恐夫子之不自脫於罰也而奚以賞罰人為是不然夫子之身則匹夫也夫子之職則非匹夫也天也文王也周公也以天而視文王則警與譴不在夫子乎以文王而視周公則訓與責不在夫子乎以周公而相天子以令天下則賞與罰不在夫子乎非夫子求其警與譴訓與責賞與罰之柄也天與文王周公以是柄與夫子也然則何以知是柄之非求而天與文王周公與之也曰吾不知也非惟吾不知也而夫子亦或知或不知也夫子曰文不在兹又曰吾不復夢則文王周公以是柄與夫子夫子知之矣至於天以是柄而與夫子則雖夫子亦不自知也知則不可知而隱則不可隱也然則夫子猶不自知而曷為不可隱也天以與夫子而可隱則儀封人者孰告之孰發之耶儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸莫之告而告莫之發而發則封人之言者人也其所以言者天也然則天與文王周公與其夫子者如此其急也夫子而緩其急辭其與獨不得罪於天與文王周公也耶故春秋者天子之事也天子無賞罰而夫子有天子之所無者躬乎天與文王之道而塞乎周公之職以佐天子之賞罰也然則夫子之賞罰非孔氏之私政也天下之公政也而夫子何過焉且經曷嘗曰此丘之為哉書元書春者天之臨也書王者天子之臨也書公者魯之臨也隱元年公及邾儀父盟于蔑二年春公會戎于濳天不得臨周周不得臨諸侯魯不得臨國乎得臨之斯得賞罰之矣罪我者其惟春秋以迹不以情也夫子之思不可謂不審矣嗚呼聖人之於天下後世教詳而政明如此入夫子之教者出夫子之政者也出夫子之教者入夫子之政者也入其賞政猶未逺於教也出其賞政猶得入其教哉入有三而學者能取其二出有二而學者能去其一則夫子之道幾矣十先生奧論注前集卷八
