body:
  text: 十先生奧論注後集卷十四五經論葉適總論古之治足以為經不待經以為治後世待經以為治而其治未能出於經其事宏大廣逺非一人之故一日之力而儒者欲以簡易言之此所以謾然而莫得其統也上古聖人之治天下至矣其道在於器數其變通在於事物其紀綱倫類律度曲折莫不有義在於宗廟朝廷州閭鄉井之間其教民周流登降㑹通感應之節而誦說其所以然之意使之自得於心而有餘於身以行之於君臣父子夫婦昆弟在於望官其波頽風靡而天下之人無不根於性命間於道德而習於死生之變其治之若此至於承弊改法聖人繼出損益文質先後迭施治有異而不相廢道有同而不相襲故其言語文字或始之以陳其義或終之以紀其成言與事遷書與世易蓋皆可以為經而當時之天下不待是以為治周室既衰聖王不作制治之器喪失而不存或其器僅存而其數廢缺而不明民之耳目無所聞見心無所正而其上下始習為鄙詐戾虐之行風俗日以敝惡而相趨於亂孔子哀先王之道將遂湮沒而不可考而自傷其莫能救也迹其聖賢憂世之勤勞而驗其成敗因革之故知其言語文字之具者猶足為訓於天下也於是定為易詩書春秋之文推明禮樂之器數而黜其所不合者又為之論述其大意使其徒相與宗之以遺後之人然猶曰如有用我者其為東周蓋經者所以載治而非以為治也其後卒以大亂戰國吞滅秦漢崛興天下蕩然不復堯舜三代之舊其後學者無所依據於是始皆求之於書而孔氏之經遂行於天下故儀封人見曰天下之無道也久矣天將以夫子為木鐸而孔子亦曰天之未喪斯文也嗚呼豈非天哉自是以來句斷章解補緝壞爛厯世數十而不能相一蓋至今百有餘年之間豪傑之士相因而起始能推明其說務合堯舜三代之舊以無失於孔氏之遺意蓋自伏羲至於孔氏而道始存於經自孔氏至於今而經始明有能施之於治殆庶幾乎㑹之於心驗之於物其行之以誠其裁之以義其聚為仁其散為禮本末並舉幽顯一致卓乎其不可易也雖然將即是經以求其制度器數之等而盡復堯舜之舊歟則其世逺矣其事往矣迂暗而不明牽合而難通而天下病矣夫不必求之堯舜三代則將節文而自為之歟則內顧自疑而不敢為雖為之而無所折衷則民不從矣然則姑守其所聞以為如是而足以治歟則無驗於事者其言不合無考於器者其遒不化論髙而實違是又不可也徘徊旁徨久而不得定歟則好為異論以敗經者將遂出其間矣是又不可以不懼也噫世無聖人而天下之所恃以為治者是經之空言而已以其未能出於經也是以治亂之效無以異於前世其難齊之俗致變之由或反甚焉夫擬天地之變化觀治道之離合如此其大也及其經之明如此其難也世之君子可以即其故而深思矣詩此篇論詩言周最詳夏商逺矣書籍所載存其大略而其詳不可得而言矣詳而可言者莫如周言周之最詳者莫如詩夫人之治始於艱難而成於積纍七月陳王業也周公遭變故陳后稷先公風化之所由致王業之艱難也及其天命既集極盛而太平文王文王受命作周也既醉太平也至於始衰而復興車攻宣王復古也宣王內修政事外攘夷狄復文武之竟土遂微而不振黍離閔宗周也周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去故作是詩也與其後世嘗更塗炭之民憂傷悲怨思䝉其道而不可復得者皆見於詠歌而極於形容故夫學者於周之治有以考見其次第難易雖逺而不能忘者徒以其詩也詩之興尚矣夏商以前皆磨滅而不傳豈其所以為之者至周人而後能歟夫形於天地之間者物也皆一而不同者物之情也因其不同而聼之不失其所以一者物之理也堅凝紛錯逃遁隱伏無不釋然而解悠然而遇者由其理而不可亂也是故古之聖賢養天下以中發人心以和使各由其正以自通於物絪緼茫昧將形將生陰陽晦明風雨霜露或始或卒山川草木形著茂長髙飛之翼蟄居之蟲四時之迭至聲氣之感觸華實榮耀銷落枯槁動於思慮接於耳目無不言也旁取廣喻有正有反比次抑揚反覆細繹大關於政化下於鄙俚其言無不到也當其抽辭涵意欲語而未出發舒情性若止而不窮蓋其精之至也夫言語不通嗜欲不齊風俗不同而世之先後亦大異矣聽其言也而文不能違焉此足以見其心之無不合也然後均以律吕諫以官師金石震蕩節奏繁興羽旄干戚弦匏簫管被服衮黼拜起揖遜以祭以宴而相與樂乎其中於是神祗祖考相其幽室家子孫協其明福祿盛滿橫暢旁浹充塞宇宙薰然粹然不知其所以然故後世言周之治為詳最者以其詩見之然則非周人能為詩蓋詩之道至於周而後備也夫王道之始自盛而入衰則天下之心始自親而入怨蓋幽厲以來忽亡天下無以整齊諸侯而一其民其勢如冰合而忽解雲附而忽散刀鋸斧鉞如林而起同壤異制而權衡小數始出於政令之中矣然猶深原憤發能思其先君祖考之舊以寬意敢忘而不敢叛敢怨而不敢怒嗚呼仇者親之對也逆者順之資也苟未至於不可以悔而或可以收者則皆眷然而不忍慨然而有欲為者矣然則於其周人之治不獨以其極盛者而言之蓋其衰而猶若此也至於削滅潰壞亡失其舊而不可復考然後泯然而不作矣然則詩亡然後春秋作豈不信哉雖離騷詩之變也史記屈原為上官大夫讒王怒而疏之故憂愁幽思而作離騷離騷者猶離憂也離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣賦詩之流也選皇甫謐三都賦序子夏序詩二曰賦故知賦者古詩之流也異體雜出與時轉徙又下而為俳優里巷之辭然後詩之類也寬閒平易之心必習為怨懟無聊之言莊誠恭敬之意必變為侮笑戲狎之情此詩之失也夫古之為詩也求以治之後之為詩也求以亂之然則豈惟其見周之詳又以知後世之不能為周之盛極而不可及也書此篇論常心天有常道地有常事人有常心何謂常心父母之於子也無不用其情言不意索而傳事不逆慮而知竭力而不為父者不告其人者必以告其子此之謂常心其於人也不然以外之不常喪其所常矣夫天地之常而得之於物也不後而將不先而逆喜怒哀樂稱事之當然而不為過見之者疑乎拙其於庶物也無窮聖人得是心也奉而行之用其厚去其薄用其朴去其巧用其不知去其知廟堂之謀其於野人必忠告而求聞焉天地不能違鬼神不能問復合而為一是故哀憐慘怛保衛刑政以救其民而復其常今夫外乎人之思慮而不出於所則知者其事文以深其謀密以巧伏於潜淵之下而動於九天之上使其卒然莫得其所從事亦其心之放也謂之非常故亂生於非常不祥莫大焉蓋自秦漢以來儒者爭言唐虞三代之事其化功流行而風俗純美天文地理之極莫不順序至於自言其一代之治則何其淺陋鄙野而不足愛其君者往往誘使致焉而其君亦皆愧恥其意不敢庶幾其萬一蓋將從而不能及也夫聖人之道其有遏絶於後世固若是之逺者何耶昔者孔子序書録上古之帝王於其興事造業布政出令以經理天下之際始於受禪終於征伐已略盡矣堯典昔在帝堯將遜于位遜于虞舜舜典帝曰格汝舜詢事考言乃言底厥績二載汝陟帝位正月上日受終于文祖大禹謨帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師湯誓伊尹相湯伐桀泰誓武王伐商今其存者其智謀非有以出於人也其行事非有矜於衆也以天為不可不敬以民為不可不畏以已為不可任以諫為不可逆患至而不敢避功成而不敢居酌天下之心而處其中如是而已矣先事而憂已事而思天下皆安而聖人自危其防慮畏謹有家人父子所不能知是故智者以為愚勇者以為怯辨者以為訥聖人之常心獨守而不失此其所以為大也穆王始喪其常心周行天下上崑崙涉瑶水以觀天地之所極車馬不足以給其役貨財不足以充其求列周穆王篇穆王遊化人之宫大悅肆意逺遊命駕八駿之乘别日升崑崙之丘以觀黃帝之宫遂賔于西王母觴于瑤池之上西王母為王謡王和之至於邈然衰耄始為祥刑之書以命吕侯蓋其意悲哀焉吕刑篇穆王訓夏贖刑作吕刑惟吕命王享國百年耄荒度作刑以詰四方云云監于兹祥刑秦繆公過周襲鄭千里用兵以貪得國之功怒其臣蹇叔以為悖繆而無智既而敗師囚將無隻輪匹馬之返復班其悔過之意誓於羣臣秦誓篇穆公以代鄭晉襄公帥師敗諸崤還歸作秦誓公曰惟古之謀人則曰末就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆左僖三十二年杞子自鄭使告于秦曰鄭人使我掌其北門之管若潜師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之三十三年敗秦師于崤獲百里孟明視西乞術白乙丙以歸髙唐邁濟河焚舟賦苟孟明之載戰也前空山肉填平地血流四馬隻輪蕩然不收夫二繆皆好異者也及其既老而悔復其常心而孔子猶有録焉又况於其能常而勿失者乎悲夫無惑乎後世之極言於帝王之盛而終以不能致者也夫教不至者殺養不足者剝仁不足者斷今也喪其常心而君臣上下相飾以智相鬬以巧愈出而愈竒愈用而愈疑蓋自秦漢魏晉隋唐之君務為非常不測之智以愚其民抗焉而為之上方合而遽散幾得而復失而欲以空心庶幾於唐虞三代之治是猶桀之譽堯北行而求其越也豈不悖哉夫反常以合常以其心求帝王之心其為易而無難也然且自愧其不能為自恕其不得為使天下之民欲被父母之化終不可得而以聖人不復起於後世者惑矣易此篇論聖人以道易天下易非道也所以用是道也聖人有以用天下之道而名之以為易易者易也夫物之推移世之遷革流行變化不常其所天地之至數也聖人己見之矣是故以道易天下而不待其所自易逆其端萌察其逆順而與之終始自有天地生民以來至於成周之衰雖帝王異號更易不一而未嘗有大變極亂如後世之酷者聖人迭起而能以道易天下故也嗚呼自秦漢而下者何其禍亂之酷耶彼惟無聖人不能以道易天下而聽其自易天地之數與人心之不肖適相尋於無窮是以潰散而不可支故夫聖人推為仁義禮樂制為生殺賞罰作為宫室器用序為尊卑名品文字以通其心志權衡以一其偏私舉皆歸之於易而文王孔子立於憂患之世有以見天下之情而懼其不能知則又重之以示其變繫之而存乎辭而易之為書備矣係辭下八卦成列象在其中矣因而重之爻在其中矣係辭焉而命之動在其中矣書之未備也易存乎道見道者足以為易書之既備也易存乎書天下即其書而觀之易書備而易始窮矣測之以象數别之以筮占離析其卦爻而推之以於事物之故辨智幾殫而不得其毫芒於是陰陽律厯曲學小數時日下俚之說與夫素隱行怪窺測異端恢絶不倫之士埋伏於山林草野之間者皆有以自託於易故後世以易為幽逺難通之書其上下出入鬼神恍惚不可窮詰而無以為用於天下嗟夫聖人非不知卒之至於此而猶為之豈其亦有所不得已者耶夫循其本而至其末由聖人之作易而至於天下之人能讀易之書則其卒之如此亦何足怪也是故莫若反其本而論之曰卦曰彖曰象曰爻此其所以為易而天下後世之所共知者也係辭上彖者言乎象者也爻者言乎變者也然至於求之而莫得其當夫天地水火雷風山澤此八物者一氣之所役陰陽之所分其始為造其卒為化而聖人不知其所由來者也因其相摩相蕩鼓舞闔闢設而兩之而義理生焉故曰卦說卦天地定位山澤通氣雷風相薄水火不相射八卦相錯乾為天坤為地震為雷巽為風坎為水離為火艮為山兑為澤是故有亨有否有行有止而人則配之後有聖人焉推而明之故夫彖者所以推明其義理之所從生而全其為是卦之意者也象者所以言其為得是卦者也而聖人君子先王後帝雜取而用之以之修身以之應物而無所不合夫因八卦而兩之而後有義義立而後有用然後聖人之所以察天地陰陽而擬其身者矣是故曰神曰變無思無為而神明其德者皆其勢之當然而非有獨異於人也係上參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此又曰是興神物以前民用聖人以此齊戒以神明其德夫故君子之用易莫切於象爻者所以備一卦之事者也有卦則有易有易則有太極太極立而終始具矣易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶同上因而兩之而變生焉故兩者所以明變而六者所以為兩也夫因是四者而求之而聖人之道與易之用書未知孰離也然後其所以用是道者可復見矣然則其所以為易者何也夫孔子則既言矣天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正亂禁民為非曰義又曰闢户謂之乾闔户謂之坤一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用謂之神嗚呼思過半矣周禮此篇論其言說未具先王之治不見於後世德淺功薄而俗化陋儒者為之感憤太息思有以易之而未能自信於必行則皆求之於經於易所以見其載道之用者也於書所以見帝王之處天下者也於詩所以見其天下之處其君之心者也而春秋者所以禁其為非而反之於道以明其必不可違天下之大義而獨任其私欲者也夫苟為得道之用而又知其君臣上下相為報施之心以折之於是非豫奪之際是足以易後世之治為先王之治而無難矣然而尤未能盡信者以其說之未具也蓋周禮六卿之書言周公之為周至於建國設官井田兵法興利防患器械工巧之術咸在凡成康之盛所以能補上世之未備而後世不可復加者其先後可見而本末可言也於是儒者莫不為之欣然自喜以為可以必行而無疑也雖然使先王之治所以必不行於後世諛聞寡見之君因遂以為經為不可盡信者其必自是書始矣夫其說之未具也是誠若不可行焉吾其待其具而行之何哉工之為器也得規矩而通之天下之器其可方可圓可窊可橢者皆規矩之類也故法存於心巧形於物器成而天下利未有盡待其法而盡用其巧者也有賤工焉執三代之器而用今之材閉户而模之出户而視諸人人不能識也則强之而莫之就售是其材非不美也今夫周禮之書嘗一用矣非惟不足以治而乃至於亂孔子之於經也微見先王之意而不盡載其所以為之之說其告門人弟子與其當時之人所以問之政事詳矣若曰修身以應變酌古以御今然後繼周者百世可知也子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也奈何取其說之具者而徒加之後世哉且又有大不可者非特此也古之治天下者必辨其內外小大之序而設施其繁簡詳略之宜三代之時自漢淮以南皆棄而不有方天下為五千里而王之自治者千里而已其外小大之國千餘皆得以自治其正朔所頒禮樂征伐自天子出朝㑹貢賦賢能之士入於王都此特其大者也而其生殺廢置猶不為小者天子皆不與焉而天子之自治者亦斷然如一國不能過漢之數郡又有聖賢而為之臣皆久於其官而不去其為地狹為民寡而治之者衆始之以勤終之以無倦行之以誠故其米鹽繁密無所不盡而宫內之隱可以悉有之書而無所愧蓋其自治者至則諸侯之效上也捷輔相之尊通行於四海而教率之而天子又為之巡狩其國以一道德同風俗而正其律度量衡故觀之象曰先王以省方設教言下觀而化也今也包夷貃之外以為域破天下之諸侯以為郡縣事雖豪髮一自上出法嚴令具不得搖手而無聖賢為之臣不能久於官而遽去而又有苟簡詐僞之心生焉乃欲其米鹽委靡無所不盡以求合於周禮之書而又易其大者將以縱井田封建之舊此其論所以髙而難行人情不安而至於亂也夫因今之地用今之民以周公為之其必有處此矣然則讀是書者深思而徐考之可也春秋此篇論聖人之終事春秋道之極也聖人之終事也天地之大義在於君臣父子兄弟夫婦朋友賔主之交其尤精者上通於陰陽旁通於無間古之聖人其必有合是而出是者矣其於治人也止惡而進善有不同焉止之於心而不行之於事人不見其自治之迹而已不多其能自治之功是雖聖人不能加焉有已則有私有私則有欲而既行之於事矣然而知仁義禮樂之勝已也折而從之則聖人之治之也佚是其次也仁義禮樂有不能勝則聖人之治也始勞矣然而聞人之非已也必以為懼聞人之是已也必以為喜是故因其所喜懼而治之是又其次也是已不喜非已不見不喜者自弃也不可者自暴也冝何以治之而察其情也其必不為善則慕夫賞其必為不善則畏夫罰聖人之治人至是止矣嗚呼使其止於是而天下惟吾之所治則春秋何獨為而書止於此有人焉不惟無所喜懼而欲自為是非不惟無所畏慕而欲自為賞罰其視天下也眊眊焉而期乎亂是又不幸當王道之衰是非不公而賞罰不行聖人以為今不能治也不若揭而示之於無窮嗟夫彼何人也以一時之得而易無窮之名故夫春秋之所為作者所以治夫仁義禮樂是非賞罰之所不能治者也雖然慕無窮之名而為善畏無窮之名而不畏惡此猶天下之中人也其所以率為而莫或制者豈其真無所畏而然耶曰逆理敗道不自列於人類者皆其欲之流也至於定則未有不反其本矣故崔杼能為弒君而不能殺其書已之史官襄二十五年夏五月乙亥齊崔杼弒其君光齊豹𨽻也奮於一攻難以求除其丹書之惡昭公二十年秋盜殺衛侯之兄摯仲尼曰齊豹之盜而孟縶之賊此何弔焉凡天下之惡有未至於杼天下之賤有未至於豹仁義禮樂之所不能誘是非賞罰之所不能革堯舜三代之治雖不復行而是書猶有所勸也是故由孔氏以來二千餘載易詩書之道未明也其用於當世以為援據折衷者春秋而已故曰春秋者道之極聖人之終事也嗚呼無仁義禮樂無是非賞罰以區區之書禁天下之惡而歸之於善聖人之用法已嚴矣而學者又以嚴求之則人情之所不能堪其弊必至於盡弃其書而天下大亂而不可救此則學為春秋者之過也雖然無責焉已耳彼無聖人之心而用春秋之法則責備者以為疵而明微者以為訐矣是故從其三而觀之一曰情二曰勢三曰理人之為不善其必有不自得於中者也人之施已也不以道而後已之報物也不可反聖人獨有察焉是之謂情迫於不可止動於不能已强有加於弱小有屈於大不知其然而然者也是之謂勢夫如是則宜若無罪焉可也雖然舜能事瞽瞍而天下不能為子書大禹謨舜日號泣于旻天于父母負罪引慝祗載見瞽瞍䕫䕫齊栗箕子能事紂而天下不能為臣史宋世家箕子紂親戚也紂始為象箸箕子歎曰不可振也紂為淫泆箕子諫之不聽人或曰可以去矣箕子曰為人臣諌不聽而去是彰君之惡而自說於民吾不忍為也乃被髮佯狂為奴湯事葛文王事昆夷而天下不能為國孟唯仁者為能以大事小是故湯事葛文王事昆夷是何耶是未之思也是之謂理察其情因其勢斷之於理而春秋始可得而言矣不以情不以勢其心不厭然而服我則誰肯自負於空言之理哉嗚呼是道之極而聖人之終事也十先生奧論注後集卷十四
