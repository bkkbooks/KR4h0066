body:
  text: 十先生奧論注前集卷二聖賢論楊萬里曾子無聖人之天而求至乎聖人之地其至者否也然則其孰為地孰為天仁也者聖人之地也力也者聖人之天也堯舜之所性湯武之所身孔顏之所傳惟此一事故夫仁也者聖人之地也學聖人而不求至其地是欲歸其家未及門而宿於牆之外也然則仁何事於力子曰仁之為器重舉者莫能勝其為道逺行者莫能至又曰有能一日用其力於仁矣乎而冉求亦曰非不説子之道力不足也故夫天下之重者莫重於不重之重而太山為至輕天下之力者莫力於非力之力而烏獲為至羸仁也者不重之重也聖人也者非力之力也夫惟有非力之力者然後能舉不重之重不然子貢之辨子路之勇足以屈天下震諸子而一登聖人之門動靜語默弛然廢舉其辨與勇納之懷而無所用之然則必有非力之力而後能舉此不重之重者也蓋夫口易強而有辨也身易強而有勇也資難強而有力也非有其天其誰實能之故曰力也者聖人之天也無其天而求至其地無其力而求舉其仁此楚人之所以學烏獲而死者也昔者楚人有慕烏獲之力而學之其里之父欲持千鈞之負而適秦者聞楚人之力也而請焉楚人者欣然而試負之然肩之而不能勝勝之而不能步步之而不能至秦強而走焉不十步而絶筋折脛以死學者無聖人之力而求舉聖人之仁吾懼其負而不能勝勝而不步步而不至秦也故夫烏獲可慕而不可學也有烏獲之力而舉烏獲之負可也無烏獲之力而試烏獲之負可乎烏獲之力千鈞之負不可試也而况聖人之仁而可試乎哉有其力而堪其負其惟曾子乎曾子曰士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎曾子之力庶乎聖人之力者也何也其力𢎞然後肩之而能勝其力毅然後勝之而能步曾子之於仁𢎞以肩之毅以步之其至於秦無難也雖然輕天下之重者重而不之覺邇天下之逺者逺而不之慮曾子亦覺其重而慮其逺者也子曰仁者安仁安則重者輕夫何覺又曰我欲仁斯仁至矣至則逺者邇夫何慮此聖人之事也曾子未及也故曰曾子之力庶乎聖人之力者也雖然任重而能堪堪之而不釋道逺而能趨趨之而不息秦雖去楚逺矣其庸不可至乎而况吾仁非若秦之去楚也哉曾子也雖未能如聖人之不覺其重不慮其逺之安也仁以自任死而後已曾子其不至於仁乎子思曰或安而行之或利而行之或勉強而行之及其成功一也曾子之謂矣顏子道可遇而不可傳非真不可傳也遇則可傳不遇則不可傳矣何謂遇以吾之有迎彼之有是謂遇遇則不相拒而不遇則不相受不相受而求相傳是煮石以求其為粥也薪可盡斧可穿而粥不可成何也粥固石之所必無也天下之事從其有而迎其有則其功易取其無而納以有則其功難而况於以道傳人而傳於不相受者耶蓋不相受而求其傳吾雖挈然有以與之彼則茫然不知所以受之吾雖昭然有以示之彼則暗然不知所以覩之彼非不受不覩也彼固無以受無以覩也舉珠玉以授無指而責其不玩指日月以示無目而責其不仰可乎若夫手與目具者惟恐吾之不授不示也授則受示則覩矣不惟授而後受示而後覩也雖不授之猶將取之雖不示之猶將窺之何則彼固有以遇也手與珠玉遇則其取不可禁目與日月遇則其覩不可閉大哉遇乎聖人以道而傳於人不有遇之何以傳之雖然聖人之於人固不忍以不遇而不傳亦不可以不遇而必傳不遇而不傳天下將以吾為絶不遇而必傳天下將以吾為拂拂之則有所不勝而絶之則又有所不悅聖人於此難矣哉以夫子而傳顔子顏子之幸耶曰非顏子之幸也夫子之幸也何也夫子之無難也何也遇而非傳也夫惟遇而非傳是以傳而必遇吾嘗觀夫子與回言終日而回不違其契蓋如此也契原於順順原於遇今夫日能消氷而不能消水豈日之樂乎氷而祛乎水哉氷與日相受而水與日相捍故也夫子之於回其日之與氷歟何其遇而順順而契也然則回與夫子之契豈夫子之言能啓人而顏子之聽則聽人也耶夫子之言能啓人也則難言之童啓矣回之聽能聽人也則車馬輕裘之言入矣然則夫子之言言不以言回之聽也聽不以聽言不以言則言者天也聽不以聽則聽者亦天也以夫子之天觸回之天以回之天感夫子之天是惟無合合則遇矣夫何違之有當其未言回意已傳及其既言回意無外使夫子一笑而回已領矣而况與之言終日耶或者曰回何功於後學也參如回則無其孝經矣門人皆如回則無論語矣有經而道猶不傳也回也日居於韶濩鐘磬之側而弗考弗擊使有耳者無聞焉非過歟違生疑疑生問問生道而回也不違也嗟乎道以言而通亦以言而塞非言之能塞道也失之也一失而為訓詁再失而為辭章言之盛道之衰也不有回之學何以使學者知有妙學哉學者棄其學以學回之妙學則盛者衰衰者盛矣盛者未盛而衰者未衰曰回之無功於後學也宜也孟子仁可得而求乎曰可仁可得而聞乎曰不可仁不可聞則學者烏可求曰求以不言不求以言蓋體仁者心也而心非仁喻心者言也而言非心言道非心也而言可以求仁乎哉言之非心也以言有所不能言也非惟彼心之仁不能言於吾也吾自求之吾自得之吾自不能言之矣人有生而不能飲酒者問酒之何味其能飲酒者不過告之以酒之美而已若酒之所以美者雖能飲酒者亦不能自言也非吝於告也極天下之善言酒者止於此也就使能言而不止於此亦不能使不飲者之知味何則吾以其言言酒而彼以其聽聽酒而言與聽卒非酒也韓子曰博愛之謂仁程子曰非也仁者覺也吾將是韓子則夫子之言有不然者顏回問仁子曰克已復禮為仁於博愛何與焉吾將是程子則夫子之言有不然者樊遲問仁子曰愛人於覺何與焉仁之不可言也如此然則仁不可言二子之論烏乎歸曰吾將歸乎夫子然則夫子之論是不一也烏乎而得歸於夫子曰吾將由孟子以歸夫子程子者得夫子之潛者也韓子者得夫子之彰者也孟子者得夫子之潛與彰而據其會者也孟子曰惻隱之心仁之端也又曰今人乍見孺子將入於井皆有怵惕惻隱之心嗟乎孟子之言仁蓋至於此止乎然則曷謂惻隱曰是不可言歟孟子之言及於惻隱蓋假惻隱以明仁而惻隱非仁也今於惻隱之外又求惻隱之説正使惻隱之説明而仁愈晦矣雖然試言之隱也者若有所痛也惻也者若有所憫也痛則覺覺則憫憫則愛人之手足痺而木者則謂之不仁蓋方其痺而木也搔之而不醒扶之而不恤彼其非不愛四體也無痛癢之可覺也至於無病之人誤而拔一髮則百骸為之震何也覺其痛也覺其一髮之痛則愛心生不覺四體之痛則愛心息孟子曰不仁者以其所不愛及其所愛此不覺於人者也曰人病舍其田而藝人之田此覺於人而不覺於身者也曰指不若人則知惡之心不若人則不知惡此覺於身而不覺於心者也以覺吾之痛覺彼之痛則愛人以覺彼之痛覺吾之痛則自愛自覺而自愛則何理之不悟覺人而愛人則何物之不覆是故不愛始於不憫不憫始於不覺不覺始於不痛古之君子以不如舜為憂此一痛也以一夫不被其澤為責此亦一痛也故曰痛則覺覺則憫憫則愛然則克己復禮仁也愛人仁也博愛之謂仁仁也仁者覺也仁者何也均惻隱之心也故曰孟子得夫子之潛與彰而據其會者也雖然孟子則善言仁矣何與乎學者之事哉學者誦孟子之言者也吾知惻隱之為仁也市門之儈終日導千金之賈而鬻於市歸其家無一錢之藏則外而不內也孟子之言仁何與乎學者之事哉孟子曰苟能充之足以保四海苟不充之不足以事父母學者蓋亦求其所以充之也哉十先生奧論注前集卷二
