body:
  text: 十先生奧論注後集卷五七聖論陳傅良七聖論序余觀天下之變傷古不復見也作七聖論人之言者唐虞之法不如夏夏不如商商不如周吁法愈備而人愈澆天下所以至於秦漢也歟古之聖人居世之變而不與焉者惟文王故離之而繫其未云堯舜此篇論舉元凱去四凶風俗之變聖人起之也故夫聖人有所利於天下者必有所病於天下火之伏也噓之則然扇之則炎猛獸寢于山其怒而嘷也必或驚之其貪而殺也必或誘之夫天下之機心莫之禁也猶火而易擾也猶猛獸聖人之初蓋不急於立而震之也兹非其材之不足於立而智之不足於慮也如是可以治矣則亦無好於有為也夫如是可以治矣而好於有為者皆起於愧其所不能而求工其難聖人惟不求夫工也則雖有所遲焉若畏缺焉若偷而弗以為巳愧是聖人非惡夫成而固遲之也而憂其成之速而弊也非惡夫備而固缺之也而憂其備之極而巧也吾力足以成矣足以備矣而畢取焉以為名則風俗之變巧日益滋弊日益亟而後之必有不可支者矣惟己之快而後之人無繼者聖人不為也故寧有屈於其名而推其餘以及後人昔者觀書至於堯未嘗不惑之也共工之欺堯知之矣而去之不以時堯典共工方鳩僝功帝曰吁靜言庸違象共滔天四嶽舉鯀堯曰不可而嶽猶曰試鯀堯聽之未害及鯀用而無成則嶽之責也奚辭同上帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圮族嶽曰异哉試可乃巳帝曰往欽哉九載績用弗成而堯不加夫知其欺而縱之不若未之知猶憚也責之無辭而難之則是苟有辭者莫得而詰之也巳然則宜去弗去宜責弗責亦奚以厲天下者嗚呼堯非不知其無以厲天下或者將有以議己也而犯人之議也弗恤而且安之唯憂天下之變而不敢震之也一傳至舜四凶之未誅誅之十六相之未舉舉之見左文十八年夫族大難擊而新進者易疑舜奮焉擊人之難而進其所疑動之以其所未嘗而收天下之權而天下健其誅之之快而决其舉之之驟而舜之法始詳於天下噫詳天下之法者舜也而斫天下之朴者亦舜也孔子之論堯舜曰大哉堯之為君君哉舜也蓋思堯也夫其嘆舜也夫禹此篇論貢助徹之法一聖人作必有以勝乎古之人者矣吁愈作而愈勝吾固憂其所終也是故舜之勝堯禹之勝舜非舜禹之美事也時之及聖人不能却其來則勢之積雖聖人亦不可保其往也則舜禹亦不得以為之也後之聖人又有以勝之者矣而天下之變遂至於窮焉而無所歸世之議者曰治地莫善於助莫不善於貢嗟夫貢之猶有所不善也固所以遺商周也助之盡善是其所以開秦已矣何者天下之理是非之相因而成毁之相仍故法不可以極而弊常生於積美之後民之初混焉生羣焉居而已夫其混焉生羣焉居貴賤無别而彼此不相為用甚逸而可樂也則其戴聖人而君之者非意也勢也唯其利也而昏於其智之不察也其害也而窘於其材之不禦也其爭也而紊於其謀之不决也彼見夫聖人之不類也而其智之足以察也才之足以禦也謀之足以决也則因聚而君之以求其如是之欲而已聖人者亦供其如是之求而已上之人初無所取於其下也下之人初無所奉於其上也夫上之人無所取乎其下是無法也下之人無所奉其上是無禮也後世聖人謂是不可以久也於是乎有貢嗚呼自其貴賤之無等彼此之不相為用至於上得以取其下而下得以奉其上則亦既詳矣羽皮不如絲麻絲麻不如衮冕佩玉至其有衮冕佩玉人始艱於自檢且將放焉以惟安之求則曰不如袒裼之適夫絲麻雖質民不病於寒而衮冕佩玉之飾盛民始病於禮故凡近質者猶可措其未施之智而盡飾者益滋其無已之情是故人之情不可使之甚便而君子之治亦難乎其無餘巧也以無餘之利足甚便之欲而天下之患日益故曰井田之成阡陌之生也彼秦人以其功利之心一旦破先王之井田而阡陌之天下亦卒不以此患苦之而亡秦也前食貨志秦孝公用商君壞井田開阡陌破先王之舊而天下不患苦之者則亦已有所厭而喜其新幸其有所縱而解其甚也巳故孔子曰虞夏之道寡怨於民商周之道不勝其弊記表記云吁聖人固己憂天下之必秦而悲夏之道不可復見也哉湯此篇論援天以自神聖人而有所立也猶懼其天下之變也聖人而有所變則亦趨天下而詐之也巳矣凡人之情弗堪於尊卑貴賤之檢恥役於人而樂於亡辨未嘗不欲一决而逞也而聖人為之禮為之法禮之可愧而法之可畏故天下不忍犯君之尊而憚其嚴雖然禁人己詳而人情不自勝猶懼其僭而至於篡狎而至於無所忌也而聖人又將易之而自肆乎其外動天下之兵加諸其天下之君而曰吾亦以為理吁吾身禁之吾身犯之則天下蕩然弗顧且至於大亂亡日矣聖人憂焉曰道之在天下覺之而信愚之而尊故為之明以易天下之見而道信為之幽以難天下之知而道尊信以行吾道之常而尊以通吾道之變心吾知其明也卿士吾知其賢也庶人吾知其公也索之冥冥探之茫茫而謂之卜者果何取也見獨而未孚議搖而未固心失其明卿士失其賢庶人失其公卜一施焉則獨者孚搖者固故心也卿士也庶人也為之明而卜也為之幽吾取焉而用其自神之機而寓之曰天天之說行則斯民也動於其所不測而安於今日之所未嘗意其固然而忘其前日之所不可其見聖人也天而不神而見其君也獨夫而不君而後禮法可以無廢吁天之說所以愚天下之耳目而濟禮法之窮而聖人病矣嘗觀於商其書必言卜盤庚上下稽曰云云其詩必推祥異商頌𤣥鳥祀髙宗也天命𤣥鳥降而生商鄭氏箋天使鳦下而生商者謂鳦遺卵有娀氏女簡狄吞之而生契其懼民必以其祖考意見書盤庚而其禮則嚴於祭那頌祀成湯也烈祖祀中宗也長發大禘也殷武祀髙宗也孔子亦曰夏道尊命敬神而逺之商人尊神先鬼而後禮記表記云則商俗之鬼史漢髙祖紀太史公曰殷人承之以敬敬之敝小人以鬼自湯之援天以自神焉始也書湯誓有夏多罪天命殛之又曰致天之罰湯誥天道福善禍淫降災于夏肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏蓋嘗論之當周之衰諸侯之僭極仲尼欲繩之而位匹夫也以匹夫之位而繩諸侯之是非其名日益僭春秋之作於是乎書王隱元年春王正月云云湯欲加其所不可加於天子而託之天仲尼欲加其所不可加於諸侯而託之王吁吾是以為聖人病也武王此篇論偃武修文聖人之始為天下也同之而已矣而未始震之也其次則震之也己而未始愚之也又其次則愚之也矣而未始媚之也媚天下焉以利而厭其心而幸其不叛而聖人之術蓋至於治周而已窮嗚呼亦其風俗之世薄也古者君近民以寬而民之待君以嚴故聖人之治簡而直安而無忌天下之情亦願而聽命歡愈而無怨是以堯舜之於天下取之不謝捨之不請儻然受之當時不怪其無故之獲悶然釋之亦不尤其為是苟異也自商以來上之人不固也以懼下之心未孚也以疑夫上日以懼雖欲有專焉而不敢肆意以為下日以疑則少有不慊於其中也巳族而竊議於其後聖人遭風俗之㑹亦因以其術維之而已幸而便於治今則雖欲留焉以資後人亦不可得吾於周之治蓋悲武王周公之居其巳甚而出於其無可為而說者曰是其所以為能亦惑也巳孔子論商民之敝曰蕩而不靜勝而無恥周民之敝曰利而巧文而不慙表記云嗚呼盡之矣武王之所以偃兵而自疏其非忍散財發粟以致其愛書武成散鹿臺之財發巨橋之粟多其文章綢繆其禮樂以調伏其怒蓋皆洽之以歡揉之以柔以鎮其靜而滿足其無恥之俗之心而其弊也則利而巧雖歡之而不德也文之而不慙雖柔之而不情也則雖有武王周公者承之天下且不可以復見况乎其無武王周公者承之也子貢贖人不受金孔子過之曰魯自是不復贖人矣家語致思篇魯國之法贖人臣妾于諸侯者皆取金於府子貢贖之辭而不取金孔子聞之曰賜失之矣自今以後魯人不復贖人於諸侯云云以賜之賢贖人而不利焉宜好名之趍也而遂至於不贖何也天下之情惟期乎巳勝者不可以復加者則亦莫之勝也己莫之勝者無繼則魯之人不贖也果矣周之道其所以不可勝者是其所以不可繼也伊尹此篇論湯伐桀段之以信天下人心之疑舉天下之口以辨焉不解也而唯一無心者足以定之均千金之産雖其父兄不敢以意屬諸其鄰二人之爭必塗之人曲直之而後釋蓋無心者天下之所信而自固也昔者湯之仁天下之德之者衆矣桀之不仁天下之讎之者亦衆矣彼其德湯而讎桀也則湯之興天下必以為是而其伐桀天下亦孰以為非雖然或者是其所德而非其所讎天下之心猶有疑也何者天下之人固有不忍恩湯以自便而雖被桀之虐必不敢怨焉者在也且夫君臣之分甚明而理亂者勢之常數則幸國之釁而易其君又仁人之所不為豈有天下而無仁義之人則湯之仁也吾將以為固然桀之不仁吾亦安之於無可奈何而已必不忍德湯以叛君不敢以桀弃而不之臣也夫使天下之大有一夫惻然乎湯之不忍歸而愓然乎桀之不敢去則聖人所不取嗚呼此伐夏之師所以至伊尹而定也彼伊尹者耕畎畝之中以樂堯舜之道者也桀之暴也不加湯之聖也不聞彼其心何嘗利湯而病桀哉湯三聘之而悶然而應薦之桀者五反而衎然而適則其心又非欲興湯而亡桀也夫其不病之也而非欲亡之也而至於醜夏而不留夫其不利之也而又非欲興之也而至於歸亳而不辭然則桀誠不足以有天下而天下果不可以無湯夫而後向之不敢恃者以自决而不忍者亦以安而湯之伐桀天下始晏然無疑孔子序書曰伊尹既醜有夏復歸于亳伊尹相湯伐桀微伊尹雖湯亦無自信於天下也哉周公之東征邦人有艱之者周公曰民獻有十夫為之也而後邦人無異議蓋嘗論之以湯伐夏猶假伊尹以信以周公伐商猶假十夫以信故夫湯周公有無心之實而伊尹十夫有無心之形與聲徒實而形與聲不孚焉而動天下之兵者三代不為也嗚呼而况乎其實之併亡也周公此篇論誅𬋩叔而封武庚武王之封武庚也存商之仁也固存商之仁也亦安周之心也以人之臣虐其君而取其天下雖盛德民之不疑者蓋寡而重弃其孤翦焉其族而覆之祀民心之疑不解矣民疑而不解天下不可居也故夫封武庚亦安周也吾行仁而不失其自安之道武王之計得矣而周公從而殺之周公之殺武庚非武王之意也聖人之為不如是其甚也兄殺其弟父殺其子人則曰吾固疑其弗利於商也其號曰有之而固將徐絶之也武王之繼商不情也周公一誅而被武王不情之名則周公之心豈安嗚呼周公之誅管叔其諸以謝天下歟且管叔非叛周也叛周公也武庚則叛周也非叛周公也管叔之罪私而武庚之禍大蓋武庚蓄未逞之謀而發於管蔡之隙管叔不勝其忿以成武庚掎角之勢則周公之致辟于武庚而寬管叔之誅也似可何至於戕其兄嗚呼周公之誅管叔其以謝天下也武庚叛也管叔亦叛也周公而施於武庚而置管叔是屈於親而法獨行於讎也叛均而罰異則天下偏周公之刑矣偏周公之刑則不情武王者管叔不忍殺也是故周公寧忍於管叔夫周公而猶忍於管叔則非甚於武庚矣天下無甚周公之辭而後無疑武王之心故周公能以其身犯戕兄之不祥亦不纍其君父以弗利商之謗悲夫其仁於君父也夫昔者帝舜誅四凶人而封其欲殺巳之弟而天下咸服孟萬章問曰象日以殺舜為事立為天子則放之何也孟子曰封之也或曰放焉萬章曰舜流共工于幽州放歡兜于崇山殺三苗于三危殛繇于羽山四罪而天下咸服誅不仁也象至不仁封之有痺有痺之人奚罪焉仁人固如是乎在它人則誅之在弟則封之石碏殺州吁而及其子厚君子曰義左隱四年州吁未能和其民厚問定君於石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圖之陳人執之而請涖於衛九月衛人使右宰醜涖殺州吁子濮石碏使其宰獳羊肩涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎蓋象不濟四凶之惡則舜可以私厚與州吁之謀則石碏不得不公也由此觀之管叔無連商之罪則周公亦可以無誅吁管叔之無連商而可以無誅周公欲也雖然吾亦悲周公之未有以處武庚者十先生奧論注後集卷五
