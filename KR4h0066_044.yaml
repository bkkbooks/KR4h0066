body:
  text: 十先生奧論注續集卷十四進論鄭湜君體一此篇論聖質非可恃聖學所當本有聖質必有聖學質非聖人之所恃也有聰明聖知天縱之質而不知至學之本其於天下國家必有悖理傷道不中節者矣終不可入於聖人之域堯舜禹湯文武之所以聖非特其質過人以有堯舜禹湯文武之學也堯舜禹湯文武所以不作於後世者豈後世之君絶無堯舜禹湯文武之質哉數聖人學不傳也漢髙祖豁達大度寬仁愛人髙祖紀寬仁愛人意豁如也常有大度其質固有於詩書者然雖銷印輟洗從諌如流酈食其欲立六國後漢王刻印張良發八難漢王令趣銷印又沛公踞牀使兩女子洗郡生不拜長揖日不宜踞見長者於是沛公起攝衣從之而溺愛易嫡爭臣不能救諌上欲廢太子立戚夫人子趙王如意張良曰此難以口舌爭也誅秦蹙項雖方此其壯而傾鵕冠之婉媚公卿乃因以關說佞幸傳漢興佞幸寵臣髙祖時則有藉孺非有才能但以婉媚貴幸與上卧起公卿皆因關說其雄略雖足以駕馭桀猾而伉廉嫚侮商山之老齊魯大儒終不肯從之游張良傳四人年老皆以上嫚侮士故逃匿山中又叔孫通傳召魯諸生三十人魯有二生不肯行文帝恭儉𤣥默化民以躬刑法志文帝躬修𤣥默化行天下二十三年如一日可謂盛德矣然惜百金之費不營露臺而賞賜弄臣纍百巨萬文帝贊曰文帝即位二十三年宫室苑囿無所增益以露臺直百金乃罷之見鄧通甚說尊幸之賞賜巨方稽古禮文謙遜未遑賈誼傳誼以為當興禮樂帝謙遜未遑又新垣平有玉杯之詐而眩於玉杯之說及議制度封禪號稱寬厚而所學者申韓其與廷尉議刑常過於刻儒林傳孝文本好刑名之言又盜玉環事詳見張釋之傳唐太宗文武之才英烈之氣自足髙出前古然優游王魏𨗳人使諌魏徴傳貞觀之初𨗳人使諌而有不殺此老之恨魏徴傳何時殺此田舍翁力行仁義欲與三王比隆魏徴傳此徴勸我行仁義既效又膠王道彥傳贊欲與三代比隆而窮兵伐遼乃欲求勝於隋氏太宗伐遼詔李績為遼東道行軍大總管率兵二萬討之破其國制度紀綱雖足為子孫憑藉而家法不正父子兄弟之間為有慙德太宗紀太子建成與齊王元吉謀害太宗未發太宗以兵入𤣥武門殺太子建成及齊王元吉夫髙帝之度孝文之仁太宗之才雖古之聖君不過如是然而所蔽乃與庸主相類者何也可以為聖賢之君者是質也其蔽不免類庸主者不得聖賢之學也使三主者挾如是之質而留意於聖賢之學袪其所蔽擴而充之則功業所就豈止為漢唐之君哉世之人主明智者或失於苛察果决者或暗於先入强毅者或鄰於自用英鋭者或喜功而貪利夫明智也果决也强毅也英鋭也皆明主之美質也天下所喜聞而欣道也然有是質而反以害治而便嬖姦巧之人從而窺伺其質之所向而陰投之滋其蔽而甚其惑者學不足用其是質也古之帝王亦豈外是質而能為聖人哉然而心曠然無偏繫嬖佞不能移功利機巧不能入雖明智足以照物而無先事之察雖果决足以主斷而無偏信之惑雖强毅足以有立而無輕待臣下之意雖英鋭足以有為而無謀淺妄動之躁同是明智爾同是果决爾同是强毅爾同是英鋭爾然居之無所蔽用之而不偏者學之力也廣厦之下細旃之上留意藝文表章經術親與經生儒士考論同異寧不曰學乎曰非聖賢所謂學也夫學者所以正其心也堯舜禹之所以精一大禹謨人心惟危道心惟微惟精惟一允執厥中湯之所以日新仲虺之誥德日新萬邦惟懷文之所以純亦不已者記中庸文王之所以為文也純亦不已果何所致力哉皆所從事於其心也何則心者萬物之一源聖人所以治天下之本也是心虛明純一則事之是非利害君子小人忠邪之情狀昭然吾前是心一差則諛佞得而誘之左右得而蔽之憸巧得而乘之作於事害於政皆自端發耳天錫人主之質雖有所甚美必有所甚偏所謂明智也果毅也英鋭也皆其所甚美而不能無偏也心能用其質則質之美者日以充大而偏處日以消融是心既差則其病必於其質之偏處而發而并其質之所甚美者而汩亂之是以聖賢不恃其有過人之質日就月將體察其病之所從起而究其病根之所伏而治之至於學力純至足以化其質而不為質所勝則其發也未有不中節者矣嗚呼此乃堯舜禹湯文武之所以作聖人之地又奚止於治天下哉人主幸而有可致之質不以堯舜禹湯文武所以為學者為學而自期望止於漢唐之君惜矣君體二此篇論人主有是權當有以用是權人主所制天下之命者權也權之在我雖不可一日脫於手然知操而不知縱知收而不知散知翕而不知張則權雖在我而我終無以用是權也有是權而不能用譬之於物非不枵然大也然挈之則不能運錯之地又懼有負之而去者不幾於廢物乎夫惟聖人者能屬人以權而權不下移舉天下之權攬於我而無吝權權移於下則國不立吝權以自用則國無與共功者然既屬之人矣而不下移者操縱自我也我既攬之而不吝於人者我提其要也世之人主不能自執天子之權故權移於下又恐權之下移執之而至於自用此所以兩失之也今夫人主所為置宰輔捐爵祿而崇寵之者非以夫萬幾不可以自治故擇人而委之耶然則論議政事進退人才乃其職也若夫政事不出於中書而指撝悉自於㫖意人才不繇於廟堂而驟遷驟罷於冥冥無據之中以此為能收威福之柄在已又焉用彼相曰政事出於中書論議皆當耶人才由於廟堂進退皆能公耶使皆當而公則天子安用自勞哉既不能皆當而公則夫天子自執其權者宜也曰吾惟擇其人而用之以議論進退之權而授之其或當耶否耶公耶私耶然後吾從而黜陟之如是則議論進退之權雖在宰相而黜陟宰輔之權實在人主也苟預疑不能為公與當也而奪之權無誤於委任以制斷由已為權柄昧於責成以齷齪順㫖為忠純使材者鬱蓄而無所施不才者得以默默而安其愚則成敗是非之責盡歸於人主而威福之柄乃隂奪於私門烏在為權在我也孰若授之權而懲其不公與其不當者使進得以效其忠退有所顧忌而不敢其委任之體豈不博大而責之術豈不甚精且核耶且大臣之任自與有司不同人主之權又與臣下不同人主惟不自用乃能用人人主不用人而自用何異於臣下乎大臣侵有司之職猶且不可而况人主奪臣下之權乎夫天下之才之夥政事之繁决非一人聰明所能預吾既疑大臣而不能屬之以權則夫所與議論進退此者果誰耶必左右曲躬附耳者得以售其奸矣然則吾之執權而自用乃姦人之幸也夫世之奸臣欲得其君之權非肆然而據之彼固隂有以使權移于已雖明主所不悟也何者明主必欲操天下之權彼惟因其欲操天下之權也故間摘事之可喜而說之使益奪臣下之權一侵則彼之說益進明主惟見威福之出於已而不知彼實借吾權以行其說則權實在彼也此人主所以喜奪大臣之權而忘其機柄之旁落也是以自古明主執權而自用者其遺患於國或甚於庸主漢宣帝懲霍氏之弊躬總核之政宣帝贊孝宣之治信賞必罰綜核名實雖甚尊寵丙魏然所與出納樞機裁可政事者皆出於中書尚書故其功雖足以中興然所以滋恭顯亦不薄也循吏傳序漢世良吏於是為盛稱中興焉又詳見𢎞恭石顯傳光武號稱總攬權綱本紀明謹政體總攬權綱量時度力舉無過事然薄三公之任不付以事方其無事時權雖在人主繼之幼少而大柄委於內而無所屬故外戚閹宦乘間而竊之雖三公憤激而不能救之者權素奪也太傅陳蕃上疏誅中官夫二君攬天下之權而執之所以求為無失也然其末流權歸於嬖戚乃有甚於大臣之専何也患生於所偏而勢失於所不料此操權者所深戒相體一此篇論大臣當自正君心始大臣欲相其君大有為於天下者必自其正君心始何者心者將大有為之本也心正則天下之事無不可為者矣小人不待逐而去也政事不待更而修也心不先正今日逐一小人明日復用一小人今日修一政事明日復害一政事用力戛戛而𫝑愈踈矣假令其君能暫親君子逺小人屏私意立政事以與我戮力有為於一時他日之敗必自其心發之也傅說之相髙宗也其反復啓沃之端惟曰典于學耳書說命念終始典于學厥德修罔覺方商之中衰髙宗之所以夢想良弼者書說命上夢帝賚子良弼其代豫言固欲與共中興之業也說起版築之間謀不及此者孟告子上傅說舉於版築之間蓋說之所恃與中興商家者髙宗之心先之以學以正其有為之本則撻荆楚朝諸侯有天下固已在說與髙宗二人規摹中矣管仲一見桓公便許以霸業不數年九合諸侯一正天下功烈非不偉也左僖公二十四年齊桓公置射鉤而使管仲相論語九合諸侯不以兵車管仲之力也又云管仲相桓公伯諸侯一匡天下然仲不知正君之學以為肉腐於爼酒腐於觴不足害霸及桓公之心一蠧則三奸擅國六嬖多寵齊敗掃地矣向來九合之功業齟齬而不立也仲之所以先正於君心者度其君不能聽則功業齟齬而不立也與其功業齟齬止於圖霸不成耳君心既蠧其禍豈止於不霸哉觀仲之速成而遽壞則知傅說之相業所從來逺矣戰國之世上益急於就功名獨孟子以格君心為已任以為一正君而國定君不鄉道不志於仁而求為之富强是輔桀而富之也後世貶管仲最深者莫若孟子蓋學術之源殊也嗚呼傅說不作正君之事不復見孟軻既沒正君之學不得其傳後之君子雖有致君澤物之意而不探古人之本忠智者能以謀謨舉天下之事功而已然知求治而未知正君也直亮者能危言正論繩君之愆謬而已然知規過而未知養德也君不正治不可保也德不養過不可勝改也魏徴能使其君信其行義之說而不能救其晚節窮兵之失魏徴傳帝謂羣臣曰此徴勸我行禮義既效矣又太宗征遼東歸後歎曰魏徴若在使我必無是行宋璟能使其君勵精以成開元之治而不能去其女寵奢侈之敗張九齡贊開元間勵精求治故宋璟言聽計行裴度能使其君果斷以成平蔡之功而不能止其貪利昵小人之害韓愈頌平淮西碑云此蔡功惟斷乃成夫喜功好大之心即向者與徴力行之心也𤣥宗荒於女寵奢侈之心即向者與璟勵精求治之心也憲宗貪利昵小人之心即向者與度果斷成功之心也心一爾曷為正於前遽變於後乎曰此非三宗之過也徴未死已有欲殺此翁之語舊唐書曰何時殺此田舍翁則太宗好諫之心已敗於此矣璟猶居相位宇文融遽以言利幸宇丈融贊言利得幸者踵相躡皆本於融云則𤣥宗侈心已萌於此矣度平蔡未歸李揆皇甫鏄已相本傳皇甫鏄由聚斂句剝為宰相則憲宗明斷已荒於此矣吾謂璟與度知求治而未知正君之過也徴知正君矣然知規過而未知養德之過也然則正君之術果何如哉邪正之機一也導人以邪者必委曲彌縫之然後陷於邪而不自知使其心果知邪之為非寧肯從吾於邪乎况强人以正者豈可以一趨而直入於正哉蓋嘗以易求之孟子而觀之正君之術焉坎之六四曰樽酒簋二用缶納約自牖見本卦釋者曰牖明處也言人臣欲以忠信善道牖納之君者必自其明處乃能入也人心有所蔽有所明就其明處而導之推而入於所蔽則自悟矣暌之六二曰遇主于巷見本卦釋者曰巷致曲之地言當暌之世君心未合有不可直致其意者當盡誠致曲使之信合也孟子因齊宣王不忍一牛之死遽以為是心可以合於王而語之王道者方其不忍殺一牛之時乃其仁心所發見也於此引而達之則油然生矣此納約自牖之義也宣王自言其好貨好色之疾孟子不直折其所好乃就其所好而為之說也使之與民同者大抵色與貨與民同之則已之所好者必薄矣所以潛移其病根也此遇主于巷之義也大臣所以啓沃其君者豈止如諍臣徒强之於言語口舌哉惟因其所明而悟入之使得其天理之本然致曲而達之使漸入而不苦其難夫然故道而弗牽强而弗抑安居而不反君心庶其正乎或曰古之帝王正心誠意之學先已得於上故君臣之間以都俞訓誥相與磨礱浸潤之耳後世人主長生於深宫所以害其心者非一朝一夕也豈遽得而正諸曰是心天理之所寓也使天理可滅耶則吾不知天理果不可滅豈終不可感悟以復其正耶吾所以正之之術有未至耳十先生奧論注續集卷十四
