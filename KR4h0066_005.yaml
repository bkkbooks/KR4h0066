body:
  text: 十先生奥論註前集巻五古聖論陳傅良伊尹人心之疑舉天下之口以辨焉不解也而唯一無心者足以定之均千金之産雖其父兄不敢以意屬諸其鄰二人之爭必塗之人曲直之而後釋葢無心者天下之所信而自固也昔者湯之仁天下之徳之者衆矣桀之不仁天下之讐之者亦衆矣彼其徳湯而讐桀也則湯之與天下必以為是而其伐桀天下亦孰以為非雖然或者是其所徳而非其所讐天下之心猶有疑也何者天下之人固有不忍思湯以自便而雖被桀之虐必有不敢怨焉者在也且夫君臣之分甚明而理亂者勢之常數則幸國之釁而易其君又仁人之所不為豈有天下而無仁義之人也哉天下而有仁義之人則湯之仁也吾將以為固然桀之不仁吾亦安之於無可柰何而已又不忍徳湯以叛君不敢以桀棄而不之臣也夫使天下之大有一夫惻然乎湯之不忍歸而惕然乎桀之不敢去則聖人所不取嗚呼此伐夏之師所以至伊尹而定也彼伊尹者耕畎畝之中以樂堯舜之道者也桀之暴也不加湯之聖也不聞彼其心何嘗利湯而病桀哉湯三聘之而幡然而應薦之桀者五反而衎然而適則其心又非欲興湯而亡桀也夫其不病之也而又非欲亡之也而至於醜夏而不留夫其不利之也而又非欲興之也而至於歸亳而不辭然則桀誠不足以有天下而天下果不可以無湯夫然後向之不敢者轉以自决而不忍者亦以安而湯之伐桀天下始晏然無疑孔子序書曰伊尹既醜有夏復歸于亳伊尹相湯伐桀㣲伊尹雖湯亦無以自信於天下也哉周公之東征邦人有艱之者周公曰民獻有十夫為之也而後邦人無異議蓋嘗論之以湯伐夏猶假伊尹以信以周公伐商猶假十夫以信故夫湯周公有無心之實而伊尹十夫有無心之形與聲徒實而形與聲不孚焉而動天下之兵者三代不為也嗚呼而况乎其實之併亡也周公武王之封武庚也存商之仁也固存商之仁也亦安周之心也以人之臣虐其君而取其天下雖盛徳民之不疑者葢寡而重棄其孤翦焉其族而覆之祀民心之疑不解矣民疑而不解天下不可居也故夫封武庚亦安周也吾行仁而不失其自安之道武王之計得矣而周公從而殺之周公之殺武庚非武王之意也聖人之為不如是其甚也兄殺其父弟殺其子人則曰吾固疑其弗利於商也其號曰存之而固將徐絶之也武王之繼商不情也周公一誅而被武王不情之名則周公之心豈安嗚呼周公之誅管叔其何以謝天下歟且管叔非叛周也叛周公也武庚則叛周也非叛周公也管叔之罪私而武庚之禍大葢武庚蓄未逞之謀而發管蔡之隙管叔不勝其忿以成武庚掎角之勢則周公之致辟于武庚而寛管叔之誅也似可何至於戕其兄嗚呼周公之誅管叔其以謝天下也武庚叛也管叔亦叛也周公而施於武庚而置管叔是情屈於親而法獨行於讐也叛均而罰異則天下偏周公之刑矣偏周公之刑則不情武王者管叔不忍殺也是故周公寧忍於管叔夫周公而猶忍於管叔則非甚於武庚矣天下無甚周公之辟而後無疑武王之心故周公能以其身犯戕兄之不祥亦不累其君以弗利商之謗悲夫其仁於君父也夫昔者帝舜誅四凶人而封其欲殺已之弟而天下咸服石碏殺州吁而及其子厚君子曰義葢象不濟四㓙之惡則舜可以私厚與州吁之謀則石碏不得不公也由此觀之管叔無連商之罪則周公可以無誅吁管叔之無連商而可以無誅周公欲也雖然吾亦悲周公之未有以處武庚者堯舜火之伏也嘘之則燃扇之則炎猛獸寢於山其怒而嘷也必或驚之其貪而殺也必或誘之夫天下之機心莫之禁也猶火而易擾也猶猛獸闕聖人非惡夫成而固遲之也而憂其成之速而弊也非惡夫備而固缺之也而憂其備之極而巧也闕四凶之未誅誅之十六相之未舉舉之夫族大者難擊而新進者易疑舜奮焉擊人之所難而進其所疑動之以其所未嘗而收天下之權而天下徤其誅之之决而快其舉之之驟成湯故為之明以易天下之見而道信為之幽以難天下之知而道尊信以行吾道之常而尊以通吾道之變者也嘗觀於商其書必言卜其詩必推祥異其懼民必以其祖考而其禮必嚴於祭闕湯欲加其所不可加於天子而託之天仲尼欲加其所不可加於諸侯而托之王闕文王天有力故行健地有力故博載日月有力故運照而不息闕洞矚幽眇目之力也聴别洪纎耳之力也握持運掉手之力也趯盪趣蹌足之力也闕以火煉金則金精以事煉心則心精闕均曰性也惟聖人能性其性彼不能者情雜之也均曰神也惟聖人能神其神彼不能者意雜之也闕是以方寸之地精之則為靈明虛靜之府雜之則為塵垢滓穢之囊闕故心有兼人之力者應對起居而不亂力又倍者喜怒哀樂而不亂人又倍者死生憂患而不亂闕譬之甘泉珎木滌其源則益清培其根則滋茂此文王之純亦不已也文王吾於書得聖人之人於易得聖人之天堯舜之典直而大湯武之誓曲而重伊尹之訓峻厲周公之誥優柔聖人之事亦畧盡矣闕且天下之不可謝者時也萬物之不能逃者數也日之夕也暝月之晦也魄露之朝也晞氷之春也泮其時至其數窮也固也形不能自緘氣不能自柲闕従而為之則於道虧却而不為則於民病闕噫禹不能避謳歌獄訟之歸湯不能使徯者之無怨故禹而辭歸者弗受之也則天下必以為異湯而簡怨者弗恤之也則天下必以為忍夫使一人而有異禹之言而後禹従而聴之則人將以禹為要已使一夫而甘忍湯之言而後湯従而為之則人將以湯為要已夫如是則雖天下而不居以居是故禹不敢異而後天下安夏湯不敢忍而後天下安商伊尹湯武之師非不知後世之議已而周公之過亦自知其不免也然安於其議而不知顧知其不免而卒不獲逃焉者何也湯武周公非嫌名也吾身獲萬世之美名而天下有不可一朝居之禍兹固湯武周公所深憂也是故寧以吾之不足而易天下之大利而不敢以吾身之名而廢天下之安是以湯之徳寧有慙武之樂寧未善而周公亦安於其後之貶也闕首伐桀之謀亦既非矣鳴條之師如釋而放其君於桐人其謂我何十先生奥論註前集巻五
